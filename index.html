window.showSubReasonModal=function(subReason){
  const f=getFilters();
  const{storeIdx,catIdx,reasonIdx,subReasonIdx,custIdx}=_LS_IDX;
  if(subReasonIdx<0){alert('Specific reason column not found');return;}
  const allFiltered=filterLS(f);
  const rows=allFiltered.filter(r=>{
    const v=String(r[subReasonIdx]||'').trim()||'(blank)';
    return v===subReason;
  });
  const total=rows.length;

  // Group by store with full details
  const storeMap={};
  rows.forEach(r=>{
    const store=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    const cat=catIdx>=0?String(r[catIdx]||''):'';
    const broadR=reasonIdx>=0?String(r[reasonIdx]||''):'';
    const cust=custIdx>=0?String(r[custIdx]||''):'';
    if(!storeMap[store])storeMap[store]={c:0,cats:{},broadReasons:{},custs:{},rm:'—',market:'—',cluster:'—'};
    storeMap[store].c++;
    if(cat)storeMap[store].cats[cat]=(storeMap[store].cats[cat]||0)+1;
    if(broadR)storeMap[store].broadReasons[broadR]=(storeMap[store].broadReasons[broadR]||0)+1;
    if(cust)storeMap[store].custs[cust]=(storeMap[store].custs[cust]||0)+1;
    if(r._wkStore){storeMap[store].rm=r._wkStore.rm;storeMap[store].market=r._wkStore.market;storeMap[store].cluster=r._wkStore.cluster;}
  });
  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1].c-a[1].c);

  // Aggregations
  const mktMap={};
  rows.forEach(r=>{const mkt=r._wkStore?r._wkStore.market:'Unknown';mktMap[mkt]=(mktMap[mkt]||0)+1;});
  const mktArr=Object.entries(mktMap).sort((a,b)=>b[1]-a[1]);

  const catMap={};
  rows.forEach(r=>{const c=catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown';catMap[c]=(catMap[c]||0)+1;});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  const broadRMap={};
  rows.forEach(r=>{const br=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';broadRMap[br]=(broadRMap[br]||0)+1;});
  const broadRArr=Object.entries(broadRMap).sort((a,b)=>b[1]-a[1]);

  const custMap={};
  rows.forEach(r=>{const c=custIdx>=0?String(r[custIdx]||''):'';if(c)custMap[c]=(custMap[c]||0)+1;});
  const custArr=Object.entries(custMap).sort((a,b)=>b[1]-a[1]);

  // ── 3-way aggregation: Market / Cluster / RM ────────────
  const aggMkt={},aggClu={},aggRm={};
  rows.forEach(r=>{
    const wk=r._wkStore;
    const mkt=wk?wk.market:'(walkins not synced yet)';
    const clu=wk?wk.cluster:'(walkins not synced yet)';
    const rm=wk?wk.rm:(r._rm&&r._rm!=='Unknown'?r._rm:'(walkins not synced yet)');
    const sn=storeIdx>=0?String(r[storeIdx]||'').trim():'';
    [
      [aggMkt,mkt],[aggClu,clu],[aggRm,rm]
    ].forEach(([map,key])=>{
      if(!map[key])map[key]={c:0,stores:new Set()};
      map[key].c++;
      if(sn)map[key].stores.add(sn);
    });
  });
  const mkAggTbl=(label,map,clickAttrFn)=>{
    const arr=Object.entries(map).sort((a,b)=>b[1].c-a[1].c);
    const tblRows=arr.map(([k,v])=>{
      const isUnsynced=k==='(walkins not synced yet)';
      const cell0=clickAttrFn&&!isUnsynced?`<span class="clickable" onclick="${clickAttrFn(k)}">${k}</span>`:isUnsynced?`<span style="color:var(--muted);font-style:italic">${k}</span>`:`<strong>${k}</strong>`;
      return{cells:[cell0,fi(v.c),fi(v.stores.size),`<span class="badge ${pct(v.c,total)>=15?'badge-red':pct(v.c,total)>=8?'badge-amber':'badge-green'}">${pct(v.c,total)}%</span>`]};
    });
    return`<div style="margin-bottom:1.25rem;">
      <div class="section-lbl">By ${label} (${arr.length})</div>
      ${sortableTbl([label,'Count','Stores','Share%'],tblRows,['Total',fi(total),'','100%'])}
    </div>`;
  };

  const storeRows=storeArr.map(([k,v])=>{
    const topCat=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
    const topBR=Object.entries(v.broadReasons).sort((a,b)=>b[1]-a[1])[0];
    const custBreak=Object.entries(v.custs).map(([ck,cv])=>`${ck}:${cv}`).join(', ');
    return{cells:[
      `<span class="clickable" onclick="showStoreModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
      `<strong style="font-size:14px;color:var(--red)">${fi(v.c)}</strong>`,
      `${pct(v.c,total)}%`,
      topBR?topBR[0]:'—',
      topCat?topCat[0]:'—',
      custBreak||'—'
    ]};
  });

  openModal(`Specific reason: "${subReason}"`,`${fi(total)} entries · ${storeArr.length} stores · ${Object.keys(aggMkt).length} markets · ${Object.keys(aggClu).length} clusters · ${Object.keys(aggRm).length} RMs`,`
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric red"><div class="lbl">Total for this reason</div><div class="val">${fi(total)}</div><div class="sub">${pct(total,allFiltered.length)}% of all loss</div></div>
      <div class="metric"><div class="lbl">Stores affected</div><div class="val">${storeArr.length}</div></div>
      <div class="metric"><div class="lbl">Markets affected</div><div class="val">${Object.keys(aggMkt).length}</div></div>
      <div class="metric green"><div class="lbl">RMs affected</div><div class="val">${Object.keys(aggRm).length}</div></div>
    </div>

    ${custArr.length?`
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;">
      ${custArr.map(([k,v])=>`
        <div style="background:${k.toLowerCase().includes('new')?'#e6f5ee':k.toLowerCase().includes('repeat')?'#e6eefa':'#fff8e6'};border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">${k}</div>
          <div style="font-size:24px;font-weight:600;color:${k.toLowerCase().includes('new')?'var(--green)':k.toLowerCase().includes('repeat')?'var(--blue)':'var(--amber)'};">${fi(v)}</div>
          <div style="font-size:11px;color:var(--muted);">${pct(v,total)}% of this reason</div>
        </div>`).join('')}
    </div>`:''}

    <div class="two-col" style="margin-bottom:1.25rem;">
      <div>
        <div class="section-lbl">By broad reason (col I)</div>
        ${sortableTbl(['Broad reason','Count','Share%'],
          broadRArr.map(([k,v])=>({cells:[k,fi(v),`${pct(v,total)}%`]})),
          ['Total',fi(total),'100%']
        )}
      </div>
      <div>
        <div class="section-lbl">By category</div>
        ${sortableTbl(['Category','Count','Share%'],
          catArr.map(([k,v])=>({cells:[k,fi(v),`${pct(v,total)}%`]})),
          ['Total',fi(total),'100%']
        )}
      </div>
    </div>

    <!-- 3 separate breakdown tables -->
    <div style="background:#f8f9fb;border-radius:10px;padding:12px;margin-bottom:1.25rem;">
      <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">📊 Geographic & ownership breakdown</div>
      <div class="two-col" style="grid-template-columns:1fr 1fr;gap:1rem;">
        <div>${mkAggTbl('Market',aggMkt,k=>`showMarketModal('${k.replace(/'/g,"\\\\'")}')`)}</div>
        <div>${mkAggTbl('Cluster',aggClu,null)}</div>

      ${mkAggTbl('RM',aggRm,k=>`showRMModal('${k.replace(/'/g,"\\\\'")}')`)}

    <div class="section-lbl">📋 Store-wise list — click a store name for full detail</div>
    ${sortableTbl(
      ['Store','Count','Share%','Top broad reason','Top category','Customer type'],
      storeRows,
      ['Total',fi(total),'100%','','','']
    )}`);
};

window.showCategoryModal=function(category){
  const f=getFilters();
  const{storeIdx,catIdx,reasonIdx,sizeIdx,styleIdx,qtyIdx}=_LS_IDX;
  const rows=filterLS(f).filter(r=>catIdx>=0&&String(r[catIdx]||'')===category);
  const total=rows.length;

  // Group by store
  const storeMap={};
  rows.forEach(r=>{
    const store=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    const reason=reasonIdx>=0?String(r[reasonIdx]||''):'';
    if(!storeMap[store])storeMap[store]={c:0,reasons:{},rm:'—',market:'—'};
    storeMap[store].c++;
    if(reason)storeMap[store].reasons[reason]=(storeMap[store].reasons[reason]||0)+1;
    const wkStore=r._wkStore;
    if(wkStore){storeMap[store].rm=wkStore.rm;storeMap[store].market=wkStore.market;}
  });
  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1].c-a[1].c);

  // Group by market
  const mktMap={};
  rows.forEach(r=>{const mkt=r._wkStore?r._wkStore.market:'Unknown';if(!mktMap[mkt])mktMap[mkt]=0;mktMap[mkt]++;});
  const mktArr=Object.entries(mktMap).sort((a,b)=>b[1]-a[1]);

  // Group by reason
  const reasonMap={};
  rows.forEach(r=>{const rk=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';if(!reasonMap[rk])reasonMap[rk]=0;reasonMap[rk]++;});
  const reasonArr=Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]);

  // Group by size
  const sizeMap={};
  rows.forEach(r=>{const sk=sizeIdx>=0?String(r[sizeIdx]||''):'';if(sk&&sk!=='-'){if(!sizeMap[sk])sizeMap[sk]=0;sizeMap[sk]++;}});

  const storeRows=storeArr.map(([k,v])=>{

  openModal(`Category: ${category}`,`${fi(total)} entries · ${storeArr.length} stores · ${mktArr.length} markets`,`

      <div class="metric amber"><div class="lbl">Total entries</div><div class="val">${fi(total)}</div></div>

      <div>
        <div class="section-lbl">Top reasons for this category</div>
        ${sortableTbl(['Reason','Count','Share%'],
          reasonArr.map(([k,v])=>({cells:[k,fi(v),`${pct(v,total)}%`]})),
          ['Total',fi(total),'100%']
        )}
      </div>
      <div>
        <div class="section-lbl">By market</div>

// ── RM MODAL — shows ALL stores under RM, including zero-walkin/zero-day ───
window.showRMModal=function(rm){
  const f=getFilters();
  // ALL stores under this RM filtered by current cluster/market filters (NOT date — we want to see zero-day stores too)
  const allRMStores=_WK.stores.filter(s=>
    s.rm===rm&&_has(f.cluster,s.cluster)&&_has(f.market,s.market)
  );
  const filtLS=filterLS({...f,rm});
  const{storeIdx}=_LS_IDX;
  const storeRows=allRMStores.map(s=>{
    const dRange=daysInRange(s.days,f);
    const w=dRange.reduce((a,d)=>a+d.w,0);
    const b=dRange.reduce((a,d)=>a+d.b,0);
    const nb=w-b;
    const cv=pct(b,w);
    const daysWith=dRange.filter(d=>d.w>0).length;
    const ls=filtLS.filter(r=>normStore(String(r[storeIdx]||''))===s.outletNorm).length;
    return{...s,w,b,nb,cv,ls,lsPct:pct(ls,nb),daysWith,totalDays:dRange.length,zeroFlag:(w===0||daysWith===0)};
  }).sort((a,b)=>{
    // Zero-walkin stores at top, then by walkins desc
    if(a.zeroFlag&&!b.zeroFlag)return -1;
    if(!a.zeroFlag&&b.zeroFlag)return 1;
    return b.w-a.w;
  });
  const tW=storeRows.reduce((s,r)=>s+r.w,0);
  const tB=storeRows.reduce((s,r)=>s+r.b,0);
  const tNB=tW-tB;
  const tLS=storeRows.reduce((s,r)=>s+r.ls,0);
  const zeroCount=storeRows.filter(s=>s.zeroFlag).length;
  const activeCount=storeRows.length-zeroCount;
  const dateLabel=_F.dateFrom||_F.dateTo?`${_F.dateFrom?fmtDK(_F.dateFrom):'Start'} → ${_F.dateTo?fmtDK(_F.dateTo):'End'}`:'';
  const af=[_fLabel(f.cluster,'Cluster'),_fLabel(f.market,'Market'),dateLabel].filter(Boolean).join(' · ');

  const tblRows=storeRows.map(s=>({
    cells:[
      `<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,
      s.market||'—',
      s.cluster||'—',
      s.type||'—',
      s.daysWith===0?`<span class="badge badge-red">0 days</span>`:`${s.daysWith}/${s.totalDays}`,
      s.w===0?`<span class="badge badge-red">0</span>`:fi(s.w),
      fi(s.b),
      fi(s.nb),
      s.w>0?`<span class="badge ${bc(s.cv)}">${s.cv}%</span>`:'—',
      fi(s.ls),
      s.nb>0?`<span class="badge ${bc(s.lsPct)}">${s.lsPct}%</span>`:'—',
      s.zeroFlag?`<span class="badge badge-red">🔴 No walkin data</span>`:`<span class="badge badge-green">✓ Active</span>`
    ],
    _cls:s.zeroFlag?'audit-red':''
  }));

  openModal(`RM: ${rm} — store breakdown`,`${storeRows.length} stores · ${activeCount} active · ${zeroCount} with no walkin data ${af?'· '+af:''}`,`
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric"><div class="lbl">Total stores</div><div class="val">${storeRows.length}</div><div class="sub">${activeCount} active</div></div>
      <div class="metric red"><div class="lbl">🔴 Zero walkins</div><div class="val">${zeroCount}</div><div class="sub">stores not reporting</div></div>
      <div class="metric blue"><div class="lbl">Walkins</div><div class="val">${fi(tW)}</div><div class="sub">${pct(tB,tW)}% conv</div></div>
      <div class="metric amber"><div class="lbl">Loss captured</div><div class="val">${fi(tLS)}</div><div class="sub">${pct(tLS,tNB)}% coverage</div></div>
    </div>
    ${zeroCount>0?`<div style="background:#fff5f5;border:1px solid #fdeaea;border-left:4px solid var(--red);border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:#a32020;">
      🔴 <strong>${zeroCount} store${zeroCount>1?'s have':' has'} zero walkin entries</strong> in the selected period — highlighted at the top of the table below.
    </div>`:''}
    <div class="section-lbl">Store-wise detail (zero-walkin stores shown first)</div>
    ${sortableTbl(
      ['Store','Market','Cluster','Type','Days w/ data','Walkins','Bills','Non-buyers','Conv%','Loss','Coverage%','Status'],
      tblRows,
      ['Total','','','','',fi(tW),fi(tB),fi(tNB),`<span class="badge ${bc(pct(tB,tW))}">${pct(tB,tW)}%</span>`,fi(tLS),`<span class="badge ${bc(pct(tLS,tNB))}">${pct(tLS,tNB)}%</span>`,''],
      r=>r._cls
    )}`);
};

const _MONTH_DATA={};

async function loadMonth(key){
  const cfg=MONTHS[key];
  if(!cfg)return;
  const pill=addPill(`${cfg.label} — loading...`,'pill-wait');
  try{
    // Load walkins
    const wkRaw=await fetchTab(cfg.wkTab);
    if(wkRaw.error){throw new Error(wkRaw.error);}
    const wkRowCount=(wkRaw.rows||[]).length;
    const wkHdrCount=(wkRaw.headers||[]).length;
    const wk=parseWalkins(wkRaw.headers||[],wkRaw.rows||[]);
    // Load loss of sale
    const lsRaw=await fetchTab(cfg.lsTab);
    if(lsRaw.error){throw new Error(lsRaw.error);}
    _MONTH_DATA[key]={wk,lsHeaders:lsRaw.headers||[],lsRows:lsRaw.rows||[]};
    const lsRowCount=(lsRaw.rows||[]).length;
    if(wkRowCount===0&&wkHdrCount===0){
      // Tab exists but is empty — neutral info pill, NOT an error. Still keep LS data.
      pill.className='pill pill-info';
      pill.textContent=`${cfg.label} · Walkins tab empty · ${fi(lsRowCount)} LS rows`;
    }else if(wk.stores.length===0&&wkRowCount>0){
      // Tab has data but parser couldn't extract — real warning
      pill.className='pill pill-err';
      pill.textContent=`${cfg.label} ⚠️ "${cfg.wkTab}" has ${wkRowCount} rows but parser found 0 stores. Check console.`;
      console.error(`[loadMonth] ${key}: parseWalkins returned 0 stores. First headers:`,(wkRaw.headers||[]).slice(0,15),'· first row:',(wkRaw.rows||[])[0]);
    }else{
      pill.className='pill pill-ok';
      pill.textContent=`${cfg.label} · ${wk.stores.length} stores · ${fi(lsRowCount)} LS rows`;
    }
  }catch(e){
    pill.className='pill pill-err';
    pill.textContent=`${cfg.label} — ${e.message}`;
    _MONTH_DATA[key]=null;
  }
}

function mergeMonths(keys){
  const storeMap={};
  const allLSRows=[];
  let lsHeaders=[];
  const dayMap={};

  keys.forEach(key=>{
    const d=_MONTH_DATA[key];
    if(!d)return;
    // Merge stores
    (d.wk.stores||[]).forEach(s=>{
      if(!storeMap[s.outletNorm]){
        storeMap[s.outletNorm]={...s,days:[...s.days]};
      } else {
        storeMap[s.outletNorm].days=[...storeMap[s.outletNorm].days,...s.days];
        storeMap[s.outletNorm].totalW+=s.totalW;
        storeMap[s.outletNorm].totalB+=s.totalB;
      }
    });
    // Merge days
    (d.wk.days||[]).forEach(day=>{
      if(!dayMap[day.dk])dayMap[day.dk]={dk:day.dk,dayNum:day.dayNum,w:0,b:0};
      dayMap[day.dk].w+=day.w;
      dayMap[day.dk].b+=day.b;
    });
    // Merge LS rows
    allLSRows.push(...(d.lsRows||[]));
    // Pick headers with the MOST NAMED columns (non-empty strings). If tied, pick the
    // longer array. This handles the case where APR's last column has an empty header
    // but MAY has "Purpose" there — without this, the merge would silently drop the
    // Purpose column name.
    const namedNew=(d.lsHeaders||[]).filter(h=>String(h||'').trim()).length;
    const namedCur=(lsHeaders||[]).filter(h=>String(h||'').trim()).length;
    if(namedNew>namedCur||(namedNew===namedCur&&(d.lsHeaders||[]).length>(lsHeaders||[]).length))lsHeaders=d.lsHeaders;
  });

  const stores=Object.values(storeMap);
  const days=Object.values(dayMap).sort((a,b)=>a.dk.localeCompare(b.dk));
  const rms=[...new Set(stores.map(s=>s.rm).filter(Boolean))].sort();
  const clusters=[...new Set(stores.map(s=>s.cluster).filter(Boolean))].sort();
  const markets=[...new Set(stores.map(s=>s.market).filter(Boolean))].sort();
  const dks=days.map(d=>d.dk);
  // Rebuild store→RM map and multi-key lookup
  _WK_STORE_BY_KEY={};
  stores.forEach(s=>{
    _STORE_RM[s.outletNorm]=s.rm;
    storeKeys(s.outlet).forEach(k=>{if(!_WK_STORE_BY_KEY[k])_WK_STORE_BY_KEY[k]=s;});
  });
  return{wk:{stores,days,rms,clusters,markets,dks},lsHeaders,lsRows:allLSRows};
}

function applyMonthFilter(){
  // _F.month is an array; empty = "all months"; legacy 'all' string also tolerated.
  const sel=_F.month;
  let keys;
  if(Array.isArray(sel)){keys=sel.length?sel:_activeMonths;}
  else if(!sel||sel==='all'){keys=_activeMonths;}
  else{keys=[sel];}
  const available=keys.filter(k=>_MONTH_DATA[k]);
  if(!available.length){console.warn('[applyMonthFilter] no months available for selection:',sel);return false;}
  try{
    const merged=mergeMonths(available);
    _WK=merged.wk;
    parseLoss(merged.lsHeaders,merged.lsRows);
    console.log('[applyMonthFilter] OK · selection=',sel,'· stores=',_WK.stores.length,'days=',_WK.days.length,'LS rows=',_LS_ROWS.length);
    return true;
  }catch(e){
    console.error('[applyMonthFilter] FAILED:',e.message,e.stack);
    return false;
  }
}

async function init(){
  document.getElementById('ov').innerHTML='<div class="loading">Discovering sheet tabs...</div>';
  document.getElementById('ls').innerHTML='<div class="loading">Loading...</div>';
  document.getElementById('topbar-meta').textContent='Discovering sheet tabs...';
  console.log('[init] starting');

  // ── STEP 1: AUTO-DISCOVER MONTHS ──────────────────────
  let discoveryInfo;
  try{
    discoveryInfo=await discoverMonths();
  }catch(e){
    console.error('[init] discoverMonths FAILED:',e.message);
    document.getElementById('ov').innerHTML=`<div class="err-card">
      ❌ <strong>Could not discover sheet tabs.</strong><br>
      ${e.message.includes('list=tabs')?'Your Apps Script needs to be updated to support the <code>?list=tabs</code> endpoint. Paste the new Apps Script code I provided and redeploy.':e.message}
    </div>`;
    document.getElementById('topbar-meta').textContent='Error — discovery failed';
    return;
  }
  if(!_activeMonths.length){
    document.getElementById('ov').innerHTML=`<div class="err-card">
      ❌ <strong>No paired month tabs found.</strong><br>
      Each month needs BOTH a <code>Walkins &lt;MONTH&gt;</code> and <code>Loss of sale data &lt;MONTH&gt;</code> tab.<br>
      ${discoveryInfo.unpaired.length?`<br>Found these unpaired tabs:<br><pre style="font-size:11px;white-space:pre-wrap;">${discoveryInfo.unpaired.map(([k,v])=>`${k} → walkin: ${v.wkTab||'MISSING'} | loss: ${v.lsTab||'MISSING'}`).join('\n')}</pre>`:''}
    </div>`;
    document.getElementById('topbar-meta').textContent='Error — no months discovered';
    return;
  }
  document.getElementById('topbar-meta').textContent=`Loading ${_activeMonths.length} month${_activeMonths.length>1?'s':''}...`;

  // ── STEP 2: LOAD ALL DISCOVERED MONTHS IN PARALLEL ────
  await Promise.all(_activeMonths.map(k=>loadMonth(k)));
  console.log('[init] all months loaded:',_activeMonths.map(k=>`${k}=${_MONTH_DATA[k]?'OK':'FAILED'}`));

  // ── STEP 3: APPLY FILTER + RENDER ─────────────────────
  _F.month=[];  // empty array = all months
  const available=_activeMonths.filter(k=>_MONTH_DATA[k]);
  if(available.length===0){
    document.getElementById('ov').innerHTML='<div class="err-card">❌ Could not load any month data. Check pills above for details.</div>';
    document.getElementById('topbar-meta').textContent='Error — no data loaded';
    return;
  }
  const loaded=available.map(k=>MONTHS[k].label).join(' + ');
  document.getElementById('topbar-meta').textContent=`${loaded} · Live from Google Sheets`;

  if(applyMonthFilter()){
    try{buildFilterBar();console.log('[init] buildFilterBar OK');}
    catch(e){console.error('[init] buildFilterBar FAILED:',e.message,e.stack);
      document.getElementById('global-filter-bar').innerHTML=`<div class="err-card">⚠️ Filter bar failed: ${e.message}</div>`;}
    try{renderAll();console.log('[init] renderAll OK · DONE');}
    catch(e){console.error('[init] renderAll FAILED:',e.message,e.stack);
      document.getElementById('ov').innerHTML=`<div class="err-card">⚠️ Render failed: <strong>${e.message}</strong><br><pre style="font-size:11px;white-space:pre-wrap;margin-top:.5rem;">${e.stack||''}</pre></div>`;}
  }else{
    document.getElementById('ov').innerHTML='<div class="err-card">❌ Data loaded but processing failed. Check console (F12) for details.</div>';
  }
}

// Build an index: normalised store name → KPI row, plus by-code lookup
let _KPI_BY_NORM={},_KPI_BY_CODE={};
(function _buildKpiIdx(){
  if(typeof _KPI_DATA==='undefined')return;
  _KPI_DATA.forEach(k=>{
    const n=normStore(k.store);
    if(n)_KPI_BY_NORM[n]=k;
    if(k.code)_KPI_BY_CODE[k.code.toUpperCase()]=k;
  });
})();

function _kpiLookup(outlet){
  if(!outlet)return null;
  const n=normStore(outlet);
  if(_KPI_BY_NORM[n])return _KPI_BY_NORM[n];
  // Fallback: scan codes inside the outlet string
  const cm=String(outlet).match(/\(([^)]+)\)/);
  if(cm&&_KPI_BY_CODE[cm[1].toUpperCase()])return _KPI_BY_CODE[cm[1].toUpperCase()];
  return null;
}

// Build a per-store joined row: KPI + loss stats (within current filters)
function _kpiJoined(f){
  const{storeIdx,reasonIdx}=_LS_IDX;
  const lsRows=filterLS(f);
  // Group loss rows by normalised outlet
  const lossByStore={};
  lsRows.forEach(r=>{
    const sn=storeIdx>=0?String(r[storeIdx]||'').trim():'';
    if(!sn)return;
    const n=normStore(sn);
    if(!lossByStore[n])lossByStore[n]={count:0,reasons:{},store:sn};
    lossByStore[n].count++;
    if(reasonIdx>=0){
      const rv=String(r[reasonIdx]||'').trim()||'(blank)';
      lossByStore[n].reasons[rv]=(lossByStore[n].reasons[rv]||0)+1;
    }
  });
  // Walkin-derived non-buyers per store
  const filtStores=filterStores(_WK.stores,f);
  const wkByNorm={};
  filtStores.forEach(s=>{
    const dRange=daysInRange(s.days,f);
    const w=dRange.reduce((a,d)=>a+d.w,0);
    const b=dRange.reduce((a,d)=>a+d.b,0);
    wkByNorm[s.outletNorm]={w,b,nb:w-b,outlet:s.outlet,market:s.market,rm:s.rm,cluster:s.cluster};
  });
  // Walk every KPI row, also respect filter scope (market/RM)
  const joined=[];
  _KPI_DATA.forEach(k=>{
    if(Array.isArray(f.rm)?f.rm.length:!!f.rm){
      const sel=Array.isArray(f.rm)?f.rm:[f.rm];
      if(!sel.map(_normRM).includes(_normRM(k.rm)))return;
    }
    if(Array.isArray(f.market)?f.market.length:!!f.market){
      const sel=Array.isArray(f.market)?f.market:[f.market];
      if(!sel.map(_normMarket).includes(_normMarket(k.market)))return;
    }
    const n=normStore(k.store);
    const wk=wkByNorm[n];
    const loss=lossByStore[n];
    const lossCount=loss?loss.count:0;
    const nb=wk?wk.nb:0;
    const lossCov=nb>0?Math.round(lossCount/nb*100):(lossCount>0?100:0);
    const topReason=loss?Object.entries(loss.reasons).sort((a,b)=>b[1]-a[1])[0]:null;
    joined.push({
      kpi:k,
      lossCount,
      nb,
      lossCov,
      topReason:topReason?topReason[0]:'',
      topReasonCount:topReason?topReason[1]:0,
      matched:!!wk,
      wkW:wk?wk.w:0,
      wkB:wk?wk.b:0
    });
  });
  return joined;
}
// Loose-match helpers — KPI rm/market labels may not exactly match loss-data labels.
function _normRM(s){return String(s||'').toLowerCase().replace(/\s+/g,'').trim();}
function _normMarket(s){return String(s||'').toLowerCase().replace(/\s+/g,'').trim();}

// 📊 WEEKLY GRID TAB — store × week grid in the KPI-sheet format.
// For each store, four rows: Bills / Walkins / Loss of Sale / Non Engaged.
// Week 1 = the ISO calendar week starting from April 1 of the fiscal year;
// Week 2 = Apr 8-14, … so every week has 7 days and the calendar is
// consistent whether April 1 lands on a Monday or a Saturday.
// Non Engaged = Walkins − Bills − Loss (uncaptured non-buyers).
// ═══════════════════════════════════════════════════════════════════

// Fiscal-year start (Apr 1). If earliest data is in April X, fiscal year = X;
// otherwise walk back — data from Jan-Mar belongs to the previous fiscal year.
function _fiscalYearFromData(){
  const allDks=[];
  if(_WK&&_WK.days)_WK.days.forEach(d=>allDks.push(d.dk));
  _LS_ROWS.forEach(r=>{if(r._dk)allDks.push(r._dk);});
  if(!allDks.length)return new Date().getFullYear();
  const earliest=allDks.reduce((a,b)=>a<b?a:b);
  const [y,m]=earliest.split('-').map(Number);
  return m>=4?y:y-1;
}
function _weekFromApr1(dk,fiscalYear){
  if(!dk)return null;
  const parts=dk.split('-').map(Number);
  const y=parts[0],m=parts[1],d=parts[2];
  const start=new Date(fiscalYear,3,1);
  const target=new Date(y,m-1,d);
  const days=Math.floor((target-start)/86400000);
  if(days<0)return null;
  return Math.floor(days/7)+1;
}
function _weekLabelFromApr1(weekNum,fiscalYear){
  const start=new Date(fiscalYear,3,1);
  start.setDate(start.getDate()+(weekNum-1)*7);
  const end=new Date(start);
  end.setDate(start.getDate()+6);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`${start.getDate()} ${M[start.getMonth()]}–${end.getDate()} ${M[end.getMonth()]}`;
}

// State
let _wgridMetricFilter='all'; // 'all' | 'bills' | 'walkins' | 'loss' | 'nonEng'
window.setWgridMetric=function(m){_wgridMetricFilter=m;renderWeeklyGrid();};

window.downloadWeeklyGridCsv=function(){
  const f=getFilters();
  const{storeIdx}=_LS_IDX;
  const stores=filterStores(_WK.stores,f);
  const filtLS=filterLS(f);
  const fy=_fiscalYearFromData();
  // Determine last week from data
  let maxWeek=0;
  stores.forEach(s=>s.days.forEach(d=>{if(dateInRange(d.dk,f)){const w=_weekFromApr1(d.dk,fy);if(w&&w>maxWeek)maxWeek=w;}}));
  filtLS.forEach(r=>{if(r._dk){const w=_weekFromApr1(r._dk,fy);if(w&&w>maxWeek)maxWeek=w;}});
  if(!maxWeek)maxWeek=1;
  const weeks=[];for(let i=1;i<=maxWeek;i++)weeks.push(i);
  const lossByStoreWeek={};
  filtLS.forEach(r=>{
    const sn=storeIdx>=0?String(r[storeIdx]||'').trim():'';
    if(!sn)return;
    const w=_weekFromApr1(r._dk,fy);
    if(!w)return;
    const key=normStore(sn);
    if(!lossByStoreWeek[key])lossByStoreWeek[key]={};
    lossByStoreWeek[key][w]=(lossByStoreWeek[key][w]||0)+1;
  });
  const esc=v=>{const s=String(v==null?'':v);if(s.includes(',')||s.includes('"')||s.includes('\n'))return'"'+s.replace(/"/g,'""')+'"';return s;};
  const lines=[['Outlet Name','Metric',...weeks.map(w=>`Week ${w}`)].map(esc).join(',')];
  stores.sort((a,b)=>a.outlet.localeCompare(b.outlet)).forEach(s=>{
    const weekMap={bills:{},walkins:{},loss:{},nonEng:{}};
    s.days.forEach(d=>{
      if(!dateInRange(d.dk,f))return;
      const w=_weekFromApr1(d.dk,fy);
      if(!w)return;
      weekMap.walkins[w]=(weekMap.walkins[w]||0)+d.w;
      weekMap.bills[w]=(weekMap.bills[w]||0)+d.b;
    });
    const ls=lossByStoreWeek[s.outletNorm]||{};
    weeks.forEach(w=>{weekMap.loss[w]=ls[w]||0;});
    weeks.forEach(w=>{
      const wk=weekMap.walkins[w]||0,bl=weekMap.bills[w]||0,lo=weekMap.loss[w]||0;
      weekMap.nonEng[w]=Math.max(0,wk-bl-lo);
    });
    lines.push([esc(s.outlet),esc('Bills'),...weeks.map(w=>weekMap.bills[w]||0)].join(','));
    lines.push([esc(''),esc('Walkins'),...weeks.map(w=>weekMap.walkins[w]||0)].join(','));
    lines.push([esc(''),esc('Loss of Sale'),...weeks.map(w=>weekMap.loss[w]||0)].join(','));
    lines.push([esc(''),esc('Non Engaged'),...weeks.map(w=>weekMap.nonEng[w]||0)].join(','));
  });
  const csv=lines.join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href=url;a.download=`weekly-grid-${ts}.csv`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};

  if(!stores.length){
    target.innerHTML=`
      <div style="background:linear-gradient(135deg,#f0f5ff 0%,#fff 100%);border:1px solid #d0dffa;border-left:4px solid var(--blue);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
        <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">📊 Weekly Grid — store × week</div>
        <div style="font-size:12px;color:var(--muted);">No stores match the current filter selection.</div>
      </div>`;
    return;
  }

  // Row order = user-controlled metric filter. 'all' shows all four rows per store.
  const metricRows=[
    {key:'bills',label:'Bills',color:'var(--green)'},
    {key:'walkins',label:'Walkins',color:'var(--blue)'},
    {key:'loss',label:'Loss of Sale',color:'var(--red)'},
    {key:'nonEng',label:'Non Engaged',color:'var(--amber)'}
  ];
  const visibleMetrics=_wgridMetricFilter==='all'?metricRows:metricRows.filter(m=>m.key===_wgridMetricFilter);

  // Per-store weekly aggregates
  const storeWeekMaps=stores.map(s=>{
    const wm={bills:{},walkins:{},loss:{},nonEng:{}};
    s.days.forEach(d=>{
      if(!dateInRange(d.dk,f))return;
      const w=_weekFromApr1(d.dk,fy);
      if(!w)return;
      wm.walkins[w]=(wm.walkins[w]||0)+d.w;
      wm.bills[w]=(wm.bills[w]||0)+d.b;
    });
    const ls=lossByStoreWeek[s.outletNorm]||{};
    weeks.forEach(w=>{wm.loss[w]=ls[w]||0;});
    weeks.forEach(w=>{
      const wk=wm.walkins[w]||0,bl=wm.bills[w]||0,lo=wm.loss[w]||0;
      wm.nonEng[w]=Math.max(0,wk-bl-lo);
    });
    return{store:s,wm};
  });

  // Column totals per week (across all visible stores)
  const totals={};
  visibleMetrics.forEach(m=>{totals[m.key]={};weeks.forEach(w=>{totals[m.key][w]=0;});});
  storeWeekMaps.forEach(({wm})=>{
    visibleMetrics.forEach(m=>{weeks.forEach(w=>{totals[m.key][w]+=wm[m.key][w]||0;});});
  });

  // Column headers: sticky first two columns, weeks with range in a smaller font
  const weekHeaderCells=weeks.map(w=>`<th style="min-width:80px;text-align:right;">Week ${w}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">${_weekLabelFromApr1(w,fy)}</span></th>`).join('');

  // Body — 4 rows per store, only the first row of each block shows the outlet name
  const bodyRows=storeWeekMaps.map(({store,wm})=>{
    return visibleMetrics.map((m,mi)=>{
      const cells=weeks.map(w=>{
        const v=wm[m.key][w]||0;
        return`<td style="text-align:right;font-variant-numeric:tabular-nums;">${v===0?'<span style="color:var(--muted);">0</span>':fi(v)}</td>`;
      }).join('');
      const outletCell=mi===0
        ? `<td rowspan="${visibleMetrics.length}" style="font-weight:600;vertical-align:top;background:var(--surface);position:sticky;left:0;z-index:1;"><span class="clickable" onclick="showStoreModal('${store.outlet.replace(/'/g,"\\'")}')">${store.outlet}</span><br><span style="font-size:10px;color:var(--muted);font-weight:400;">${store.market||''} · ${store.rm||''}</span></td>`
        : '';
      return`<tr style="border-top:${mi===0?'2px solid var(--border)':'1px solid var(--border)'};">
        ${outletCell}
        <td style="font-weight:600;color:${m.color};position:sticky;left:${mi===0?'220px':'0'};background:var(--bg);z-index:1;">${m.label}</td>
        ${cells}
      </tr>`;
    }).join('');
  }).join('');

  // Footer — totals per metric per week
  const footerRows=visibleMetrics.map((m,mi)=>{
    const cells=weeks.map(w=>`<td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600;">${fi(totals[m.key][w])}</td>`).join('');
    const labelCell=mi===0
      ? `<td rowspan="${visibleMetrics.length}" style="font-weight:700;vertical-align:top;background:var(--bg);position:sticky;left:0;">TOTAL (${stores.length} stores)</td>`
      : '';
    return`<tr style="background:var(--bg);border-top:${mi===0?'2px solid var(--border)':'1px solid var(--border)'};">
      ${labelCell}
      <td style="font-weight:700;color:${m.color};position:sticky;left:${mi===0?'220px':'0'};background:var(--bg);">${m.label}</td>
      ${cells}
    </tr>`;
  }).join('');

  const seg=(k,lbl,c)=>`<button onclick="setWgridMetric('${k}')" style="border:0;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;background:${_wgridMetricFilter===k?c:'var(--surface)'};color:${_wgridMetricFilter===k?'#fff':'var(--muted)'};">${lbl}</button>`;

  const grandTotals={};visibleMetrics.forEach(m=>{grandTotals[m.key]=weeks.reduce((s,w)=>s+totals[m.key][w],0);});

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#f0f5ff 0%,#fff 100%);border:1px solid #d0dffa;border-left:4px solid var(--blue);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">📊 Weekly Grid — Store × Week (FY starting April ${fy})</div>
      <div style="font-size:12px;color:var(--muted);">Each store has 4 rows: <strong>Bills</strong> / <strong>Walkins</strong> / <strong>Loss of Sale</strong> / <strong>Non Engaged</strong>. Weeks are 7-day buckets counting from <strong>1 April ${fy}</strong> (Week 1 = 1–7 Apr, Week 2 = 8–14 Apr, …). Non Engaged = Walkins − Bills − Loss captured. Filters and store click behaviour work here like the other tabs.</div>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:1rem;">
      <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        ${seg('all','All 4 metrics','var(--blue)')}
        <div style="width:1px;background:var(--border);"></div>
        ${seg('bills','Bills only','var(--green)')}
        <div style="width:1px;background:var(--border);"></div>
        ${seg('walkins','Walkins only','var(--blue)')}
        <div style="width:1px;background:var(--border);"></div>
        ${seg('loss','Loss only','var(--red)')}
        <div style="width:1px;background:var(--border);"></div>
        ${seg('nonEng','Non-Engaged only','var(--amber)')}
      </div>
      <button class="filter-btn" onclick="downloadWeeklyGridCsv()" style="background:var(--green);color:#fff;border-color:var(--green);font-weight:600;">⬇ Download CSV</button>
      <div style="font-size:11px;color:var(--muted);">
        <strong style="color:var(--text);">${stores.length}</strong> stores · <strong style="color:var(--text);">${weeks.length}</strong> weeks (Week 1 → Week ${maxWeek})
      </div>
    </div>

    <div class="metrics" style="margin-bottom:1rem;">
      ${visibleMetrics.map(m=>`<div class="metric" style="border-left:3px solid ${m.color};"><div class="lbl">${m.label} · total</div><div class="val" style="color:${m.color};">${fi(grandTotals[m.key])}</div></div>`).join('')}
    </div>

    <div style="overflow:auto;border:1px solid var(--border);border-radius:8px;max-height:75vh;">
      <table style="border-collapse:collapse;min-width:100%;width:max-content;">
        <thead>
          <tr style="background:var(--surface);">
            <th style="position:sticky;top:0;left:0;z-index:3;background:var(--surface);border-bottom:2px solid var(--border);border-right:1px solid var(--border);padding:8px 10px;min-width:220px;text-align:left;">Outlet Name</th>
            <th style="position:sticky;top:0;left:220px;z-index:3;background:var(--surface);border-bottom:2px solid var(--border);border-right:1px solid var(--border);padding:8px 10px;min-width:110px;text-align:left;">Metric</th>
            ${weeks.map(w=>`<th style="position:sticky;top:0;z-index:2;background:var(--surface);border-bottom:2px solid var(--border);padding:8px 10px;min-width:80px;text-align:right;">Week ${w}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">${_weekLabelFromApr1(w,fy)}</span></th>`).join('')}
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
        <tfoot>${footerRows}</tfoot>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// 🔎 REASON ANALYSIS TAB — pick a reason (e.g. "Perceived poor value
// for money") and see a 360° gap-finder view: total entries, the RMs
// and stores reporting it, top staff contributors, top categories /
// sub-categories, and a phrase summary of the customer notes & notes.
// ═══════════════════════════════════════════════════════════════════
let _rsnSel=null;
let _rsnUseSubReason=false; // toggle between col-I reason and col-J sub-reason
window.setReasonAnalysisReason=function(reason){_rsnSel=reason;show('rsn');};
window.setRsnReason=function(reason){_rsnSel=reason;renderReasonAnalysis();};
window.setRsnSource=function(useSub){_rsnUseSubReason=!!useSub;_rsnSel=null;renderReasonAnalysis();};

// Drill into a single (reason, store) — list every row with Date / Staff /
// Product / Customer Notes / Notes / Customer columns, sorted by staff.
window.showReasonStoreDetail=function(reason,store){
  const f=getFilters();
  const{storeIdx,reasonIdx,subReasonIdx,empIdx,catIdx,subCatIdx,designIdx,sizeIdx,styleIdx,colorIdx,polishIdx,custNotesIdx,notes2Idx,custIdx,dateIdx,qtyIdx,valIdx}=_LS_IDX;
  const activeReasonIdx=_rsnUseSubReason&&subReasonIdx>=0?subReasonIdx:reasonIdx;
  const rows=filterLS(f).filter(r=>{
    const rv=String(r[activeReasonIdx]||'').trim()||'(blank)';
    if(rv!==reason)return false;
    const sn=storeIdx>=0?String(r[storeIdx]||'').trim():'';
    return sn===store;
  });
  if(!rows.length){
    openModal(`🔎 ${store} — "${reason}"`,'No data','<p class="muted-note">No matching entries.</p>');
    return;
  }
  // Sort by staff name (rows with empty staff go to the end)
  rows.sort((a,b)=>{
    const sa=empIdx>=0?String(a[empIdx]||'').trim():'';
    const sb=empIdx>=0?String(b[empIdx]||'').trim():'';
    if(!sa&&sb)return 1;
    if(sa&&!sb)return -1;
    return sa.toLowerCase().localeCompare(sb.toLowerCase());
  });

  // Build product description from category / sub-category / design# + attrs
  function _product(r){
    const main=[];
    if(catIdx>=0){const v=String(r[catIdx]||'').trim();if(v)main.push(v);}
    if(subCatIdx>=0){const v=String(r[subCatIdx]||'').trim();if(v)main.push(v);}
    if(designIdx>=0){const v=String(r[designIdx]||'').trim();if(v&&v!=='-')main.push(`#${v}`);}
    const attrs=[];
    if(sizeIdx>=0){const v=String(r[sizeIdx]||'').trim();if(v)attrs.push(`size ${v}`);}
    if(styleIdx>=0){const v=String(r[styleIdx]||'').trim();if(v)attrs.push(`style ${v}`);}
    if(colorIdx>=0){const v=String(r[colorIdx]||'').trim();if(v)attrs.push(`color ${v}`);}
    if(polishIdx>=0){const v=String(r[polishIdx]||'').trim();if(v)attrs.push(`polish ${v}`);}
    const mainHtml=main.length?`<strong>${main.join(' / ')}</strong>`:'<span style="color:var(--muted);">—</span>';
    const attrHtml=attrs.length?`<br><span style="font-size:10px;color:var(--muted);">${attrs.join(' · ')}</span>`:'';
    return mainHtml+attrHtml;
  }
  function _muted(s){return s?String(s):'<span style="color:var(--muted);">—</span>';}

  // Staff summary pills
  const staffMap={};
  rows.forEach(r=>{
    const s=empIdx>=0?(String(r[empIdx]||'').trim()||'Unknown'):'Unknown';
    staffMap[s]=(staffMap[s]||0)+1;
  });
  const staffArr=Object.entries(staffMap).sort((a,b)=>b[1]-a[1]);
  const staffPills=staffArr.map(([k,v])=>`<span style="background:#fef4e8;color:#a85c14;border:1px solid #f0c8a0;border-radius:14px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block;margin:2px 4px 2px 0;">${k} · ${fi(v)}</span>`).join('');

  // Group rows by staff so the table visually groups same staff together
  let lastStaff='';
  const tblRows=rows.map((r,i)=>{
    const staff=empIdx>=0?(String(r[empIdx]||'').trim()||'(blank)'):'(blank)';
    const newGroup=staff!==lastStaff;
    lastStaff=staff;
    const date=dateIdx>=0?fmtDK(toDayKey(r[dateIdx])||''):'—';
    const cn=custNotesIdx>=0?String(r[custNotesIdx]||'').trim():'';
    const nt=notes2Idx>=0?String(r[notes2Idx]||'').trim():'';
    const cust=custIdx>=0?String(r[custIdx]||'').trim():'';
    return{cells:[
      i+1,
      `<span style="font-size:11px;color:var(--muted);white-space:nowrap;">${date||'—'}</span>`,
      newGroup?`<strong>${staff}</strong>`:`<span style="color:var(--muted);font-size:11px;">↳ ${staff}</span>`,
      _product(r),
      cn?`<span style="font-size:11px;line-height:1.4;">${cn}</span>`:'<span style="color:var(--muted);">—</span>',
      nt?`<span style="font-size:11px;line-height:1.4;">${nt}</span>`:'<span style="color:var(--muted);">—</span>',
      _muted(cust)
    ]};
  });

  const totalQty=qtyIdx>=0?rows.reduce((s,r)=>s+n(r[qtyIdx]),0):0;
  const totalVal=valIdx>=0?rows.reduce((s,r)=>s+n(r[valIdx]),0):0;
  const wkStore=_WK&&_WK.stores?_WK.stores.find(s=>s.outletNorm===normStore(store)):null;
  const subline=`${rows.length} entries · ${staffArr.length} staff · sorted by staff${wkStore?` · ${wkStore.market||'—'} · RM: ${wkStore.rm||'—'}`:''}`;

  const summary=`
    <div style="margin-bottom:10px;">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;">Staff contributors (sorted by entry count):</div>
      ${staffPills}
    </div>
    <div class="metrics" style="margin-bottom:10px;">
      <div class="metric red"><div class="lbl">Entries</div><div class="val">${fi(rows.length)}</div></div>
      <div class="metric amber"><div class="lbl">Staff</div><div class="val">${staffArr.length}</div></div>
      ${qtyIdx>=0?`<div class="metric"><div class="lbl">Qty</div><div class="val">${fi(totalQty)}</div></div>`:''}
      ${valIdx>=0?`<div class="metric green"><div class="lbl">Value</div><div class="val">₹${fs(totalVal)}</div></div>`:''}
    </div>`;

  const tbl=sortableTbl(
    ['#','Date','Staff','Product','Customer Notes','Notes','Customer'],
    tblRows,
    null
  );

  openModal(`🔎 ${store} — "${reason}"`,subline,summary+tbl);
};

function _rsnTopOf(map,n){
  return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,n);
}
function _rsnTopLabel(map,n){
  const top=_rsnTopOf(map,n);
  if(!top.length)return'<span style="color:var(--muted);">—</span>';
  return top.map(([k,c])=>`${k} <span style="color:var(--muted);font-size:10px;">(${c})</span>`).join(', ');
}
function renderReasonAnalysis(){
  const target=document.getElementById('rsn');
  const f=getFilters();
  const{reasonIdx,subReasonIdx,storeIdx,catIdx,subCatIdx,empIdx,custIdx,custNotesIdx,notes2Idx,qtyIdx,valIdx,sizeIdx,styleIdx,colorIdx,polishIdx,designIdx}=_LS_IDX;
  if(reasonIdx<0&&subReasonIdx<0){
    target.innerHTML=`<div class="err-card">Reason column not detected in the loss-of-sale sheet.</div>`;
    return;
  }
  const activeReasonIdx=_rsnUseSubReason&&subReasonIdx>=0?subReasonIdx:reasonIdx;
  const sourceLabel=activeReasonIdx===subReasonIdx?'Sub-reason (col J)':'Reason Of Loss Of Sale (col I)';
  const allRows=filterLS(f);

  // Reason frequency (within current filter)
  const reasonMap={};
  allRows.forEach(r=>{
    const v=String(r[activeReasonIdx]||'').trim()||'(blank)';
    reasonMap[v]=(reasonMap[v]||0)+1;
  });
  const reasonArr=Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]);
  if(!_rsnSel||!reasonMap[_rsnSel]){
    _rsnSel=reasonArr.length?reasonArr[0][0]:null;
  }

  // Source toggle (Reason vs Sub-reason) — only if both exist
  const sourceToggle=(subReasonIdx>=0&&reasonIdx>=0&&subReasonIdx!==reasonIdx)?`
    <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;">
      <button onclick="setRsnSource(false)" style="border:0;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;background:${!_rsnUseSubReason?'var(--red)':'var(--surface)'};color:${!_rsnUseSubReason?'#fff':'var(--muted)'};">Reason Of Loss Of Sale (col I)</button>
      <div style="width:1px;background:var(--border);"></div>
      <button onclick="setRsnSource(true)" style="border:0;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;background:${_rsnUseSubReason?'var(--red)':'var(--surface)'};color:${_rsnUseSubReason?'#fff':'var(--muted)'};">Sub-reason (col J)</button>
    </div>`:'';

  const selectorHtml=`
    <div class="card" style="margin-bottom:1rem;">
      ${sourceToggle}
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin:6px 0 8px 0;">Pick a reason to deep-dive (showing ${reasonArr.length} reason${reasonArr.length===1?'':'s'} from <strong>${sourceLabel}</strong> · sorted by volume):</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:180px;overflow-y:auto;">
        ${reasonArr.map(([k,c])=>`
          <button onclick="setRsnReason('${k.replace(/'/g,"\\'")}')"
            style="background:${k===_rsnSel?'var(--red)':'var(--surface)'};color:${k===_rsnSel?'#fff':'var(--text)'};border:1px solid ${k===_rsnSel?'var(--red)':'var(--border)'};border-radius:18px;padding:5px 12px;font-size:11px;cursor:pointer;${k===_rsnSel?'font-weight:600;':''}">
            ${k} <span style="opacity:.75;">(${fi(c)})</span>
          </button>
        `).join('')}
      </div>
    </div>`;

  if(!_rsnSel){
    target.innerHTML=`
      <div style="background:linear-gradient(135deg,#fdeaea 0%,#fff 100%);border:1px solid #f0c0c0;border-left:4px solid var(--red);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
        <div style="font-size:18px;font-weight:600;">🔎 Reason Analysis — gap finder</div>
        <div style="font-size:12px;color:var(--muted);">Pick a reason below to see who's reporting it, in which stores, by which staff, on which products, and what customers actually said.</div>
      </div>
      ${selectorHtml}
      <p class="muted-note" style="padding:1rem;">No reasons in the current filter selection.</p>`;
    return;
  }

  const reason=_rsnSel;
  const rows=allRows.filter(r=>(String(r[activeReasonIdx]||'').trim()||'(blank)')===reason);
  const total=rows.length;

  // ── Aggregations ──
  const rmMap={},storeMap={},staffMap={},catMap={},subCatMap={},subCatFull={},sizeMap={},styleMap={},colorMap={},polishMap={},designMap={},custMap={};
  rows.forEach(r=>{
    const store=storeIdx>=0?String(r[storeIdx]||'Unknown').trim()||'Unknown':'Unknown';
    const rm=r._rm||'Unknown';
    const market=r._wkStore?r._wkStore.market:'Unknown';
    const cluster=r._wkStore?r._wkStore.cluster:'Unknown';
    const staff=empIdx>=0?(String(r[empIdx]||'').trim()||'Unknown'):'Unknown';
    const cat=catIdx>=0?(String(r[catIdx]||'').trim()||'Unknown'):'Unknown';
    const subCat=subCatIdx>=0?(String(r[subCatIdx]||'').trim()):'';
    const sz=sizeIdx>=0?(String(r[sizeIdx]||'').trim()):'';
    const stl=styleIdx>=0?(String(r[styleIdx]||'').trim()):'';
    const col=colorIdx>=0?(String(r[colorIdx]||'').trim()):'';
    const pol=polishIdx>=0?(String(r[polishIdx]||'').trim()):'';
    const dn=designIdx>=0?(String(r[designIdx]||'').trim()):'';
    const cust=custIdx>=0?(String(r[custIdx]||'').trim()||'Unknown'):'Unknown';
    const qty=qtyIdx>=0?n(r[qtyIdx]):0;
    const val=valIdx>=0?n(r[valIdx]):0;

    if(!rmMap[rm])rmMap[rm]={entries:0,stores:new Set(),markets:new Set(),staff:{},cat:{},qty:0,val:0};
    rmMap[rm].entries++;rmMap[rm].stores.add(store);rmMap[rm].markets.add(market);
    if(staff!=='Unknown')rmMap[rm].staff[staff]=(rmMap[rm].staff[staff]||0)+1;
    rmMap[rm].cat[cat]=(rmMap[rm].cat[cat]||0)+1;
    rmMap[rm].qty+=qty;rmMap[rm].val+=val;

    if(!storeMap[store])storeMap[store]={entries:0,rm,market,cluster,staff:{},cat:{},qty:0,val:0};
    storeMap[store].entries++;
    if(staff!=='Unknown')storeMap[store].staff[staff]=(storeMap[store].staff[staff]||0)+1;
    storeMap[store].cat[cat]=(storeMap[store].cat[cat]||0)+1;
    storeMap[store].qty+=qty;storeMap[store].val+=val;

    if(staff!=='Unknown'){
      if(!staffMap[staff])staffMap[staff]={entries:0,stores:new Set(),rms:new Set(),cat:{}};
      staffMap[staff].entries++;staffMap[staff].stores.add(store);staffMap[staff].rms.add(rm);
      staffMap[staff].cat[cat]=(staffMap[staff].cat[cat]||0)+1;
    }

    if(!catMap[cat])catMap[cat]={entries:0,stores:new Set(),subCat:{},qty:0,val:0};
    catMap[cat].entries++;catMap[cat].stores.add(store);
    if(subCat)catMap[cat].subCat[subCat]=(catMap[cat].subCat[subCat]||0)+1;
    catMap[cat].qty+=qty;catMap[cat].val+=val;

    if(subCat){
      subCatMap[subCat]=(subCatMap[subCat]||0)+1;
      if(!subCatFull[subCat])subCatFull[subCat]={entries:0,stores:new Set(),cat:{},staff:{},design:{},sz:{},stl:{},col:{},pol:{},qty:0,val:0};
      const sb=subCatFull[subCat];
      sb.entries++;
      sb.stores.add(store);
      sb.cat[cat]=(sb.cat[cat]||0)+1;
      if(staff!=='Unknown')sb.staff[staff]=(sb.staff[staff]||0)+1;
      if(dn&&dn!=='-'&&dn.length>=3)sb.design[dn]=(sb.design[dn]||0)+1;
      if(sz)sb.sz[sz]=(sb.sz[sz]||0)+1;
      if(stl)sb.stl[stl]=(sb.stl[stl]||0)+1;
      if(col)sb.col[col]=(sb.col[col]||0)+1;
      if(pol)sb.pol[pol]=(sb.pol[pol]||0)+1;
      sb.qty+=qty;
      sb.val+=val;
    }
    if(sz)sizeMap[sz]=(sizeMap[sz]||0)+1;
    if(stl)styleMap[stl]=(styleMap[stl]||0)+1;
    if(col)colorMap[col]=(colorMap[col]||0)+1;
    if(pol)polishMap[pol]=(polishMap[pol]||0)+1;
    if(dn&&dn!=='-'&&dn.length>=3)designMap[dn]=(designMap[dn]||0)+1;
    custMap[cust]=(custMap[cust]||0)+1;
  });

  const totalQty=rows.reduce((s,r)=>s+(qtyIdx>=0?n(r[qtyIdx]):0),0);
  const totalVal=rows.reduce((s,r)=>s+(valIdx>=0?n(r[valIdx]):0),0);

  // ── Notes phrase summary ──
  const noteCols=[custNotesIdx,notes2Idx].filter(v=>v>=0&&v!==undefined);
  const STOP=new Set(['the','of','and','in','on','for','to','a','an','is','are','with','our','my','your','i','no','not','by','at','this','that','was','it','be','have','has','as','from','but','or','if','do','does','did','can','will','want','wanted','need','needed','looking','look','please','customer','cust','rs','some','more','same','also','any','all','one','two','should','would','only','told','said','asked','came','went','dont','don','they','them','their','her','his','she','he','were','been','wants','request','requested','show','showed','than','then','when','where','which','what','who','why','how','here','there','very','just','too','out','up','down','off','about','into','over','under','again','still','now','already','much','many','few','little','first','last','next','old','new']);
  const SIZE_PAT=/^\d+(\.\d+|[-–]\d+(\.\d+)?)?$/;
  const phraseMap={};
  rows.forEach((r,i)=>{
    if(!noteCols.length)return;
    const text=noteCols.map(c=>String(r[c]||'')).join(' | ');
    if(!text.trim())return;
    const toks=String(text).toLowerCase().replace(/[^a-z0-9.\-]+/g,' ').split(/\s+/)
      .filter(t=>t&&!STOP.has(t)&&(t.length>=3||SIZE_PAT.test(t)));
    const phrases=new Set();
    toks.forEach(t=>{if(t.length>=4||SIZE_PAT.test(t))phrases.add(t);});
    for(let j=0;j<toks.length-1;j++)phrases.add(toks[j]+' '+toks[j+1]);
    for(let j=0;j<toks.length-2;j++)phrases.add(toks[j]+' '+toks[j+1]+' '+toks[j+2]);
    phrases.forEach(p=>{if(!phraseMap[p])phraseMap[p]=[];phraseMap[p].push(i);});
  });
  const topPhrases=Object.entries(phraseMap).filter(([,arr])=>arr.length>=2).sort((a,b)=>b[1].length-a[1].length).slice(0,30);

  // Top sample customer notes (first 12 distinct, non-empty)
  const sampleNotes=[];
  const seenNoteText=new Set();
  for(const r of rows){
    if(sampleNotes.length>=12)break;
    const text=noteCols.map(c=>String(r[c]||'').trim()).filter(Boolean).join(' · ');
    if(!text)continue;
    const key=text.toLowerCase().slice(0,80);
    if(seenNoteText.has(key))continue;
    seenNoteText.add(key);
    const store=storeIdx>=0?String(r[storeIdx]||''):'';
    sampleNotes.push({store,text:text.length>240?text.slice(0,240)+'…':text});
  }

  // ── Headline narrative (one-line gist) ──
  const topPhraseForGist=topPhrases[0]?topPhrases[0][0]:'';
  const topCatForGist=_rsnTopOf(catMap,1)[0];
  const topRmForGist=_rsnTopOf(Object.fromEntries(Object.entries(rmMap).map(([k,v])=>[k,v.entries])),1)[0];
  const topStaffForGist=_rsnTopOf(staffMap,1)[0]?_rsnTopOf(Object.fromEntries(Object.entries(staffMap).map(([k,v])=>[k,v.entries])),1)[0]:null;
  const headline=`<strong>${fi(total)} loss entries</strong> tagged <strong>"${reason}"</strong> across <strong>${Object.keys(storeMap).length} stores</strong> and <strong>${Object.keys(rmMap).length} RMs</strong>${topRmForGist?` — most reported by <strong>${topRmForGist[0]}</strong> (${topRmForGist[1]} entries)`:''}${topCatForGist?`, mostly in <strong>${topCatForGist[0]}</strong> category`:''}${topStaffForGist?`, top staff contributor <strong>${topStaffForGist[0]}</strong> (${topStaffForGist[1]} entries)`:''}${topPhraseForGist?`. Recurring phrase in notes: <strong>"${topPhraseForGist}"</strong>`:''}.`;

  // ── Tables ──
  const rmArr=Object.entries(rmMap).sort((a,b)=>b[1].entries-a[1].entries);
  const rmTbl=sortableTbl(
    ['RM','Entries','Stores','Markets','Top staff','Top category','Qty','Value'],
    rmArr.map(([k,v])=>({cells:[
      `<strong>${k}</strong>`,
      fi(v.entries),
      fi(v.stores.size),
      fi(v.markets.size),
      _rsnTopLabel(v.staff,2),
      _rsnTopLabel(v.cat,2),
      qtyIdx>=0?fi(v.qty):'—',
      valIdx>=0?`₹${fs(v.val)}`:'—'
    ]})),
    ['Total',fi(total),fi(Object.keys(storeMap).length),'','','',qtyIdx>=0?fi(totalQty):'—',valIdx>=0?`₹${fs(totalVal)}`:'—']
  );

  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1].entries-a[1].entries).slice(0,50);
  const storeTbl=sortableTbl(
    ['Store','RM','Market','Entries','Top staff','Top category','Qty','Value'],
    storeArr.map(([k,v])=>({cells:[
      `<span class="clickable" onclick="showReasonStoreDetail('${reason.replace(/'/g,"\\'")}','${k.replace(/'/g,"\\'")}')">${k}</span>`,
      `<span style="font-size:11px;color:var(--muted);">${v.rm}</span>`,
      `<span style="font-size:11px;color:var(--muted);">${v.market}</span>`,
      fi(v.entries),
      _rsnTopLabel(v.staff,2),
      _rsnTopLabel(v.cat,1),
      qtyIdx>=0?fi(v.qty):'—',
      valIdx>=0?`₹${fs(v.val)}`:'—'
    ]})),
    null
  );

  const staffArr=Object.entries(staffMap).sort((a,b)=>b[1].entries-a[1].entries).slice(0,30);
  const staffTbl=staffArr.length?sortableTbl(
    ['Staff','Entries','Stores','RMs','Top category'],
    staffArr.map(([k,v])=>({cells:[
      `<strong>${k}</strong>`,
      fi(v.entries),
      fi(v.stores.size),
      fi(v.rms.size),
      _rsnTopLabel(v.cat,2)
    ]})),
    null
  ):'<p class="muted-note">No staff column / data available.</p>';

  const subCatArr=Object.entries(subCatFull).sort((a,b)=>b[1].entries-a[1].entries);
  const subCatTbl=subCatArr.length?sortableTbl(
    ['Sub-category','Entries','Stores','Top category','Top design#','Top staff','Top size','Qty','Value'],
    subCatArr.map(([k,v])=>({cells:[
      `<span class="clickable" onclick="showRsnSubCatDetail('${reason.replace(/'/g,"\\'")}','${k.replace(/'/g,"\\'")}')">${k}</span>`,
      fi(v.entries),
      fi(v.stores.size),
      _rsnTopLabel(v.cat,2),
      _rsnTopLabel(v.design,2),
      _rsnTopLabel(v.staff,2),
      _rsnTopLabel(v.sz,2),
      qtyIdx>=0?fi(v.qty):'—',
      valIdx>=0?`₹${fs(v.val)}`:'—'
    ]})),
    null
  ):'<p class="muted-note">No sub-category column / data available.</p>';

  const catArr=Object.entries(catMap).sort((a,b)=>b[1].entries-a[1].entries);
  const catTbl=sortableTbl(
    ['Category','Entries','Stores','Top sub-category','Qty','Value'],
    catArr.map(([k,v])=>({cells:[
      `<span class="clickable" onclick="showRsnCatDetail('${reason.replace(/'/g,"\\'")}','${k.replace(/'/g,"\\'")}')">${k}</span>`,
      fi(v.entries),
      fi(v.stores.size),
      _rsnTopLabel(v.subCat,3),
      qtyIdx>=0?fi(v.qty):'—',
      valIdx>=0?`₹${fs(v.val)}`:'—'
    ]})),
    null
  );

  const attrCard=(title,attrKey,map,n)=>{
    const arr=_rsnTopOf(map,n);
    if(!arr.length)return'';
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px;">${title}</div>
      ${arr.map(([k,c])=>`<div class="clickable" onclick="showRsnAttrDetail('${reason.replace(/'/g,"\\'")}','${attrKey}','${String(k).replace(/'/g,"\\'")}')" style="font-size:12px;display:flex;justify-content:space-between;padding:4px 6px;margin:0 -6px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:4px;"><span>${k}</span><span style="color:var(--muted);font-weight:600;">${fi(c)}</span></div>`).join('')}
    </div>`;
  };

  const phraseTbl=topPhrases.length?sortableTbl(
    ['Phrase','Mentions','Sample','% of entries'],
    topPhrases.map(([p,arr])=>{
      const sampleRow=rows[arr[0]];
      const sampleText=noteCols.map(c=>String(sampleRow[c]||'').trim()).filter(Boolean).join(' · ');
      const short=sampleText.length>120?sampleText.slice(0,120)+'…':sampleText;
      return{cells:[
        `<strong>${p}</strong>`,
        fi(arr.length),
        `<span style="font-size:11px;color:var(--muted);">${short||'—'}</span>`,
        `${Math.round(arr.length/total*100)}%`
      ]};
    }),
    null
  ):'<p class="muted-note">No recurring phrases (needs ≥2 mentions in Customer Notes / Notes).</p>';

  const sampleHtml=sampleNotes.length?sampleNotes.map(s=>`
    <div style="border-left:3px solid var(--red);padding:6px 12px;margin-bottom:6px;background:var(--surface);border-radius:0 6px 6px 0;">
      <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px;">${s.store||'—'}</div>
      <div style="font-size:12px;line-height:1.45;">${s.text}</div>
    </div>
  `).join(''):'<p class="muted-note">No customer notes captured for this reason.</p>';

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#fdeaea 0%,#fff 100%);border:1px solid #f0c0c0;border-left:4px solid var(--red);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">🔎 Reason Analysis — gap finder</div>
      <div style="font-size:12px;color:var(--muted);">${headline}</div>
    </div>

    ${selectorHtml}

    <div class="metrics" style="margin-bottom:1rem;">
      <div class="metric red"><div class="lbl">Total entries</div><div class="val">${fi(total)}</div><div class="sub">${Math.round(total/allRows.length*100)}% of all loss in scope</div></div>
      <div class="metric"><div class="lbl">Stores reporting</div><div class="val">${Object.keys(storeMap).length}</div><div class="sub">${Object.keys(rmMap).length} RMs · ${[...new Set(Object.values(rmMap).flatMap(v=>[...v.markets]))].length} markets</div></div>
      <div class="metric blue"><div class="lbl">Categories affected</div><div class="val">${Object.keys(catMap).length}</div><div class="sub">${Object.keys(subCatMap).length} sub-categories</div></div>
      <div class="metric amber"><div class="lbl">Staff contributors</div><div class="val">${Object.keys(staffMap).length}</div></div>
      ${valIdx>=0?`<div class="metric green"><div class="lbl">Loss value</div><div class="val">₹${fs(totalVal)}</div><div class="sub">${qtyIdx>=0?fi(totalQty)+' units':''}</div></div>`:''}
    </div>

    <div class="card">
      <div class="card-title">By RM — which RM is reporting this most, and where</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Each RM ranked by entries. "Stores" = how many distinct stores under that RM logged this reason. "Top staff" / "Top category" highlight where each RM's volume is concentrated.</p>
      ${rmTbl}
    </div>

    <div class="card">
      <div class="card-title">By store — top ${Math.min(50,Object.keys(storeMap).length)} stores logging this reason</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Click a store to open the standard store-detail modal. Top staff / top category are the dominant contributor inside that store.</p>
      ${storeTbl}
    </div>

    <div class="card">
      <div class="card-title">By staff — who is contributing most entries</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Top 30 staff by entry count. High concentration at one staff member can flag either a problem area or simply a busy assignment — compare against the staff's store and RM context.</p>
      ${staffTbl}
    </div>

    <div class="card">
      <div class="card-title">By category — which products are driving this reason</div>
      ${catTbl}
    </div>

    <div class="card">
      <div class="card-title">By sub-category — drill one level deeper</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Each row groups by the loss-sheet's <strong>Product Sub Category</strong> column for this reason. Click a sub-category to see the per-store / per-product breakdown.</p>
      ${subCatTbl}
    </div>

    <div class="card">
      <div class="card-title">Product attributes — top values seen in this reason</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 10px 0;">Top recurring values across Size / Style / Color / Polish / Design#. Customer type at far right.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;">
        ${attrCard('Size','size',sizeMap,8)}
        ${attrCard('Style','style',styleMap,8)}
        ${attrCard('Color','color',colorMap,8)}
        ${attrCard('Polish','polish',polishMap,8)}
        ${attrCard('Design #','design',designMap,8)}
        ${attrCard('Customer type','cust',custMap,8)}
      </div>
    </div>

    <div class="card">
      <div class="card-title">💬 Sample customer notes (up to 12 distinct)</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">A spread of actual quotes pulled from rows tagged with this reason. Each block shows the store followed by the note text.</p>
      ${sampleHtml}
    </div>`;
}

// Drill into a single (reason, category) — list every product (sub-category +
// design#) with its count, store list, top staff, and top attribute values.
window.showRsnCatDetail=function(reason,category){
  const f=getFilters();
  const{storeIdx,reasonIdx,subReasonIdx,catIdx,subCatIdx,designIdx,sizeIdx,styleIdx,colorIdx,polishIdx,empIdx,qtyIdx,valIdx}=_LS_IDX;
  const activeReasonIdx=_rsnUseSubReason&&subReasonIdx>=0?subReasonIdx:reasonIdx;
  const rows=filterLS(f).filter(r=>{
    const rv=String(r[activeReasonIdx]||'').trim()||'(blank)';
    if(rv!==reason)return false;
    const cv=catIdx>=0?(String(r[catIdx]||'').trim()||'Unknown'):'Unknown';
    return cv===category;
  });
  if(!rows.length){openModal(`📦 ${category} — "${reason}"`,'No data','<p class="muted-note">No matching entries.</p>');return;}
  const productMap={};
  rows.forEach(r=>{
    const subCat=subCatIdx>=0?String(r[subCatIdx]||'').trim():'';
    const dn=designIdx>=0?String(r[designIdx]||'').trim():'';
    const sz=sizeIdx>=0?String(r[sizeIdx]||'').trim():'';
    const stl=styleIdx>=0?String(r[styleIdx]||'').trim():'';
    const col=colorIdx>=0?String(r[colorIdx]||'').trim():'';
    const pol=polishIdx>=0?String(r[polishIdx]||'').trim():'';
    const productKey=(subCat+(dn&&dn!=='-'?` · #${dn}`:''))||'(no product detail)';
    if(!productMap[productKey])productMap[productKey]={count:0,stores:{},staff:{},sz:{},stl:{},col:{},pol:{},qty:0,val:0};
    const p=productMap[productKey];
    p.count++;
    const sn=storeIdx>=0?String(r[storeIdx]||'').trim():'';
    if(sn)p.stores[sn]=(p.stores[sn]||0)+1;
    const sf=empIdx>=0?String(r[empIdx]||'').trim():'';
    if(sf)p.staff[sf]=(p.staff[sf]||0)+1;
    if(sz)p.sz[sz]=(p.sz[sz]||0)+1;
    if(stl)p.stl[stl]=(p.stl[stl]||0)+1;
    if(col)p.col[col]=(p.col[col]||0)+1;
    if(pol)p.pol[pol]=(p.pol[pol]||0)+1;
    p.qty+=qtyIdx>=0?n(r[qtyIdx]):0;
    p.val+=valIdx>=0?n(r[valIdx]):0;
  });
  const arr=Object.entries(productMap).sort((a,b)=>b[1].count-a[1].count);
  const _topMap=(m,nn)=>Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,nn).map(([k,c])=>`${k} <span style="color:var(--muted);font-size:10px;">(${c})</span>`).join(', ')||'<span style="color:var(--muted);">—</span>';
  const tbl=sortableTbl(
    ['Product (sub-cat · design#)','Count','Stores','Top staff','Top size','Top style','Top color','Qty','Value'],
    arr.map(([k,v])=>({cells:[
      `<strong>${k}</strong>`,
      fi(v.count),
      _topMap(v.stores,4),
      _topMap(v.staff,2),
      _topMap(v.sz,2),
      _topMap(v.stl,2),
      _topMap(v.col,2),
      qtyIdx>=0?fi(v.qty):'—',
      valIdx>=0?`₹${fs(v.val)}`:'—'
    ]})),
    ['Total',fi(rows.length),'','','','','',qtyIdx>=0?fi(rows.reduce((s,r)=>s+(qtyIdx>=0?n(r[qtyIdx]):0),0)):'—',valIdx>=0?`₹${fs(rows.reduce((s,r)=>s+(valIdx>=0?n(r[valIdx]):0),0))}`:'—']
  );
  const storeCount=new Set(rows.map(r=>storeIdx>=0?String(r[storeIdx]||'').trim():'').filter(Boolean)).size;
  openModal(`📦 ${category} — "${reason}"`,`${fi(rows.length)} entries · ${arr.length} distinct products · ${storeCount} stores`,tbl);
};

// Drill into a single (reason, sub-category) — list every store + product
// (design# / size / style / color / polish) with its count and top staff.
window.showRsnSubCatDetail=function(reason,subCategory){
  const f=getFilters();
  const{storeIdx,reasonIdx,subReasonIdx,catIdx,subCatIdx,designIdx,sizeIdx,styleIdx,colorIdx,polishIdx,empIdx,qtyIdx,valIdx}=_LS_IDX;
  const activeReasonIdx=_rsnUseSubReason&&subReasonIdx>=0?subReasonIdx:reasonIdx;
  if(subCatIdx<0){openModal(`📦 ${subCategory}`,'Column missing','<p class="muted-note">Sub-category column not detected.</p>');return;}
  const rows=filterLS(f).filter(r=>{
    const rv=String(r[activeReasonIdx]||'').trim()||'(blank)';
    if(rv!==reason)return false;
    return String(r[subCatIdx]||'').trim()===subCategory;
  });
  if(!rows.length){openModal(`📦 ${subCategory} — "${reason}"`,'No data','<p class="muted-note">No matching entries.</p>');return;}
  // Group by (store, category, design#) so each row = unique store + product combo
  const map={};
  rows.forEach(r=>{
    const store=storeIdx>=0?(String(r[storeIdx]||'').trim()||'Unknown'):'Unknown';
    const cat=catIdx>=0?(String(r[catIdx]||'').trim()||'—'):'—';
    const dn=designIdx>=0?String(r[designIdx]||'').trim():'';
    const sz=sizeIdx>=0?String(r[sizeIdx]||'').trim():'';
    const stl=styleIdx>=0?String(r[styleIdx]||'').trim():'';
    const col=colorIdx>=0?String(r[colorIdx]||'').trim():'';
    const pol=polishIdx>=0?String(r[polishIdx]||'').trim():'';
    const designKey=(dn&&dn!=='-'?`#${dn}`:'(no design#)');
    const key=`${store}||${cat}||${designKey}`;
    if(!map[key])map[key]={store,cat,design:designKey,count:0,staff:{},sz:{},stl:{},col:{},pol:{},qty:0,val:0};
    const m=map[key];
    m.count++;
    const sf=empIdx>=0?String(r[empIdx]||'').trim():'';
    if(sf)m.staff[sf]=(m.staff[sf]||0)+1;
    if(sz)m.sz[sz]=(m.sz[sz]||0)+1;
    if(stl)m.stl[stl]=(m.stl[stl]||0)+1;
    if(col)m.col[col]=(m.col[col]||0)+1;
    if(pol)m.pol[pol]=(m.pol[pol]||0)+1;
    m.qty+=qtyIdx>=0?n(r[qtyIdx]):0;
    m.val+=valIdx>=0?n(r[valIdx]):0;
  });
  const arr=Object.values(map).sort((a,b)=>b.count-a.count);
  const _topMap=(m,nn)=>Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,nn).map(([k,c])=>`${k} <span style="color:var(--muted);font-size:10px;">(${c})</span>`).join(', ')||'<span style="color:var(--muted);">—</span>';
  const tbl=sortableTbl(
    ['Store','Category','Design #','Count','Top staff','Top size','Top style','Top color','Top polish','Qty','Value'],
    arr.map(x=>({cells:[
      `<span class="clickable" onclick="showStoreModal('${x.store.replace(/'/g,"\\'")}')">${x.store}</span>`,
      x.cat,
      `<strong>${x.design}</strong>`,
      fi(x.count),
      _topMap(x.staff,2),
      _topMap(x.sz,2),
      _topMap(x.stl,2),
      _topMap(x.col,2),
      _topMap(x.pol,2),
      qtyIdx>=0?fi(x.qty):'—',
      valIdx>=0?`₹${fs(x.val)}`:'—'
    ]})),
    ['Total','','',fi(rows.length),'','','','','',qtyIdx>=0?fi(rows.reduce((s,r)=>s+(qtyIdx>=0?n(r[qtyIdx]):0),0)):'—',valIdx>=0?`₹${fs(rows.reduce((s,r)=>s+(valIdx>=0?n(r[valIdx]):0),0))}`:'—']
  );
  const storeCount=new Set(arr.map(x=>x.store)).size;
  openModal(`📦 ${subCategory} — "${reason}"`,`${fi(rows.length)} entries · ${arr.length} rows · ${storeCount} stores`,tbl);
};

// Drill into a single (reason, attributeKey, attributeValue) — list each
// store + category + product (sub-cat · design#) row with its count.
window.showRsnAttrDetail=function(reason,attrKey,attrValue){
  const f=getFilters();
  const{storeIdx,reasonIdx,subReasonIdx,catIdx,subCatIdx,designIdx,sizeIdx,styleIdx,colorIdx,polishIdx,custIdx,empIdx}=_LS_IDX;
  const activeReasonIdx=_rsnUseSubReason&&subReasonIdx>=0?subReasonIdx:reasonIdx;
  const attrIdxMap={size:sizeIdx,style:styleIdx,color:colorIdx,polish:polishIdx,design:designIdx,cust:custIdx};
  const attrIdx=attrIdxMap[attrKey];
  const attrTitle={size:'Size',style:'Style',color:'Color',polish:'Polish',design:'Design #',cust:'Customer type'}[attrKey]||attrKey;
  if(attrIdx==null||attrIdx<0){
    openModal(`🏷️ ${attrTitle}: ${attrValue}`,'Column missing','<p class="muted-note">Attribute column not detected in the sheet.</p>');
    return;
  }
  const rows=filterLS(f).filter(r=>{
    const rv=String(r[activeReasonIdx]||'').trim()||'(blank)';
    if(rv!==reason)return false;
    return String(r[attrIdx]||'').trim()===attrValue;
  });
  if(!rows.length){openModal(`🏷️ ${attrTitle}: ${attrValue}`,'No data','<p class="muted-note">No matching entries.</p>');return;}
  // Group by (store, category, product) so each row = a unique store/cat/product combo
  const map={};
  rows.forEach(r=>{
    const store=storeIdx>=0?(String(r[storeIdx]||'').trim()||'Unknown'):'Unknown';
    const cat=catIdx>=0?(String(r[catIdx]||'').trim()||'—'):'—';
    const subCat=subCatIdx>=0?String(r[subCatIdx]||'').trim():'';
    const dn=designIdx>=0?String(r[designIdx]||'').trim():'';
    const productKey=(subCat+(dn&&dn!=='-'?` · #${dn}`:''))||'—';
    const key=`${store}||${cat}||${productKey}`;
    if(!map[key])map[key]={store,cat,product:productKey,count:0,staff:{}};
    map[key].count++;
    const sf=empIdx>=0?String(r[empIdx]||'').trim():'';
    if(sf)map[key].staff[sf]=(map[key].staff[sf]||0)+1;
  });
  const arr=Object.values(map).sort((a,b)=>b.count-a.count);
  const _topMap=(m,nn)=>Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,nn).map(([k,c])=>`${k} <span style="color:var(--muted);font-size:10px;">(${c})</span>`).join(', ')||'<span style="color:var(--muted);">—</span>';
  const tbl=sortableTbl(
    ['Store','Category','Product (sub-cat · design#)','Count','Top staff'],
    arr.map(x=>({cells:[
      `<span class="clickable" onclick="showStoreModal('${x.store.replace(/'/g,"\\'")}')">${x.store}</span>`,
      x.cat,
      `<strong>${x.product}</strong>`,
      fi(x.count),
      _topMap(x.staff,2)
    ]})),
    ['Total','','',fi(rows.length),'']
  );
  const storeCount=new Set(arr.map(x=>x.store)).size;
  openModal(`🏷️ ${attrTitle}: ${attrValue} — "${reason}"`,`${fi(rows.length)} entries · ${arr.length} rows · ${storeCount} stores`,tbl);
};

// ═══════════════════════════════════════════════════════════════════
// 📄 RAW DATA TAB — every column from the loss-of-sale sheet, with the
// global filter applied + pagination + CSV download. Useful when users
// want to inspect or export the actual rows backing the dashboard.
// ═══════════════════════════════════════════════════════════════════
let _rawPage=0;
let _rawPageSize=100;
let _rawSearch='';
let _rawSortCol=-1;
let _rawSortAsc=true;
window.setRawPage=function(p){_rawPage=Math.max(0,p);renderRawData();};
window.setRawPageSize=function(n){_rawPageSize=parseInt(n,10)||100;_rawPage=0;renderRawData();};
window.setRawSearch=function(v){_rawSearch=String(v||'').toLowerCase().trim();_rawPage=0;renderRawData();};
window.setRawSort=function(col){
  col=parseInt(col,10);
  if(_rawSortCol===col)_rawSortAsc=!_rawSortAsc;
  else{_rawSortCol=col;_rawSortAsc=true;}
  _rawPage=0;
  renderRawData();
};

function _rawTruncate(v,max){
  const s=String(v==null?'':v);
  if(s.length<=max)return s;
  return s.slice(0,max)+'…';
}
function _rawEscapeHtml(v){
  return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function _rawCsvEscape(v){
  const s=String(v==null?'':v);
  if(s.includes(',')||s.includes('"')||s.includes('\n')||s.includes('\r')){
    return'"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}
window.downloadRawCsv=function(){
  const f=getFilters();
  let rows=filterLS(f);
  if(_rawSearch){
    rows=rows.filter(r=>r.some(v=>String(v==null?'':v).toLowerCase().includes(_rawSearch)));
  }
  const headers=(_LS_HEADERS||[]).map((h,i)=>h&&String(h).trim()?h:`Col ${i+1}`);
  const lines=[headers.map(_rawCsvEscape).join(',')];
  rows.forEach(r=>lines.push(headers.map((_,i)=>_rawCsvEscape(r[i])).join(',')));
  const csv=lines.join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ts=new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  a.href=url;a.download=`loss-of-sale-raw-${ts}.csv`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};
function renderRawData(){
  const target=document.getElementById('raw');
  if(!_LS_HEADERS||!_LS_HEADERS.length){
    target.innerHTML=`<div class="err-card">⚠️ Loss-of-sale headers not loaded yet. Wait for initial data load to complete.</div>`;
    return;
  }
  const f=getFilters();
  let rows=filterLS(f);
  const totalFiltered=rows.length;
  // Optional in-tab full-text search across all columns (cheap on filtered set)
  if(_rawSearch){
    rows=rows.filter(r=>r.some(v=>String(v==null?'':v).toLowerCase().includes(_rawSearch)));
  }
  // Sort across the full filtered set BEFORE paginating, so sort persists across pages
  if(_rawSortCol>=0){
    const col=_rawSortCol,asc=_rawSortAsc;
    rows=rows.slice().sort((a,b)=>{
      const av=String(a[col]==null?'':a[col]);
      const bv=String(b[col]==null?'':b[col]);
      const an=parseFloat(av.replace(/[₹,% ]/g,''));
      const bn=parseFloat(bv.replace(/[₹,% ]/g,''));
      const bothNum=!isNaN(an)&&!isNaN(bn)&&av.replace(/[\d.\-+eE,₹% ]/g,'').trim()===''&&bv.replace(/[\d.\-+eE,₹% ]/g,'').trim()==='';
      if(bothNum)return asc?an-bn:bn-an;
      return asc?av.localeCompare(bv):bv.localeCompare(av);
    });
  }
  const total=rows.length;
  const pageSize=_rawPageSize;
  const pages=Math.max(1,Math.ceil(total/pageSize));
  if(_rawPage>=pages)_rawPage=pages-1;
  if(_rawPage<0)_rawPage=0;
  const start=_rawPage*pageSize;
  const end=Math.min(total,start+pageSize);
  const pageRows=rows.slice(start,end);
  const headers=_LS_HEADERS.map((h,i)=>h&&String(h).trim()?String(h):`Col ${i+1}`);

  // Active-filter chips for the banner
  const fLabels=[
    _fLabel(f.month,'Month'),
    f.dateFrom||f.dateTo?`Date: ${f.dateFrom?fmtDK(f.dateFrom):'Start'} → ${f.dateTo?fmtDK(f.dateTo):'End'}`:'',
    _fLabel(f.cluster,'Cluster'),_fLabel(f.rm,'RM'),_fLabel(f.market,'Market'),_fLabel(f.store,'Store'),
    _fLabel(f.reason,'Reason'),_fLabel(f.custType,'Customer'),_fLabel(f.purpose,'Purpose')
  ].filter(Boolean);
  const filterChips=fLabels.length
    ? fLabels.map(l=>`<span style="background:#eaf1fc;color:#1a3fa0;border-radius:14px;padding:3px 10px;font-size:11px;font-weight:600;">${l}</span>`).join(' ')
    : '<span style="color:var(--muted);font-size:11px;">No filters applied — showing every loss row.</span>';

  const pager=(side)=>`
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:8px 0;font-size:12px;color:var(--muted);${side==='top'?'border-bottom:1px solid var(--border);margin-bottom:8px;':'border-top:1px solid var(--border);margin-top:8px;'}">
      <span><strong style="color:var(--text);">Page ${_rawPage+1} of ${pages}</strong> · showing rows <strong style="color:var(--text);">${total?fi(start+1):0}–${fi(end)}</strong> of <strong style="color:var(--text);">${fi(total)}</strong></span>
      <span style="flex:1;"></span>
      <button class="filter-btn" ${_rawPage===0?'disabled style="opacity:.4;cursor:not-allowed;"':''} onclick="setRawPage(0)">⏮ First</button>
      <button class="filter-btn" ${_rawPage===0?'disabled style="opacity:.4;cursor:not-allowed;"':''} onclick="setRawPage(${_rawPage-1})">◀ Prev</button>
      <input type="number" min="1" max="${pages}" value="${_rawPage+1}" onchange="setRawPage(parseInt(this.value,10)-1)" style="width:60px;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:11px;text-align:center;"/>
      <button class="filter-btn" ${_rawPage>=pages-1?'disabled style="opacity:.4;cursor:not-allowed;"':''} onclick="setRawPage(${_rawPage+1})">Next ▶</button>
      <button class="filter-btn" ${_rawPage>=pages-1?'disabled style="opacity:.4;cursor:not-allowed;"':''} onclick="setRawPage(${pages-1})">Last ⏭</button>
      <span style="opacity:.5;">|</span>
      <label style="font-size:11px;">Per page:</label>
      <select onchange="setRawPageSize(this.value)" style="font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);">
        ${[50,100,250,500,1000].map(n=>`<option value="${n}"${_rawPageSize===n?' selected':''}>${n}</option>`).join('')}
      </select>
    </div>`;

  // Build the data table — every header is clickable to sort the full filtered set
  const thead=`<tr>${headers.map((h,i)=>{
    const cls=_rawSortCol===i?(_rawSortAsc?'sort-asc':'sort-desc'):'';
    return`<th data-sortable="1" class="${cls}" onclick="setRawSort(${i})" style="background:var(--surface);position:sticky;top:0;z-index:2;border-bottom:2px solid var(--border);padding:6px 8px;font-size:11px;font-weight:600;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;">${_rawEscapeHtml(h)}</th>`;
  }).join('')}</tr>`;
  const tbody=pageRows.map((r,ri)=>{
    const cells=headers.map((_,i)=>{
      const v=r[i];
      const disp=_rawTruncate(v,80);
      const fullTitle=String(v==null?'':v).replace(/"/g,'&quot;');
      return`<td title="${fullTitle}" style="padding:5px 8px;font-size:11px;border-bottom:1px solid var(--border);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${_rawEscapeHtml(disp)}</td>`;
    }).join('');
    return`<tr style="background:${ri%2?'var(--bg)':'var(--surface)'};">${cells}</tr>`;
  }).join('');
  const tableHtml=`<div style="overflow:auto;border:1px solid var(--border);border-radius:8px;max-height:70vh;">
    <table style="border-collapse:collapse;min-width:100%;width:max-content;">
      <thead>${thead}</thead>
      <tbody>${tbody||`<tr><td colspan="${headers.length}" style="padding:30px;text-align:center;color:var(--muted);font-size:13px;">No rows match the current filter${_rawSearch?' + search':''}.</td></tr>`}</tbody>
    </table>
  </div>`;

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#fff5e6 0%,#fff 100%);border:1px solid #f5d499;border-left:4px solid var(--amber);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">📄 Raw Data — full loss-of-sale rows with every column</div>
