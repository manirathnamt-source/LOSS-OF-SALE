      <div style="font-size:12px;color:var(--muted);">Each row = one loss-of-sale entry from the sheet. Every original column (Date, Outlet, Customer, Phone, Reason, Sub-reason, Category, Sub-category, Size, Style, Color, Polish, Design#, Qty, Value, Customer Notes, Notes, Purpose, etc.) is shown verbatim. Filters from the global bar are applied. Hover any cell to see the full value if truncated.</div>
    </div>

    <div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:12px;color:var(--muted);font-weight:600;">Active filters:</span>
        ${filterChips}
      </div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;">
        <input type="text" value="${_rawSearch.replace(/"/g,'&quot;')}" placeholder="Search across all columns..." oninput="setRawSearch(this.value)" style="flex:1;min-width:240px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:12px;outline:none;"/>
        ${_rawSortCol>=0?`<button class="filter-btn" onclick="setRawSort(-1)" title="Restore original row order">↻ Clear sort (${headers[_rawSortCol]||''} ${_rawSortAsc?'▲':'▼'})</button>`:''}
        <button class="filter-btn" onclick="downloadRawCsv()" style="background:var(--green);color:#fff;border-color:var(--green);font-weight:600;">⬇ Download CSV (${fi(total)} rows)</button>
        <div style="font-size:11px;color:var(--muted);">
          <strong style="color:var(--text);">${fi(total)}</strong> of <strong style="color:var(--text);">${fi(totalFiltered)}</strong> filtered ·
          <strong style="color:var(--text);">${fi(_LS_ROWS.length)}</strong> total in sheet ·
          <strong style="color:var(--text);">${headers.length}</strong> columns
        </div>
      </div>
    </div>

    <div class="card">
      ${pager('top')}
      ${tableHtml}
      ${pager('bottom')}
    </div>`;
}

function renderSale(){
  if(typeof _KPI_DATA==='undefined'||!_KPI_DATA.length){
    document.getElementById('sale').innerHTML=`<div class="err-card">⚠️ KPI Funnel dataset not loaded.</div>`;
    return;
  }
  const f=getFilters();
  const joined=_kpiJoined(f);
  const target=document.getElementById('sale');
  if(!joined.length){
    target.innerHTML=`
      <div style="background:linear-gradient(135deg,#fff5e6 0%,#fff 100%);border:1px solid #f5d499;border-left:4px solid var(--amber);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
        <div style="font-size:18px;font-weight:600;">💰 Sale (KPI Funnel)</div>
        <div style="font-size:12px;color:var(--muted);">No stores match the current filter selection.</div>
      </div>`;
    return;
  }

  // ── Aggregates ──
  const sum=key=>joined.reduce((s,j)=>s+(j.kpi[key.split('.')[0]][key.split('.')[1]]||0),0);
  const totalWkAprT=sum('walkins.aprT'),totalWkAprA=sum('walkins.aprA');
  const totalWkMayT=sum('walkins.mayT'),totalWkMayA=sum('walkins.mayA');
  const totalBillsAprA=sum('bills.aprA'),totalBillsMayA=sum('bills.mayA');
  const totalSaleAprT=sum('sale.aprT'),totalSaleAprA=sum('sale.aprA');
  const totalSaleMayT=sum('sale.mayT'),totalSaleMayA=sum('sale.mayA');
  const totalLoss=joined.reduce((s,j)=>s+j.lossCount,0);
  const totalNB=joined.reduce((s,j)=>s+j.nb,0);
  const overallLossCov=totalNB>0?Math.round(totalLoss/totalNB*100):0;
  const matched=joined.filter(j=>j.matched).length;
  const saleAchMay=totalSaleMayT>0?Math.round(totalSaleMayA/totalSaleMayT*100):0;
  const wkAchMay=totalWkMayT>0?Math.round(totalWkMayA/totalWkMayT*100):0;
  // Weighted avg May conversion (bills / walk-ins May from KPI)
  const convMay=totalWkMayA>0?(totalBillsMayA/totalWkMayA*100).toFixed(1):'—';

  // Remark distribution + loss correlation
  const remarkMap={};
  joined.forEach(j=>{
    const rk=j.kpi.remark||'(blank)';
    if(!remarkMap[rk])remarkMap[rk]={count:0,loss:0,nb:0,stores:[]};
    remarkMap[rk].count++;
    remarkMap[rk].loss+=j.lossCount;
    remarkMap[rk].nb+=j.nb;
    remarkMap[rk].stores.push(j);
  });
  const remarkArr=Object.entries(remarkMap).sort((a,b)=>b[1].count-a[1].count);

  // Per-market aggregation (Apr + May)
  const mktMap={};
  joined.forEach(j=>{
    const m=j.kpi.market||'(blank)';
    if(!mktMap[m])mktMap[m]={count:0,wkAprT:0,wkAprA:0,wkMayT:0,wkMayA:0,billsAprA:0,billsMayA:0,saleAprT:0,saleAprA:0,saleMayT:0,saleMayA:0,loss:0,nb:0,cumAchSum:0,cumAchN:0};
    const o=mktMap[m];
    o.count++;
    o.wkAprT+=j.kpi.walkins.aprT||0;
    o.wkAprA+=j.kpi.walkins.aprA||0;
    o.wkMayT+=j.kpi.walkins.mayT||0;
    o.wkMayA+=j.kpi.walkins.mayA||0;
    o.billsAprA+=j.kpi.bills.aprA||0;
    o.billsMayA+=j.kpi.bills.mayA||0;
    o.saleAprT+=j.kpi.sale.aprT||0;
    o.saleAprA+=j.kpi.sale.aprA||0;
    o.saleMayT+=j.kpi.sale.mayT||0;
    o.saleMayA+=j.kpi.sale.mayA||0;
    o.loss+=j.lossCount;
    o.nb+=j.nb;
    if(j.kpi.sale.cumAch!=null){o.cumAchSum+=j.kpi.sale.cumAch;o.cumAchN++;}
  });
  const mktArr=Object.entries(mktMap).sort((a,b)=>(b[1].saleAprA+b[1].saleMayA)-(a[1].saleAprA+a[1].saleMayA));

  // Per-RM aggregation (Apr + May)
  const rmMap={};
  joined.forEach(j=>{
    const r=j.kpi.rm||'(blank)';
    if(!rmMap[r])rmMap[r]={count:0,wkAprT:0,wkAprA:0,wkMayT:0,wkMayA:0,billsAprA:0,billsMayA:0,saleAprT:0,saleAprA:0,saleMayT:0,saleMayA:0,loss:0,nb:0,cumAchSum:0,cumAchN:0};
    const o=rmMap[r];
    o.count++;
    o.wkAprT+=j.kpi.walkins.aprT||0;
    o.wkAprA+=j.kpi.walkins.aprA||0;
    o.wkMayT+=j.kpi.walkins.mayT||0;
    o.wkMayA+=j.kpi.walkins.mayA||0;
    o.billsAprA+=j.kpi.bills.aprA||0;
    o.billsMayA+=j.kpi.bills.mayA||0;
    o.saleAprT+=j.kpi.sale.aprT||0;
    o.saleAprA+=j.kpi.sale.aprA||0;
    o.saleMayT+=j.kpi.sale.mayT||0;
    o.saleMayA+=j.kpi.sale.mayA||0;
    o.loss+=j.lossCount;
    o.nb+=j.nb;
    if(j.kpi.sale.cumAch!=null){o.cumAchSum+=j.kpi.sale.cumAch;o.cumAchN++;}
  });
  const rmArr=Object.entries(rmMap).sort((a,b)=>(b[1].saleAprA+b[1].saleMayA)-(a[1].saleAprA+a[1].saleMayA));

  // ── Insight buckets ──
  const lowConvHighLoss=joined.filter(j=>j.kpi.conversion.cumAch!=null&&j.kpi.conversion.cumAch<90&&j.lossCount>=5)
    .sort((a,b)=>b.lossCount-a.lossCount).slice(0,15);
  const lowWalkinsHighLoss=joined.filter(j=>j.kpi.walkins.cumAch!=null&&j.kpi.walkins.cumAch<90&&j.lossCount>=5)
    .sort((a,b)=>b.lossCount-a.lossCount).slice(0,15);
  const billsLowAbvHigh=joined.filter(j=>j.kpi.bills.cumAch!=null&&j.kpi.abv.cumAch!=null&&j.kpi.bills.cumAch<90&&j.kpi.abv.cumAch>=100)
    .sort((a,b)=>a.kpi.bills.cumAch-b.kpi.bills.cumAch).slice(0,15);

  const remarkTbl=sortableTbl(
    ['Remark','Stores','Total loss entries','Non-buyers','Avg loss-cov%'],
    remarkArr.map(([k,v])=>({cells:[
      `<strong>${k}</strong>`,
      fi(v.count),
      fi(v.loss),
      fi(v.nb),
      `<span class="badge ${v.nb>0&&Math.round(v.loss/v.nb*100)>=40?'badge-hi':v.nb>0&&Math.round(v.loss/v.nb*100)>=25?'badge-mid':'badge-lo'}">${v.nb>0?Math.round(v.loss/v.nb*100):0}%</span>`
    ]})),
    ['Total',fi(joined.length),fi(totalLoss),fi(totalNB),`<span class="badge ${bc(overallLossCov)}">${overallLossCov}%</span>`]
  );

  const mktTbl=sortableTbl(
    ['Market','Stores',_saleColHdr('Walk-ins (Ach/Tgt)'),_saleColHdr('Bills'),_saleColHdr('Sale (Ach/Tgt)'),'Cum Sale Ach%','Loss entries','Loss-cov%'],
    mktArr.map(([k,v])=>{
      const cov=v.nb>0?Math.round(v.loss/v.nb*100):0;
      const avgCum=v.cumAchN>0?Math.round(v.cumAchSum/v.cumAchN):null;
      return{cells:[
        `<span class="clickable" onclick="showSaleScopeModal('market','${k.replace(/'/g,"\\'")}')">${k}</span>`,
        fi(v.count),
        _kpiTAm(v.wkAprT,v.wkAprA,v.wkMayT,v.wkMayA),
        _kpiNumm(v.billsAprA,v.billsMayA),
        _kpiTAMoneym(v.saleAprT,v.saleAprA,v.saleMayT,v.saleMayA),
        _kpiAchDisp(avgCum),
        fi(v.loss),
        `<span class="badge ${bc(cov)}">${cov}%</span>`
      ]};
    }),
    ['Total',fi(joined.length),_kpiTAm(totalWkAprT,totalWkAprA,totalWkMayT,totalWkMayA),_kpiNumm(totalBillsAprA,totalBillsMayA),_kpiTAMoneym(totalSaleAprT,totalSaleAprA,totalSaleMayT,totalSaleMayA),'',fi(totalLoss),`<span class="badge ${bc(overallLossCov)}">${overallLossCov}%</span>`]
  );

  const rmTbl=sortableTbl(
    ['RM','Stores',_saleColHdr('Walk-ins (Ach/Tgt)'),_saleColHdr('Bills'),_saleColHdr('Sale (Ach/Tgt)'),'Cum Sale Ach%','Loss entries','Loss-cov%'],
    rmArr.map(([k,v])=>{
      const cov=v.nb>0?Math.round(v.loss/v.nb*100):0;
      const avgCum=v.cumAchN>0?Math.round(v.cumAchSum/v.cumAchN):null;
      return{cells:[
        `<span class="clickable" onclick="showSaleScopeModal('rm','${k.replace(/'/g,"\\'")}')">${k}</span>`,
        fi(v.count),
        _kpiTAm(v.wkAprT,v.wkAprA,v.wkMayT,v.wkMayA),
        _kpiNumm(v.billsAprA,v.billsMayA),
        _kpiTAMoneym(v.saleAprT,v.saleAprA,v.saleMayT,v.saleMayA),
        _kpiAchDisp(avgCum),
        fi(v.loss),
        `<span class="badge ${bc(cov)}">${cov}%</span>`
      ]};
    }),
    ['Total',fi(joined.length),_kpiTAm(totalWkAprT,totalWkAprA,totalWkMayT,totalWkMayA),_kpiNumm(totalBillsAprA,totalBillsMayA),_kpiTAMoneym(totalSaleAprT,totalSaleAprA,totalSaleMayT,totalSaleMayA),'',fi(totalLoss),`<span class="badge ${bc(overallLossCov)}">${overallLossCov}%</span>`]
  );

  const storeRowHTML=j=>{
    const k=j.kpi;
    const cov=j.lossCov;
    const reason=j.topReason?`<span style="font-size:11px;color:var(--muted)">${j.topReason} (${j.topReasonCount})</span>`:'<span style="color:var(--muted)">—</span>';
    const matchBadge=j.matched?'':'<span class="badge badge-amber" title="No matching store in Walk-in / Loss sheets" style="font-size:9px;">unmatched</span>';
    const storeLabel=j.matched
      ? `<span class="clickable" onclick="showStoreModal('${(_kpiLookupOutlet(j)).replace(/'/g,"\\'")}')">${k.store}</span> ${matchBadge}`
      : `<span style="color:var(--muted)">${k.store}</span> ${matchBadge}`;
    return{cells:[
      storeLabel,
      `<span style="font-size:11px;color:var(--muted)">${k.market}</span>`,
      `<span style="font-size:11px;color:var(--muted)">${k.rm}</span>`,
      `<span style="font-size:11px;color:var(--muted)">${k.type||'—'}</span>`,
      `<span style="font-size:11px;color:${k.remark==='On Track'?'var(--green)':k.remark==='No Clear Numbers'?'var(--muted)':'var(--red)'};font-weight:600;">${k.remark||'—'}</span>`,
      _kpiTAm(k.walkins.aprT,k.walkins.aprA,k.walkins.mayT,k.walkins.mayA),
      _kpiAchDisp(k.walkins.cumAch),
      _kpiConvm(k.conversion.aprA,k.conversion.mayA),
      _kpiAchDisp(k.conversion.cumAch),
      _kpiTAm(k.bills.aprT,k.bills.aprA,k.bills.mayT,k.bills.mayA),
      _kpiAchDisp(k.bills.cumAch),
      _kpiTAMoneym(k.sale.aprT,k.sale.aprA,k.sale.mayT,k.sale.mayA),
      _kpiAchDisp(k.sale.cumAch),
      fi(j.lossCount),
      `<span class="badge ${bc(cov)}">${cov}%</span>`,
      reason
    ]};
  };

  const storeTbl=sortableTbl(
    ['Store','Market','RM','Type','Remark',_saleColHdr('Walk-ins'),'Walk-ins Cum%',_saleColHdr('Conv'),'Conv Cum%',_saleColHdr('Bills'),'Bills Cum%',_saleColHdr('Sale'),'Sale Cum%','Loss','Loss-cov%','Top reason'],
    joined.sort((a,b)=>b.lossCount-a.lossCount).map(storeRowHTML),
    null
  );

  const insightCard=(title,subtitle,arr,color)=>{
    if(!arr.length)return'';
    return `<div class="card">
      <div class="card-title" style="color:${color};">${title}</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">${subtitle}</p>
      ${sortableTbl(
        ['Store','Market','RM','Cum Walk-in%','Cum Conv%','Cum Bills%','Cum ABV%','Cum Sale%','Loss entries','Loss-cov%'],
        arr.map(j=>({cells:[
          j.matched
            ? `<span class="clickable" onclick="showStoreModal('${(_kpiLookupOutlet(j)).replace(/'/g,"\\'")}')">${j.kpi.store}</span>`
            : `<span style="color:var(--muted)">${j.kpi.store}</span>`,
          `<span style="font-size:11px;color:var(--muted)">${j.kpi.market}</span>`,
          `<span style="font-size:11px;color:var(--muted)">${j.kpi.rm}</span>`,
          _kpiAchDisp(j.kpi.walkins.cumAch),
          _kpiAchDisp(j.kpi.conversion.cumAch),
          _kpiAchDisp(j.kpi.bills.cumAch),
          _kpiAchDisp(j.kpi.abv.cumAch),
          _kpiAchDisp(j.kpi.sale.cumAch),
          fi(j.lossCount),
          `<span class="badge ${bc(j.lossCov)}">${j.lossCov}%</span>`
        ]})),
        null
      )}
    </div>`;
  };

  // Tile values switch with the Apr / May / Both toggle
  const saleAchApr=totalSaleAprT>0?Math.round(totalSaleAprA/totalSaleAprT*100):0;
  const wkAchApr=totalWkAprT>0?Math.round(totalWkAprA/totalWkAprT*100):0;
  const convApr=totalWkAprA>0?(totalBillsAprA/totalWkAprA*100).toFixed(1):'—';
  let tileSale,tileWk,tileConv;
  if(_saleMonth==='apr'){
    tileSale={lbl:'Apr Sale',val:fs(totalSaleAprA),sub:`${saleAchApr}% of ${fs(totalSaleAprT)} target`};
    tileWk={lbl:'Apr Walk-ins',val:fi(totalWkAprA),sub:`${wkAchApr}% of ${fi(totalWkAprT)} target`};
    tileConv={lbl:'Apr Conversion',val:`${convApr}%`,sub:'bills / walk-ins (weighted)'};
  }else if(_saleMonth==='may'){
    tileSale={lbl:'May Sale',val:fs(totalSaleMayA),sub:`${saleAchMay}% of ${fs(totalSaleMayT)} target`};
    tileWk={lbl:'May Walk-ins',val:fi(totalWkMayA),sub:`${wkAchMay}% of ${fi(totalWkMayT)} target`};
    tileConv={lbl:'May Conversion',val:`${convMay}%`,sub:'bills / walk-ins (weighted)'};
  }else{
    tileSale={lbl:'Sale Apr + May',val:fs(totalSaleAprA+totalSaleMayA),sub:`Apr ${fs(totalSaleAprA)} (${saleAchApr}%) · May ${fs(totalSaleMayA)} (${saleAchMay}%)`};
    tileWk={lbl:'Walk-ins Apr + May',val:fi(totalWkAprA+totalWkMayA),sub:`Apr ${fi(totalWkAprA)} (${wkAchApr}%) · May ${fi(totalWkMayA)} (${wkAchMay}%)`};
    tileConv={lbl:'Conversion (weighted)',val:`${convMay}%`,sub:`Apr ${convApr}% · May ${convMay}%`};
  }
  const saleSegBtn=(mode,label,emoji)=>`<button onclick="setSaleMonth('${mode}')" style="border:0;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;background:${_saleMonth===mode?'var(--green)':'var(--surface)'};color:${_saleMonth===mode?'#fff':'var(--muted)'};border-radius:0;">${emoji} ${label}</button>`;

  // ═══════════════════════════════════════════════════════════
  // 🔬 KPI COMBINATION DIAGNOSTICS — 2×2 matrices + per-store
  // diagnosis bucket. Click any quadrant for the matching store list.
  // ═══════════════════════════════════════════════════════════
  const _isAch=v=>v!=null&&v>=100;
  const _isNot=v=>v!=null&&v<100;
  function _buildMatrix(items,keyA,keyB){
    const q={tt:[],tf:[],ft:[],ff:[]};
    items.forEach(j=>{
      const a=j.kpi[keyA].cumAch,b=j.kpi[keyB].cumAch;
      if(a==null||b==null)return;
      if(_isAch(a)&&_isAch(b))q.tt.push(j);
      else if(_isAch(a)&&_isNot(b))q.tf.push(j);
      else if(_isNot(a)&&_isAch(b))q.ft.push(j);
      else q.ff.push(j);
    });
    return q;
  }
  function _quadStats(arr){
    const loss=arr.reduce((s,j)=>s+j.lossCount,0);
    const nb=arr.reduce((s,j)=>s+j.nb,0);
    const cov=nb>0?Math.round(loss/nb*100):0;
    return{loss,nb,cov};
  }
  const matrices={
    wkConv:{a:'walkins',b:'conversion',labelA:'Walk-ins',labelB:'Conversion',
      q:_buildMatrix(joined,'walkins','conversion'),
      legends:{
        tt:'Healthy funnel — footfall AND closing both on target.',
        tf:'Walk-ins ✓ · Conversion ✗ — traffic comes but doesn\'t close. Biggest loss-recovery target (training / engagement / product availability).',
        ft:'Walk-ins ✗ · Conversion ✓ — when customers come they buy, but too few come. Marketing / visibility problem.',
        ff:'Both failing — structural issue. Needs market-level intervention.'
      }
    },
    convSale:{a:'conversion',b:'sale',labelA:'Conversion',labelB:'Sale',
      q:_buildMatrix(joined,'conversion','sale'),
      legends:{
        tt:'Conversion ✓ AND Sale ✓ — clean execution.',
        tf:'Conversion ✓ · Sale ✗ — closing well but small tickets. ABV / cross-sell gap; check inventory mix and upsell prompts.',
        ft:'Conversion ✗ · Sale ✓ — fewer closes but big tickets carrying the store. Risk: depends on a few premium customers.',
        ff:'Both ✗ — sale miss with weak conversion. Highest-priority remediation.'
      }
    },
    billsAbv:{a:'bills',b:'abv',labelA:'Bills',labelB:'ABV',
      q:_buildMatrix(joined,'bills','abv'),
      legends:{
        tt:'Bills ✓ AND ABV ✓ — volume and value both healthy.',
        tf:'Bills ✓ · ABV ✗ — closing volume but small ticket sizes. Upsell training opportunity.',
        ft:'Bills ✗ · ABV ✓ — each bill is rich but too few of them. Conversion drag — see Conv × Sale matrix.',
        ff:'Bills ✗ AND ABV ✗ — both quantity and value below target. Critical revenue gap.'
      }
    }
  };
  // Persist for modal access
  window._saleMatrices=matrices;

  function _renderMatrix(key,m){
    const tone=v=>v.length>0?v.length:0;
    const cellHtml=(qk,clsLbl,hint)=>{
      const arr=m.q[qk];
      const st=_quadStats(arr);
      return `<div class="kpi-quad kpi-quad-${qk}" onclick="showKpiCombo('${key}','${qk}')">
        <div class="kpi-quad-hdr">${clsLbl}</div>
        <div class="kpi-quad-count">${tone(arr)} <span style="font-size:12px;font-weight:500;color:var(--muted)">store${arr.length===1?'':'s'}</span></div>
        <div class="kpi-quad-desc">${hint}<br><span style="color:var(--text);font-weight:600;">${fi(st.loss)}</span> loss entries · cov ${st.cov}%</div>
      </div>`;
    };
    return `<div class="kpi-matrix">
      ${cellHtml('tt',`${m.labelA} ✓ · ${m.labelB} ✓`,m.legends.tt)}
      ${cellHtml('tf',`${m.labelA} ✓ · ${m.labelB} ✗`,m.legends.tf)}
      ${cellHtml('ft',`${m.labelA} ✗ · ${m.labelB} ✓`,m.legends.ft)}
      ${cellHtml('ff',`${m.labelA} ✗ · ${m.labelB} ✗`,m.legends.ff)}
    </div>`;
  }
  // Single-KPI miss buckets — every store where cum ach% < 100% for that KPI alone
  const singleMiss={
    walkins:joined.filter(j=>_isNot(j.kpi.walkins.cumAch)).sort((a,b)=>(a.kpi.walkins.cumAch||0)-(b.kpi.walkins.cumAch||0)),
    conversion:joined.filter(j=>_isNot(j.kpi.conversion.cumAch)).sort((a,b)=>(a.kpi.conversion.cumAch||0)-(b.kpi.conversion.cumAch||0)),
    bills:joined.filter(j=>_isNot(j.kpi.bills.cumAch)).sort((a,b)=>(a.kpi.bills.cumAch||0)-(b.kpi.bills.cumAch||0)),
    abv:joined.filter(j=>_isNot(j.kpi.abv.cumAch)).sort((a,b)=>(a.kpi.abv.cumAch||0)-(b.kpi.abv.cumAch||0)),
    sale:joined.filter(j=>_isNot(j.kpi.sale.cumAch)).sort((a,b)=>(a.kpi.sale.cumAch||0)-(b.kpi.sale.cumAch||0)),
  };
  window._saleSingleMiss=singleMiss;
  const singleChips=[
    ['walkins','👣 Walk-ins ✗','#3066be'],
    ['conversion','🤝 Conversion ✗','#d4831a'],
    ['bills','🧾 Bills ✗','#7e6cb4'],
    ['abv','💎 ABV ✗','#5a8a3a'],
    ['sale','💰 Sale ✗','#b94545'],
  ].map(([k,lbl,color])=>{
    const arr=singleMiss[k];
    const loss=arr.reduce((s,j)=>s+j.lossCount,0);
    return `<button onclick="showKpiCombo('single','${k}')" style="background:${color};color:#fff;border:0;border-radius:10px;padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;line-height:1.35;text-align:left;min-width:140px;">
      <span style="font-size:13px;">${lbl}</span>
      <span style="font-size:11px;opacity:0.9;font-weight:500;">${arr.length} stores · ${fi(loss)} loss</span>
    </button>`;
  }).join('');
  const singleMissHtml=`
    <div class="card">
      <div class="card-title">🎯 KPI not achieved — single-metric store lists (one-click)</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 10px 0;">Each chip = the stores where that KPI's cumulative ach% is below 100%. Click any chip to see the full list (sorted by loss volume), with full funnel + loss columns. Use this when you only care about one metric — e.g. just "show me stores where conversion isn't hit".</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${singleChips}</div>
    </div>`;

  const combosHtml=`
    <div class="card">
      <div class="card-title">🔬 KPI combination diagnostics — click any quadrant for the store list</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 4px 0;">Each matrix splits stores by whether two cumulative ach% KPIs hit ≥100%. Loss entries within each quadrant are summed from the current global filter — so you can spot which combination is driving the most leakage.</p>
      <div class="section-lbl" style="margin-top:12px;">Walk-ins × Conversion — funnel entry vs closing</div>
      ${_renderMatrix('wkConv',matrices.wkConv)}
      <div class="section-lbl" style="margin-top:14px;">Conversion × Sale — closing rate vs revenue target</div>
      ${_renderMatrix('convSale',matrices.convSale)}
      <div class="section-lbl" style="margin-top:14px;">Bills × ABV — volume vs ticket value</div>
      ${_renderMatrix('billsAbv',matrices.billsAbv)}
    </div>`;

  // Per-store diagnosis bucket (one bucket per store, precedence-based)
  function _diagnose(j){
    const w=j.kpi.walkins.cumAch,c=j.kpi.conversion.cumAch,b=j.kpi.bills.cumAch,a=j.kpi.abv.cumAch,s=j.kpi.sale.cumAch;
    if([w,c,b,a,s].every(v=>v==null))return{code:'unknown',label:'⚪ No clear numbers',color:'var(--muted)'};
    if(_isAch(w)&&_isAch(c)&&_isAch(b)&&_isAch(a)&&_isAch(s))return{code:'healthy',label:'✅ All KPIs on track',color:'var(--green)'};
    if(_isAch(s)&&_isNot(c))return{code:'cushioned',label:'💎 Sale ✓ · Conv ✗ — premium tickets cushioning weak close',color:'#7e6cb4'};
    if(_isAch(c)&&_isNot(s))return{code:'value-gap',label:'💸 Conv ✓ · Sale ✗ — closing fine, ticket-size shortfall',color:'#d4831a'};
    if(_isNot(w)&&_isNot(c))return{code:'critical',label:'🔴 Walk-ins ✗ + Conv ✗ — structural problem',color:'var(--red)'};
    if(_isNot(w)&&_isNot(s))return{code:'traffic',label:'👣 Walk-ins driving sale miss',color:'var(--amber)'};
    if(_isNot(b)&&_isAch(a))return{code:'upsell-ok',label:'🟡 ABV ✓ · Bills ✗ — too few closes, each bill rich',color:'var(--amber)'};
    if(_isAch(b)&&_isNot(a))return{code:'volume-ok',label:'🟠 Bills ✓ · ABV ✗ — many bills, small tickets',color:'#d4831a'};
    if(_isNot(s))return{code:'mixed-fail',label:'🔴 Sale ✗ — mixed funnel drivers',color:'var(--red)'};
    return{code:'other',label:'⚪ Mixed / other',color:'var(--muted)'};
  }
  const diagMap={};
  joined.forEach(j=>{
    const d=_diagnose(j);
    if(!diagMap[d.code])diagMap[d.code]={label:d.label,color:d.color,stores:[],loss:0,nb:0};
    diagMap[d.code].stores.push(j);
    diagMap[d.code].loss+=j.lossCount;
    diagMap[d.code].nb+=j.nb;
  });
  window._saleDiagnoses=diagMap;
  const diagOrder=['healthy','value-gap','cushioned','upsell-ok','volume-ok','traffic','critical','mixed-fail','unknown','other'];
  const diagRows=diagOrder.filter(k=>diagMap[k]).map(k=>{
    const v=diagMap[k];
    const cov=v.nb>0?Math.round(v.loss/v.nb*100):0;
    return{cells:[
      `<span class="clickable" onclick="showKpiCombo('diag','${k}')" style="color:${v.color};font-weight:600;">${v.label}</span>`,
      fi(v.stores.length),
      fi(v.loss),
      fi(v.nb),
      `<span class="badge ${bc(cov)}">${cov}%</span>`
    ]};
  });
  const diagnosisHtml=`
    <div class="card">
      <div class="card-title">🧭 Funnel diagnosis bucket — one label per store</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Every store assigned to a single primary diagnosis (precedence-based: healthy → sale-vs-conv combo → walkins/conv structural → upsell/volume mismatch → other). Click a row to see the stores in that bucket with full KPI funnel + loss columns.</p>
      ${sortableTbl(['Diagnosis','Stores','Loss entries','Non-buyers','Loss-cov%'],diagRows,null)}
    </div>`;

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#e8f9ec 0%,#fff 100%);border:1px solid #b8e3c1;border-left:4px solid var(--green);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">💰 Sale (KPI Funnel)</div>
      <div style="font-size:12px;color:var(--muted);">${joined.length} stores in scope · ${matched} matched to walk-in/loss data (${joined.length-matched} unmatched). Click a market, RM, or store for drill-down. Use the toggle below to focus on April, May, or both side-by-side. Loss columns reflect the global filter (date / RM / market / store).</div>
    </div>

    <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1rem;">
      ${saleSegBtn('apr','April','🅰')}
      <div style="width:1px;background:var(--border);"></div>
      ${saleSegBtn('may','May','🅼')}
      <div style="width:1px;background:var(--border);"></div>
      ${saleSegBtn('both','Both (Apr + May)','🔀')}
    </div>

    <div class="metrics" style="margin-bottom:1.25rem;">
      <div class="metric"><div class="lbl">Stores tracked</div><div class="val">${joined.length}</div><div class="sub">${matched} matched to loss data</div></div>
      <div class="metric green"><div class="lbl">${tileSale.lbl}</div><div class="val">${tileSale.val}</div><div class="sub">${tileSale.sub}</div></div>
      <div class="metric blue"><div class="lbl">${tileWk.lbl}</div><div class="val">${tileWk.val}</div><div class="sub">${tileWk.sub}</div></div>
      <div class="metric amber"><div class="lbl">${tileConv.lbl}</div><div class="val">${tileConv.val}</div><div class="sub">${tileConv.sub}</div></div>
      <div class="metric red"><div class="lbl">Loss entries</div><div class="val">${fi(totalLoss)}</div><div class="sub">${overallLossCov}% of ${fi(totalNB)} non-buyers</div></div>
    </div>

    <div class="card">
      <div class="card-title">📌 Funnel-flagged segments — KPI gaps that overlap with loss</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 10px 0;">Each remark from the KPI sheet rolled up with total loss entries and avg loss-cov% across the matching stores. <em>Conversion Affected</em> / <em>Walk-in Affected</em> segments are usually where loss-of-sale data adds the most colour.</p>
      ${remarkTbl}
    </div>

    ${singleMissHtml}
    ${combosHtml}
    ${diagnosisHtml}

    ${insightCard('🔴 Low conversion ach% + high loss entries','Stores where cumulative conversion ach% is under 90% AND ≥5 loss entries recorded. Strong signal that loss-of-sale is a real driver — not just demand softness.',lowConvHighLoss,'var(--red)')}
    ${insightCard('🟡 Low walk-ins ach% + high loss entries','Stores under-achieving walk-ins targets but still logging loss. Footfall problem + lost demand → priority for marketing + assortment review.',lowWalkinsHighLoss,'var(--amber)')}
    ${insightCard('💡 Bills under-target, ABV over-target','Stores selling well on ticket size but not closing enough bills — classic upsell-fine / convert-fail pattern. Cross-check against the top loss reasons for these stores.',billsLowAbvHigh,'var(--blue)')}

    <div class="card">
      <div class="card-title">By market — Sale ach% vs loss exposure</div>
      ${mktTbl}
    </div>

    <div class="card">
      <div class="card-title">By RM — funnel performance + loss</div>
      ${rmTbl}
    </div>

    <div class="card">
      <div class="card-title">All stores (${joined.length}) — full funnel + loss columns · sortable</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Click a store name to open the loss-of-sale store modal. <em>unmatched</em> = store appears in the KPI sheet but not in the current walk-in/loss data (different name spelling or new store).</p>
      ${storeTbl}
    </div>`;
}

// Helper to surface the actual outlet name the loss-data uses (for showStoreModal)
function _kpiLookupOutlet(j){
  const n=normStore(j.kpi.store);
  const wkS=_WK.stores.find(s=>s.outletNorm===n);
  return wkS?wkS.outlet:j.kpi.store;
}

// Modal drill-down: store-wise KPI + loss for a Market / RM
window.showSaleScopeModal=function(scope,value){
  const f=getFilters();
  const joined=_kpiJoined(f).filter(j=>{
    if(scope==='market')return _normMarket(j.kpi.market)===_normMarket(value);
    if(scope==='rm')return _normRM(j.kpi.rm)===_normRM(value);
    return true;
  });
  if(!joined.length){openModal(`💰 ${value} — KPI + loss`,scope,'<p class="muted-note">No stores in this scope.</p>');return;}
  const totalLoss=joined.reduce((s,j)=>s+j.lossCount,0);
  const totalNB=joined.reduce((s,j)=>s+j.nb,0);
  const cov=totalNB>0?Math.round(totalLoss/totalNB*100):0;
  const sumK=key=>joined.reduce((s,j)=>{const[g,k]=key.split('.');return s+(j.kpi[g][k]||0);},0);
  const sApr=sumK('sale.aprA'),sAprT=sumK('sale.aprT');
  const sMay=sumK('sale.mayA'),sMayT=sumK('sale.mayT');
  const wApr=sumK('walkins.aprA'),wAprT=sumK('walkins.aprT');
  const wMay=sumK('walkins.mayA'),wMayT=sumK('walkins.mayT');
  const bApr=sumK('bills.aprA'),bMay=sumK('bills.mayA');
  const sAchA=sAprT>0?Math.round(sApr/sAprT*100):0,sAchM=sMayT>0?Math.round(sMay/sMayT*100):0;
  const wAchA=wAprT>0?Math.round(wApr/wAprT*100):0,wAchM=wMayT>0?Math.round(wMay/wMayT*100):0;
  const cvA=wApr>0?(bApr/wApr*100).toFixed(1):'—',cvM=wMay>0?(bMay/wMay*100).toFixed(1):'—';
  let mt;
  if(_saleMonth==='apr')mt={s:{lbl:'Apr Sale',val:fs(sApr),sub:`${sAchA}% of ${fs(sAprT)}`},w:{lbl:'Apr Walk-ins',val:fi(wApr),sub:`${wAchA}% of ${fi(wAprT)}`},b:{lbl:'Apr Bills',val:fi(bApr),sub:`conv ${cvA}%`}};
  else if(_saleMonth==='may')mt={s:{lbl:'May Sale',val:fs(sMay),sub:`${sAchM}% of ${fs(sMayT)}`},w:{lbl:'May Walk-ins',val:fi(wMay),sub:`${wAchM}% of ${fi(wMayT)}`},b:{lbl:'May Bills',val:fi(bMay),sub:`conv ${cvM}%`}};
  else mt={s:{lbl:'Sale Apr + May',val:fs(sApr+sMay),sub:`Apr ${fs(sApr)} (${sAchA}%) · May ${fs(sMay)} (${sAchM}%)`},w:{lbl:'Walk-ins Apr + May',val:fi(wApr+wMay),sub:`Apr ${fi(wApr)} (${wAchA}%) · May ${fi(wMay)} (${wAchM}%)`},b:{lbl:'Bills Apr + May',val:fi(bApr+bMay),sub:`Conv Apr ${cvA}% · May ${cvM}%`}};
  const monthLabel=_saleMonth==='apr'?'April only':_saleMonth==='may'?'May only':'Apr + May';
  const summary=`
    <div style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Showing: <strong>${monthLabel}</strong> — switch via the Apr / May / Both toggle on the Sale tab.</div>
    <div class="metrics" style="margin-bottom:1rem;">
      <div class="metric green"><div class="lbl">${mt.s.lbl}</div><div class="val">${mt.s.val}</div><div class="sub">${mt.s.sub}</div></div>
      <div class="metric blue"><div class="lbl">${mt.w.lbl}</div><div class="val">${mt.w.val}</div><div class="sub">${mt.w.sub}</div></div>
      <div class="metric amber"><div class="lbl">${mt.b.lbl}</div><div class="val">${mt.b.val}</div><div class="sub">${mt.b.sub}</div></div>
      <div class="metric red"><div class="lbl">Loss-cov%</div><div class="val">${cov}%</div><div class="sub">${fi(totalLoss)} of ${fi(totalNB)} non-buyers</div></div>
    </div>`;
  const tbl=sortableTbl(
    ['Store','Type','Remark',_saleColHdr('Walk-ins'),'Walk-ins Cum%',_saleColHdr('Conv'),'Conv Cum%',_saleColHdr('Bills'),'Bills Cum%',_saleColHdr('Sale'),'Sale Cum%','Loss','Loss-cov%'],
    joined.sort((a,b)=>b.lossCount-a.lossCount).map(j=>{
      const k=j.kpi;
      return{cells:[
        j.matched
          ? `<span class="clickable" onclick="showStoreModal('${_kpiLookupOutlet(j).replace(/'/g,"\\'")}')">${k.store}</span>`
          : `<span style="color:var(--muted)">${k.store}</span>`,
        `<span style="font-size:11px;color:var(--muted)">${k.type||'—'}</span>`,
        `<span style="font-size:11px;color:${k.remark==='On Track'?'var(--green)':k.remark==='No Clear Numbers'?'var(--muted)':'var(--red)'};font-weight:600;">${k.remark||'—'}</span>`,
        _kpiTAm(k.walkins.aprT,k.walkins.aprA,k.walkins.mayT,k.walkins.mayA),
        _kpiAchDisp(k.walkins.cumAch),
        _kpiConvm(k.conversion.aprA,k.conversion.mayA),
        _kpiAchDisp(k.conversion.cumAch),
        _kpiTAm(k.bills.aprT,k.bills.aprA,k.bills.mayT,k.bills.mayA),
        _kpiAchDisp(k.bills.cumAch),
        _kpiTAMoneym(k.sale.aprT,k.sale.aprA,k.sale.mayT,k.sale.mayA),
        _kpiAchDisp(k.sale.cumAch),
        fi(j.lossCount),
        `<span class="badge ${bc(j.lossCov)}">${j.lossCov}%</span>`
      ]};
    }),
    null
  );
  openModal(`💰 ${value} — Store-wise KPI + Loss`,`${scope.toUpperCase()} · ${joined.length} stores · ${monthLabel}`,summary+tbl);
};

// Drill-down: show the store list for a 2×2 quadrant or a diagnosis bucket
window.showKpiCombo=function(matrixKey,quadKey){
  let stores=[],title='',sub='';
  if(matrixKey==='diag'){
    const d=window._saleDiagnoses&&window._saleDiagnoses[quadKey];
    if(!d){openModal('💰 Diagnosis','No data','<p class="muted-note">No stores in this bucket.</p>');return;}
    stores=d.stores;
    title=`🧭 ${d.label}`;
    sub=`${stores.length} stores · ${fi(d.loss)} loss entries · cov ${d.nb>0?Math.round(d.loss/d.nb*100):0}%`;
  }else if(matrixKey==='single'){
    stores=(window._saleSingleMiss&&window._saleSingleMiss[quadKey])||[];
    const lbl={walkins:'Walk-ins',conversion:'Conversion',bills:'Bills',abv:'ABV',sale:'Sale'}[quadKey]||quadKey;
    title=`🎯 ${lbl} not achieved`;
    sub=`${stores.length} stores · cumulative ach% below 100%`;
  }else{
    const m=window._saleMatrices&&window._saleMatrices[matrixKey];
    if(!m){openModal('💰 KPI combination','No data','<p class="muted-note">Matrix not available.</p>');return;}
    stores=m.q[quadKey]||[];
    const qLabel={tt:`${m.labelA} ✓ · ${m.labelB} ✓`,tf:`${m.labelA} ✓ · ${m.labelB} ✗`,ft:`${m.labelA} ✗ · ${m.labelB} ✓`,ff:`${m.labelA} ✗ · ${m.labelB} ✗`}[quadKey]||'';
    title=`🔬 ${qLabel}`;
    sub=`${stores.length} stores · ${m.legends[quadKey]||''}`;
  }
  if(!stores.length){openModal(title,sub,'<p class="muted-note">No stores in this combination.</p>');return;}
  const totalLoss=stores.reduce((s,j)=>s+j.lossCount,0);
  const totalNB=stores.reduce((s,j)=>s+j.nb,0);
  const cov=totalNB>0?Math.round(totalLoss/totalNB*100):0;
  const summary=`
    <div class="metrics" style="margin-bottom:1rem;">
      <div class="metric"><div class="lbl">Stores</div><div class="val">${stores.length}</div></div>
      <div class="metric red"><div class="lbl">Loss entries</div><div class="val">${fi(totalLoss)}</div><div class="sub">${fi(totalNB)} non-buyers</div></div>
      <div class="metric ${cov>=40?'red':cov>=25?'amber':'green'}"><div class="lbl">Loss-cov%</div><div class="val">${cov}%</div></div>
    </div>`;
  const tbl=sortableTbl(
    ['Store','Market','RM','Type','Cum Walk-in%','Cum Conv%','Cum Bills%','Cum ABV%','Cum Sale%','Loss entries','Loss-cov%','Top reason'],
    stores.slice().sort((a,b)=>b.lossCount-a.lossCount).map(j=>({cells:[
      j.matched
        ? `<span class="clickable" onclick="showStoreModal('${_kpiLookupOutlet(j).replace(/'/g,"\\'")}')">${j.kpi.store}</span>`
        : `<span style="color:var(--muted)">${j.kpi.store}</span>`,
      `<span style="font-size:11px;color:var(--muted)">${j.kpi.market}</span>`,
      `<span style="font-size:11px;color:var(--muted)">${j.kpi.rm}</span>`,
      `<span style="font-size:11px;color:var(--muted)">${j.kpi.type||'—'}</span>`,
      _kpiAchDisp(j.kpi.walkins.cumAch),
      _kpiAchDisp(j.kpi.conversion.cumAch),
      _kpiAchDisp(j.kpi.bills.cumAch),
      _kpiAchDisp(j.kpi.abv.cumAch),
      _kpiAchDisp(j.kpi.sale.cumAch),
      fi(j.lossCount),
      `<span class="badge ${bc(j.lossCov)}">${j.lossCov}%</span>`,
      j.topReason?`<span style="font-size:11px;color:var(--muted)">${j.topReason} (${j.topReasonCount})</span>`:'<span style="color:var(--muted)">—</span>'
    ]})),
    null
  );
  openModal(title,sub,summary+tbl);
};

</script>
