      `<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,
      s.market,s.rm,fi(nb),fi(ls),
      `<span class="badge ${cov<10?'badge-red':'badge-amber'}">${cov}%</span>`,
      `<span class="badge ${badPct>50?'badge-red':'badge-amber'}">${badPct}%</span>`,
      '<span class="badge badge-red">🔴 Two issues</span>'
    ]}));
    return{title:`${issueStores.length} stores with BOTH low coverage AND bad phones`,
      html:issueStores.length?sortableTbl(['Store','Market','RM','Non-buyers','Loss captured','Cov%','Bad phone%','Status'],tblRows,null):'<p style="color:var(--green);">✅ No stores with both issues found.</p>'};
  }

  // 20. Best performing RM / store (highest coverage)
  if(/best performing|highest coverage|best rm|best store|top.*coverage/.test(q)){
    const f2=getFilters();
    const filtStores=filterStores(_WK.stores,f2);
    const dim=/rm|regional/.test(q)?'rm':'store';
    const map={};
    filtStores.forEach(s=>{
      const dRange=daysInRange(s.days,f2);
      const w=dRange.reduce((a,d)=>a+d.w,0);const b=dRange.reduce((a,d)=>a+d.b,0);const nb=w-b;
      const lsRows=rows.filter(r=>storeIdx>=0&&normStore(String(r[storeIdx]||''))===s.outletNorm);
      const k=dim==='rm'?s.rm:s.outlet;
      if(!k||k==='Unknown')return;
      if(!map[k])map[k]={nb:0,ls:0,market:s.market,rm:s.rm};
      map[k].nb+=nb;map[k].ls+=lsRows.length;
    });
    const arr=Object.entries(map).filter(([,v])=>v.nb>=10).map(([k,v])=>({k,...v,cov:pct(v.ls,v.nb)})).sort((a,b)=>b.cov-a.cov).slice(0,N);
    return{title:`🏆 Top ${arr.length} ${dim}s by loss coverage`,
      html:sortableTbl(['Rank',dim.charAt(0).toUpperCase()+dim.slice(1),'Non-buyers','Loss','Coverage%'],
        arr.map((r,i)=>({cells:[`#${i+1}`,r.k,fi(r.nb),fi(r.ls),`<span class="badge ${r.cov>=50?'badge-green':r.cov>=25?'badge-amber':'badge-red'}">${r.cov}%</span>`]})),null)};
  }

  // 21. Pending walkins by market — how much LS data is unsynced
  if(/pending|unsynced|not synced|missing walkins/.test(q)){
    const map={};
    rows.forEach(r=>{const m=r._wkStore?r._wkStore.market:'(no walkins yet)';if(!map[m])map[m]={total:0,pending:0};map[m].total++;if(!r._syncedDk)map[m].pending++;});
    const arr=Object.entries(map).sort((a,b)=>b[1].pending-a[1].pending);
    const tblRows=arr.map(([k,v])=>({cells:[k,fi(v.total),fi(v.pending),`<span class="badge ${pct(v.pending,v.total)>50?'badge-red':pct(v.pending,v.total)>20?'badge-amber':'badge-green'}">${pct(v.pending,v.total)}%</span>`]}));
    return{title:`⏳ Pending walkins sync by market`,html:sortableTbl(['Market','Total LS','Pending','Pending%'],tblRows,null)};
  }

  // 22. Concentration / outliers — reasons with high store reach (affects many stores)
  if(/many stores|high stores|widespread|spread across|reasons? affecting/.test(q)){
    if(reasonIdx<0)return{title:'Reason column missing',html:'<p>Reason column not found.</p>'};
    const map={};
    rows.forEach(r=>{const k=String(r[reasonIdx]||'').trim();if(!k)return;if(!map[k])map[k]={c:0,stores:new Set()};map[k].c++;const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(sn)map[k].stores.add(sn);});
    const arr=Object.entries(map).sort((a,b)=>b[1].stores.size-a[1].stores.size).slice(0,N);
    return{title:`Reasons with widest store reach (top ${arr.length})`,
      html:sortableTbl(['Reason','Count','Stores affected','Avg per store'],
        arr.map(([k,v])=>({cells:[`<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','I')">${k}</span>`,fi(v.c),fi(v.stores.size),(v.c/v.stores.size).toFixed(1)]})),null)};
  }

  // 23. New customer share by RM / market
  if(/new customer share|new customer.*\bby\b|share.*new customer/.test(q)){
    if(custIdx<0)return{title:'Customer Type missing',html:'<p>Customer type column not found.</p>'};
    const dim=/store/.test(q)?'store':/market/.test(q)?'market':'rm';
    const getter=dim==='rm'?(r=>r._rm):dim==='market'?(r=>r._wkStore?r._wkStore.market:null):(r=>storeIdx>=0?String(r[storeIdx]||''):null);
    const map={};
    rows.forEach(r=>{const k=getter(r);if(!k||k==='Unknown')return;if(!map[k])map[k]={total:0,new:0,rep:0};map[k].total++;const c=String(r[custIdx]||'').toLowerCase().trim();if(isNewVal(c))map[k].new++;else if(isRepVal(c))map[k].rep++;});
    const arr=Object.entries(map).filter(([,v])=>v.total>=10).map(([k,v])=>({k,...v,newPct:pct(v.new,v.total),repPct:pct(v.rep,v.total)})).sort((a,b)=>b.newPct-a.newPct).slice(0,N);
    return{title:`🆕 New customer share by ${dim} (top ${arr.length})`,
      html:sortableTbl([dim.charAt(0).toUpperCase()+dim.slice(1),'Total','New','New%','Repeat','Repeat%'],
        arr.map(r=>({cells:[r.k,fi(r.total),fi(r.new),`<span class="badge ${r.newPct>=70?'badge-amber':'badge-green'}">${r.newPct}%</span>`,fi(r.rep),`${r.repPct}%`]})),null)};
  }

  // 24. Loss trend / spike detection — last 7/14 days vs prior period
  if(/sudden spike|spike|trend|surge|increase.*loss|loss.*increase/.test(q)){
    const allDks=[...new Set(rows.map(r=>r._dk).filter(Boolean))].sort();
    if(allDks.length<14)return{title:'Need more data',html:`<p>Need at least 14 days of data for spike detection. Current: ${allDks.length} days.</p>`};
    const last7=allDks.slice(-7);const prev7=allDks.slice(-14,-7);
    const last7Set=new Set(last7);const prev7Set=new Set(prev7);
    const map={};
    rows.forEach(r=>{const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(!sn)return;if(!map[sn])map[sn]={last:0,prev:0,rm:'',market:''};if(last7Set.has(r._dk))map[sn].last++;if(prev7Set.has(r._dk))map[sn].prev++;if(r._wkStore){map[sn].rm=r._wkStore.rm;map[sn].market=r._wkStore.market;}});
    const arr=Object.entries(map).map(([k,v])=>({k,...v,delta:v.last-v.prev,pct:v.prev>0?Math.round((v.last-v.prev)/v.prev*100):(v.last>0?100:0)})).filter(r=>r.delta>0).sort((a,b)=>b.pct-a.pct).slice(0,N);
    return{title:`📈 Top ${arr.length} stores with biggest loss spike (last 7d vs prior 7d)`,
      html:arr.length?sortableTbl(['Store','Market','RM','Prior 7d','Last 7d','Δ','Spike%'],
        arr.map(r=>({cells:[`<span class="clickable" onclick="showStoreModal('${r.k.replace(/'/g,"\\'")}')">${r.k}</span>`,r.market,r.rm,fi(r.prev),fi(r.last),`+${fi(r.delta)}`,`<span class="badge ${r.pct>=100?'badge-red':r.pct>=50?'badge-amber':'badge-green'}">+${r.pct}%</span>`]})),null):'<p style="color:var(--green)">✅ No stores with notable spikes.</p>'};
  }

  // 25. Most improved (last 7 vs prior 7) — opposite of spike
  if(/most improved|improvement|loss.*decrease|reduced loss|less loss/.test(q)){
    const allDks=[...new Set(rows.map(r=>r._dk).filter(Boolean))].sort();
    if(allDks.length<14)return{title:'Need more data',html:`<p>Need at least 14 days. Current: ${allDks.length} days.</p>`};
    const last7=allDks.slice(-7);const prev7=allDks.slice(-14,-7);
    const last7Set=new Set(last7);const prev7Set=new Set(prev7);
    const map={};
    rows.forEach(r=>{const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(!sn)return;if(!map[sn])map[sn]={last:0,prev:0,rm:'',market:''};if(last7Set.has(r._dk))map[sn].last++;if(prev7Set.has(r._dk))map[sn].prev++;if(r._wkStore){map[sn].rm=r._wkStore.rm;map[sn].market=r._wkStore.market;}});
    const arr=Object.entries(map).map(([k,v])=>({k,...v,delta:v.last-v.prev,pct:v.prev>0?Math.round((v.last-v.prev)/v.prev*100):0})).filter(r=>r.delta<0&&r.prev>=3).sort((a,b)=>a.pct-b.pct).slice(0,N);
    return{title:`📉 Top ${arr.length} most-improved stores (loss reduced last 7d vs prior 7d)`,
      html:arr.length?sortableTbl(['Store','Market','RM','Prior 7d','Last 7d','Δ','Δ%'],
        arr.map(r=>({cells:[`<span class="clickable" onclick="showStoreModal('${r.k.replace(/'/g,"\\'")}')">${r.k}</span>`,r.market,r.rm,fi(r.prev),fi(r.last),fi(r.delta),`<span class="badge badge-green">${r.pct}%</span>`]})),null):'<p style="color:var(--muted)">No notable improvements detected.</p>'};
  }

  // 26. Help / examples / "what can I ask"
  if(/^help|what can i ask|examples?|list questions/.test(q)){
    return{title:'💡 What you can ask',html:`
      <div style="font-size:12px;line-height:1.9;">
        <p style="font-size:13px;margin-bottom:10px;"><strong>Here's a comprehensive list of supported question patterns. Click chips above for quick examples.</strong></p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <strong style="color:var(--blue);">📊 Rankings</strong>
            <ul style="margin:4px 0 12px 18px;padding:0;">
              <li>top 5/10/20 RMs by loss</li>
              <li>top stores · worst markets</li>
              <li>best performing RM / store</li>
              <li>worst conversion stores</li>
              <li>staff with most loss</li>
            </ul>
            <strong style="color:var(--blue);">🎯 Filtered analysis</strong>
            <ul style="margin:4px 0 12px 18px;padding:0;">
              <li>top reason in [market]</li>
              <li>category breakdown for [store]</li>
              <li>staff in [market]</li>
              <li>loss for [RM name]</li>
            </ul>
            <strong style="color:var(--blue);">🆕 Customer analysis</strong>
            <ul style="margin:4px 0 12px 18px;padding:0;">
              <li>new vs repeat customers</li>
              <li>top reason for new customers</li>
              <li>top reason for repeat customers</li>
              <li>new customer share by RM</li>
            </ul>
          </div>
          <div>
            <strong style="color:var(--blue);">⏰ Time-based</strong>
            <ul style="margin:4px 0 12px 18px;padding:0;">
              <li>loss by day of week</li>
              <li>peak loss hours</li>
              <li>reason by time slot</li>
              <li>sudden spike / trend</li>
              <li>most improved stores</li>
            </ul>
            <strong style="color:var(--blue);">⚖️ Comparisons</strong>
            <ul style="margin:4px 0 12px 18px;padding:0;">
              <li>compare [A] vs [B]</li>
              <li>WoW comparison</li>
              <li>pareto / 80% concentration</li>
            </ul>
            <strong style="color:var(--blue);">🔍 Quality / audit</strong>
            <ul style="margin:4px 0 12px 18px;padding:0;">
              <li>stores with no walkins</li>
              <li>bad phone numbers</li>
              <li>low coverage stores</li>
              <li>abnormal reasons</li>
              <li>stores with both issues</li>
              <li>pending walkins sync</li>
            </ul>
          </div>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:10px;">💡 Tip: Adjust the count by saying "top 5", "top 20", etc.</p>
      </div>`};
  }

  // ── FALLBACK ──
  return{title:'Hmm — I didn\'t catch that',html:`
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">I couldn't match your question to a known pattern. Try one of these instead:</p>
    <ul style="font-size:12px;color:var(--text);line-height:1.8;padding-left:20px;">
      <li><strong>Rankings:</strong> "top 5 RMs by loss", "top 10 stores", "worst markets"</li>
      <li><strong>Filtered:</strong> "top reason in Bangalore", "stores in Chennai", "category breakdown for store XYZ"</li>
      <li><strong>Counts:</strong> "how many total loss", "how many stores", "how many reasons"</li>
      <li><strong>Customer:</strong> "new vs repeat customers"</li>
      <li><strong>Quality:</strong> "stores with no walkins", "bad phone numbers", "low coverage stores", "abnormal reasons"</li>
      <li><strong>Drilldowns:</strong> "show Bangalore", "stores under [RM name]", "details for [store name]"</li>
    </ul>
    <p style="font-size:11px;color:var(--muted);margin-top:10px;">Click a chip above for an example, or rephrase using these patterns.</p>`};
}

// ═══════════════════════════════════════════════════════════════════
// 💎 INSIGHTS TAB — pre-computed action-ready report
// 3 sub-views: Market / RM / Store. Pick entity → see everything.
// ═══════════════════════════════════════════════════════════════════

let _insMode='market'; // 'market' | 'rm' | 'store'
let _insEntity=''; // selected entity name (e.g., 'Bangalore')

// Global scope flag — set while Insights is active so click-through modals respect entity
window._insScope=null;

// Filter a row array down to the current Insights scope (if any)
function applyInsScope(rows){
  const sc=window._insScope;
  if(!sc||!sc.entity)return rows;
  const{storeIdx}=_LS_IDX;
  return rows.filter(r=>{
    if(sc.mode==='market')return r._wkStore&&r._wkStore.market===sc.entity;
    if(sc.mode==='rm')return r._rm===sc.entity;
    if(sc.mode==='store')return storeIdx>=0&&String(r[storeIdx]||'').trim()===sc.entity;
    return true;
  });
}
function insScopeLabel(){
  const sc=window._insScope;
  if(!sc||!sc.entity)return '';
  return`${sc.mode==='market'?'Market':sc.mode==='rm'?'RM':'Store'}: ${sc.entity}`;
}

function renderInsights(){
  const target=document.getElementById('ins');
  const f=getFilters();
  // Temporarily clear scope while building the report so applyInsScope doesn't double-apply
  // (the report builder filters scopedRows manually). We'll set scope AFTER, before HTML is injected.
  window._insScope=null;
  const rows=filterLS(f);
  const{storeIdx}=_LS_IDX;

  // Build dropdown options based on _insMode
  const allMarkets=[...new Set(rows.map(r=>r._wkStore?r._wkStore.market:null).filter(v=>v&&v!=='Unknown'))].sort();
  const allRMs=[...new Set(rows.map(r=>r._rm).filter(v=>v&&v!=='Unknown'))].sort();
  const allStores=storeIdx>=0?[...new Set(rows.map(r=>String(r[storeIdx]||'').trim()).filter(Boolean))].sort():[];

  let opts=[],modeLabel='';
  if(_insMode==='market'){opts=allMarkets;modeLabel='Market';}
  else if(_insMode==='rm'){opts=allRMs;modeLabel='RM';}
  else{opts=allStores;modeLabel='Store';}

  // Auto-select first option if none selected
  if(opts.length&&!opts.includes(_insEntity))_insEntity=opts[0];

  const subTabBtn=(mode,label,emoji)=>
    `<button onclick="_insMode='${mode}';_insEntity='';renderInsights()" style="padding:10px 20px;border:0;background:${_insMode===mode?'var(--blue)':'var(--surface)'};color:${_insMode===mode?'#fff':'var(--muted)'};font-weight:600;font-size:13px;cursor:pointer;border-radius:8px 8px 0 0;border-bottom:${_insMode===mode?'3px solid var(--blue)':'3px solid transparent'};">${emoji} ${label}</button>`;

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#fff8e6 0%,#fff 100%);border:1px solid #f0d68a;border-left:4px solid var(--amber);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">💎 Insights — Pre-computed Action Report</div>
      <div style="font-size:12px;color:var(--muted);">Pick a Market / RM / Store → see complete diagnostic + auto-detected red flags + recommended actions. No drilling required.</div>
    </div>

    <div style="display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:1rem;">
      ${subTabBtn('market','Market','📍')}
      ${subTabBtn('rm','RM','👤')}
      ${subTabBtn('store','Store','🏪')}
    </div>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;background:var(--surface);padding:12px 16px;border-radius:8px;border:1px solid var(--border);">
      <label style="font-size:12px;font-weight:600;color:var(--muted);">Select ${modeLabel}:</label>
      <select onchange="_insEntity=this.value;renderInsights()" style="flex:1;max-width:380px;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;">
        ${opts.length?opts.map(o=>`<option value="${o.replace(/"/g,'&quot;')}"${_insEntity===o?' selected':''}>${o}</option>`).join(''):'<option disabled>No data available</option>'}
      </select>
      <span style="font-size:11px;color:var(--muted);">${opts.length} ${modeLabel.toLowerCase()}${opts.length!==1?'s':''} available</span>
    </div>

    <div id="ins-report">${_insEntity?buildInsightReport(_insMode,_insEntity,rows,f):'<p style="color:var(--muted);font-size:13px;padding:2rem;text-align:center;">Select an entity above to see the report.</p>'}</div>`;
  // Activate scope now so any modal opened from inside the Insights report respects it
  if(_insEntity)window._insScope={mode:_insMode,entity:_insEntity};
}

// ── INSIGHT REPORT BUILDER ─────────────────────────────────
function buildInsightReport(mode,entity,allRows,f){
  const{storeIdx,catIdx,reasonIdx,custIdx,empIdx,phoneIdx,timingIdx,dateIdx,subReasonIdx,subCatIdx,sizeIdx,styleIdx,colorIdx}=_LS_IDX;
  // Filter rows for this entity
  const scopedRows=allRows.filter(r=>{
    if(mode==='market')return r._wkStore&&r._wkStore.market===entity;
    if(mode==='rm')return r._rm===entity;
    if(mode==='store')return storeIdx>=0&&String(r[storeIdx]||'').trim()===entity;
    return false;
  });
  if(!scopedRows.length){
    return`<div class="err-card">No loss data for ${mode}: ${entity} in current filters.</div>`;
  }
  // Find related walkin store(s) — for store mode it's one, for RM/market it's many
  const wkStoresInScope=_WK.stores.filter(s=>{
    if(mode==='market')return s.market===entity;
    if(mode==='rm')return s.rm===entity;
    if(mode==='store')return s.outlet===entity||s.outletNorm===normStore(entity);
    return false;
  });

  // ── Compute walkin metrics ─────────────────────────────
  let totalW=0,totalB=0,daysWithData=new Set(),storesReporting=new Set();
  wkStoresInScope.forEach(s=>{
    const dRange=daysInRange(s.days,f);
    dRange.forEach(d=>{
      if(d.w>0){totalW+=d.w;daysWithData.add(d.dk);storesReporting.add(s.outletNorm);}
      totalB+=d.b;
    });
  });
  const totalLS=scopedRows.length;
  const totalNB=totalW-totalB;
  const convPct=pct(totalB,totalW);
  const covPct=pct(totalLS,totalNB);
  const zeroWalkinStores=wkStoresInScope.filter(s=>!storesReporting.has(s.outletNorm));

  // ── Customer breakdown ─────────────────────────────────
  const cc=getCustCounts(scopedRows);
  const totalCust=cc.new+cc.repeat+cc.other;
  const newPct=pct(cc.new,totalCust);
  const repPct=pct(cc.repeat,totalCust);

  // ── Reason breakdown (col I) ───────────────────────────
  const reasonMap={};
  scopedRows.forEach(r=>{if(reasonIdx<0)return;const k=String(r[reasonIdx]||'').trim()||'(blank)';if(!reasonMap[k])reasonMap[k]={c:0,new:0,rep:0,stores:new Set(),staff:new Set()};reasonMap[k].c++;const ct=String(r[custIdx]||'').toLowerCase().trim();if(isNewVal(ct))reasonMap[k].new++;else if(isRepVal(ct))reasonMap[k].rep++;const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(sn)reasonMap[k].stores.add(sn);const stf=empIdx>=0?String(r[empIdx]||''):'';if(stf)reasonMap[k].staff.add(stf);});
  const reasonArr=Object.entries(reasonMap).sort((a,b)=>b[1].c-a[1].c);

  // ── Sub-reason (col J) ─────────────────────────────────
  const subReasonMap={};
  if(subReasonIdx>=0){
    scopedRows.forEach(r=>{const k=String(r[subReasonIdx]||'').trim()||'(blank)';if(!subReasonMap[k])subReasonMap[k]={c:0,stores:new Set()};subReasonMap[k].c++;const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(sn)subReasonMap[k].stores.add(sn);});
  }
  const subReasonArr=Object.entries(subReasonMap).sort((a,b)=>b[1].c-a[1].c);

  // ── Category breakdown ─────────────────────────────────
  const catMap={};
  scopedRows.forEach(r=>{if(catIdx<0)return;const k=String(r[catIdx]||'').trim()||'(blank)';if(!catMap[k])catMap[k]={c:0};catMap[k].c++;});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1].c-a[1].c);

  // ── Phone quality ──────────────────────────────────────
  let phValid=0,phBad=0,phMissing=0;
  scopedRows.forEach(r=>{if(r._mob==='valid')phValid++;else if(r._mob==='missing')phMissing++;else phBad++;});
  const phBadPct=pct(phBad+phMissing,totalLS);

  // ── Time slot pattern ──────────────────────────────────
  const timeMap={};
  scopedRows.forEach(r=>{if(!r._time)return;if(!timeMap[r._time])timeMap[r._time]={c:0,staff:{}};timeMap[r._time].c++;const stf=empIdx>=0?String(r[empIdx]||''):'';if(stf){timeMap[r._time].staff[stf]=(timeMap[r._time].staff[stf]||0)+1;}});
  const timeArr=Object.entries(timeMap).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const peakTime=timeArr.length?timeArr.reduce((m,e)=>e[1].c>m[1].c?e:m):null;

  // ── Staff performance ──────────────────────────────────
  const staffMap={};
  scopedRows.forEach(r=>{if(empIdx<0)return;const k=String(r[empIdx]||'').trim();if(!k)return;if(!staffMap[k])staffMap[k]={c:0,reasons:{},times:{},phBad:0,new:0,rep:0,categories:{},lastHourCnt:0};staffMap[k].c++;const rsn=reasonIdx>=0?String(r[reasonIdx]||'').trim():'';if(rsn){staffMap[k].reasons[rsn]=(staffMap[k].reasons[rsn]||0)+1;}const tm=r._time;if(tm){staffMap[k].times[tm]=(staffMap[k].times[tm]||0)+1;}if(r._mob!=='valid')staffMap[k].phBad++;const cust=String(r[custIdx]||'').toLowerCase().trim();if(isNewVal(cust))staffMap[k].new++;else if(isRepVal(cust))staffMap[k].rep++;const cat=catIdx>=0?String(r[catIdx]||'').trim():'';if(cat)staffMap[k].categories[cat]=(staffMap[k].categories[cat]||0)+1;});
  const staffArr=Object.entries(staffMap).sort((a,b)=>b[1].c-a[1].c);

  // ── Reason concentration (single dominant reason) ──────
  const topReason=reasonArr[0];
  const topReasonPct=topReason?pct(topReason[1].c,totalLS):0;

  // ── Auto-detected RED FLAGS ────────────────────────────
  const redFlags=[];const greenWins=[];const actions=[];

  // Coverage flags
  if(totalNB>0&&covPct<20)redFlags.push({txt:`Loss coverage is critically low: only <strong>${covPct}%</strong> of ${fi(totalNB)} non-buyers captured. Many losses going un-recorded.`,sev:'high'});
  else if(totalNB>0&&covPct>=50)greenWins.push(`Strong loss coverage: <strong>${covPct}%</strong> of non-buyers captured (${fi(totalLS)} entries).`);

  // Phone quality
  if(phBadPct>40)redFlags.push({txt:`Phone number quality is poor: <strong>${phBadPct}%</strong> invalid/missing (${fi(phBad+phMissing)} of ${fi(totalLS)}). Customer follow-up at risk.`,sev:'high'});
  else if(phBadPct<10&&totalLS>50)greenWins.push(`Phone data quality is excellent: only <strong>${phBadPct}%</strong> invalid.`);

  // Zero-walkin stores
  if(mode!=='store'&&zeroWalkinStores.length>0){
    const zPct=pct(zeroWalkinStores.length,wkStoresInScope.length);
    if(zPct>30)redFlags.push({txt:`<strong>${zeroWalkinStores.length} stores</strong> (${zPct}%) reporting <em>zero walkins</em> in selected period — pending data entry.`,sev:'high'});
    else if(zeroWalkinStores.length>0)redFlags.push({txt:`${zeroWalkinStores.length} stores have no walkin data yet — pending sync.`,sev:'medium'});
  }

  // Top-reason concentration
  if(topReasonPct>=50)redFlags.push({txt:`One reason dominates: "<strong>${topReason[0]}</strong>" = ${topReasonPct}% of all losses. Either real concentration or lazy data entry — investigate.`,sev:'medium'});
  else if(topReasonPct<35&&reasonArr.length>=5)greenWins.push(`Healthy reason diversity: top reason "${topReason?topReason[0]:''}" at ${topReasonPct}%, ${reasonArr.length} distinct reasons captured.`);

  // Single-staff dominance (for store mode)
  if(mode==='store'&&staffArr.length){
    const topStaffPct=pct(staffArr[0][1].c,totalLS);
    if(topStaffPct>=70&&staffArr.length>=2)redFlags.push({txt:`Single staff "<strong>${staffArr[0][0]}</strong>" enters ${topStaffPct}% of losses. Validate data accuracy — possibly biased.`,sev:'medium'});
    else if(staffArr.length>=3&&topStaffPct<50)greenWins.push(`Staff distribution healthy: ${staffArr.length} staff active, top contributor ${topStaffPct}%.`);
  }

  // Time concentration (batch entry suspicion)
  if(peakTime&&timeArr.length>=2){
    const peakPct=pct(peakTime[1].c,totalLS);
    if(peakPct>=60)redFlags.push({txt:`<strong>${peakPct}%</strong> of all entries clustered at <strong>${peakTime[0]}</strong> — looks like batch entry, not real-time capture. Reliability questionable.`,sev:'medium'});
  }

  // Customer mix
  if(totalCust>20){
    if(repPct<5&&newPct>80)redFlags.push({txt:`Very few repeat customer entries (${repPct}%, ${fi(cc.repeat)}). Either you have no loyalty problem, or staff don't track repeat losses.`,sev:'low'});
    else if(repPct>=20)greenWins.push(`Repeat customer loss tracked (${repPct}%, ${fi(cc.repeat)} entries) — important for retention insight.`);
  }

  // Staff with lazy data entry (only 1-2 distinct reasons)
  const lazyStaff=staffArr.filter(([,v])=>v.c>=10&&Object.keys(v.reasons).length<=2);
  if(lazyStaff.length>=2){
    redFlags.push({txt:`<strong>${lazyStaff.length} staff</strong> use only 1-2 reasons across all entries — suggests templated/lazy entry: ${lazyStaff.slice(0,3).map(([k])=>k).join(', ')}${lazyStaff.length>3?', ...':''}`,sev:'medium'});
  }

  // ── Recommended ACTIONS ────────────────────────────────
  if(zeroWalkinStores.length>0&&mode!=='store')actions.push({label:`Add walkin data for ${zeroWalkinStores.length} pending stores`,detail:zeroWalkinStores.slice(0,3).map(s=>s.outlet).join(', ')+(zeroWalkinStores.length>3?', ...':'')});
  if(phBadPct>30)actions.push({label:`Fix ${fi(phBad+phMissing)} invalid phone numbers`,detail:`Brief field staff on the 10-digit + no-4-repeating-digits rule`});
  if(covPct<25&&totalNB>0)actions.push({label:`Boost loss capture rate — only ${covPct}% of ${fi(totalNB)} non-buyers recorded`,detail:`Train staff to log every lost customer interaction`});
  if(topReasonPct>=50)actions.push({label:`Investigate "${topReason[0]}" — driving ${topReasonPct}% of all losses`,detail:`Either fix root cause or check data accuracy`});
  if(lazyStaff.length>=2)actions.push({label:`Retrain ${lazyStaff.length} staff with low reason diversity`,detail:`Encourage capturing actual customer feedback, not defaults`});
  if(!actions.length)actions.push({label:'Maintain current standards',detail:'No critical actions detected. Continue monitoring weekly.'});

  // ── Plain English INSIGHTS (the killer feature) ────────
  const insights=[];

  // Insight 1: top reason + customer type pattern
  if(topReason){
    const r=topReason[1];
    const newVsRep=r.new>=r.rep*2?`mostly NEW customers (${r.new} of ${r.c})`:r.rep>=r.new*2?`mostly REPEAT customers (${r.rep} of ${r.c}) — retention issue`:`mixed customers (${r.new} new / ${r.rep} repeat)`;
    insights.push(`💡 <strong>${topReasonPct}%</strong> of loss is due to <strong>"${topReason[0]}"</strong> — ${newVsRep}. Affects <strong>${r.stores.size}</strong> stores via <strong>${r.staff.size}</strong> staff.`);
  }

  // Insight 2: time pattern
  if(peakTime&&timeArr.length>=3){
    const peakStaff=Object.entries(peakTime[1].staff).sort((a,b)=>b[1]-a[1])[0];
    insights.push(`⏰ Peak loss hour: <strong>${peakTime[0]}</strong> (${fi(peakTime[1].c)} entries, ${pct(peakTime[1].c,totalLS)}% of total).${peakStaff?` Top contributor: <strong>${peakStaff[0]}</strong> (${peakStaff[1]} entries).`:''}`);
  }

  // Insight 3: repeat customer reason
  if(cc.repeat>=10&&reasonArr.length){
    const repReasonMap={};
    scopedRows.forEach(r=>{if(isRepVal(String(r[custIdx]||'').toLowerCase().trim())){const k=reasonIdx>=0?String(r[reasonIdx]||'').trim():'';if(k)repReasonMap[k]=(repReasonMap[k]||0)+1;}});
    const topRepReason=Object.entries(repReasonMap).sort((a,b)=>b[1]-a[1])[0];
    if(topRepReason)insights.push(`🔁 Repeat-customer loss leader: <strong>"${topRepReason[0]}"</strong> (${fi(topRepReason[1])} of ${fi(cc.repeat)} repeat losses, ${pct(topRepReason[1],cc.repeat)}%). Focus retention efforts here.`);
  }

  // Insight 4: phone quality concentration
  if(phBad+phMissing>=10){
    const badStaff={};
    scopedRows.forEach(r=>{if(r._mob!=='valid'&&empIdx>=0){const k=String(r[empIdx]||'').trim();if(k)badStaff[k]=(badStaff[k]||0)+1;}});
    const worstStaff=Object.entries(badStaff).sort((a,b)=>b[1]-a[1])[0];
    if(worstStaff&&worstStaff[1]>=5)insights.push(`📱 <strong>${worstStaff[0]}</strong> has ${worstStaff[1]} bad phone entries — ${pct(worstStaff[1],phBad+phMissing)}% of all bad numbers in this ${mode}. Coach this staff specifically.`);
  }

  // Insight 5: store hotspot (for market/RM mode)
  if(mode!=='store'){
    const storeCounts={};
    scopedRows.forEach(r=>{const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(sn)storeCounts[sn]=(storeCounts[sn]||0)+1;});
    const topStore=Object.entries(storeCounts).sort((a,b)=>b[1]-a[1])[0];
    if(topStore&&topStore[1]>=20&&pct(topStore[1],totalLS)>=20){
      insights.push(`🏪 Single hotspot: <strong>${topStore[0]}</strong> alone accounts for <strong>${pct(topStore[1],totalLS)}%</strong> of losses (${fi(topStore[1])} of ${fi(totalLS)}). Priority intervention.`);
    }
  }

  // Insight 6: category-reason link
  if(catArr.length&&reasonArr.length>=2){
    const topCat=catArr[0];
    const topCatReasonMap={};
    scopedRows.forEach(r=>{if(catIdx>=0&&String(r[catIdx]||'').trim()===topCat[0]){const k=reasonIdx>=0?String(r[reasonIdx]||'').trim():'';if(k)topCatReasonMap[k]=(topCatReasonMap[k]||0)+1;}});
    const topCatReason=Object.entries(topCatReasonMap).sort((a,b)=>b[1]-a[1])[0];
    if(topCatReason&&topCat[1].c>=15){
      insights.push(`🏷️ Top category <strong>"${topCat[0]}"</strong> (${fi(topCat[1].c)} losses) — main driver: <strong>"${topCatReason[0]}"</strong> (${fi(topCatReason[1])} entries, ${pct(topCatReason[1],topCat[1].c)}% of this category).`);
    }
  }

  // ── BUILD HTML ─────────────────────────────────────────
  const flagsRedHTML=redFlags.length?redFlags.map(rf=>`
    <li style="padding:8px 12px;background:${rf.sev==='high'?'#fff5f5':rf.sev==='medium'?'#fff8e6':'#fafafa'};border-left:3px solid ${rf.sev==='high'?'var(--red)':rf.sev==='medium'?'var(--amber)':'var(--muted)'};border-radius:0 6px 6px 0;margin-bottom:6px;font-size:12px;line-height:1.5;">${rf.txt}</li>
  `).join(''):'<li style="padding:8px 12px;color:var(--green);font-size:12px;">✅ No critical red flags detected — performing within healthy ranges.</li>';

  const greensHTML=greenWins.length?greenWins.map(g=>`
    <li style="padding:8px 12px;background:#e6f5ee;border-left:3px solid var(--green);border-radius:0 6px 6px 0;margin-bottom:6px;font-size:12px;line-height:1.5;">${g}</li>
  `).join(''):'<li style="padding:8px 12px;color:var(--muted);font-size:12px;font-style:italic;">No notable wins detected yet. Build improvements over time.</li>';

  const actionsHTML=actions.map((a,i)=>`
    <li style="padding:10px 14px;background:#fff;border:1px solid #e0d4f7;border-radius:8px;margin-bottom:8px;font-size:12px;">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <div style="background:#6b52d4;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">${i+1}</div>
        <div><strong>${a.label}</strong><div style="font-size:11px;color:var(--muted);margin-top:2px;">${a.detail}</div></div>
      </div>
    </li>
  `).join('');

  const insightsHTML=insights.length?insights.map(ins=>`
    <li style="padding:10px 14px;background:#fff8e6;border-left:3px solid var(--amber);border-radius:0 6px 6px 0;margin-bottom:8px;font-size:13px;line-height:1.6;">${ins}</li>
  `).join(''):'<li style="padding:10px;color:var(--muted);font-size:12px;font-style:italic;">Not enough data for auto-insights yet.</li>';

  // Top tables
  const top5ReasonsHTML=reasonArr.slice(0,5).map(([k,v])=>({cells:[
    `<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','I')">${k}</span>`,
    fi(v.c),
    `<span class="badge ${pct(v.c,totalLS)>=30?'badge-red':pct(v.c,totalLS)>=15?'badge-amber':'badge-green'}">${pct(v.c,totalLS)}%</span>`,
    `${fi(v.new)} / ${fi(v.rep)}`,
    fi(v.stores.size),
    fi(v.staff.size)
  ]}));

  const top5SubReasonsHTML=subReasonArr.slice(0,5).map(([k,v])=>({cells:[
    subReasonIdx>=0?`<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','J')">${k}</span>`:k,
    fi(v.c),
    `<span class="badge ${pct(v.c,totalLS)>=30?'badge-red':pct(v.c,totalLS)>=15?'badge-amber':'badge-green'}">${pct(v.c,totalLS)}%</span>`,
    fi(v.stores.size)
  ]}));

  const top5CatHTML=catArr.slice(0,5).map(([k,v])=>({cells:[
    `<span class="clickable" onclick="showCatDetailModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
    fi(v.c),
    `<span class="badge ${pct(v.c,totalLS)>=25?'badge-red':pct(v.c,totalLS)>=12?'badge-amber':'badge-green'}">${pct(v.c,totalLS)}%</span>`
  ]}));

  const staffTblHTML=staffArr.slice(0,15).map(([k,v])=>{
    const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
    const topT=Object.entries(v.times).sort((a,b)=>b[1]-a[1])[0];
    const reasonDiv=Object.keys(v.reasons).length;
    const phBadPct=pct(v.phBad,v.c);
    const lazyFlag=v.c>=10&&reasonDiv<=2;
    return{cells:[
      `<span class="clickable" onclick="showStaffInsightModal('${k.replace(/'/g,"\\'")}')">${k}</span>${lazyFlag?' <span class="badge badge-red" title="Uses only 1-2 reasons">⚠️</span>':''}`,
      fi(v.c),
      `${fi(v.new)} / ${fi(v.rep)}`,
      topR?topR[0]:'—',
      reasonDiv,
      topT?topT[0]:'—',
      `<span class="badge ${phBadPct>50?'badge-red':phBadPct>20?'badge-amber':'badge-green'}">${phBadPct}%</span>`
    ],_cls:lazyFlag?'audit-amber':''};
  });

  const timeTblHTML=timeArr.map(([t,v])=>({cells:[
    t,fi(v.c),`<span class="badge ${pct(v.c,totalLS)>=25?'badge-red':pct(v.c,totalLS)>=12?'badge-amber':'badge-green'}">${pct(v.c,totalLS)}%</span>`,
    peakTime&&t===peakTime[0]?'<span class="badge badge-red">⚡ Peak</span>':''
  ]}));

  const zeroStoresTblHTML=zeroWalkinStores.slice(0,10).map(s=>({cells:[
    `<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,
    s.market,s.cluster,
    '<span class="badge badge-red">🔴 No walkins yet</span>'
  ]}));

  return`
    <!-- HEALTH SUMMARY -->
    <div style="background:linear-gradient(135deg,#fff 0%,#fafbfd 100%);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;">
      <div style="font-size:20px;font-weight:600;margin-bottom:4px;">${mode==='market'?'📍':mode==='rm'?'👤':'🏪'} ${entity}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:1rem;">${mode==='market'?wkStoresInScope.length+' stores in this market':mode==='rm'?wkStoresInScope.length+' stores under this RM':wkStoresInScope[0]?wkStoresInScope[0].market+' · '+wkStoresInScope[0].cluster:''}</div>
      <div style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;">
        <div style="background:#f8f9fb;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;">Loss entries</div>
          <div style="font-size:22px;font-weight:600;color:var(--red);">${fi(totalLS)}</div>
        </div>
        <div style="background:#f8f9fb;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;">Walkins</div>
          <div style="font-size:22px;font-weight:600;color:var(--blue);">${fi(totalW)}</div>
        </div>
        <div style="background:#f8f9fb;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;">Conv%</div>
          <div style="font-size:22px;font-weight:600;color:${convPct>=40?'var(--green)':convPct>=25?'var(--amber)':'var(--red)'};">${convPct}%</div>
        </div>
        <div style="background:#f8f9fb;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;">Coverage%</div>
          <div style="font-size:22px;font-weight:600;color:${covPct>=50?'var(--green)':covPct>=25?'var(--amber)':'var(--red)'};">${covPct}%</div>
        </div>
        <div style="background:#f8f9fb;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;">Phone OK%</div>
          <div style="font-size:22px;font-weight:600;color:${100-phBadPct>=80?'var(--green)':100-phBadPct>=50?'var(--amber)':'var(--red)'};">${100-phBadPct}%</div>
        </div>
        <div style="background:#f8f9fb;border-radius:8px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;">New / Repeat</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);padding-top:6px;"><span style="color:var(--green)">${newPct}%</span> / <span style="color:var(--blue)">${repPct}%</span></div>
        </div>
      </div>
    </div>

    <!-- 3-COL TOP SECTION: Red flags · Green wins · Actions -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
      <div class="card" style="background:#fff5f5;border-color:#fdeaea;">
        <div class="card-title" style="color:#a32020;">🚩 Red flags (${redFlags.length})</div>
        <ul style="list-style:none;padding:0;margin:0;">${flagsRedHTML}</ul>
      </div>
      <div class="card" style="background:#e6f5ee;border-color:#c8e8d4;">
        <div class="card-title" style="color:#1a6e40;">✅ Green wins (${greenWins.length})</div>
        <ul style="list-style:none;padding:0;margin:0;">${greensHTML}</ul>
      </div>
      <div class="card" style="background:#f5f0ff;border-color:#e0d4f7;">
        <div class="card-title" style="color:#5a3da0;">⚡ Top actions this week</div>
        <ul style="list-style:none;padding:0;margin:0;">${actionsHTML}</ul>
      </div>
    </div>

    <!-- AUTO-INSIGHTS -->
    <div class="card">
      <div class="card-title">💡 Pre-computed insights (read & act)</div>
      <ul style="list-style:none;padding:0;margin:0;">${insightsHTML}</ul>
    </div>

    <!-- LOSS DIAGNOSTIC -->
    <div style="background:#f0f5ff;border:1px solid #d0dffa;border-radius:10px;padding:6px 14px;margin-top:1rem;margin-bottom:.5rem;">
      <div style="font-size:11px;font-weight:600;color:#1a3fa0;text-transform:uppercase;letter-spacing:.5px;">🔍 Loss diagnostic — why customers leave</div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">Top 5 reasons (col I)</div>
        ${reasonArr.length?sortableTbl(['Reason','Count','Share%','New/Repeat','Stores','Staff'],top5ReasonsHTML,null):'<p style="color:var(--muted)">No reason data.</p>'}
      </div>
      <div class="card">
        <div class="card-title">Top 5 specific reasons (col J)</div>
        ${subReasonArr.length?sortableTbl(['Specific reason','Count','Share%','Stores'],top5SubReasonsHTML,null):'<p style="color:var(--muted)">No col J data.</p>'}
      </div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-title">Top 5 categories</div>
        ${catArr.length?sortableTbl(['Category','Count','Share%'],top5CatHTML,null):'<p style="color:var(--muted)">No category data.</p>'}
      </div>
      <div class="card">
        <div class="card-title">⏰ Time-of-day pattern</div>
        ${timeArr.length?sortableTbl(['Time slot','Count','Share%','Status'],timeTblHTML,null):'<p style="color:var(--muted)">No timing data.</p>'}
      </div>
    </div>

    <!-- STAFF EFFECTIVENESS -->
    <div style="background:#fff5f5;border:1px solid #fdeaea;border-radius:10px;padding:6px 14px;margin-top:1rem;margin-bottom:.5rem;">
      <div style="font-size:11px;font-weight:600;color:#a32020;text-transform:uppercase;letter-spacing:.5px;">👥 Staff effectiveness — who needs coaching</div>
    </div>
    <div class="card">
      <div class="card-title">Top ${Math.min(15,staffArr.length)} staff · ⚠️ = uses only 1-2 reasons (lazy entry suspected)</div>
      ${staffArr.length?sortableTbl(['Staff','Entries','New/Repeat','Top reason','Reason diversity','Peak time','Phone bad%'],staffTblHTML,null,r=>r._cls):'<p style="color:var(--muted)">No staff data.</p>'}
    </div>

    <!-- DATA VALIDITY -->
    ${zeroWalkinStores.length||phBadPct>20?`
    <div style="background:#fff8e6;border:1px solid #f0d68a;border-radius:10px;padding:6px 14px;margin-top:1rem;margin-bottom:.5rem;">
      <div style="font-size:11px;font-weight:600;color:#a05d0a;text-transform:uppercase;letter-spacing:.5px;">🚦 Data validity check — is this data trustworthy?</div>
    </div>
    ${zeroWalkinStores.length?`<div class="card">
      <div class="card-title">🔴 Stores reporting zero walkins (${zeroWalkinStores.length})</div>
      ${sortableTbl(['Store','Market','Cluster','Status'],zeroStoresTblHTML,null)}
      ${zeroWalkinStores.length>10?`<p style="font-size:11px;color:var(--muted);margin-top:8px;">Showing 10 of ${zeroWalkinStores.length}. Add walkin data in your Walkins sheet.</p>`:''}
    </div>`:''}
    `:''}

    ${buildDeepDiagnostics(mode,entity,scopedRows,allRows,wkStoresInScope,f)}

    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:1.5rem;padding:1rem;">📊 Report computed at ${new Date().toLocaleString()} · Showing data for current global filters</p>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// 📊 DEEP DIAGNOSTICS — collapsible sub-sections (A, C, D, E, F)
// ═══════════════════════════════════════════════════════════════════
function buildDeepDiagnostics(mode,entity,scopedRows,allRows,wkStoresInScope,f){
  const{storeIdx,catIdx,reasonIdx,custIdx,empIdx,phoneIdx,timingIdx,dateIdx,subReasonIdx,subCatIdx,sizeIdx,styleIdx,colorIdx,polishIdx,designIdx,nameIdx}=_LS_IDX;
  if(!scopedRows.length)return '';
  const totalLS=scopedRows.length;

  // ════════ A. BEHAVIORAL PATTERNS ═══════════════════════════
  // A1. Staff "template" detection — staff repeatedly using same reason+category combo
  // A2. Time-anomaly staff — staff whose entries cluster in 1 hour (likely batch entry)
  // A3. Phone-staff link — staff with most bad phone numbers (concentration)
  const staffMetrics={};
  scopedRows.forEach(r=>{
    if(empIdx<0)return;
    const s=String(r[empIdx]||'').trim();
    if(!s)return;
    if(!staffMetrics[s])staffMetrics[s]={c:0,combos:{},times:{},badPh:0,reasons:{},categories:{}};
    staffMetrics[s].c++;
    const cat=catIdx>=0?String(r[catIdx]||'').trim():'';
    const rsn=reasonIdx>=0?String(r[reasonIdx]||'').trim():'';
    if(cat&&rsn){const combo=`${rsn} × ${cat}`;staffMetrics[s].combos[combo]=(staffMetrics[s].combos[combo]||0)+1;}
    if(rsn)staffMetrics[s].reasons[rsn]=(staffMetrics[s].reasons[rsn]||0)+1;
    if(cat)staffMetrics[s].categories[cat]=(staffMetrics[s].categories[cat]||0)+1;
    if(r._time)staffMetrics[s].times[r._time]=(staffMetrics[s].times[r._time]||0)+1;
    if(r._mob!=='valid')staffMetrics[s].badPh++;
  });

  // A1: Staff with template behavior (one reason+cat combo ≥70% of entries)
  const templateStaff=[];
  Object.entries(staffMetrics).forEach(([s,v])=>{
    if(v.c<10)return;
    const topCombo=Object.entries(v.combos).sort((a,b)=>b[1]-a[1])[0];
    if(topCombo&&pct(topCombo[1],v.c)>=70){
      templateStaff.push({staff:s,combo:topCombo[0],comboPct:pct(topCombo[1],v.c),comboCount:topCombo[1],total:v.c});
    }
  });
  templateStaff.sort((a,b)=>b.comboPct-a.comboPct);

  // A2: Time-anomaly staff (one time slot ≥70% of their entries)
  const timeAnomalyStaff=[];
  Object.entries(staffMetrics).forEach(([s,v])=>{
    if(v.c<10)return;
    const topTime=Object.entries(v.times).sort((a,b)=>b[1]-a[1])[0];
    if(topTime&&pct(topTime[1],v.c)>=70){
      timeAnomalyStaff.push({staff:s,time:topTime[0],timeCount:topTime[1],total:v.c,pct:pct(topTime[1],v.c)});
    }
  });
  timeAnomalyStaff.sort((a,b)=>b.pct-a.pct);

  // A3: Phone-staff link — total bad phones in this scope
  const totalBadPh=scopedRows.filter(r=>r._mob!=='valid').length;
  const phoneStaffArr=Object.entries(staffMetrics).filter(([,v])=>v.badPh>0).sort((a,b)=>b[1].badPh-a[1].badPh).slice(0,10);

  const aRedFlagCount=templateStaff.length+timeAnomalyStaff.length;

  const aHtml=`
    <div class="two-col">
      <div>
        <div class="section-lbl">🎭 Staff template behavior (same reason+category ≥70% of entries)</div>
        ${templateStaff.length?sortableTbl(['Staff','Top combo','Occurrences','Total entries','Concentration%'],
          templateStaff.slice(0,10).map(t=>({cells:[
            `<span class="clickable" onclick="showStaffInsightModal('${t.staff.replace(/'/g,"\\'")}')">${t.staff}</span>`,
            `<span style="font-size:11px">${t.combo}</span>`,
            fi(t.comboCount),fi(t.total),
            `<span class="badge badge-red">${t.comboPct}%</span>`
          ]})),null):'<p style="color:var(--green);font-size:12px;">✅ No staff with template-only entries detected.</p>'}
        <p style="font-size:11px;color:var(--muted);margin-top:6px;">Staff using one reason+category combo repeatedly may be lazily templating instead of capturing real customer feedback.</p>
      </div>
      <div>
        <div class="section-lbl">⏰ Time-anomaly staff (one time slot dominates ≥70%)</div>
        ${timeAnomalyStaff.length?sortableTbl(['Staff','Peak slot','Entries in slot','Total entries','Time concentration%'],
          timeAnomalyStaff.slice(0,10).map(t=>({cells:[
            `<span class="clickable" onclick="showStaffInsightModal('${t.staff.replace(/'/g,"\\'")}')">${t.staff}</span>`,t.time,fi(t.timeCount),fi(t.total),
            `<span class="badge badge-red">${t.pct}%</span>`
          ]})),null):'<p style="color:var(--green);font-size:12px;">✅ No staff with abnormal time concentration.</p>'}
        <p style="font-size:11px;color:var(--muted);margin-top:6px;">If 70%+ of a staff's entries fall in one slot, they're likely doing batch entry — data not real-time, less reliable.</p>
      </div>
    </div>
    <div class="section-lbl" style="margin-top:1rem;">📱 Phone-quality concentration by staff (who creates the most bad numbers)</div>
    ${phoneStaffArr.length?sortableTbl(['Staff','Total entries','Bad phone count','Bad%','Share of all bad'],
      phoneStaffArr.map(([s,v])=>({cells:[
        `<span class="clickable" onclick="showStaffInsightModal('${s.replace(/'/g,"\\'")}')">${s}</span>`,fi(v.c),fi(v.badPh),
        `<span class="badge ${pct(v.badPh,v.c)>50?'badge-red':pct(v.badPh,v.c)>20?'badge-amber':'badge-green'}">${pct(v.badPh,v.c)}%</span>`,
        `<span class="badge ${pct(v.badPh,totalBadPh||1)>30?'badge-red':pct(v.badPh,totalBadPh||1)>15?'badge-amber':'badge-green'}">${pct(v.badPh,totalBadPh||1)}%</span>`
      ]})),null):'<p style="color:var(--muted);font-size:12px;">No phone-quality issues detected.</p>'}
  `;

  // ════════ C. CUSTOMER-CENTRIC ══════════════════════════════
  // C1. Chronic non-buyers — same phone appearing >=2 times
  // C2. New customer vs repeat customer reason mix (already in main report — add deeper)
  // C3. High-intent customer pattern — repeat customers with price-related reasons

  // C1: Same phone appearing multiple times
  const phoneOccurrences={};
  scopedRows.forEach(r=>{
    if(phoneIdx<0)return;
    if(r._mob!=='valid')return;
    const ph=String(r[phoneIdx]||'').replace(/\D/g,'');
    if(ph.length!==10)return;
    if(!phoneOccurrences[ph])phoneOccurrences[ph]={c:0,reasons:new Set(),categories:new Set(),stores:new Set(),name:''};
    phoneOccurrences[ph].c++;
    if(reasonIdx>=0)phoneOccurrences[ph].reasons.add(String(r[reasonIdx]||''));
    if(catIdx>=0)phoneOccurrences[ph].categories.add(String(r[catIdx]||''));
    if(storeIdx>=0)phoneOccurrences[ph].stores.add(String(r[storeIdx]||''));
    if(nameIdx>=0&&!phoneOccurrences[ph].name)phoneOccurrences[ph].name=String(r[nameIdx]||'');
  });
  const chronicNonBuyers=Object.entries(phoneOccurrences).filter(([,v])=>v.c>=2).sort((a,b)=>b[1].c-a[1].c);

  // C3: High-intent repeat customers with price-related reasons
  const PRICE_RELATED=['price concern','discount expectation not met','found cheaper online','perceived poor value for money','price mismatch with website','found substitute product at lower price'];
  let highIntentRepeat=0;
  scopedRows.forEach(r=>{
    if(custIdx<0||reasonIdx<0)return;
    const cust=String(r[custIdx]||'').toLowerCase().trim();
    if(!isRepVal(cust))return;
    const rsn=String(r[reasonIdx]||'').toLowerCase().trim();
    if(PRICE_RELATED.some(p=>rsn===p||rsn.includes(p)||p.includes(rsn)))highIntentRepeat++;
  });

  // C2 deep: top categories for new vs repeat
  const newCats={},repCats={};
  scopedRows.forEach(r=>{
    if(custIdx<0||catIdx<0)return;
    const cust=String(r[custIdx]||'').toLowerCase().trim();
    const cat=String(r[catIdx]||'').trim();
    if(!cat)return;
    if(isNewVal(cust))newCats[cat]=(newCats[cat]||0)+1;
    else if(isRepVal(cust))repCats[cat]=(repCats[cat]||0)+1;
  });
  const topNewCat=Object.entries(newCats).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topRepCat=Object.entries(repCats).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const cHtml=`
    <div class="section-lbl">🔁 Chronic non-buyers (same phone, multiple losses)</div>
    ${chronicNonBuyers.length?`<p style="font-size:12px;margin-bottom:8px;"><strong>${fi(chronicNonBuyers.length)} customers</strong> appeared in loss data ${chronicNonBuyers.length>1?'multiple times':'twice'}. These are warm but unconverted — high-priority follow-up targets.</p>
    ${sortableTbl(['Phone','Customer name','Visits','Stores','Distinct reasons','Distinct categories'],
      chronicNonBuyers.slice(0,15).map(([ph,v])=>({cells:[
        ph,v.name||'—',
        `<span class="badge ${v.c>=4?'badge-red':v.c>=3?'badge-amber':'badge-green'}">${v.c}×</span>`,
        fi(v.stores.size),fi(v.reasons.size),fi(v.categories.size)
      ]})),null)}
    ${chronicNonBuyers.length>15?`<p style="font-size:11px;color:var(--muted);margin-top:6px;">Showing top 15 of ${chronicNonBuyers.length}.</p>`:''}`:
    '<p style="color:var(--green);font-size:12px;">✅ No chronic non-buyers detected (each phone appears only once).</p>'}

    <div style="background:#fff5f5;border-left:3px solid var(--red);padding:10px 14px;border-radius:0 6px 6px 0;margin-top:1rem;font-size:12px;">
      💔 <strong>High-intent repeat customers lost on PRICE:</strong> ${fi(highIntentRepeat)} entries where REPEAT customers walked out for price-related reasons. These are your most retention-vulnerable losses — they trust you enough to come back but find prices unconvincing.
    </div>

    <div class="two-col" style="margin-top:1rem;">
      <div>
        <div class="section-lbl">🆕 What new customers come for (then leave)</div>
        ${topNewCat.length?sortableTbl(['Category','New customer losses','Share of new losses'],
          topNewCat.map(([k,v])=>({cells:[k,fi(v),`<span class="badge ${pct(v,Object.values(newCats).reduce((a,b)=>a+b,0))>=30?'badge-red':pct(v,Object.values(newCats).reduce((a,b)=>a+b,0))>=15?'badge-amber':'badge-green'}">${pct(v,Object.values(newCats).reduce((a,b)=>a+b,0))}%</span>`]})),null):'<p style="color:var(--muted);font-size:12px;">No new customer data.</p>'}
      </div>
      <div>
        <div class="section-lbl">🔁 What repeat customers come back for (and leave)</div>
        ${topRepCat.length?sortableTbl(['Category','Repeat customer losses','Share of repeat losses'],
          topRepCat.map(([k,v])=>({cells:[k,fi(v),`<span class="badge ${pct(v,Object.values(repCats).reduce((a,b)=>a+b,0))>=30?'badge-red':pct(v,Object.values(repCats).reduce((a,b)=>a+b,0))>=15?'badge-amber':'badge-green'}">${pct(v,Object.values(repCats).reduce((a,b)=>a+b,0))}%</span>`]})),null):'<p style="color:var(--muted);font-size:12px;">No repeat customer data.</p>'}
      </div>
    </div>
  `;

  // ════════ D. PRODUCT/SKU PATTERNS ══════════════════════════
  // D1. Repeated product losses — same sub-category+size+style appearing N times
  // D2. Hot attributes — colors/polishes/styles with high loss

  const productCombos={};
  scopedRows.forEach(r=>{
    const parts=[];
    if(catIdx>=0)parts.push(String(r[catIdx]||''));
    if(subCatIdx>=0)parts.push(String(r[subCatIdx]||''));
    if(sizeIdx>=0)parts.push(String(r[sizeIdx]||''));
    if(styleIdx>=0)parts.push(String(r[styleIdx]||''));
    const combo=parts.filter(Boolean).join(' · ');
    if(!combo)return;
    if(!productCombos[combo])productCombos[combo]={c:0,reasons:{},stores:new Set()};
    productCombos[combo].c++;
    const rsn=reasonIdx>=0?String(r[reasonIdx]||''):'';
    if(rsn)productCombos[combo].reasons[rsn]=(productCombos[combo].reasons[rsn]||0)+1;
    const sn=storeIdx>=0?String(r[storeIdx]||''):'';
    if(sn)productCombos[combo].stores.add(sn);
  });
  const repeatProducts=Object.entries(productCombos).filter(([,v])=>v.c>=3).sort((a,b)=>b[1].c-a[1].c).slice(0,15);

  // D2: hot attributes
  const attrCount=(idx)=>{
    if(idx<0)return [];
    const map={};
    scopedRows.forEach(r=>{const v=String(r[idx]||'').trim();if(v)map[v]=(map[v]||0)+1;});
    return Object.entries(map).filter(([k,v])=>v>=3).sort((a,b)=>b[1]-a[1]).slice(0,8);
  };
  const hotColors=attrCount(colorIdx);
  const hotStyles=attrCount(styleIdx);
  const hotPolishes=attrCount(polishIdx);
  const hotSizes=attrCount(sizeIdx);

  const dHtml=`
    <div class="section-lbl">📦 Repeatedly lost product combinations (3+ occurrences)</div>
    ${repeatProducts.length?sortableTbl(['Product (cat · sub · size · style)','Loss count','Stores affected','Top reason'],
      repeatProducts.map(([k,v])=>{
        const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
        return{cells:[
          `<span style="font-size:11px">${k}</span>`,
          `<span class="badge ${v.c>=10?'badge-red':v.c>=5?'badge-amber':'badge-green'}">${v.c}×</span>`,
          fi(v.stores.size),
          topR?`${topR[0]} (${topR[1]})`:'—'
        ]};
      }),null):'<p style="color:var(--muted);font-size:12px;">No product combo repeats 3+ times.</p>'}
    <p style="font-size:11px;color:var(--muted);margin-top:6px;">A combination losing 3+ customers may indicate stock issue, pricing issue, or quality issue with that specific product.</p>

    <div class="two-col" style="margin-top:1rem;">
      <div>
        <div class="section-lbl">🎨 High-loss colors${hotColors.length?'':' (no data)'}</div>
        ${hotColors.length?sortableTbl(['Color','Loss count'],hotColors.map(([k,v])=>({cells:[k,fi(v)]})),null):''}
      </div>
      <div>
        <div class="section-lbl">✨ High-loss polishes${hotPolishes.length?'':' (no data)'}</div>
        ${hotPolishes.length?sortableTbl(['Polish','Loss count'],hotPolishes.map(([k,v])=>({cells:[k,fi(v)]})),null):''}
      </div>
    </div>
    <div class="two-col">
      <div>
        <div class="section-lbl">💎 High-loss styles${hotStyles.length?'':' (no data)'}</div>
        ${hotStyles.length?sortableTbl(['Style','Loss count'],hotStyles.map(([k,v])=>({cells:[k,fi(v)]})),null):''}
      </div>
      <div>
        <div class="section-lbl">📏 High-loss sizes${hotSizes.length?'':' (no data)'}</div>
        ${hotSizes.length?sortableTbl(['Size','Loss count'],hotSizes.map(([k,v])=>({cells:[k,fi(v)]})),null):''}
      </div>
    </div>
  `;

  // ════════ E. OPERATIONAL DRIFT ════════════════════════════
  // E1. Coverage drift — last 7d vs prior 7d
  // E2. Stale stores — zero walkins for 5+ days
  // E3. Reason mix change — top reason shifting WoW

  const allDks=[...new Set(scopedRows.map(r=>r._dk).filter(Boolean))].sort();
  let coverageDriftHTML='<p style="color:var(--muted);font-size:12px;">Need at least 14 days of data for drift analysis.</p>';
  if(allDks.length>=14){
    const last7=new Set(allDks.slice(-7));
    const prev7=new Set(allDks.slice(-14,-7));
    let prevLS=0,lastLS=0,prevNB=0,lastNB=0;
    scopedRows.forEach(r=>{if(last7.has(r._dk))lastLS++;else if(prev7.has(r._dk))prevLS++;});
    wkStoresInScope.forEach(s=>{s.days.forEach(d=>{const nb=d.w-d.b;if(last7.has(d.dk))lastNB+=nb;else if(prev7.has(d.dk))prevNB+=nb;});});
    const prevCov=pct(prevLS,prevNB);const lastCov=pct(lastLS,lastNB);
    const delta=lastCov-prevCov;
    const arrow=delta>=2?'<span style="color:var(--green)">▲</span>':delta<=-2?'<span style="color:var(--red)">▼</span>':'<span style="color:var(--muted)">→</span>';
    coverageDriftHTML=`
      <div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr));">
        <div class="metric"><div class="lbl">Prior 7 days</div><div class="val">${prevCov}%</div><div class="sub">${fi(prevLS)} loss / ${fi(prevNB)} non-buyers</div></div>
        <div class="metric"><div class="lbl">Last 7 days</div><div class="val">${lastCov}%</div><div class="sub">${fi(lastLS)} loss / ${fi(lastNB)} non-buyers</div></div>
        <div class="metric ${delta>=2?'green':delta<=-2?'red':''}"><div class="lbl">Coverage drift</div><div class="val">${arrow} ${delta>0?'+':''}${delta}pp</div><div class="sub">${Math.abs(delta)<2?'stable':delta>0?'improving':'declining'}</div></div>
      </div>
    `;
  }

  // E2: stale stores — zero walkin entries for last 5+ days
  const today=allDks.length?allDks[allDks.length-1]:null;
  const staleStores=[];
  wkStoresInScope.forEach(s=>{
    const recentDays=daysInRange(s.days,f).filter(d=>d.w>0);
    if(!recentDays.length){staleStores.push({store:s.outlet,market:s.market,rm:s.rm,lastEntry:'never in period',daysSilent:'∞'});return;}
    const lastEntry=recentDays.reduce((a,b)=>a.dk>b.dk?a:b);
    if(today){
      const d1=new Date(lastEntry.dk+'T00:00:00');const d2=new Date(today+'T00:00:00');
      const days=Math.round((d2-d1)/86400000);
      if(days>=5)staleStores.push({store:s.outlet,market:s.market,rm:s.rm,lastEntry:fmtDK(lastEntry.dk),daysSilent:days});
    }
  });
  staleStores.sort((a,b)=>(b.daysSilent==='∞'?9999:b.daysSilent)-(a.daysSilent==='∞'?9999:a.daysSilent));

  // E3: Reason mix change
  let reasonDriftHTML='<p style="color:var(--muted);font-size:12px;">Need at least 14 days for reason-drift comparison.</p>';
  if(allDks.length>=14&&reasonIdx>=0){
    const last7=new Set(allDks.slice(-7));const prev7=new Set(allDks.slice(-14,-7));
    const prevMix={},lastMix={};
    let prevT=0,lastT=0;
    scopedRows.forEach(r=>{const k=String(r[reasonIdx]||'').trim()||'(blank)';if(last7.has(r._dk)){lastMix[k]=(lastMix[k]||0)+1;lastT++;}else if(prev7.has(r._dk)){prevMix[k]=(prevMix[k]||0)+1;prevT++;}});
    const allReasons=new Set([...Object.keys(prevMix),...Object.keys(lastMix)]);
    const drifts=[...allReasons].map(rsn=>{
      const p=pct(prevMix[rsn]||0,prevT);const l=pct(lastMix[rsn]||0,lastT);
      return{reason:rsn,prev:prevMix[rsn]||0,last:lastMix[rsn]||0,prevPct:p,lastPct:l,delta:l-p};
    }).filter(d=>Math.abs(d.delta)>=3||d.prev>=5||d.last>=5).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)).slice(0,10);
    if(drifts.length){
      reasonDriftHTML=sortableTbl(['Reason','Prior 7d','Last 7d','Prior%','Last%','Δ pp','Trend'],
        drifts.map(d=>{
          const arrow=d.delta>=3?'<span style="color:var(--red)">▲</span>':d.delta<=-3?'<span style="color:var(--green)">▼</span>':'→';
          const trend=d.delta>=5?'<span class="badge badge-red">Rising fast</span>':d.delta>=3?'<span class="badge badge-amber">Rising</span>':d.delta<=-5?'<span class="badge badge-green">Falling fast</span>':d.delta<=-3?'<span class="badge badge-green">Falling</span>':'<span class="badge badge-green">Stable</span>';
          return{cells:[d.reason,fi(d.prev),fi(d.last),`${d.prevPct}%`,`${d.lastPct}%`,`${arrow} ${d.delta>0?'+':''}${d.delta}pp`,trend]};
        }),null);
    }else{
      reasonDriftHTML='<p style="color:var(--green);font-size:12px;">✅ No notable reason-mix shifts week over week.</p>';
    }
  }

  const eHtml=`
    <div class="section-lbl">📉 Coverage drift (last 7 days vs prior 7 days)</div>
    ${coverageDriftHTML}

    <div class="section-lbl" style="margin-top:1rem;">⌛ Stale stores (5+ days no walkin entry)</div>
    ${staleStores.length?sortableTbl(['Store','Market','RM','Last walkin entry','Days silent'],
      staleStores.slice(0,15).map(s=>({cells:[
        `<span class="clickable" onclick="showStoreModal('${s.store.replace(/'/g,"\\'")}')">${s.store}</span>`,
        s.market,s.rm,s.lastEntry,
        `<span class="badge ${s.daysSilent==='∞'||s.daysSilent>=10?'badge-red':s.daysSilent>=7?'badge-amber':'badge-green'}">${s.daysSilent} day${s.daysSilent===1?'':'s'}</span>`
      ]})),null):'<p style="color:var(--green);font-size:12px;">✅ All stores have walkin entries within the last 4 days.</p>'}
    ${staleStores.length>15?`<p style="font-size:11px;color:var(--muted);margin-top:6px;">Showing 15 of ${staleStores.length}.</p>`:''}

    <div class="section-lbl" style="margin-top:1rem;">🔀 Reason mix shift (which reasons trended up/down)</div>
    ${reasonDriftHTML}
  `;

  // ════════ F. SHORT-TERM FORECAST ═══════════════════════════
  // F1. Project month-end loss based on current pace
  // F2. Project coverage trajectory

  let forecastHTML='<p style="color:var(--muted);font-size:12px;">Need at least 7 days of data for forecasting.</p>';
  if(allDks.length>=7){
    const last7=allDks.slice(-7);
    const last7Set=new Set(last7);
    let last7LS=0,last7NB=0,last7W=0,last7B=0;
    scopedRows.forEach(r=>{if(last7Set.has(r._dk))last7LS++;});
    wkStoresInScope.forEach(s=>{s.days.forEach(d=>{if(last7Set.has(d.dk)){last7NB+=(d.w-d.b);last7W+=d.w;last7B+=d.b;}});});
    const dailyLS=last7LS/7;
    const dailyW=last7W/7;
    const dailyB=last7B/7;
    const dailyNB=last7NB/7;

    // Project to month end (assuming 30-day month)
    const today=new Date();
    const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
    const dayOfMonth=today.getDate();
    const daysRemaining=daysInMonth-dayOfMonth;
    const projectedLS=Math.round(dailyLS*daysInMonth);
    const projectedW=Math.round(dailyW*daysInMonth);
    const projectedB=Math.round(dailyB*daysInMonth);
    const projectedNB=Math.round(dailyNB*daysInMonth);
    const projectedCov=pct(projectedLS,projectedNB);

    // Next 7 days projection
    const next7LS=Math.round(dailyLS*7);
    const next7W=Math.round(dailyW*7);

    forecastHTML=`
      <p style="font-size:12px;color:var(--muted);margin-bottom:10px;"><strong>Caveat:</strong> Forecasts assume the last 7 days' pace continues. Use as a directional indicator, not a guarantee.</p>

      <div style="background:#f0f5ff;border:1px solid #d0dffa;border-radius:8px;padding:14px;margin-bottom:1rem;">
        <div style="font-size:13px;font-weight:600;color:#1a3fa0;margin-bottom:8px;">📅 Next 7 days (at current pace)</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Projected loss</div>
            <div style="font-size:20px;font-weight:600;color:var(--red);">${fi(next7LS)}</div>
          </div>
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Projected walkins</div>
            <div style="font-size:20px;font-weight:600;color:var(--blue);">${fi(next7W)}</div>
          </div>
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Daily avg loss</div>
            <div style="font-size:20px;font-weight:600;">${dailyLS.toFixed(1)}</div>
          </div>
        </div>
      </div>

      <div style="background:#fff8e6;border:1px solid #f0d68a;border-radius:8px;padding:14px;">
        <div style="font-size:13px;font-weight:600;color:#a05d0a;margin-bottom:8px;">📅 Month-end projection (${daysRemaining} days remaining)</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Total loss (month)</div>
            <div style="font-size:20px;font-weight:600;color:var(--red);">${fi(projectedLS)}</div>
          </div>
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Total walkins</div>
            <div style="font-size:20px;font-weight:600;color:var(--blue);">${fi(projectedW)}</div>
          </div>
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Total bills</div>
            <div style="font-size:20px;font-weight:600;color:var(--green);">${fi(projectedB)}</div>
          </div>
          <div style="background:#fff;border-radius:6px;padding:8px;text-align:center;">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;">Coverage%</div>
            <div style="font-size:20px;font-weight:600;color:${projectedCov>=50?'var(--green)':projectedCov>=25?'var(--amber)':'var(--red)'};">${projectedCov}%</div>
          </div>
        </div>
      </div>
    `;
  }

  // ════════ BUILD COLLAPSIBLE SECTIONS ══════════════════════
  const detailsBlock=(emoji,title,subtitle,html,defaultOpen)=>`
    <details ${defaultOpen?'open':''} style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.75rem;">
      <summary style="cursor:pointer;padding:14px 18px;font-weight:600;font-size:14px;list-style:none;display:flex;justify-content:space-between;align-items:center;">
        <span>${emoji} ${title}</span>
        <span style="font-size:11px;color:var(--muted);font-weight:400;">${subtitle}</span>
      </summary>
      <div style="padding:0 18px 18px 18px;border-top:1px solid var(--border);">
        ${html}
      </div>
    </details>
  `;

  return`
    <div style="background:#fafbfd;border:1px solid var(--border);border-radius:10px;padding:6px 14px;margin-top:1.5rem;margin-bottom:.5rem;">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">📊 Deep diagnostics — click any section to expand</div>
    </div>
    ${detailsBlock('🎭','Behavioral patterns',`${aRedFlagCount} flagged staff · phone-quality concentration`,aHtml,false)}
    ${detailsBlock('👤','Customer intelligence',`${chronicNonBuyers.length} chronic non-buyers · ${fi(highIntentRepeat)} high-intent lost`,cHtml,false)}
    ${detailsBlock('📦','Product / SKU patterns',`${repeatProducts.length} repeating product losses · hot attributes`,dHtml,false)}
    ${detailsBlock('📉','Operational drift',`${staleStores.length} stale stores · reason mix shifts · coverage trend`,eHtml,false)}
    ${detailsBlock('🔮','Forecast (next 7 days + month-end)',`directional projection based on last 7 days pace`,forecastHTML,false)}
  `;
}

// ── LOSS DETAIL TAB ───────────────────────────────────────
function renderLossDetail(){
  const f=getFilters();
  const rows=filterLS(f);
  const total=rows.length;
  const{storeIdx,reasonIdx,catIdx,qtyIdx,valIdx,dateIdx}=_LS_IDX;
  const totalQty=qtyIdx>=0?rows.reduce((s,r)=>s+n(r[qtyIdx]),0):0;
  const totalVal=valIdx>=0?rows.reduce((s,r)=>s+n(r[valIdx]),0):0;
  const allDKs=_LS_ROWS.map(r=>{const dk=toDayKey(r[dateIdx]);return dk;}).filter(Boolean);
  const latestInSheet=allDKs.length?allDKs.reduce((a,b)=>a>b?a:b):null;
  const earliestInSheet=allDKs.length?allDKs.reduce((a,b)=>a<b?a:b):null;
  const lastWkDay=_WK&&_WK.days.length?_WK.days[_WK.days.length-1]:null;
  const firstWkDay=_WK&&_WK.days.length?_WK.days[0]:null;
  const excluded=_LS_ROWS.filter(r=>r._dk&&!r._syncedDk).length;

  function grp(getKey){const m={};rows.forEach(r=>{const k=String(getKey(r)||'Unknown');if(!m[k])m[k]={c:0,q:0,v:0};m[k].c++;if(qtyIdx>=0)m[k].q+=n(r[qtyIdx]);if(valIdx>=0)m[k].v+=n(r[valIdx]);});return Object.entries(m).sort((a,b)=>b[1].c-a[1].c);}
  const rmGrp=grp(r=>r._rm||'Unknown');
  const mktGrp=grp(r=>r._wkStore?r._wkStore.market:'Unknown');
  const sGrp=grp(r=>storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown');
  const stAlert=sh=>sh>=10?'<span class="badge badge-red">High</span>':sh>=5?'<span class="badge badge-amber">Watch</span>':'<span class="badge badge-green">OK</span>';
  const mkHdr=n=>['Name','Count',...(qtyIdx>=0?['Qty']:[]),...(valIdx>=0?['Value']:[]),'Share%','Alert'].map((h,i)=>i===0?n:h);
  const ftr=()=>['Total',fi(total),...(qtyIdx>=0?[fi(totalQty)]:[]),...(valIdx>=0?[`₹${fs(totalVal)}`]:[]),'100%',''];

// ── CATEGORY ANALYSIS TAB ────────────────────────────────
function renderCatAnalysis(){
  const f=getFilters();
  const rows=filterLS(f);
  const total=rows.length;
  const{catIdx,reasonIdx,storeIdx,sizeIdx,styleIdx,subCatIdx,colorIdx,polishIdx,designIdx,notesIdx}=_LS_IDX;

  if(!total){
    document.getElementById('cat').innerHTML=`<div class="err-card">No loss of sale data for the selected filters.</div>`;
    return;
  }

  // ── GROUP HELPERS ─────────────────────────────────────────
  function grp(rows,getKey){
    const m={};
    rows.forEach(r=>{
      const k=String(getKey(r)||'Unknown');
      if(!m[k])m[k]={c:0,stores:new Set(),reasons:{},sizes:{},styles:{},cats:{}};
      m[k].c++;
      const store=storeIdx>=0?String(r[storeIdx]||''):'';
      if(store)m[k].stores.add(store);
      const reason=reasonIdx>=0?String(r[reasonIdx]||''):'';
      if(reason)m[k].reasons[reason]=(m[k].reasons[reason]||0)+1;
      const size=sizeIdx>=0?String(r[sizeIdx]||''):'';
      if(size)m[k].sizes[size]=(m[k].sizes[size]||0)+1;
      const style=styleIdx>=0?String(r[styleIdx]||''):'';
      if(style)m[k].styles[style]=(m[k].styles[style]||0)+1;
      const cat=catIdx>=0?String(r[catIdx]||''):'';
      if(cat)m[k].cats[cat]=(m[k].cats[cat]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>b[1].c-a[1].c);
  }

  function topN(obj,n){return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([k,v])=>`${k}(${v})`).join(', ');}

  // ── MARKET → CATEGORY BREAKDOWN ──────────────────────────
  const markets=[...new Set(rows.map(r=>r._wkStore?r._wkStore.market:'Unknown').filter(Boolean))].sort();

  // Overall category summary
  const catGrp=grp(rows,r=>catIdx>=0?r[catIdx]:'Unknown');
  const reasonGrp=grp(rows,r=>reasonIdx>=0?r[reasonIdx]:'Unknown');
  const sizeGrp=grp(rows,r=>sizeIdx>=0?r[sizeIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');
  const styleGrp=grp(rows,r=>styleIdx>=0?r[styleIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');
  const subCatGrp=grp(rows,r=>subCatIdx>=0?r[subCatIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');

  // Market wise category matrix
  const mktCatMap={};
  rows.forEach(r=>{
    const mkt=r._wkStore?r._wkStore.market:'Unknown';
    const cat=catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown';
    const reason=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';
    const size=sizeIdx>=0?String(r[sizeIdx]||''):'';
    if(!mktCatMap[mkt])mktCatMap[mkt]={total:0,cats:{},reasons:{},sizes:{}};
    mktCatMap[mkt].total++;
    mktCatMap[mkt].cats[cat]=(mktCatMap[mkt].cats[cat]||0)+1;
    mktCatMap[mkt].reasons[reason]=(mktCatMap[mkt].reasons[reason]||0)+1;
    if(size)mktCatMap[mkt].sizes[size]=(mktCatMap[mkt].sizes[size]||0)+1;
  });
  const mktArr=Object.entries(mktCatMap).sort((a,b)=>b[1].total-a[1].total);

  // Category × Reason cross table
  const allCats=[...new Set(rows.map(r=>catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown'))].filter(c=>c!=='Unknown').sort();
  const allReasons=[...new Set(rows.map(r=>reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown'))].filter(r=>r!=='Unknown').sort();
  const crossMap={};
  rows.forEach(r=>{
    const cat=catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown';
    const reason=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';
    if(!crossMap[cat])crossMap[cat]={};
    crossMap[cat][reason]=(crossMap[cat][reason]||0)+1;
  });

  const prAlert=sh=>sh>=30?'<span class="badge badge-red">High</span>':sh>=15?'<span class="badge badge-amber">Medium</span>':'<span class="badge badge-green">Low</span>';
  const stAlert=sh=>sh>=10?'<span class="badge badge-red">High</span>':sh>=5?'<span class="badge badge-amber">Watch</span>':'<span class="badge badge-green">OK</span>';

  // Cache for the 4 clickable metric-card modals
  window._catCtx={rows,total,catGrp,reasonGrp,mktArr,subCatGrp,sizeGrp,styleGrp};

  document.getElementById('cat').innerHTML=`
    <div style="background:linear-gradient(135deg,#fff8e6 0%,#fff 100%);border:1px solid #f0d68a;border-left:4px solid var(--amber);border-radius:10px;padding:14px 18px;margin-bottom:1.25rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">🏷️ Category Analysis</div>
      <div style="font-size:12px;color:var(--muted);">Click any reason or category below to drill: <strong>Reason → Stores → Category → Other Reasons & Staff</strong></div>
    </div>

    <div class="metrics" style="cursor:pointer;">
      <div class="metric clickable-card" title="Click to see all loss entries breakdown" onclick="showCatTotalModal()"><div class="lbl">Total loss entries</div><div class="val">${fi(total)}</div><div class="sub">filtered · click to drill down</div></div>
      <div class="metric red clickable-card" title="Click to see categories list" onclick="showCatListModal()"><div class="lbl">Categories affected</div><div class="val">${catGrp.length}</div><div class="sub">click to view list</div></div>
      <div class="metric amber clickable-card" title="Click to see reasons list" onclick="showCatReasonsModal()"><div class="lbl">Unique reasons</div><div class="val">${reasonGrp.length}</div><div class="sub">click to view list</div></div>
      <div class="metric clickable-card" title="Click to see markets list" onclick="showCatMarketsModal()"><div class="lbl">Markets affected</div><div class="val">${mktArr.length}</div><div class="sub">click to view list</div></div>
    </div>

    <!-- ═══════ MAIN ANALYSIS (Reason I + Reason J + Category) ═══════ -->
    <div style="background:#f5f0ff;border:1px solid #e0d4f7;border-radius:10px;padding:6px 14px;margin-top:1rem;margin-bottom:.5rem;">
      <div style="font-size:11px;font-weight:600;color:#5a3da0;text-transform:uppercase;letter-spacing:.5px;">🎯 Main analysis — click any row to drill to stores</div>
    </div>

    <!-- REASON SUMMARY (col I) -->
    <div class="card">
      <div class="card-title">By reason of loss (col I) — click to drill: stores → category → other reasons & staff</div>
      ${sortableTbl(
        ['Reason of loss (col I)','Count','Stores affected','Top category','Top size','Share%','Alert'],
        reasonGrp.map(([k,v])=>{
          const sh=pct(v.c,total);
          const topC=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
          const topSz=Object.entries(v.sizes).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[
            `<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','I')">${k}</span>`,
            fi(v.c),fi(v.stores.size),
            topC?topC[0]:'—',
            topSz?`${topSz[0]}(${topSz[1]})`:'—',
            `${sh}%`,prAlert(sh)
          ]};
        }),
        ['Total',fi(total),'','','','100%','']
      )}
    </div>

    <!-- SPECIFIC REASON SUMMARY (col J) -->
    ${(()=>{
      const subRIdx=_LS_IDX.subReasonIdx;
      if(subRIdx<0||subRIdx===reasonIdx)return ''; // no col J or it's the same as col I
      const subMap={};
      rows.forEach(r=>{
        const v=String(r[subRIdx]||'').trim()||'(blank)';
        if(!subMap[v])subMap[v]={c:0,stores:new Set(),cats:{},broadReasons:{}};
        subMap[v].c++;
        const store=storeIdx>=0?String(r[storeIdx]||''):'';
        if(store)subMap[v].stores.add(store);
        const cat=catIdx>=0?String(r[catIdx]||''):'';
        if(cat)subMap[v].cats[cat]=(subMap[v].cats[cat]||0)+1;

      });
      const subGrp=Object.entries(subMap).sort((a,b)=>b[1].c-a[1].c);
      if(!subGrp.length)return '';
      return`<div class="card">
        <div class="card-title">By specific reason (col J) — click to drill: stores → category → other reasons & staff</div>
        ${sortableTbl(
          ['Specific reason (col J)','Count','Stores affected','Top broad reason (col I)','Top category','Share%','Alert'],
          subGrp.map(([k,v])=>{
            const sh=pct(v.c,total);
            const topBR=Object.entries(v.broadReasons).sort((a,b)=>b[1]-a[1])[0];

            return{cells:[
              `<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','J')">${k}</span>`,

              topBR?`${topBR[0]} (${topBR[1]})`:'—',
              topC?`${topC[0]} (${topC[1]})`:'—',
              `${sh}%`,
              prAlert(sh)

          }),
          ['Total',fi(total),'','','','100%','']
        )}
      </div>`;
    })()}

    <!-- CATEGORY SUMMARY -->
    <div class="card">
      <div class="card-title">By category — click for market breakdown</div>

          const sh=pct(v.c,total);
          const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
          const topSz=Object.entries(v.sizes).sort((a,b)=>b[1]-a[1])[0];
          const topSt=Object.entries(v.styles).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[
            `<span class="clickable" onclick="showCatDetailModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
            fi(v.c),fi(v.stores.size),
            topR?topR[0]:'—',
            topSz?`${topSz[0]}(${topSz[1]})`:'—',
            topSt?`${topSt[0]}(${topSt[1]})`:'—',
            `${sh}%`,prAlert(sh)
          ]};
        }),
        ['Total',fi(total),'','','','','100%','']
      )}
    </div>

    <!-- ═══════ DEEPER BREAKDOWNS ═══════ -->
    <div style="background:#f0f0f0;border:1px solid #d8d8d8;border-radius:10px;padding:6px 14px;margin-top:1.5rem;margin-bottom:.5rem;">

    </div>

      <div class="card-title">Market-wise category impact — click market for drill-down</div>

          const topSize=Object.entries(v.sizes).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[
            `<span class="clickable" onclick="showCatMarketModal('${mkt.replace(/'/g,"\\'")}')">${mkt}</span>`,
            fi(v.total),
            topCat?topCat[0]:'—',
            topCat?`<span class="badge ${topCat[1]/v.total>=.3?'badge-red':topCat[1]/v.total>=.15?'badge-amber':'badge-green'}">${pct(topCat[1],v.total)}%</span>`:'—',
            topReason?topReason[0]:'—',
            topReason?`<span class="badge ${topReason[1]/v.total>=.3?'badge-red':topReason[1]/v.total>=.15?'badge-amber':'badge-green'}">${pct(topReason[1],v.total)}%</span>`:'—',
            topSize?`${topSize[0]} (${topSize[1]})`:'—'
          ]};
        }),
        ['Total',fi(total),'','','','','']
      )}

    <!-- SIZE / STYLE / SUB-CAT (only if data exists) -->
    ${sizeGrp.length?`<div class="card">
      <div class="card-title">Size-wise loss</div>
      ${sortableTbl(
        ['Size','Count','Top category','Top reason','Share%','Alert'],
        sizeGrp.map(([k,v])=>{
          const sh=pct(v.c,total);
          const topC=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
          const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[k,fi(v.c),topC?topC[0]:'—',topR?topR[0]:'—',`${sh}%`,prAlert(sh)]};

      )}

    ${styleGrp.length?`<div class="card">
      <div class="card-title">Style-wise loss</div>
      ${sortableTbl(
        ['Style','Count','Top category','Top reason','Share%','Alert'],

            <td><strong>${fi(catTotal)}</strong></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  setTimeout(()=>makeSortable('cross-tbl'),50);
}
