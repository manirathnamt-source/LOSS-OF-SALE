// ── WEEK-ON-WEEK COMPARISON ───────────────────────────────
// Buckets LS rows into ISO weeks (Mon-start). Groups by RM / CM / Store with WoW % change.
function getWeekKey(dk){
  // dk = "YYYY-MM-DD" → returns "YYYY-Www" using ISO week
  if(!dk)return null;
  const d=new Date(dk+'T00:00:00');
  if(isNaN(d))return null;
  // ISO week calculation
  const target=new Date(d.valueOf());
  const dayNr=(d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  const firstThursday=target.valueOf();
  target.setMonth(0,1);
  if(target.getDay()!==4)target.setMonth(0,1+((4-target.getDay())+7)%7);
  const wk=1+Math.ceil((firstThursday-target)/(7*24*3600*1000));
  return`${d.getFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function getWeekRange(weekKey){
  // Returns "DD MMM – DD MMM" for the given ISO week
  const m=weekKey.match(/^(\d{4})-W(\d{2})$/);
  if(!m)return weekKey;
  const year=parseInt(m[1]),wk=parseInt(m[2]);
  // Jan 4 is always in week 1
  const jan4=new Date(year,0,4);
  const jan4Day=(jan4.getDay()+6)%7;
  const week1Mon=new Date(jan4);
  week1Mon.setDate(jan4.getDate()-jan4Day);
  const monday=new Date(week1Mon);
  monday.setDate(week1Mon.getDate()+(wk-1)*7);
  const sunday=new Date(monday);
  sunday.setDate(monday.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
  return`${fmt(monday)} – ${fmt(sunday)}`;
}
// Mode for the Weekly tab: 'loss' (entries) | 'walkins' | 'both' (side-by-side per cell)
let _wklyMetric='loss';
window.setWklyMetric=function(m){_wklyMetric=m;renderWeekly();};

// ── Reusable weekly-comparison helpers (used by both the Weekly tab and the drill-down modal) ──
function _weeklyBuildRows(weeks,dim,src){
  const allKeys=new Set();
  weeks.forEach(w=>{if(src[w])Object.keys(src[w][dim]).forEach(k=>allKeys.add(k));});
  return[...allKeys].map(k=>{
    const counts=weeks.map(w=>src[w]&&src[w][dim]?src[w][dim][k]||0:0);
    const prev=counts[counts.length-2]||0;
    const curr=counts[counts.length-1]||0;
    const total=counts.reduce((a,b)=>a+b,0);
    const wowDelta=curr-prev;
    const wowPct=prev>0?Math.round((curr-prev)/prev*100):(curr>0?100:0);
    return{key:k,counts,total,prev,curr,wowDelta,wowPct};
  }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
}
function _weeklyWowBadge(delta,pct,upGood){
  if(delta===0)return'<span class="badge" style="background:#f0f0f0;color:var(--muted);">→ 0</span>';
  const isUp=delta>0;
  const isGood=upGood===isUp;
  const cls=isGood?'badge-green':'badge-red';
  const arrow=isUp?'▲ +':'▼ ';
  return`<span class="badge ${cls}">${arrow}${Math.abs(delta)} (${pct>0?'+':''}${pct}%)</span>`;
}
function _weeklyBuildTable(label,dim,clickFn,ctx){
  const{weeks,byWeekLoss,byWeekWk,byWeekPurp,metric}=ctx;
  const isLoss=metric==='loss';
  const isWalkin=metric==='walkins';
  const isBoth=metric==='both';
  const isPurpose=metric==='purpose';
  const overallIncreaseGood=isWalkin||isPurpose;
  if(isBoth){
    const lossRows=_weeklyBuildRows(weeks,dim,byWeekLoss);
    const wkRowsAll=_weeklyBuildRows(weeks,dim,byWeekWk);
    const wkMap=Object.fromEntries(wkRowsAll.map(r=>[r.key,r]));
    const lossMap=Object.fromEntries(lossRows.map(r=>[r.key,r]));
    const allKeys=[...new Set([...lossRows.map(r=>r.key),...wkRowsAll.map(r=>r.key)])];
    if(!allKeys.length)return'';
    const headers=[label,...weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">Loss / Walkins</span></span>`),'Loss total','Walkin total','Loss-cov%','WoW Loss','WoW Walkins'];
    const tblRows=allKeys.map(k=>{
      const L=lossMap[k]||{counts:weeks.map(()=>0),total:0,prev:0,curr:0,wowDelta:0,wowPct:0};
      const W=wkMap[k]||{counts:weeks.map(()=>0),total:0,prev:0,curr:0,wowDelta:0,wowPct:0};
      const cov=W.total>0?Math.round(L.total/W.total*100):0;
      return{cells:[
        clickFn?`<span class="clickable" onclick="${clickFn(k)}">${k}</span>`:`<strong>${k}</strong>`,
        ...weeks.map((_,i)=>{
          const l=L.counts[i]||0;const w=W.counts[i]||0;
          const c=w>0?Math.round(l/w*100):0;
          return`<span style="font-weight:600;color:var(--red)">${fi(l)}</span> <span style="font-size:10px;color:var(--muted)">/</span> <span style="font-weight:600;color:var(--blue)">${fi(w)}</span><br><span style="font-size:10px;color:${c>=40?'var(--green)':c>=25?'var(--amber)':'var(--red)'};font-weight:600;">${c}%</span>`;
        }),
        `<strong style="color:var(--red)">${fi(L.total)}</strong>`,
        `<strong style="color:var(--blue)">${fi(W.total)}</strong>`,
        `<span class="badge ${cov>=40?'badge-hi':cov>=25?'badge-mid':'badge-lo'}">${cov}%</span>`,
        _weeklyWowBadge(L.wowDelta,L.wowPct,false),
        _weeklyWowBadge(W.wowDelta,W.wowPct,true)
      ]};
    }).sort((a,b)=>{
      const aT=parseInt(String(a.cells[allKeys.length+1]).replace(/[^\d]/g,''))||0;
      const bT=parseInt(String(b.cells[allKeys.length+1]).replace(/[^\d]/g,''))||0;
      return bT-aT;
    });
    const totalsL=weeks.map(w=>byWeekLoss[w]?.total||0);
    const totalsW=weeks.map(w=>byWeekWk[w]?.total||0);
    const tL=totalsL.reduce((a,b)=>a+b,0);
    const tW=totalsW.reduce((a,b)=>a+b,0);
    const tCov=tW>0?Math.round(tL/tW*100):0;
    const totFooter=['Total',
      ...weeks.map((_,i)=>{const c=totalsW[i]>0?Math.round(totalsL[i]/totalsW[i]*100):0;return`<span style="font-weight:700;color:var(--red)">${fi(totalsL[i])}</span> / <span style="font-weight:700;color:var(--blue)">${fi(totalsW[i])}</span><br><span style="font-size:10px;color:${c>=40?'var(--green)':c>=25?'var(--amber)':'var(--red)'};font-weight:600;">${c}%</span>`;}),
      fi(tL),fi(tW),`<span class="badge ${tCov>=40?'badge-hi':tCov>=25?'badge-mid':'badge-lo'}">${tCov}%</span>`,
      _weeklyWowBadge((totalsL[totalsL.length-1]||0)-(totalsL[totalsL.length-2]||0),(totalsL[totalsL.length-2]||0)>0?Math.round(((totalsL[totalsL.length-1]||0)-(totalsL[totalsL.length-2]||0))/(totalsL[totalsL.length-2]||0)*100):0,false),
      _weeklyWowBadge((totalsW[totalsW.length-1]||0)-(totalsW[totalsW.length-2]||0),(totalsW[totalsW.length-2]||0)>0?Math.round(((totalsW[totalsW.length-1]||0)-(totalsW[totalsW.length-2]||0))/(totalsW[totalsW.length-2]||0)*100):0,true)
    ];
    return`<div class="card"><div class="card-title">By ${label.toLowerCase()} (${allKeys.length}) — Loss / Walkins side-by-side with conversion %</div>
      ${sortableTbl(headers,tblRows,totFooter)}
    </div>`;
  }
  if(isPurpose){
    const lossRows=_weeklyBuildRows(weeks,dim,byWeekLoss);
    const purpRows=_weeklyBuildRows(weeks,dim,byWeekPurp);
    const lossMap=Object.fromEntries(lossRows.map(r=>[r.key,r]));
    const purpMap=Object.fromEntries(purpRows.map(r=>[r.key,r]));
    const allKeys=[...new Set([...lossRows.map(r=>r.key),...purpRows.map(r=>r.key)])];
    if(!allKeys.length)return'';
    const headers=[label,...weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">With purpose / Loss</span></span>`),'Captured','Loss total','Capture%','WoW Capture%'];
    const tblRows=allKeys.map(k=>{
      const L=lossMap[k]||{counts:weeks.map(()=>0),total:0};
      const P=purpMap[k]||{counts:weeks.map(()=>0),total:0};
      const cap=L.total>0?Math.round(P.total/L.total*100):0;
      const lastL=L.counts[L.counts.length-1]||0;
      const prevL=L.counts[L.counts.length-2]||0;
      const lastP=P.counts[P.counts.length-1]||0;
      const prevP=P.counts[P.counts.length-2]||0;
      const lastCap=lastL>0?Math.round(lastP/lastL*100):0;
      const prevCap=prevL>0?Math.round(prevP/prevL*100):0;
      const capDelta=lastCap-prevCap;
      return{cells:[
        clickFn?`<span class="clickable" onclick="${clickFn(k)}">${k}</span>`:`<strong>${k}</strong>`,
        ...weeks.map((_,i)=>{
          const l=L.counts[i]||0;const p=P.counts[i]||0;
          const c=l>0?Math.round(p/l*100):0;
          return`<span style="font-weight:600;color:var(--green)">${fi(p)}</span> <span style="font-size:10px;color:var(--muted)">/</span> <span style="font-weight:600;color:var(--red)">${fi(l)}</span><br><span style="font-size:10px;color:${c>=70?'var(--green)':c>=30?'var(--amber)':'var(--red)'};font-weight:600;">${l>0?c+'%':'—'}</span>`;
        }),
        `<strong style="color:var(--green)">${fi(P.total)}</strong>`,
        `<strong style="color:var(--red)">${fi(L.total)}</strong>`,
        `<span class="badge ${cap>=70?'badge-green':cap>=30?'badge-amber':'badge-red'}">${cap}%</span>`,
        (function(){
          if(prevL===0&&lastL===0)return'<span class="badge" style="background:#f0f0f0;color:var(--muted);">—</span>';
          const arrow=capDelta>0?'▲ +':capDelta<0?'▼ ':'→ ';
          const cls=capDelta>0?'badge-green':capDelta<0?'badge-red':'';
          return`<span class="badge ${cls}" style="${capDelta===0?'background:#f0f0f0;color:var(--muted);':''}">${arrow}${Math.abs(capDelta)} pts</span>`;
        })()
      ]};
    }).sort((a,b)=>{
      const ax=String(a.cells[weeks.length+3]).match(/(-?\d+)/);
      const bx=String(b.cells[weeks.length+3]).match(/(-?\d+)/);
      return(ax?+ax[1]:0)-(bx?+bx[1]:0);
    });
    const totalsL=weeks.map(w=>byWeekLoss[w]?.total||0);
    const totalsP=weeks.map(w=>byWeekPurp[w]?.total||0);
    const tL=totalsL.reduce((a,b)=>a+b,0);
    const tP=totalsP.reduce((a,b)=>a+b,0);
    const tCap=tL>0?Math.round(tP/tL*100):0;
    const lastL=totalsL[totalsL.length-1]||0,prevL=totalsL[totalsL.length-2]||0;
    const lastP=totalsP[totalsP.length-1]||0,prevP=totalsP[totalsP.length-2]||0;
    const lastCap=lastL>0?Math.round(lastP/lastL*100):0;
    const prevCap=prevL>0?Math.round(prevP/prevL*100):0;
    const capDelta=lastCap-prevCap;
    const arrow=capDelta>0?'▲ +':capDelta<0?'▼ ':'→ ';
    const cls=capDelta>0?'badge-green':capDelta<0?'badge-red':'';
    const totFooter=['Total',
      ...weeks.map((_,i)=>{const c=totalsL[i]>0?Math.round(totalsP[i]/totalsL[i]*100):0;return`<span style="font-weight:700;color:var(--green)">${fi(totalsP[i])}</span> / <span style="font-weight:700;color:var(--red)">${fi(totalsL[i])}</span><br><span style="font-size:10px;color:${c>=70?'var(--green)':c>=30?'var(--amber)':'var(--red)'};font-weight:600;">${totalsL[i]>0?c+'%':'—'}</span>`;}),
      fi(tP),fi(tL),`<span class="badge ${tCap>=70?'badge-green':tCap>=30?'badge-amber':'badge-red'}">${tCap}%</span>`,
      `<span class="badge ${cls}" style="${capDelta===0?'background:#f0f0f0;color:var(--muted);':''}">${arrow}${Math.abs(capDelta)} pts</span>`
    ];
    return`<div class="card"><div class="card-title">By ${label.toLowerCase()} (${allKeys.length}) — Purpose collection (worst capture% first)</div>
      ${sortableTbl(headers,tblRows,totFooter)}
    </div>`;
  }
  // Single-metric view (loss or walkin)
  const src=isLoss?byWeekLoss:byWeekWk;
  const dimRows=_weeklyBuildRows(weeks,dim,src);
  if(!dimRows.length)return'';
  const headers=[label,...weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}</span>`),'Total','WoW Δ (last vs prev)'];
  const tblRows=dimRows.map(r=>({
    cells:[
      clickFn?`<span class="clickable" onclick="${clickFn(r.key)}">${r.key}</span>`:`<strong>${r.key}</strong>`,
      ...r.counts.map(c=>fi(c)),
      `<strong>${fi(r.total)}</strong>`,
      _weeklyWowBadge(r.wowDelta,r.wowPct,overallIncreaseGood)
    ]
  }));
  const totals=weeks.map(w=>src[w]?.total||0);
  const totFooter=['Total',...totals.map(c=>fi(c)),fi(totals.reduce((a,b)=>a+b,0)),_weeklyWowBadge(totals[totals.length-1]-totals[totals.length-2],totals[totals.length-2]>0?Math.round((totals[totals.length-1]-totals[totals.length-2])/totals[totals.length-2]*100):0,overallIncreaseGood)];
  return`<div class="card"><div class="card-title">By ${label.toLowerCase()} (${dimRows.length})</div>
    ${sortableTbl(headers,tblRows,totFooter)}
  </div>`;
}
// Bucket loss-rows + walkin-stores into week-keyed maps by RM/Cluster/Market/Store/Reason
function _weeklyBuildBuckets(lsRows,wkStores,f){
  const{storeIdx,purposeIdx,reasonIdx}=_LS_IDX;
  const byWeekLoss={};
  const byWeekPurp={};
  lsRows.forEach(r=>{
    const wk=getWeekKey(r._dk);
    if(!wk)return;
    if(!byWeekLoss[wk])byWeekLoss[wk]={total:0,byRM:{},byCluster:{},byMarket:{},byStore:{},byReason:{}};
    byWeekLoss[wk].total++;
    const rm=r._rm||'Unknown';
    byWeekLoss[wk].byRM[rm]=(byWeekLoss[wk].byRM[rm]||0)+1;
    const ws=r._wkStore;
    const cluster=ws?ws.cluster:'(unsynced)';
    const market=ws?ws.market:'(unsynced)';
    byWeekLoss[wk].byCluster[cluster]=(byWeekLoss[wk].byCluster[cluster]||0)+1;
    byWeekLoss[wk].byMarket[market]=(byWeekLoss[wk].byMarket[market]||0)+1;
    const store=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    byWeekLoss[wk].byStore[store]=(byWeekLoss[wk].byStore[store]||0)+1;
    const reason=reasonIdx>=0?(String(r[reasonIdx]||'').trim()||'(blank)'):'(blank)';
    byWeekLoss[wk].byReason[reason]=(byWeekLoss[wk].byReason[reason]||0)+1;
    if(purposeIdx>=0&&String(r[purposeIdx]||'').trim()){
      if(!byWeekPurp[wk])byWeekPurp[wk]={total:0,byRM:{},byCluster:{},byMarket:{},byStore:{},byReason:{}};
      byWeekPurp[wk].total++;
      byWeekPurp[wk].byRM[rm]=(byWeekPurp[wk].byRM[rm]||0)+1;
      byWeekPurp[wk].byCluster[cluster]=(byWeekPurp[wk].byCluster[cluster]||0)+1;
      byWeekPurp[wk].byMarket[market]=(byWeekPurp[wk].byMarket[market]||0)+1;
      byWeekPurp[wk].byStore[store]=(byWeekPurp[wk].byStore[store]||0)+1;
      byWeekPurp[wk].byReason[reason]=(byWeekPurp[wk].byReason[reason]||0)+1;
    }
  });
  const byWeekWk={};
  wkStores.forEach(s=>{
    s.days.forEach(d=>{
      if(!dateInRange(d.dk,f))return;
      const wk=getWeekKey(d.dk);
      if(!wk)return;
      if(!byWeekWk[wk])byWeekWk[wk]={total:0,byRM:{},byCluster:{},byMarket:{},byStore:{},byReason:{}};
      byWeekWk[wk].total+=d.w;
      byWeekWk[wk].byRM[s.rm]=(byWeekWk[wk].byRM[s.rm]||0)+d.w;
      byWeekWk[wk].byCluster[s.cluster]=(byWeekWk[wk].byCluster[s.cluster]||0)+d.w;
      byWeekWk[wk].byMarket[s.market]=(byWeekWk[wk].byMarket[s.market]||0)+d.w;
      byWeekWk[wk].byStore[s.outlet]=(byWeekWk[wk].byStore[s.outlet]||0)+d.w;
    });
  });
  const weeks=[...new Set([...Object.keys(byWeekLoss),...Object.keys(byWeekWk)])].sort();
  return{weeks,byWeekLoss,byWeekWk,byWeekPurp};
}

// Drill-down: store-wise weekly comparison for a single Market / Cluster / RM
window.showWeeklyDrill=function(scope,value){
  const f=getFilters();
  // Scope down loss rows + walkin stores to the chosen market/cluster/rm
  const isMarket=scope==='market',isCluster=scope==='cluster',isRm=scope==='rm';
  const lsRows=filterLS(f).filter(r=>{
    const ws=r._wkStore;
    if(isMarket){const v=ws?ws.market:'(unsynced)';return v===value;}
    if(isCluster){const v=ws?ws.cluster:'(unsynced)';return v===value;}
    if(isRm)return(r._rm||'Unknown')===value;
    return true;
  });
  const wkStores=filterStores(_WK.stores,f).filter(s=>{
    if(isMarket)return s.market===value;
    if(isCluster)return s.cluster===value;
    if(isRm)return s.rm===value;
    return true;
  });
  const ctx=_weeklyBuildBuckets(lsRows,wkStores,f);
  ctx.metric=_wklyMetric;
  const{weeks}=ctx;
  if(weeks.length<2){
    openModal(`📅 ${value} — store-wise weekly`,`${scope.toUpperCase()} · only ${weeks.length} week${weeks.length===1?'':'s'} of data — need ≥2 for WoW comparison.`,
      `<p class="muted-note" style="padding:1rem;">Not enough weeks of data within this ${scope}.</p>`);
    return;
  }
  // Summary row
  const totalAllLoss=weeks.reduce((s,w)=>s+(ctx.byWeekLoss[w]?.total||0),0);
  const totalAllWk=weeks.reduce((s,w)=>s+(ctx.byWeekWk[w]?.total||0),0);
  const totalAllPurp=weeks.reduce((s,w)=>s+(ctx.byWeekPurp[w]?.total||0),0);
  const lastL=ctx.byWeekLoss[weeks[weeks.length-1]]?.total||0;
  const prevL=ctx.byWeekLoss[weeks[weeks.length-2]]?.total||0;
  const dLoss=lastL-prevL;
  const lastW=ctx.byWeekWk[weeks[weeks.length-1]]?.total||0;
  const prevW=ctx.byWeekWk[weeks[weeks.length-2]]?.total||0;
  const dWk=lastW-prevW;
  const cap=totalAllLoss>0?Math.round(totalAllPurp/totalAllLoss*100):0;
  const scopeStores=new Set();
  wkStores.forEach(s=>scopeStores.add(s.outlet));
  const subline=`${scopeStores.size} stores · ${weeks.length} weeks (${getWeekRange(weeks[0])} → ${getWeekRange(weeks[weeks.length-1])}) · Mode: ${_wklyMetric}`;
  const summary=`
    <div class="metrics" style="margin-bottom:1rem;">
      <div class="metric red"><div class="lbl">Loss entries</div><div class="val">${fi(totalAllLoss)}</div><div class="sub">Latest ${fi(lastL)} · Δ ${dLoss>0?'+':''}${fi(dLoss)}</div></div>
      <div class="metric blue"><div class="lbl">Walkins</div><div class="val">${fi(totalAllWk)}</div><div class="sub">Latest ${fi(lastW)} · Δ ${dWk>0?'+':''}${fi(dWk)}</div></div>
      <div class="metric amber"><div class="lbl">Loss-cov%</div><div class="val">${totalAllWk>0?Math.round(totalAllLoss/totalAllWk*100):0}%</div><div class="sub">loss / walkins</div></div>
      <div class="metric ${cap>=70?'green':cap>=30?'amber':'red'}"><div class="lbl">Purpose capture</div><div class="val">${cap}%</div><div class="sub">${fi(totalAllPurp)} of ${fi(totalAllLoss)}</div></div>
    </div>`;
  const tbl=_weeklyBuildTable('Store','byStore',k=>`showStoreModal('${k.replace(/'/g,"\\'")}')`,ctx);
  // Reason breakdown for the scoped subset — always loss mode
  const reasonCtx={weeks,byWeekLoss:ctx.byWeekLoss,byWeekWk:ctx.byWeekWk,byWeekPurp:ctx.byWeekPurp,metric:'loss'};
  const reasonTbl=_weeklyBuildTable('Reason','byReason',null,reasonCtx);
  const reasonSection=reasonTbl?`<div class="section-lbl" style="margin-top:14px;">📋 Loss reasons week-over-week — within this ${scope}</div>${reasonTbl}`:'';
  openModal(`📅 ${value} — store-wise weekly comparison`,subline,summary+(tbl||'<p class="muted-note">No store-level data in this scope.</p>')+reasonSection);
};

// Drill into a single reason — show stores + week-by-week count for that reason
window.showWeeklyReasonModal=function(reason){
  const f=getFilters();
  const{reasonIdx,storeIdx}=_LS_IDX;
  if(reasonIdx<0){openModal(`📋 ${reason}`,'No reason column','<p class="muted-note">Reason column not detected in the sheet.</p>');return;}
  const rows=filterLS(f).filter(r=>{
    const rv=String(r[reasonIdx]||'').trim()||'(blank)';
    return rv===reason;
  });
  if(!rows.length){openModal(`📋 ${reason}`,'No data','<p class="muted-note">No loss entries with this reason in the current filter.</p>');return;}
  // Bucket this reason's rows by week and by store
  const byWeek={};
  const byStore={};
  rows.forEach(r=>{
    const wk=getWeekKey(r._dk);
    if(!wk)return;
    byWeek[wk]=(byWeek[wk]||0)+1;
    const sn=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    if(!byStore[sn])byStore[sn]={total:0,perWeek:{}};
    byStore[sn].total++;
    byStore[sn].perWeek[wk]=(byStore[sn].perWeek[wk]||0)+1;
  });
  const weeks=Object.keys(byWeek).sort();
  // Render a single weekly cell with the count + delta vs the previous week (or "—" for the first)
  function _wkCell(counts,i,upGood){
    const cur=counts[i]||0;
    if(i===0)return `<span style="font-weight:600;">${fi(cur)}</span><br><span style="font-size:9px;color:var(--muted);">—</span>`;
    const prev=counts[i-1]||0;
    const d=cur-prev;
    const p=prev>0?Math.round((cur-prev)/prev*100):(cur>0?100:0);
    let badge;
    if(d===0)badge=`<span style="font-size:9px;color:var(--muted);">→ 0</span>`;
    else{
      const isUp=d>0;
      const cls=(upGood===isUp)?'color:var(--green);':'color:var(--red);';
      const arrow=isUp?'▲ +':'▼ ';
      badge=`<span style="font-size:9px;font-weight:600;${cls}">${arrow}${Math.abs(d)} (${p>0?'+':''}${p}%)</span>`;
    }
    return `<span style="font-weight:600;">${fi(cur)}</span><br>${badge}`;
  }
  const last=byWeek[weeks[weeks.length-1]]||0;
  const prev=byWeek[weeks[weeks.length-2]]||0;
  const wow=last-prev;
  const wowPct=prev>0?Math.round((last-prev)/prev*100):(last>0?100:0);
  const weekHeaders=weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">count · Δ vs prev</span></span>`);
  const totalCounts=weeks.map(w=>byWeek[w]||0);
  const totalsRow=`<div class="card"><div class="card-title">Week-over-week count for this reason — Δ shown beneath each week</div>
    <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Each cell: <strong>count</strong> on top, <strong>delta vs the previous week</strong> beneath (▲ red = more loss = bad, ▼ green = less loss = good). First week has no delta.</p>
    ${sortableTbl(['Reason',...weekHeaders,'Total','Latest WoW Δ'],[{cells:[
      `<strong>${reason}</strong>`,
      ...weeks.map((_,i)=>_wkCell(totalCounts,i,false)),
      `<strong>${fi(rows.length)}</strong>`,
      wow===0?'<span class="badge" style="background:#f0f0f0;color:var(--muted);">→ 0</span>':`<span class="badge ${wow>0?'badge-red':'badge-green'}">${wow>0?'▲ +':'▼ '}${Math.abs(wow)} (${wowPct>0?'+':''}${wowPct}%)</span>`
    ]}],null)}
  </div>`;
  // Store breakdown — also surfaces per-week deltas
  const storeArr=Object.entries(byStore).sort((a,b)=>b[1].total-a[1].total);
  const storeTbl=`<div class="card"><div class="card-title">Stores logging this reason (${storeArr.length}) — per-store week-over-week with Δ</div>
    <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Same convention as above — count on top, delta vs the previous week beneath.</p>
    ${sortableTbl(
      ['Store',...weekHeaders,'Total','Latest WoW Δ'],
      storeArr.map(([sn,v])=>{
        const counts=weeks.map(w=>v.perWeek[w]||0);
        const sl=counts[counts.length-1]||0;
        const sp=counts[counts.length-2]||0;
        const sd=sl-sp;
        const spc=sp>0?Math.round((sl-sp)/sp*100):(sl>0?100:0);
        const sBadge=sd===0?'<span class="badge" style="background:#f0f0f0;color:var(--muted);">→ 0</span>':`<span class="badge ${sd>0?'badge-red':'badge-green'}">${sd>0?'▲ +':'▼ '}${Math.abs(sd)} (${spc>0?'+':''}${spc}%)</span>`;
        return{cells:[
          `<span class="clickable" onclick="showStoreModal('${sn.replace(/'/g,"\\'")}')">${sn}</span>`,
          ...weeks.map((_,i)=>_wkCell(counts,i,false)),
          `<strong>${fi(v.total)}</strong>`,
          sBadge
        ]};
      }),
      null
    )}
  </div>`;
  openModal(`📋 ${reason} — week-by-week (with per-week Δ)`,`${fi(rows.length)} loss entries · ${storeArr.length} stores · ${weeks.length} weeks`,totalsRow+storeTbl);
};

function renderWeekly(){
  const f=getFilters();
  const rows=filterLS(f);
  const{storeIdx,purposeIdx,reasonIdx}=_LS_IDX;
  const target=document.getElementById('wkly');

  // ── Bucket LOSS by week ──
  const byWeekLoss={};
  const byWeekPurp={}; // loss entries with a non-empty Purpose (col T)
  rows.forEach(r=>{
    const wk=getWeekKey(r._dk);
    if(!wk)return;
    if(!byWeekLoss[wk])byWeekLoss[wk]={total:0,byRM:{},byCluster:{},byMarket:{},byStore:{},byReason:{}};
    byWeekLoss[wk].total++;
    const rm=r._rm||'Unknown';
    byWeekLoss[wk].byRM[rm]=(byWeekLoss[wk].byRM[rm]||0)+1;
    const wkStore=r._wkStore;
    const cluster=wkStore?wkStore.cluster:'(unsynced)';
    const market=wkStore?wkStore.market:'(unsynced)';
    byWeekLoss[wk].byCluster[cluster]=(byWeekLoss[wk].byCluster[cluster]||0)+1;
    byWeekLoss[wk].byMarket[market]=(byWeekLoss[wk].byMarket[market]||0)+1;
    const store=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    byWeekLoss[wk].byStore[store]=(byWeekLoss[wk].byStore[store]||0)+1;
    const reason=reasonIdx>=0?(String(r[reasonIdx]||'').trim()||'(blank)'):'(blank)';
    byWeekLoss[wk].byReason[reason]=(byWeekLoss[wk].byReason[reason]||0)+1;
    // Mirror into byWeekPurp only when Purpose is captured
    if(purposeIdx>=0&&String(r[purposeIdx]||'').trim()){
      if(!byWeekPurp[wk])byWeekPurp[wk]={total:0,byRM:{},byCluster:{},byMarket:{},byStore:{},byReason:{}};
      byWeekPurp[wk].total++;
      byWeekPurp[wk].byRM[rm]=(byWeekPurp[wk].byRM[rm]||0)+1;
      byWeekPurp[wk].byCluster[cluster]=(byWeekPurp[wk].byCluster[cluster]||0)+1;
      byWeekPurp[wk].byMarket[market]=(byWeekPurp[wk].byMarket[market]||0)+1;
      byWeekPurp[wk].byStore[store]=(byWeekPurp[wk].byStore[store]||0)+1;
      byWeekPurp[wk].byReason[reason]=(byWeekPurp[wk].byReason[reason]||0)+1;
    }
  });

  // ── Bucket WALKINS by week (using filterStores so RM/Cluster/Market/Store filter applies) ──
  const byWeekWk={};
  const filtStores=filterStores(_WK.stores,f);
  filtStores.forEach(s=>{
    s.days.forEach(d=>{
      if(!dateInRange(d.dk,f))return;
      const wk=getWeekKey(d.dk);
      if(!wk)return;
      if(!byWeekWk[wk])byWeekWk[wk]={total:0,byRM:{},byCluster:{},byMarket:{},byStore:{},byReason:{}};
      byWeekWk[wk].total+=d.w;
      byWeekWk[wk].byRM[s.rm]=(byWeekWk[wk].byRM[s.rm]||0)+d.w;
      byWeekWk[wk].byCluster[s.cluster]=(byWeekWk[wk].byCluster[s.cluster]||0)+d.w;
      byWeekWk[wk].byMarket[s.market]=(byWeekWk[wk].byMarket[s.market]||0)+d.w;
      byWeekWk[wk].byStore[s.outlet]=(byWeekWk[wk].byStore[s.outlet]||0)+d.w;
    });
  });

  // Union of week keys (a week may have walkins but no loss, or vice versa)
  const weeks=[...new Set([...Object.keys(byWeekLoss),...Object.keys(byWeekWk)])].sort();

  if(!rows.length&&!filtStores.length){
    target.innerHTML=`
      <div style="background:linear-gradient(135deg,#f5f0ff 0%,#fff 100%);border:1px solid #e0d4f7;border-left:4px solid #6b52d4;border-radius:10px;padding:14px 18px;margin-bottom:1.25rem;">
        <div style="font-size:18px;font-weight:600;">📅 Weekly Comparison</div>
        <div style="font-size:12px;color:var(--muted);">No data in current filter selection.</div>
      </div>`;
    return;
  }
  if(weeks.length<2){
    target.innerHTML=`
      <div style="background:linear-gradient(135deg,#f5f0ff 0%,#fff 100%);border:1px solid #e0d4f7;border-left:4px solid #6b52d4;border-radius:10px;padding:14px 18px;margin-bottom:1.25rem;">
        <div style="font-size:18px;font-weight:600;">📅 Weekly Comparison</div>
        <div style="font-size:12px;color:var(--muted);">Need at least 2 weeks of data to show WoW comparison. Currently: ${weeks.length} week${weeks.length===1?` (${getWeekRange(weeks[0])})`:'s'}.</div>
      </div>`;
    return;
  }

  // ── Active dataset based on toggle ──
  // 'loss'    → byWeekLoss only        (red=increase=bad)
  // 'walkins' → byWeekWk only          (green=increase=good)
  // 'both'    → cell shows "L / W" with conv% in WoW column
  // 'purpose' → cell shows "withPurp / lossTotal" with collection% beneath
  const isLoss=_wklyMetric==='loss';
  const isWalkin=_wklyMetric==='walkins';
  const isBoth=_wklyMetric==='both';
  const isPurpose=_wklyMetric==='purpose';
  const byWeek=isLoss?byWeekLoss:isWalkin?byWeekWk:byWeekLoss; // primary; 'both'/'purpose' use both
  const metricNoun=isLoss?'loss entries':isWalkin?'walkins':isPurpose?'purpose-captured / total loss':'loss / walkins';
  const overallIncreaseGood=isWalkin||isPurpose; // for walkin/purpose mode, ▲ = good

  const buildRows=(dim,src)=>{
    const allKeys=new Set();
    weeks.forEach(w=>{if(src[w])Object.keys(src[w][dim]).forEach(k=>allKeys.add(k));});
    return[...allKeys].map(k=>{
      const counts=weeks.map(w=>src[w]&&src[w][dim]?src[w][dim][k]||0:0);
      const prev=counts[counts.length-2]||0;
      const curr=counts[counts.length-1]||0;
      const total=counts.reduce((a,b)=>a+b,0);
      const wowDelta=curr-prev;
      const wowPct=prev>0?Math.round((curr-prev)/prev*100):(curr>0?100:0);
      return{key:k,counts,total,prev,curr,wowDelta,wowPct};
    }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
  };
  // Badge sign convention: in walkin mode, ▲ is green; in loss mode, ▲ is red
  const wowBadge=(delta,pct,upGood)=>{
    if(delta===0)return'<span class="badge" style="background:#f0f0f0;color:var(--muted);">→ 0</span>';
    const isUp=delta>0;
    const isGood=upGood===isUp;
    const cls=isGood?'badge-green':'badge-red';
    const arrow=isUp?'▲ +':'▼ ';
    return`<span class="badge ${cls}">${arrow}${Math.abs(delta)} (${pct>0?'+':''}${pct}%)</span>`;
  };

  const buildTable=(label,dim,clickFn)=>{
    if(isBoth){
      // Combined view: each week column shows "Loss / Walkin" and adds Conv% (Loss as % of Walkins)
      const lossRows=buildRows(dim,byWeekLoss);
      const wkRowsAll=buildRows(dim,byWeekWk);
      const wkMap=Object.fromEntries(wkRowsAll.map(r=>[r.key,r]));
      const lossMap=Object.fromEntries(lossRows.map(r=>[r.key,r]));
      const allKeys=[...new Set([...lossRows.map(r=>r.key),...wkRowsAll.map(r=>r.key)])];
      if(!allKeys.length)return'';
      const headers=[label,...weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">Loss / Walkins</span></span>`),'Loss total','Walkin total','Loss-cov%','WoW Loss','WoW Walkins'];
      const tblRows=allKeys.map(k=>{
        const L=lossMap[k]||{counts:weeks.map(()=>0),total:0,prev:0,curr:0,wowDelta:0,wowPct:0};
        const W=wkMap[k]||{counts:weeks.map(()=>0),total:0,prev:0,curr:0,wowDelta:0,wowPct:0};
        const cov=W.total>0?Math.round(L.total/W.total*100):0;
        return{cells:[
          clickFn?`<span class="clickable" onclick="${clickFn(k)}">${k}</span>`:`<strong>${k}</strong>`,
          ...weeks.map((_,i)=>{
            const l=L.counts[i]||0;const w=W.counts[i]||0;
            const c=w>0?Math.round(l/w*100):0;
            return`<span style="font-weight:600;color:var(--red)">${fi(l)}</span> <span style="font-size:10px;color:var(--muted)">/</span> <span style="font-weight:600;color:var(--blue)">${fi(w)}</span><br><span style="font-size:10px;color:${c>=40?'var(--green)':c>=25?'var(--amber)':'var(--red)'};font-weight:600;">${c}%</span>`;
          }),
          `<strong style="color:var(--red)">${fi(L.total)}</strong>`,
          `<strong style="color:var(--blue)">${fi(W.total)}</strong>`,
          `<span class="badge ${cov>=40?'badge-hi':cov>=25?'badge-mid':'badge-lo'}">${cov}%</span>`,
          wowBadge(L.wowDelta,L.wowPct,false),
          wowBadge(W.wowDelta,W.wowPct,true)
        ]};
      }).sort((a,b)=>{
        const aT=parseInt(String(a.cells[allKeys.length+1]).replace(/[^\d]/g,''))||0;
        const bT=parseInt(String(b.cells[allKeys.length+1]).replace(/[^\d]/g,''))||0;
        return bT-aT;
      });
      const totalsL=weeks.map(w=>byWeekLoss[w]?.total||0);
      const totalsW=weeks.map(w=>byWeekWk[w]?.total||0);
      const tL=totalsL.reduce((a,b)=>a+b,0);
      const tW=totalsW.reduce((a,b)=>a+b,0);
      const tCov=tW>0?Math.round(tL/tW*100):0;
      const totFooter=['Total',
        ...weeks.map((_,i)=>{const c=totalsW[i]>0?Math.round(totalsL[i]/totalsW[i]*100):0;return`<span style="font-weight:700;color:var(--red)">${fi(totalsL[i])}</span> / <span style="font-weight:700;color:var(--blue)">${fi(totalsW[i])}</span><br><span style="font-size:10px;color:${c>=40?'var(--green)':c>=25?'var(--amber)':'var(--red)'};font-weight:600;">${c}%</span>`;}),
        fi(tL),fi(tW),`<span class="badge ${tCov>=40?'badge-hi':tCov>=25?'badge-mid':'badge-lo'}">${tCov}%</span>`,
        wowBadge((totalsL[totalsL.length-1]||0)-(totalsL[totalsL.length-2]||0),(totalsL[totalsL.length-2]||0)>0?Math.round(((totalsL[totalsL.length-1]||0)-(totalsL[totalsL.length-2]||0))/(totalsL[totalsL.length-2]||0)*100):0,false),
        wowBadge((totalsW[totalsW.length-1]||0)-(totalsW[totalsW.length-2]||0),(totalsW[totalsW.length-2]||0)>0?Math.round(((totalsW[totalsW.length-1]||0)-(totalsW[totalsW.length-2]||0))/(totalsW[totalsW.length-2]||0)*100):0,true)
      ];
      return`<div class="card"><div class="card-title">By ${label.toLowerCase()} (${allKeys.length}) — Loss / Walkins side-by-side with conversion %</div>
        ${sortableTbl(headers,tblRows,totFooter)}
      </div>`;
    }
    if(isPurpose){
      // Purpose collection view: each week column shows "withPurp / lossTotal" with capture% beneath.
      // Final columns: total captured, total loss, overall capture%, WoW Δ on capture%.
      const lossRows=buildRows(dim,byWeekLoss);
      const purpRows=buildRows(dim,byWeekPurp);
      const lossMap=Object.fromEntries(lossRows.map(r=>[r.key,r]));
      const purpMap=Object.fromEntries(purpRows.map(r=>[r.key,r]));
      const allKeys=[...new Set([...lossRows.map(r=>r.key),...purpRows.map(r=>r.key)])];
      if(!allKeys.length)return'';
      const headers=[label,...weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}<br><span style="font-size:9px;font-weight:500;color:var(--muted);">With purpose / Loss</span></span>`),'Captured','Loss total','Capture%','WoW Capture%'];
      const tblRows=allKeys.map(k=>{
        const L=lossMap[k]||{counts:weeks.map(()=>0),total:0};
        const P=purpMap[k]||{counts:weeks.map(()=>0),total:0};
        const cap=L.total>0?Math.round(P.total/L.total*100):0;
        const lastL=L.counts[L.counts.length-1]||0;
        const prevL=L.counts[L.counts.length-2]||0;
        const lastP=P.counts[P.counts.length-1]||0;
        const prevP=P.counts[P.counts.length-2]||0;
        const lastCap=lastL>0?Math.round(lastP/lastL*100):0;
        const prevCap=prevL>0?Math.round(prevP/prevL*100):0;
        const capDelta=lastCap-prevCap;
        return{cells:[
          clickFn?`<span class="clickable" onclick="${clickFn(k)}">${k}</span>`:`<strong>${k}</strong>`,
          ...weeks.map((_,i)=>{
            const l=L.counts[i]||0;const p=P.counts[i]||0;
            const c=l>0?Math.round(p/l*100):0;
            return`<span style="font-weight:600;color:var(--green)">${fi(p)}</span> <span style="font-size:10px;color:var(--muted)">/</span> <span style="font-weight:600;color:var(--red)">${fi(l)}</span><br><span style="font-size:10px;color:${c>=70?'var(--green)':c>=30?'var(--amber)':'var(--red)'};font-weight:600;">${l>0?c+'%':'—'}</span>`;
          }),
          `<strong style="color:var(--green)">${fi(P.total)}</strong>`,
          `<strong style="color:var(--red)">${fi(L.total)}</strong>`,
          `<span class="badge ${cap>=70?'badge-green':cap>=30?'badge-amber':'badge-red'}">${cap}%</span>`,
          (function(){
            if(prevL===0&&lastL===0)return'<span class="badge" style="background:#f0f0f0;color:var(--muted);">—</span>';
            const arrow=capDelta>0?'▲ +':capDelta<0?'▼ ':'→ ';
            const cls=capDelta>0?'badge-green':capDelta<0?'badge-red':'';
            return`<span class="badge ${cls}" style="${capDelta===0?'background:#f0f0f0;color:var(--muted);':''}">${arrow}${Math.abs(capDelta)} pts</span>`;
          })()
        ]};
      }).sort((a,b)=>{
        // Sort worst capture% first so leakage stands out
        const ax=String(a.cells[weeks.length+3]).match(/(-?\d+)/);
        const bx=String(b.cells[weeks.length+3]).match(/(-?\d+)/);
        return(ax?+ax[1]:0)-(bx?+bx[1]:0);
      });
      const totalsL=weeks.map(w=>byWeekLoss[w]?.total||0);
      const totalsP=weeks.map(w=>byWeekPurp[w]?.total||0);
      const tL=totalsL.reduce((a,b)=>a+b,0);
      const tP=totalsP.reduce((a,b)=>a+b,0);
      const tCap=tL>0?Math.round(tP/tL*100):0;
      const lastL=totalsL[totalsL.length-1]||0,prevL=totalsL[totalsL.length-2]||0;
      const lastP=totalsP[totalsP.length-1]||0,prevP=totalsP[totalsP.length-2]||0;
      const lastCap=lastL>0?Math.round(lastP/lastL*100):0;
      const prevCap=prevL>0?Math.round(prevP/prevL*100):0;
      const capDelta=lastCap-prevCap;
      const arrow=capDelta>0?'▲ +':capDelta<0?'▼ ':'→ ';
      const cls=capDelta>0?'badge-green':capDelta<0?'badge-red':'';
      const totFooter=['Total',
        ...weeks.map((_,i)=>{const c=totalsL[i]>0?Math.round(totalsP[i]/totalsL[i]*100):0;return`<span style="font-weight:700;color:var(--green)">${fi(totalsP[i])}</span> / <span style="font-weight:700;color:var(--red)">${fi(totalsL[i])}</span><br><span style="font-size:10px;color:${c>=70?'var(--green)':c>=30?'var(--amber)':'var(--red)'};font-weight:600;">${totalsL[i]>0?c+'%':'—'}</span>`;}),
        fi(tP),fi(tL),`<span class="badge ${tCap>=70?'badge-green':tCap>=30?'badge-amber':'badge-red'}">${tCap}%</span>`,
        `<span class="badge ${cls}" style="${capDelta===0?'background:#f0f0f0;color:var(--muted);':''}">${arrow}${Math.abs(capDelta)} pts</span>`
      ];
      return`<div class="card"><div class="card-title">By ${label.toLowerCase()} (${allKeys.length}) — Purpose collection (worst capture% first)</div>
        ${sortableTbl(headers,tblRows,totFooter)}
      </div>`;
    }
    // Single-metric view (loss or walkin)
    const src=isLoss?byWeekLoss:byWeekWk;
    const dimRows=buildRows(dim,src);
    if(!dimRows.length)return'';
    const headers=[label,...weeks.map(w=>`<span style="font-weight:600;">${getWeekRange(w)}</span>`),'Total','WoW Δ (last vs prev)'];
    const tblRows=dimRows.map(r=>({
      cells:[
        clickFn?`<span class="clickable" onclick="${clickFn(r.key)}">${r.key}</span>`:`<strong>${r.key}</strong>`,
        ...r.counts.map(c=>fi(c)),
        `<strong>${fi(r.total)}</strong>`,
        wowBadge(r.wowDelta,r.wowPct,overallIncreaseGood)
      ]
    }));
    const totals=weeks.map(w=>src[w]?.total||0);
    const totFooter=['Total',...totals.map(c=>fi(c)),fi(totals.reduce((a,b)=>a+b,0)),wowBadge(totals[totals.length-1]-totals[totals.length-2],totals[totals.length-2]>0?Math.round((totals[totals.length-1]-totals[totals.length-2])/totals[totals.length-2]*100):0,overallIncreaseGood)];
    return`<div class="card"><div class="card-title">By ${label.toLowerCase()} (${dimRows.length})</div>
      ${sortableTbl(headers,tblRows,totFooter)}
    </div>`;
  };

  // Top-line metrics — use whichever metric is selected (or both for the 'both' mode)
  const totalAllLoss=weeks.reduce((s,w)=>s+(byWeekLoss[w]?.total||0),0);
  const totalAllWk=weeks.reduce((s,w)=>s+(byWeekWk[w]?.total||0),0);
  const totalAllPurp=weeks.reduce((s,w)=>s+(byWeekPurp[w]?.total||0),0);
  const lastWkLoss=byWeekLoss[weeks[weeks.length-1]]?.total||0;
  const prevWkLoss=byWeekLoss[weeks[weeks.length-2]]?.total||0;
  const lastWkWk=byWeekWk[weeks[weeks.length-1]]?.total||0;
  const prevWkWk=byWeekWk[weeks[weeks.length-2]]?.total||0;
  const lastWkPurp=byWeekPurp[weeks[weeks.length-1]]?.total||0;
  const prevWkPurp=byWeekPurp[weeks[weeks.length-2]]?.total||0;
  const dLoss=lastWkLoss-prevWkLoss;
  const dWk=lastWkWk-prevWkWk;
  const pLoss=prevWkLoss>0?Math.round(dLoss/prevWkLoss*100):(lastWkLoss>0?100:0);
  const pWk=prevWkWk>0?Math.round(dWk/prevWkWk*100):(lastWkWk>0?100:0);
  const overallCap=totalAllLoss>0?Math.round(totalAllPurp/totalAllLoss*100):0;
  const lastCap=lastWkLoss>0?Math.round(lastWkPurp/lastWkLoss*100):0;
  const prevCap=prevWkLoss>0?Math.round(prevWkPurp/prevWkLoss*100):0;
  const dCap=lastCap-prevCap;

  const segBtn=(mode,label,emoji)=>`<button class="filter-btn" onclick="setWklyMetric('${mode}')" style="border:0;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;background:${_wklyMetric===mode?'var(--blue)':'var(--surface)'};color:${_wklyMetric===mode?'#fff':'var(--muted)'};border-radius:0;">${emoji} ${label}</button>`;

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#f5f0ff 0%,#fff 100%);border:1px solid #e0d4f7;border-left:4px solid #6b52d4;border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">📅 Weekly Comparison</div>
      <div style="font-size:12px;color:var(--muted);">Per ISO week (Mon–Sun). In <strong>Loss</strong> mode ▲ red = more loss (bad). In <strong>Walkins</strong> mode ▲ green = more footfall (good). <strong>Both</strong> shows Loss / Walkins side-by-side with conversion %. <strong>Purpose</strong> shows how many loss entries had a purpose captured each week — ▲ green = better capture.</div>
    </div>

    <div style="display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:1rem;">
      ${segBtn('loss','Loss entries','📊')}
      <div style="width:1px;background:var(--border);"></div>
      ${segBtn('walkins','Walkins','👣')}
      <div style="width:1px;background:var(--border);"></div>
      ${segBtn('both','Both (Loss / Walkins)','🔀')}
      <div style="width:1px;background:var(--border);"></div>
      ${segBtn('purpose','Purpose collection','🎯')}
    </div>
    ${isPurpose&&purposeIdx<0?`<div class="err-card" style="margin-bottom:1rem;">⚠️ <code>Purpose</code> column not detected in the loss sheet. Add a Purpose column (e.g. col T) to track capture rate here.</div>`:''}

    <div class="metrics" style="margin-bottom:1.25rem;">
      <div class="metric"><div class="lbl">Weeks loaded</div><div class="val">${weeks.length}</div><div class="sub">${getWeekRange(weeks[0])} → ${getWeekRange(weeks[weeks.length-1])}</div></div>
      ${isWalkin?`
        <div class="metric blue"><div class="lbl">Total walkins (all weeks)</div><div class="val">${fi(totalAllWk)}</div></div>
        <div class="metric"><div class="lbl">Latest week walkins</div><div class="val">${fi(lastWkWk)}</div><div class="sub">${getWeekRange(weeks[weeks.length-1])}</div></div>
        <div class="metric ${dWk>0?'green':dWk<0?'red':''}"><div class="lbl">Δ walkins vs previous</div><div class="val">${dWk>0?'+':''}${fi(dWk)}</div><div class="sub">${pWk>0?'+':''}${pWk}% ${dWk>0?'more footfall':dWk<0?'less footfall':'no change'}</div></div>
      `:isLoss?`
        <div class="metric red"><div class="lbl">Total loss entries</div><div class="val">${fi(totalAllLoss)}</div></div>
        <div class="metric"><div class="lbl">Latest week loss</div><div class="val">${fi(lastWkLoss)}</div><div class="sub">${getWeekRange(weeks[weeks.length-1])}</div></div>
        <div class="metric ${dLoss>0?'red':dLoss<0?'green':''}"><div class="lbl">Δ loss vs previous</div><div class="val">${dLoss>0?'+':''}${fi(dLoss)}</div><div class="sub">${pLoss>0?'+':''}${pLoss}% ${dLoss>0?'more loss':dLoss<0?'less loss':'no change'}</div></div>
      `:isPurpose?`
        <div class="metric ${overallCap>=70?'green':overallCap>=30?'amber':'red'}"><div class="lbl">Overall capture rate</div><div class="val">${overallCap}%</div><div class="sub">${fi(totalAllPurp)} of ${fi(totalAllLoss)} loss entries had a purpose</div></div>
        <div class="metric ${lastCap>=70?'green':lastCap>=30?'amber':'red'}"><div class="lbl">Latest week capture</div><div class="val">${lastCap}%</div><div class="sub">${fi(lastWkPurp)} / ${fi(lastWkLoss)} · ${getWeekRange(weeks[weeks.length-1])}</div></div>
        <div class="metric ${dCap>0?'green':dCap<0?'red':''}"><div class="lbl">Δ capture vs previous</div><div class="val">${dCap>0?'+':''}${dCap} pts</div><div class="sub">${dCap>0?'better collection':dCap<0?'collection slipped':'no change'}</div></div>
      `:`
        <div class="metric red"><div class="lbl">Latest loss</div><div class="val">${fi(lastWkLoss)}</div><div class="sub">${dLoss>0?'+':''}${pLoss}% vs prev</div></div>
        <div class="metric blue"><div class="lbl">Latest walkins</div><div class="val">${fi(lastWkWk)}</div><div class="sub">${dWk>0?'+':''}${pWk}% vs prev</div></div>
        <div class="metric amber"><div class="lbl">Loss-cov% latest</div><div class="val">${lastWkWk>0?Math.round(lastWkLoss/lastWkWk*100):0}%</div><div class="sub">loss as % of walkins</div></div>
      `}
    </div>

    <div class="card" style="border-left:4px solid var(--red);">
      <div class="card-title">📋 Loss reasons — week-by-week comparison</div>
      <p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">Each row = one loss reason · columns = ISO weeks (Mon–Sun) · last column = WoW Δ vs previous week. Always rendered in loss mode regardless of the toggle above (reasons only exist for loss entries). Click any reason → modal with that reason's weekly trend + store list.</p>
      ${_weeklyBuildTable('Reason','byReason',k=>`showWeeklyReasonModal('${k.replace(/'/g,"\\\\'")}')`,{weeks,byWeekLoss,byWeekWk,byWeekPurp,metric:'loss'})}
    </div>
    ${buildTable('Market','byMarket',k=>`showWeeklyDrill('market','${k.replace(/'/g,"\\\\'")}')`)}
    ${buildTable('Cluster','byCluster',k=>`showWeeklyDrill('cluster','${k.replace(/'/g,"\\\\'")}')`)}
    ${buildTable('RM','byRM',k=>`showWeeklyDrill('rm','${k.replace(/'/g,"\\\\'")}')`)}
    ${buildTable('Store','byStore',k=>`showStoreModal('${k.replace(/'/g,"\\\\'")}')`)}`;
}

          // Comparison
          'Compare Bangalore vs Chennai',
          'Pareto 80% concentration',
          'WoW comparison',
          // Quality
          'Stores with no walkins',
          'Bad phone numbers',
          'Low coverage stores',
          'Abnormal reasons',
          'Stores with both issues',
          'Pending walkins sync',
          // Help
          'Help'
        ].map(q=>`<button class="ask-chip" onclick="askChip('${q.replace(/'/g,"\\'")}')" style="background:#f0f5ff;color:var(--blue);border:1px solid #d0dffa;border-radius:18px;padding:5px 12px;font-size:11px;cursor:pointer;font-weight:500;transition:all .15s;" onmouseover="this.style.background='var(--blue)';this.style.color='#fff'" onmouseout="this.style.background='#f0f5ff';this.style.color='var(--blue)'">${q}</button>`).join('')}
      </div>
    </div>

    <div id="ask-results"></div>`;
  renderAskHistory();
}

window.askSubmit=function(){
  const inp=document.getElementById('ask-input');
  if(!inp)return;
  const q=inp.value.trim();
  if(!q)return;
  const ans=answerQuestion(q);
  ASK_HISTORY.unshift({q,a:ans,ts:new Date()});
  if(ASK_HISTORY.length>20)ASK_HISTORY.pop();
  inp.value='';
  renderAskHistory();
};
window.askChip=function(q){
  const inp=document.getElementById('ask-input');
  if(inp)inp.value=q;
  askSubmit();
};
window.askClear=function(){
  ASK_HISTORY.length=0;
  renderAskHistory();
};
function renderAskHistory(){
  const target=document.getElementById('ask-results');
  if(!target)return;
  if(!ASK_HISTORY.length){
    target.innerHTML=`<div style="background:#fafbfd;border:1px dashed var(--border);border-radius:var(--radius);padding:30px;text-align:center;color:var(--muted);font-size:13px;">
      💬 Ask a question above or click a suggestion chip to get started.
    </div>`;
    return;
  }
  target.innerHTML=ASK_HISTORY.map((h,i)=>`
    <div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;">Q</div>
        <div style="flex:1;font-size:14px;font-weight:600;color:var(--text);padding-top:4px;">${h.q}</div>
        <div style="font-size:10px;color:var(--muted);">${h.ts.toLocaleTimeString()}</div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;">A</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;">${h.a.title||'Result'}</div>
          ${h.a.html}
        </div>
      </div>
    </div>`).join('');
}

// ── Q&A ENGINE ─────────────────────────────────────────────
function answerQuestion(qOrig){
  const q=qOrig.toLowerCase().trim();
  const f=getFilters();
  const rows=filterLS(f);
  const{storeIdx,catIdx,reasonIdx,custIdx,empIdx,phoneIdx}=_LS_IDX;
  const ctx={q,qOrig,f,rows,storeIdx,catIdx,reasonIdx,custIdx,empIdx,phoneIdx};

  if(!rows||!rows.length){
    return{title:'No data',html:'<p style="color:var(--muted);font-size:12px;">No loss data in current filter selection. Try changing the Month / RM / Market filter at the top.</p>'};
  }

  // Detect N (top-N count)
  const nMatch=q.match(/\btop\s*(\d+)\b/)||q.match(/\b(\d+)\s+best\b/)||q.match(/\b(\d+)\s+worst\b/);
  const N=nMatch?parseInt(nMatch[1]):10;

  // ── INTENT MATCHING ──────────────────────────────────────

  // 1. Total / count summary
  if(/^how many|^total|^count\b|how much loss/.test(q)&&!/store|rm|market|reason|category/.test(q)){
    const totalQ=fi(rows.length);
    const synced=rows.filter(r=>r._syncedDk).length;
    return{title:`Total loss entries`,html:`
      <div class="metrics" style="grid-template-columns:repeat(3,1fr);">
        <div class="metric red"><div class="lbl">Total LS entries</div><div class="val">${totalQ}</div></div>
        <div class="metric green"><div class="lbl">Synced to walkins</div><div class="val">${fi(synced)}</div></div>
        <div class="metric amber"><div class="lbl">Pending sync</div><div class="val">${fi(rows.length-synced)}</div></div>
      </div>`};
  }

  // 2. How many stores / RMs / markets etc.
  if(/^how many\s+stores?\b/.test(q)){
    const set=new Set(rows.map(r=>storeIdx>=0?String(r[storeIdx]||'').trim():'').filter(Boolean));
    return{title:'Stores with loss entries',html:`<p style="font-size:14px;"><strong style="color:var(--red);font-size:24px;">${set.size}</strong> unique stores have loss entries in current filter.</p>`};
  }
  if(/^how many\s+rms?\b|how many regional/.test(q)){
    const set=new Set(rows.map(r=>r._rm).filter(v=>v&&v!=='Unknown'));
    return{title:'RMs with loss entries',html:`<p style="font-size:14px;"><strong style="color:var(--red);font-size:24px;">${set.size}</strong> RMs are linked to loss entries in current filter.</p>`};
  }
  if(/^how many\s+markets?\b/.test(q)){
    const set=new Set(rows.map(r=>r._wkStore?r._wkStore.market:null).filter(v=>v&&v!=='Unknown'));
    return{title:'Markets with loss',html:`<p style="font-size:14px;"><strong style="color:var(--red);font-size:24px;">${set.size}</strong> markets have loss entries in current filter.</p>`};
  }
  if(/^how many\s+reasons?\b/.test(q)&&reasonIdx>=0){
    const set=new Set(rows.map(r=>String(r[reasonIdx]||'').trim()).filter(Boolean));
    return{title:'Unique reasons',html:`<p style="font-size:14px;"><strong style="color:var(--red);font-size:24px;">${set.size}</strong> unique reasons in column I.</p>`};
  }
  if(/^how many\s+categor/.test(q)&&catIdx>=0){
    const set=new Set(rows.map(r=>String(r[catIdx]||'').trim()).filter(Boolean));
    return{title:'Unique categories',html:`<p style="font-size:14px;"><strong style="color:var(--red);font-size:24px;">${set.size}</strong> unique categories.</p>`};
  }

  // 3. Top RMs / stores / markets / reasons / categories — grouped queries
  // Helper: build top-N list of a dimension
  const topByDim=(getter,labelSing,labelPlur,clickFn)=>{
    const map={};
    rows.forEach(r=>{const k=getter(r);if(k){if(!map[k])map[k]=0;map[k]++;}});
    const arr=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    if(!arr.length)return null;
    const top=arr.slice(0,N);
    const total=arr.reduce((s,[,v])=>s+v,0);
    const tblRows=top.map(([k,v],i)=>({cells:[
      `<strong>#${i+1}</strong>`,
      clickFn?`<span class="clickable" onclick="${clickFn(k)}">${k}</span>`:`<strong>${k}</strong>`,
      fi(v),
      `<span class="badge ${pct(v,total)>=20?'badge-red':pct(v,total)>=10?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`
    ]}));
    return{title:`Top ${top.length} ${labelPlur} by loss · ${arr.length} total`,
      html:`<p style="font-size:11px;color:var(--muted);margin-bottom:8px;">${fi(total)} entries across ${arr.length} ${labelPlur}.</p>
      ${sortableTbl(['Rank',labelSing,'Loss count','Share%'],tblRows,['','Total of top '+top.length,fi(top.reduce((s,[,v])=>s+v,0)),pct(top.reduce((s,[,v])=>s+v,0),total)+'%'])}`};
  };

  if(/\b(top|best|most|highest|leading)\b.*\brm/.test(q)||/\brm.*\b(by|loss)\b/.test(q)||/loss by rm/.test(q)){
    const r=topByDim(r=>r._rm&&r._rm!=='Unknown'?r._rm:null,'RM','RMs',k=>`showRMModal('${k.replace(/'/g,"\\\\'")}')`);
    if(r)return r;
  }
  if(/\b(top|best|most|highest)\b.*\bstore/.test(q)||/store.*\bby\b.*loss/.test(q)||/loss by store/.test(q)){
    const r=topByDim(r=>storeIdx>=0?(String(r[storeIdx]||'').trim()||null):null,'Store','stores',k=>`showStoreModal('${k.replace(/'/g,"\\\\'")}')`);
    if(r)return r;
  }
  if(/\b(top|best|most|highest|worst|leading)\b.*\bmarket/.test(q)||/loss by market/.test(q)||/markets? by/.test(q)){
    const r=topByDim(r=>r._wkStore&&r._wkStore.market&&r._wkStore.market!=='Unknown'?r._wkStore.market:null,'Market','markets',k=>`showMarketModal('${k.replace(/'/g,"\\\\'")}')`);
    if(r)return r;
  }
  if(/\b(top|main|biggest|highest|leading)\b.*\breason/.test(q)||/reasons?$/.test(q)||/loss by reason/.test(q)||/why.*loss/.test(q)){
    if(reasonIdx<0)return{title:'Reason column not found',html:'<p style="color:var(--muted)">Reason column (col I) not detected in your sheet.</p>'};
    const r=topByDim(r=>String(r[reasonIdx]||'').trim()||null,'Reason','reasons',k=>`showReasonStoresModal('${k.replace(/'/g,"\\\\'")}','I')`);
    if(r)return r;
  }
  if(/\b(top|main|biggest)\b.*\bspecific reason/.test(q)||/specific reasons?$/.test(q)||/loss by specific/.test(q)){
    if(_LS_IDX.subReasonIdx<0)return{title:'Specific reason column not found',html:'<p style="color:var(--muted)">Column J (Reason) not detected.</p>'};
    const sIdx=_LS_IDX.subReasonIdx;
    const r=topByDim(r=>String(r[sIdx]||'').trim()||null,'Specific reason','specific reasons',k=>`showReasonStoresModal('${k.replace(/'/g,"\\\\'")}','J')`);
    if(r)return r;
  }
  if(/\b(top|biggest|highest|leading)\b.*\bcategor/.test(q)||/loss by categor/.test(q)||/categories?$/.test(q)){
    if(catIdx<0)return{title:'Category column not found',html:'<p style="color:var(--muted)">Category column not detected.</p>'};
    const r=topByDim(r=>String(r[catIdx]||'').trim()||null,'Category','categories',k=>`showCatDetailModal('${k.replace(/'/g,"\\\\'")}')`);
    if(r)return r;
  }
  if(/\b(top|most)\b.*\b(staff|salesperson|employee)/.test(q)||/staff with most/.test(q)||/staff.*loss/.test(q)){
    if(empIdx<0)return{title:'Staff column not found',html:'<p style="color:var(--muted)">Employee column not detected.</p>'};
    const r=topByDim(r=>String(r[empIdx]||'').trim()||null,'Staff','staff members',null);
    if(r)return r;
  }
  if(/\bworst\b.*market/.test(q)){
    return topByDim(r=>r._wkStore&&r._wkStore.market&&r._wkStore.market!=='Unknown'?r._wkStore.market:null,'Market','worst markets',k=>`showMarketModal('${k.replace(/'/g,"\\\\'")}')`);
  }

  // 4. Filter "in [market]" / "for [RM]" / "in [category]" → top reason for that filter
  const inMatch=q.match(/\b(?:in|at|for|under)\s+([a-z][a-z0-9 &/'-]{1,40})\b/);
  if(inMatch){
    const target=inMatch[1].trim();
    // Try matching to RM, market, store, category, reason
    const allRMs=[...new Set(rows.map(r=>r._rm).filter(v=>v&&v!=='Unknown'))];
    const allMkts=[...new Set(rows.map(r=>r._wkStore?r._wkStore.market:null).filter(v=>v&&v!=='Unknown'))];
    const allStores=[...new Set(rows.map(r=>storeIdx>=0?String(r[storeIdx]||'').trim():null).filter(Boolean))];
    const allCats=catIdx>=0?[...new Set(rows.map(r=>String(r[catIdx]||'').trim()).filter(Boolean))]:[];
    const fuzzy=(arr,t)=>{const m=arr.find(x=>x.toLowerCase()===t)||arr.find(x=>x.toLowerCase().startsWith(t))||arr.find(x=>x.toLowerCase().includes(t));return m;};
    const matchedRM=fuzzy(allRMs,target);
    const matchedMkt=fuzzy(allMkts,target);
    const matchedStore=fuzzy(allStores,target);
    const matchedCat=fuzzy(allCats,target);
    let scoped=null,scopeLabel='';
    if(matchedRM){scoped=rows.filter(r=>r._rm===matchedRM);scopeLabel=`RM: ${matchedRM}`;}
    else if(matchedMkt){scoped=rows.filter(r=>r._wkStore&&r._wkStore.market===matchedMkt);scopeLabel=`Market: ${matchedMkt}`;}
    else if(matchedStore){scoped=rows.filter(r=>storeIdx>=0&&String(r[storeIdx]||'').trim()===matchedStore);scopeLabel=`Store: ${matchedStore}`;}
    else if(matchedCat){scoped=rows.filter(r=>catIdx>=0&&String(r[catIdx]||'').trim()===matchedCat);scopeLabel=`Category: ${matchedCat}`;}
    if(scoped&&scoped.length){
      const askingReason=/reason|why|cause/.test(q);
      const askingCategory=/categor/.test(q);
      const askingStore=/\bstore/.test(q)&&!matchedStore;
      const askingStaff=/staff|salesperson|employee/.test(q);
      let dimGetter,dimLabel;
      if(askingReason&&reasonIdx>=0){dimGetter=r=>String(r[reasonIdx]||'').trim()||null;dimLabel='Reason';}
      else if(askingCategory&&catIdx>=0){dimGetter=r=>String(r[catIdx]||'').trim()||null;dimLabel='Category';}
      else if(askingStore){dimGetter=r=>storeIdx>=0?String(r[storeIdx]||'').trim()||null:null;dimLabel='Store';}
      else if(askingStaff&&empIdx>=0){dimGetter=r=>String(r[empIdx]||'').trim()||null;dimLabel='Staff';}
      else if(reasonIdx>=0){dimGetter=r=>String(r[reasonIdx]||'').trim()||null;dimLabel='Reason';}
      const map={};scoped.forEach(r=>{const k=dimGetter(r);if(k){if(!map[k])map[k]=0;map[k]++;}});
      const arr=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,N);
      const total=scoped.length;
      const tblRows=arr.map(([k,v],i)=>({cells:[`#${i+1}`,k,fi(v),`<span class="badge ${pct(v,total)>=20?'badge-red':pct(v,total)>=10?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`]}));
      return{title:`${dimLabel} breakdown for ${scopeLabel} · ${fi(total)} entries`,
        html:`${sortableTbl(['Rank',dimLabel,'Count','Share%'],tblRows,null)}`};
    }
  }

  // 5. New vs repeat customer
  if(/new vs repeat|new\/repeat|customer type|repeat customer/.test(q)){
    if(custIdx<0)return{title:'Customer Type column not found',html:'<p>Customer type column not detected.</p>'};
    const cc=getCustCounts(rows);
    const total=cc.new+cc.repeat+cc.other;
    return{title:'New vs Repeat customer breakdown',html:`
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;">
        <div style="background:#e6f5ee;border-radius:10px;padding:14px 24px;text-align:center;flex:1;min-width:140px;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">🆕 New</div>
          <div style="font-size:32px;font-weight:600;color:var(--green);">${fi(cc.new)}</div>
          <div style="font-size:12px;color:var(--muted);">${pct(cc.new,total)}%</div>
        </div>
        <div style="background:#e6eefa;border-radius:10px;padding:14px 24px;text-align:center;flex:1;min-width:140px;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">🔁 Repeat</div>
          <div style="font-size:32px;font-weight:600;color:var(--blue);">${fi(cc.repeat)}</div>
          <div style="font-size:12px;color:var(--muted);">${pct(cc.repeat,total)}%</div>
        </div>
        ${cc.other?`<div style="background:#fff8e6;border-radius:10px;padding:14px 24px;text-align:center;flex:1;min-width:140px;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">Other</div>
          <div style="font-size:32px;font-weight:600;color:var(--amber);">${fi(cc.other)}</div>
          <div style="font-size:12px;color:var(--muted);">${pct(cc.other,total)}%</div>
        </div>`:''}
      </div>`};
  }

  // 6. Stores with no walkins / zero walkins
  if(/no walkin|zero walkin|stores? without walkin|stores? with no walkin/.test(q)){
    const f2=getFilters();
    const zeroStores=_WK.stores.filter(s=>{
      if(f2.market&&s.market!==f2.market)return false;
      if(f2.cluster&&s.cluster!==f2.cluster)return false;
      if(f2.rm&&s.rm!==f2.rm)return false;
      const dRange=daysInRange(s.days,f2);
      const w=dRange.reduce((a,d)=>a+d.w,0);
      const daysWith=dRange.filter(d=>d.w>0).length;
      return w===0||daysWith===0;
    });
    const tblRows=zeroStores.slice(0,100).map(s=>({cells:[
      `<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,
      s.market,s.cluster,s.rm,
      '<span class="badge badge-red">🔴 No walkin data</span>'
    ]}));
    return{title:`${zeroStores.length} stores with no walkin data`+(zeroStores.length>100?' (showing top 100)':''),html:zeroStores.length?sortableTbl(['Store','Market','Cluster','RM','Status'],tblRows,null):'<p style="color:var(--green);font-size:13px;">✅ All stores have walkin data in current filter.</p>'};
  }

  // 7. Bad phone numbers
  if(/bad phone|invalid phone|phone quality|phone number issue|missing phone/.test(q)){
    if(phoneIdx<0)return{title:'Phone column not found',html:'<p>Phone column not detected.</p>'};
    const bad=rows.filter(r=>r._mob!=='valid');
    const byStore={};
    bad.forEach(r=>{const sn=storeIdx>=0?String(r[storeIdx]||'').trim()||'Unknown':'Unknown';if(!byStore[sn])byStore[sn]={c:0,total:0,market:'—',rm:'—'};byStore[sn].c++;if(r._wkStore){byStore[sn].market=r._wkStore.market;byStore[sn].rm=r._wkStore.rm;}});
    rows.forEach(r=>{const sn=storeIdx>=0?String(r[storeIdx]||'').trim()||'Unknown':'Unknown';if(byStore[sn])byStore[sn].total++;});
    const arr=Object.entries(byStore).sort((a,b)=>b[1].c/Math.max(b[1].total,1)-a[1].c/Math.max(a[1].total,1)).slice(0,N);
    const tblRows=arr.map(([k,v])=>{const p=pct(v.c,v.total);return{cells:[
      `<span class="clickable" onclick="showStoreModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
      v.market,v.rm,fi(v.total),fi(v.c),`<span class="badge ${p>50?'badge-red':p>20?'badge-amber':'badge-green'}">${p}%</span>`
    ]}});
    return{title:`Top ${arr.length} stores with bad phone numbers · ${fi(bad.length)} bad of ${fi(rows.length)} total (${pct(bad.length,rows.length)}%)`,
      html:sortableTbl(['Store','Market','RM','Total','Bad','Bad%'],tblRows,null)};
  }

  // 8. Low coverage stores
  if(/low coverage|coverage gap|poor coverage|stores with low/.test(q)){
    const f2=getFilters();
    const filtStores=filterStores(_WK.stores,f2);
    const audit=filtStores.map(s=>{
      const dRange=daysInRange(s.days,f2);
      const w=dRange.reduce((a,d)=>a+d.w,0);const b=dRange.reduce((a,d)=>a+d.b,0);const nb=w-b;
      const ls=rows.filter(r=>storeIdx>=0&&normStore(String(r[storeIdx]||''))===s.outletNorm).length;
      return{outlet:s.outlet,market:s.market,rm:s.rm,nb,ls,cov:pct(ls,nb)};
    }).filter(s=>s.nb>0).sort((a,b)=>a.cov-b.cov).slice(0,N);
    const tblRows=audit.map(s=>({cells:[
      `<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,
      s.market,s.rm,fi(s.nb),fi(s.ls),`<span class="badge ${s.cov<10?'badge-red':s.cov<25?'badge-amber':'badge-green'}">${s.cov}%</span>`
    ]}));
    return{title:`${audit.length} stores with lowest loss coverage`,html:sortableTbl(['Store','Market','RM','Non-buyers','Loss captured','Coverage%'],tblRows,null)};
  }

  // 9. Abnormal reasons
  if(/abnormal|rare reason|unusual reason|notify|flagged/.test(q)){
    const subRIdx=_LS_IDX.subReasonIdx>=0&&_LS_IDX.subReasonIdx!==reasonIdx?_LS_IDX.subReasonIdx:reasonIdx;
    if(subRIdx<0)return{title:'No reason column',html:'<p>Reason column not detected.</p>'};
    const ABNORMAL=new Set(['discount expectation not met','offer not valid in store','perceived poor value for money','polish not available','personalization not available','found substitute product at lower price','found cheaper online','(blank)','fit not comfortable','repair service not available','price mismatch with website']);
    const map={};
    rows.forEach(r=>{const v=String(r[subRIdx]||'').trim()||'(blank)';if(!map[v])map[v]={c:0,stores:new Set()};map[v].c++;const sn=storeIdx>=0?String(r[storeIdx]||''):'';if(sn)map[v].stores.add(sn);});
    const total=rows.length;
    const flagged=Object.entries(map).filter(([k,v])=>{const lc=k.toLowerCase();return ABNORMAL.has(lc)||pct(v.c,total)<2;}).sort((a,b)=>b[1].c-a[1].c);
    if(!flagged.length)return{title:'No abnormal reasons',html:'<p style="color:var(--green);font-size:13px;">✅ No abnormal reasons detected.</p>'};
    const tblRows=flagged.map(([k,v])=>{const sh=pct(v.c,total);const lc=k.toLowerCase();const flag=ABNORMAL.has(lc)?'<span class="badge badge-red">🔴 Notify</span>':'<span class="badge badge-amber">🟡 Rare</span>';return{cells:[
      `<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','${subRIdx===_LS_IDX.subReasonIdx?'J':'I'}')">${k}</span>`,
      fi(v.c),fi(v.stores.size),`${sh}%`,flag
    ]}});
    return{title:`${flagged.length} abnormal/notify-worthy reasons`,html:sortableTbl(['Reason','Count','Stores','Share%','Flag'],tblRows,null)};
  }

  // 10. WoW comparison
  if(/wow|week.over.week|week on week|weekly/.test(q)){
    return{title:'Weekly comparison',html:'<p style="font-size:13px;">For full weekly comparison, see the <strong>Weekly Comparison</strong> tab. Quick summary:</p><p style="color:var(--muted);font-size:12px;">Switch to that tab from the navigation above.</p>'};
  }

  // 11. "Show [X]" lookups - store/RM/market/reason
  const showMatch=q.match(/^(?:show|details? for|details? on|info on|tell me about|about)\s+(.+)$/i);
  if(showMatch){
    const target=showMatch[1].trim().toLowerCase();
    const allRMs=[...new Set(rows.map(r=>r._rm).filter(v=>v&&v!=='Unknown'))];
    const allMkts=[...new Set(rows.map(r=>r._wkStore?r._wkStore.market:null).filter(v=>v&&v!=='Unknown'))];
    const allStores=storeIdx>=0?[...new Set(rows.map(r=>String(r[storeIdx]||'').trim()).filter(Boolean))]:[];
    const fuzzy=(arr,t)=>arr.find(x=>x.toLowerCase()===t)||arr.find(x=>x.toLowerCase().includes(t));
    const m=fuzzy(allMkts,target);if(m)return{title:`Click to open Market modal: ${m}`,html:`<button onclick="showMarketModal('${m.replace(/'/g,"\\'")}')" style="padding:8px 16px;background:var(--blue);color:#fff;border:0;border-radius:6px;cursor:pointer;font-weight:600;">Open ${m}</button>`};
    const r=fuzzy(allRMs,target);if(r)return{title:`Click to open RM modal: ${r}`,html:`<button onclick="showRMModal('${r.replace(/'/g,"\\'")}')" style="padding:8px 16px;background:var(--blue);color:#fff;border:0;border-radius:6px;cursor:pointer;font-weight:600;">Open RM ${r}</button>`};
    const s=fuzzy(allStores,target);if(s)return{title:`Click to open Store modal: ${s}`,html:`<button onclick="showStoreModal('${s.replace(/'/g,"\\'")}')" style="padding:8px 16px;background:var(--blue);color:#fff;border:0;border-radius:6px;cursor:pointer;font-weight:600;">Open ${s}</button>`};
  }

  // 12. Stores under [RM]
  const underMatch=q.match(/stores?\s+under\s+(.+)/);
  if(underMatch){
    const target=underMatch[1].trim().toLowerCase();
    const rm=[..._WK.rms].find(r=>r.toLowerCase()===target||r.toLowerCase().includes(target));
    if(rm)return{title:`Stores under RM: ${rm}`,html:`<button onclick="showRMModal('${rm.replace(/'/g,"\\'")}')" style="padding:8px 16px;background:var(--blue);color:#fff;border:0;border-radius:6px;cursor:pointer;font-weight:600;">Open RM ${rm}</button>`};
  }

  // ═══ DEEP-ANALYSIS INTENTS ═══════════════════════════════════════════

  // 13. Top reason for NEW customers / Top reason for REPEAT customers
  if(/(top|main|biggest)\s+reason.*\b(new|fresh|first)\b.*customer|top reason for new|new customer.*reason/.test(q)){
    if(reasonIdx<0||custIdx<0)return{title:'Required columns missing',html:'<p>Reason or Customer Type column not found.</p>'};
    const newRows=rows.filter(r=>isNewVal(String(r[custIdx]||'').toLowerCase().trim()));
    if(!newRows.length)return{title:'No new customers found',html:'<p style="color:var(--muted)">No NEW-type entries in current filter.</p>'};
    const map={};newRows.forEach(r=>{const k=String(r[reasonIdx]||'').trim();if(k){if(!map[k])map[k]=0;map[k]++;}});
    const arr=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,N);
    const total=newRows.length;
    return{title:`🆕 Top ${arr.length} reasons for NEW customer loss · ${fi(total)} entries`,
      html:sortableTbl(['Reason','Count','Share%'],arr.map(([k,v])=>({cells:[`<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','I')">${k}</span>`,fi(v),`<span class="badge ${pct(v,total)>=20?'badge-red':pct(v,total)>=10?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`]})),null)};
  }
  if(/(top|main|biggest)\s+reason.*\b(repeat|repeated|returning)\b.*customer|top reason for repeat|repeat customer.*reason/.test(q)){
    if(reasonIdx<0||custIdx<0)return{title:'Required columns missing',html:'<p>Reason or Customer Type column not found.</p>'};
    const repRows=rows.filter(r=>isRepVal(String(r[custIdx]||'').toLowerCase().trim()));
    if(!repRows.length)return{title:'No repeat customers found',html:'<p style="color:var(--muted)">No REPEAT-type entries in current filter.</p>'};
    const map={};repRows.forEach(r=>{const k=String(r[reasonIdx]||'').trim();if(k){if(!map[k])map[k]=0;map[k]++;}});
    const arr=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,N);
    const total=repRows.length;
    return{title:`🔁 Top ${arr.length} reasons for REPEAT customer loss · ${fi(total)} entries`,
      html:sortableTbl(['Reason','Count','Share%'],arr.map(([k,v])=>({cells:[`<span class="clickable" onclick="showReasonStoresModal('${k.replace(/'/g,"\\'")}','I')">${k}</span>`,fi(v),`<span class="badge ${pct(v,total)>=20?'badge-red':pct(v,total)>=10?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`]})),null)};
  }

  // 14. Reason breakdown by time slot
  if(/reason.*\bby\s+time|reason.*\btime\s*slot|time.*reason|peak loss hour|peak hour|reason.*hour/.test(q)){
    if(reasonIdx<0)return{title:'Reason column missing',html:'<p>Reason column not detected.</p>'};
    const timeMap={};
    rows.forEach(r=>{if(!r._time)return;if(!timeMap[r._time])timeMap[r._time]={total:0,reasons:{}};timeMap[r._time].total++;const rsn=String(r[reasonIdx]||'').trim()||'(blank)';timeMap[r._time].reasons[rsn]=(timeMap[r._time].reasons[rsn]||0)+1;});
    const arr=Object.entries(timeMap).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    if(!arr.length)return{title:'No timing data',html:'<p style="color:var(--muted)">No time-slot data captured.</p>'};
    const total=rows.filter(r=>r._time).length;
    const tblRows=arr.map(([slot,v])=>{
      const top=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
      const peak=arr.reduce((m,[,vv])=>vv.total>m?vv.total:m,0);
      return{cells:[
        slot,
        fi(v.total),
        `<span class="badge ${pct(v.total,total)>=15?'badge-red':pct(v.total,total)>=8?'badge-amber':'badge-green'}">${pct(v.total,total)}%</span>`,
        v.total===peak?'<span class="badge badge-red">⚡ Peak</span>':v.total>=peak*.7?'<span class="badge badge-amber">High</span>':'',
        top?`${top[0]} (${top[1]})`:'—'
      ]};
    });
    return{title:`⏱️ Loss by time slot · top reason per slot`,html:sortableTbl(['Time slot','Total','Share%','Status','Top reason'],tblRows,['Total',fi(total),'100%','',''])};
  }

  // 15. Loss by day of week
  if(/day.*of.*week|weekday|monday|sunday|saturday|day.wise/.test(q)){
    const dowMap={};
    const dowNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    rows.forEach(r=>{if(!r._dk)return;const d=new Date(r._dk+'T00:00:00');if(isNaN(d))return;const dow=d.getDay();if(!dowMap[dow])dowMap[dow]=0;dowMap[dow]++;});
    const total=Object.values(dowMap).reduce((s,v)=>s+v,0);
    if(!total)return{title:'No date data',html:'<p style="color:var(--muted)">No parseable dates.</p>'};
    const peak=Math.max(...Object.values(dowMap));
    const tblRows=[0,1,2,3,4,5,6].map(d=>{
      const v=dowMap[d]||0;
      return{cells:[dowNames[d],fi(v),`<span class="badge ${pct(v,total)>=20?'badge-red':pct(v,total)>=14?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`,v===peak&&v>0?'<span class="badge badge-red">⚡ Peak</span>':'']};
    });
    return{title:'📅 Loss by day of week',html:sortableTbl(['Day','Count','Share%','Status'],tblRows,['Total',fi(total),'100%',''])};
  }

  // 16. Compare X vs Y
  const cmpMatch=q.match(/compar\w*\s+(.+?)\s+(?:vs|versus|with|and|to)\s+(.+)$/);
  if(cmpMatch){
    const a=cmpMatch[1].trim().toLowerCase();
    const b=cmpMatch[2].trim().toLowerCase();
    const allRMs=[...new Set(rows.map(r=>r._rm).filter(v=>v&&v!=='Unknown'))];
    const allMkts=[...new Set(rows.map(r=>r._wkStore?r._wkStore.market:null).filter(v=>v&&v!=='Unknown'))];
    const allStores=storeIdx>=0?[...new Set(rows.map(r=>String(r[storeIdx]||'').trim()).filter(Boolean))]:[];
    const fuzzy=(arr,t)=>arr.find(x=>x.toLowerCase()===t)||arr.find(x=>x.toLowerCase().includes(t));
    let matchA=null,matchB=null,dim='';
    matchA=fuzzy(allRMs,a);matchB=fuzzy(allRMs,b);if(matchA&&matchB)dim='RM';
    if(!dim){matchA=fuzzy(allMkts,a);matchB=fuzzy(allMkts,b);if(matchA&&matchB)dim='Market';}
    if(!dim){matchA=fuzzy(allStores,a);matchB=fuzzy(allStores,b);if(matchA&&matchB)dim='Store';}
    if(dim){
      const filterFn=(name)=>rows.filter(r=>{
        if(dim==='RM')return r._rm===name;
        if(dim==='Market')return r._wkStore&&r._wkStore.market===name;
        if(dim==='Store')return storeIdx>=0&&String(r[storeIdx]||'').trim()===name;
        return false;
      });
      const rA=filterFn(matchA),rB=filterFn(matchB);
      const ccA=getCustCounts(rA),ccB=getCustCounts(rB);
      const topReason=(rs)=>{const m={};rs.forEach(r=>{const k=reasonIdx>=0?String(r[reasonIdx]||''):'';if(k)m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1])[0];};
      const tA=topReason(rA),tB=topReason(rB);
      const topCat=(rs)=>{const m={};rs.forEach(r=>{const k=catIdx>=0?String(r[catIdx]||''):'';if(k)m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1])[0];};
      const cA=topCat(rA),cB=topCat(rB);
      const phBad=(rs)=>rs.filter(r=>r._mob!=='valid').length;
      const phA=phBad(rA),phB=phBad(rB);
      return{title:`Compare ${dim}: ${matchA} vs ${matchB}`,html:`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div style="background:#e6f5ee;border-radius:10px;padding:14px;">
            <div style="font-weight:600;color:var(--green);margin-bottom:8px;">${matchA}</div>
            <div style="font-size:13px;line-height:1.7;">
              <div><strong>Total loss:</strong> ${fi(rA.length)}</div>
              <div><strong>Stores affected:</strong> ${new Set(rA.map(r=>storeIdx>=0?String(r[storeIdx]||''):'')).size}</div>
              <div><strong>New customers:</strong> ${fi(ccA.new)} (${pct(ccA.new,ccA.new+ccA.repeat+ccA.other)}%)</div>
              <div><strong>Repeat customers:</strong> ${fi(ccA.repeat)} (${pct(ccA.repeat,ccA.new+ccA.repeat+ccA.other)}%)</div>
              <div><strong>Top reason:</strong> ${tA?tA[0]+' ('+tA[1]+')':'—'}</div>
              <div><strong>Top category:</strong> ${cA?cA[0]+' ('+cA[1]+')':'—'}</div>
              <div><strong>Bad phone%:</strong> ${pct(phA,rA.length)}%</div>
            </div>
          </div>
          <div style="background:#e6eefa;border-radius:10px;padding:14px;">
            <div style="font-weight:600;color:var(--blue);margin-bottom:8px;">${matchB}</div>
            <div style="font-size:13px;line-height:1.7;">
              <div><strong>Total loss:</strong> ${fi(rB.length)}</div>
              <div><strong>Stores affected:</strong> ${new Set(rB.map(r=>storeIdx>=0?String(r[storeIdx]||''):'')).size}</div>
              <div><strong>New customers:</strong> ${fi(ccB.new)} (${pct(ccB.new,ccB.new+ccB.repeat+ccB.other)}%)</div>
              <div><strong>Repeat customers:</strong> ${fi(ccB.repeat)} (${pct(ccB.repeat,ccB.new+ccB.repeat+ccB.other)}%)</div>
              <div><strong>Top reason:</strong> ${tB?tB[0]+' ('+tB[1]+')':'—'}</div>
              <div><strong>Top category:</strong> ${cB?cB[0]+' ('+cB[1]+')':'—'}</div>
              <div><strong>Bad phone%:</strong> ${pct(phB,rB.length)}%</div>
            </div>
          </div>
        </div>
        <div style="margin-top:1rem;padding:10px;background:#fff8e6;border-radius:8px;font-size:12px;">
          <strong>📊 Difference:</strong> ${matchA} has <strong>${rA.length-rB.length>0?'+':''}${fi(rA.length-rB.length)}</strong> more loss than ${matchB} (${rB.length>0?(rA.length>rB.length?'+':'')+Math.round((rA.length-rB.length)/rB.length*100)+'%':''})
        </div>`};
    }
    return{title:'Comparison not matched',html:`<p style="color:var(--muted);font-size:12px;">I couldn't find both "${a}" and "${b}" as RMs, Markets, or Stores. Check spelling.</p>`};
  }

  // 17. Pareto / 80% concentration
  if(/pareto|80\s*percent|80%|concentrat/.test(q)){
    const dim=/store/.test(q)?'store':/rm|regional/.test(q)?'rm':/market/.test(q)?'market':'store';
    const getter=dim==='rm'?(r=>r._rm&&r._rm!=='Unknown'?r._rm:null):dim==='market'?(r=>r._wkStore?r._wkStore.market:null):(r=>storeIdx>=0?String(r[storeIdx]||'').trim()||null:null);
    const map={};rows.forEach(r=>{const k=getter(r);if(k){if(!map[k])map[k]=0;map[k]++;}});
    const arr=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const total=arr.reduce((s,[,v])=>s+v,0);
    let cum=0,cnt80=0;
    for(const [,v] of arr){cum+=v;cnt80++;if(cum>=total*0.8)break;}
    const topPercent=Math.round(cnt80/arr.length*100);
    return{title:`📊 Pareto: ${cnt80} ${dim}s (top ${topPercent}%) cause 80% of loss`,
      html:`<p style="font-size:13px;margin-bottom:10px;">Out of <strong>${arr.length}</strong> ${dim}s, just <strong>${cnt80}</strong> account for 80% (${fi(Math.round(total*0.8))}) of total ${fi(total)} loss entries.</p>
      ${sortableTbl(['Rank',dim.charAt(0).toUpperCase()+dim.slice(1),'Count','Cumulative','Share%','Cum%'],
        arr.slice(0,Math.max(cnt80,N)).map(([k,v],i)=>{const csum=arr.slice(0,i+1).reduce((s,[,vv])=>s+vv,0);return{cells:[`#${i+1}${i<cnt80?' ⭐':''}`,k,fi(v),fi(csum),`${pct(v,total)}%`,`${pct(csum,total)}%`],_cls:i<cnt80?'audit-red':''};}),null,r=>r._cls)}`};
  }

  // 18. Worst conversion / best conversion (uses walkin data)
  if(/(worst|best)\s+conversion|conversion.*\b(rm|store|market)/.test(q)){
    const dim=/store/.test(q)?'store':/market/.test(q)?'market':'rm';
    const f2=getFilters();
    const filtStores=filterStores(_WK.stores,f2);
    const map={};
    filtStores.forEach(s=>{
      const dRange=daysInRange(s.days,f2);
      const w=dRange.reduce((a,d)=>a+d.w,0);const b=dRange.reduce((a,d)=>a+d.b,0);
      const k=dim==='rm'?s.rm:dim==='market'?s.market:s.outlet;
      if(!k||k==='Unknown')return;
      if(!map[k])map[k]={w:0,b:0};
      map[k].w+=w;map[k].b+=b;
    });
    const isWorst=/worst/.test(q);
    const arr=Object.entries(map).filter(([,v])=>v.w>=10).map(([k,v])=>({k,w:v.w,b:v.b,conv:pct(v.b,v.w)})).sort((a,b)=>isWorst?a.conv-b.conv:b.conv-a.conv).slice(0,N);
    return{title:`${isWorst?'⚠️ Worst':'🏆 Best'} ${arr.length} ${dim}s by conversion%`,
      html:sortableTbl(['Rank',dim.charAt(0).toUpperCase()+dim.slice(1),'Walkins','Bills','Conv%'],
        arr.map((r,i)=>({cells:[`#${i+1}`,r.k,fi(r.w),fi(r.b),`<span class="badge ${r.conv>=40?'badge-green':r.conv>=25?'badge-amber':'badge-red'}">${r.conv}%</span>`]})),null)};
  }

  // 19. Stores with both bad phone AND low coverage (data quality double-issue)
  if(/(both|two|multiple|all).*(issue|problem)|stores? with.*phone.*coverage|stores? with.*coverage.*phone|data quality issue|worst data/.test(q)){
    const f2=getFilters();
    const filtStores=filterStores(_WK.stores,f2);
    const issueStores=[];
    filtStores.forEach(s=>{
      const dRange=daysInRange(s.days,f2);
      const w=dRange.reduce((a,d)=>a+d.w,0);const b=dRange.reduce((a,d)=>a+d.b,0);const nb=w-b;
      const lsRows=rows.filter(r=>storeIdx>=0&&normStore(String(r[storeIdx]||''))===s.outletNorm);
      const ls=lsRows.length;const cov=pct(ls,nb);
      const badM=lsRows.filter(r=>r._mob!=='valid').length;const badPct=pct(badM,ls||1);
      if(cov<25&&badPct>20&&nb>0)issueStores.push({s,cov,badPct,nb,ls,badM});
    });
    issueStores.sort((a,b)=>(a.cov+50-a.badPct)-(b.cov+50-b.badPct)); // worst combined first
    const tblRows=issueStores.slice(0,N).map(({s,cov,badPct,nb,ls,badM})=>({cells:[
