window.showCatMarketModal=function(market){
  const f=getFilters();
  const rows=filterLS({...f,market});
  const total=rows.length;
  const{catIdx,reasonIdx,sizeIdx,styleIdx,storeIdx,subCatIdx}=_LS_IDX;

  function grpLocal(getKey){
    const m={};
    rows.forEach(r=>{const k=String(getKey(r)||'Unknown');if(!m[k])m[k]={c:0,stores:new Set()};m[k].c++;if(storeIdx>=0)m[k].stores.add(String(r[storeIdx]||''));});
    return Object.entries(m).sort((a,b)=>b[1].c-a[1].c);
  }
  const catRows=grpLocal(r=>catIdx>=0?r[catIdx]:'Unknown');
  const reasonRows=grpLocal(r=>reasonIdx>=0?r[reasonIdx]:'Unknown');
  const sizeRows=grpLocal(r=>sizeIdx>=0?r[sizeIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');
  const styleRows=grpLocal(r=>styleIdx>=0?r[styleIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');
  const subCatRows=grpLocal(r=>subCatIdx>=0?r[subCatIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');

  const prAlert=sh=>sh>=30?'<span class="badge badge-red">High</span>':sh>=15?'<span class="badge badge-amber">Medium</span>':'<span class="badge badge-green">Low</span>';

  openModal(`${market} — Category & Reason Analysis`,`${fi(total)} loss entries`,`
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.25rem;">
      <div class="metric amber"><div class="lbl">Total loss</div><div class="val">${fi(total)}</div></div>
      <div class="metric"><div class="lbl">Categories</div><div class="val">${catRows.length}</div></div>
      <div class="metric"><div class="lbl">Reasons</div><div class="val">${reasonRows.length}</div></div>
    </div>
    <div class="two-col">
      <div>
        <div class="section-lbl">Loss by category</div>
        ${sortableTbl(['Category','Count','Stores','Share%','Alert'],catRows.map(([k,v])=>{const sh=pct(v.c,total);return{cells:[k,fi(v.c),fi(v.stores.size),`${sh}%`,prAlert(sh)]};}))}
      </div>
      <div>
        <div class="section-lbl">Loss by reason</div>
        ${sortableTbl(['Reason','Count','Stores','Share%','Alert'],reasonRows.map(([k,v])=>{const sh=pct(v.c,total);return{cells:[k,fi(v.c),fi(v.stores.size),`${sh}%`,prAlert(sh)]};}))}
      </div>
    </div>
    ${sizeRows.length?`<div class="two-col">
      <div>
        <div class="section-lbl">Loss by size</div>
        ${sortableTbl(['Size','Count','Share%'],sizeRows.map(([k,v])=>({cells:[k,fi(v.c),`${pct(v.c,total)}%`]})))}
      </div>
      <div>

// Analyzes the "Purpose" column (col T) — why customers came in.
// Cross-references Purpose × Category, Purpose × Reason, Purpose × Store, Purpose × Market.
function renderPurpose(){
  const target=document.getElementById('purp');
  const f=getFilters();
  const{purposeIdx,catIdx,reasonIdx,storeIdx,custIdx,empIdx}=_LS_IDX;

  if(purposeIdx<0){
    target.innerHTML=`<div class="err-card">
      ⚠️ <strong>Purpose column not detected in the sheet.</strong><br>
      Add a column named <code>Purpose</code> (typical values: Self Use, Gift, Wedding, Engagement, etc.) to your Loss of sale data tab and reload. Column T is the expected position.
    </div>`;
    return;
  }

  const rows=filterLS(f);
  const total=rows.length;
  if(!total){
    target.innerHTML=`<div class="err-card">No loss of sale data for the selected filters.</div>`;
    return;
  }

  // ── Helper: group rows by getKey, capturing related dimensions ──
  function grp(rows,getKey){
    const m={};
    rows.forEach(r=>{
      const k=String(getKey(r)||'').trim()||'(blank)';
      if(!m[k])m[k]={c:0,stores:new Set(),reasons:{},cats:{},custs:{},markets:new Set()};
      m[k].c++;
      if(storeIdx>=0){const s=String(r[storeIdx]||'').trim();if(s)m[k].stores.add(s);}
      if(reasonIdx>=0){const v=String(r[reasonIdx]||'').trim();if(v)m[k].reasons[v]=(m[k].reasons[v]||0)+1;}
      if(catIdx>=0){const v=String(r[catIdx]||'').trim();if(v)m[k].cats[v]=(m[k].cats[v]||0)+1;}
      if(custIdx>=0){const v=String(r[custIdx]||'').trim();if(v)m[k].custs[v]=(m[k].custs[v]||0)+1;}
      if(r._wkStore&&r._wkStore.market)m[k].markets.add(r._wkStore.market);
    });
    return Object.entries(m).sort((a,b)=>b[1].c-a[1].c);
  }
  const topOf=(obj)=>Object.entries(obj).sort((a,b)=>b[1]-a[1])[0];

  const purposeGrp=grp(rows,r=>r[purposeIdx]);
  const top1=purposeGrp[0],top2=purposeGrp[1],top3=purposeGrp[2];
  const top3Pct=pct((top1?top1[1].c:0)+(top2?top2[1].c:0)+(top3?top3[1].c:0),total);
  const blankCount=purposeGrp.find(([k])=>k==='(blank)')?.[1]?.c||0;
  const blankPct=pct(blankCount,total);

  // Cross matrices: Purpose × Reason, Purpose × Category
  const allPurposes=purposeGrp.filter(([k])=>k!=='(blank)').map(([k])=>k);
  const topReasonsList=[...new Set(rows.map(r=>String(r[reasonIdx]||'').trim()).filter(Boolean))]
    .map(rsn=>({rsn,c:rows.filter(r=>String(r[reasonIdx]||'').trim()===rsn).length}))
    .sort((a,b)=>b.c-a.c).slice(0,6).map(x=>x.rsn);
  const topCatsList=[...new Set(rows.map(r=>String(r[catIdx]||'').trim()).filter(Boolean))]
    .map(cat=>({cat,c:rows.filter(r=>String(r[catIdx]||'').trim()===cat).length}))
    .sort((a,b)=>b.c-a.c).slice(0,8).map(x=>x.cat);

  function buildCross(rowKeys,colKeys,getRowKey,getColKey){
    const M={};
    rows.forEach(r=>{
      const rk=String(getRowKey(r)||'').trim()||'(blank)';
      const ck=String(getColKey(r)||'').trim();
      if(!ck)return;
      if(!M[rk])M[rk]={};
      M[rk][ck]=(M[rk][ck]||0)+1;
    });
    return M;
  }
  const purposeReasonM=buildCross(allPurposes,topReasonsList,r=>r[purposeIdx],r=>r[reasonIdx]);
  const purposeCatM=buildCross(allPurposes,topCatsList,r=>r[purposeIdx],r=>r[catIdx]);

  // Build banner + content
  const prAlert=sh=>sh>=30?'<span class="badge badge-red">High</span>':sh>=15?'<span class="badge badge-amber">Medium</span>':'<span class="badge badge-green">Low</span>';

  target.innerHTML=`
    <div style="background:linear-gradient(135deg,#f0faf5 0%,#fff 100%);border:1px solid #b8e0cc;border-left:4px solid var(--green);border-radius:10px;padding:14px 18px;margin-bottom:1.25rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">🎯 Purpose Analysis</div>
      <div style="font-size:12px;color:var(--muted);">Why did customers walk in? Self-use, gift, wedding, engagement, etc. (col T). Cross-referenced with Reason, Category, Store, Market.</div>
    </div>

    <div class="metrics">
      <div class="metric"><div class="lbl">Total loss entries</div><div class="val">${fi(total)}</div><div class="sub">${blankCount?fi(blankCount)+' blank ('+blankPct+'%)':'all have Purpose'}</div></div>
      <div class="metric green"><div class="lbl">Distinct purposes</div><div class="val">${purposeGrp.filter(([k])=>k!=='(blank)').length}</div></div>
      <div class="metric red"><div class="lbl">Top purpose</div><div class="val" style="font-size:18px">${top1?top1[0]:'—'}</div><div class="sub">${top1?fi(top1[1].c)+' entries · '+pct(top1[1].c,total)+'%':''}</div></div>
      <div class="metric amber"><div class="lbl">Top-3 concentration</div><div class="val">${top3Pct}%</div><div class="sub">${top3Pct>=70?'concentrated':'spread'}</div></div>
    </div>

    <!-- Insights row -->
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.75rem;">Insights & actionables</div>
    <div class="insights" style="margin-bottom:1.25rem;">
      <div class="insight red"><div class="i-label">🔴 #1 Purpose</div><div class="i-val">${top1?pct(top1[1].c,total):0}%</div><div class="i-title">${top1?top1[0]:'—'}</div><div class="i-body">Train staff to convert this purpose specifically.</div></div>
      <div class="insight amber"><div class="i-label">🟡 #2 Purpose</div><div class="i-val">${top2?pct(top2[1].c,total):0}%</div><div class="i-title">${top2?top2[0]:'—'}</div><div class="i-body">Secondary focus area.</div></div>
      <div class="insight ${blankPct>=20?'red':blankPct>=5?'amber':'green'}"><div class="i-label">${blankPct>=20?'🔴':blankPct>=5?'🟡':'🟢'} Data completeness</div><div class="i-val">${100-blankPct}%</div><div class="i-title">${blankCount?fi(blankCount)+' missing':'All captured'}</div><div class="i-body">${blankPct>=20?'Many entries missing purpose — staff training needed.':blankPct>=5?'Some missing — improve capture rate.':'Excellent capture rate.'}</div></div>
    </div>

    <!-- Main purpose breakdown -->
    <div class="card">
      <div class="card-title">By Purpose — click a row to drill to stores</div>
      ${sortableTbl(
        ['Purpose','Count','Stores','Markets','Top reason','Top category','Top customer type','Share%','Alert'],
        purposeGrp.map(([k,v])=>{
          const sh=pct(v.c,total);
          const tR=topOf(v.reasons);const tC=topOf(v.cats);const tCu=topOf(v.custs);
          return{cells:[
            k==='(blank)'?'<span style="color:var(--muted);font-style:italic">(no purpose entered)</span>':`<span class="clickable" onclick="showPurposeStoresModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
            fi(v.c),
            fi(v.stores.size),
            fi(v.markets.size),
            tR?tR[0]:'—',
            tC?tC[0]:'—',
            tCu?tCu[0]+' ('+tCu[1]+')':'—',
            `${sh}%`,
            prAlert(sh)
          ]};
        }),
        ['Total',fi(total),'','','','','','100%','']
      )}
    </div>

    <!-- Purpose × Category cross-table -->
    <div class="card">
      <div class="card-title">Purpose × Category — which categories are bought for which purpose</div>
      <div class="tw"><table id="purp-cat-tbl">
        <thead><tr>
          <th>Purpose</th>
          ${topCatsList.map(c=>`<th style="max-width:100px;white-space:normal;font-size:10px;">${c}</th>`).join('')}
          <th>Total</th>
        </tr></thead>
        <tbody>${allPurposes.map(p=>{
          const totalP=purposeReasonM[p]?Object.values(purposeReasonM[p]).reduce((s,v)=>s+v,0):0;
          const catTotal=(purposeGrp.find(([k])=>k===p)?.[1]?.c)||0;
          return`<tr>
            <td><strong>${p}</strong></td>
            ${topCatsList.map(c=>{
              const v=purposeCatM[p]?purposeCatM[p][c]||0:0;
              const sh=pct(v,catTotal);
              return`<td>${v>0?`<span style="font-weight:600;color:${sh>=30?'var(--red)':sh>=15?'var(--amber)':'var(--text)'}">${v}</span><span style="font-size:10px;color:var(--muted);"> (${sh}%)</span>`:'—'}</td>`;
            }).join('')}
            <td><strong>${fi(catTotal)}</strong></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

    <!-- Purpose × Reason cross-table -->
    <div class="card">
      <div class="card-title">Purpose × Reason — why each purpose-segment walks away</div>
      <div class="tw"><table id="purp-rsn-tbl">
        <thead><tr>
          <th>Purpose</th>
          ${topReasonsList.map(r=>`<th style="max-width:120px;white-space:normal;font-size:10px;">${r}</th>`).join('')}
          <th>Total</th>
        </tr></thead>
        <tbody>${allPurposes.map(p=>{
          const totalP=(purposeGrp.find(([k])=>k===p)?.[1]?.c)||0;
          return`<tr>
            <td><strong>${p}</strong></td>
            ${topReasonsList.map(rsn=>{
              const v=purposeReasonM[p]?purposeReasonM[p][rsn]||0:0;
              const sh=pct(v,totalP);
              return`<td>${v>0?`<span style="font-weight:600;color:${sh>=30?'var(--red)':sh>=15?'var(--amber)':'var(--text)'}">${v}</span><span style="font-size:10px;color:var(--muted);"> (${sh}%)</span>`:'—'}</td>`;
            }).join('')}
            <td><strong>${fi(totalP)}</strong></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

    <!-- Store × Purpose coverage matrix (Zero = not collected) -->
    ${(()=>{
      // Build store × purpose matrix from ALL rows (no filter on purpose).
      // Each store gets a row, each distinct purpose value a column, plus a "(blank)" column
      // for entries where the staff didn't capture purpose. Stores with zero data in a
      // given purpose column show "0".
      const purposeKeys=[...allPurposes,'(blank)']; // include blank as last column
      const storeM={};
      rows.forEach(r=>{
        if(storeIdx<0)return;
        const sn=String(r[storeIdx]||'').trim()||'Unknown';
        if(!storeM[sn])storeM[sn]={total:0,market:'—',rm:'—',cluster:'—',purposes:{}};
        storeM[sn].total++;
        purposeKeys.forEach(p=>{if(!(p in storeM[sn].purposes))storeM[sn].purposes[p]=0;});
        const pVal=String(r[purposeIdx]||'').trim()||'(blank)';
        storeM[sn].purposes[pVal]=(storeM[sn].purposes[pVal]||0)+1;
        if(r._wkStore){storeM[sn].market=r._wkStore.market;storeM[sn].rm=r._wkStore.rm;storeM[sn].cluster=r._wkStore.cluster;}
      });
      // Pull walkin-side stores that may have NO loss entries at all but should still be flagged
      // (these stores have collected zero loss data so by definition zero purpose data).
      const f2=getFilters();
      const wkStoresFilt=filterStores(_WK.stores,f2);
      wkStoresFilt.forEach(s=>{
        if(!storeM[s.outlet]){
          storeM[s.outlet]={total:0,market:s.market,rm:s.rm,cluster:s.cluster,purposes:Object.fromEntries(purposeKeys.map(p=>[p,0]))};
        }
      });
      const arr=Object.entries(storeM);
      const totalStores=arr.length;
      const totalCollected=arr.filter(([,v])=>v.purposes['(blank)']<v.total||v.total===0?false:false||v.total-v.purposes['(blank)']>0).length;
      const zeroStores=arr.filter(([,v])=>v.total===0||(v.total-v.purposes['(blank)'])===0).length;
      const allBlankStores=arr.filter(([,v])=>v.total>0&&v.purposes['(blank)']===v.total).length;
      // Sort: zero-collection first, then lowest coverage% next, then largest total descending
      arr.sort((a,b)=>{
        const aCov=a[1].total>0?(a[1].total-a[1].purposes['(blank)'])/a[1].total:0;
        const bCov=b[1].total>0?(b[1].total-b[1].purposes['(blank)'])/b[1].total:0;
        if(aCov!==bCov)return aCov-bCov;
        return b[1].total-a[1].total;
      });

      const cls=cov=>cov>=70?'badge-green':cov>=30?'badge-amber':'badge-red';
      const tblRows=arr.map(([sn,v])=>{
        const collected=v.total-v.purposes['(blank)'];
        const cov=v.total>0?Math.round(collected/v.total*100):0;
        const blankBadge=v.total===0
          ? '<span class="badge badge-red">No loss data</span>'
          : v.purposes['(blank)']===v.total
            ? '<span class="badge badge-red">All blank</span>'
            : v.purposes['(blank)']>0
              ? '<span class="badge badge-amber">'+fi(v.purposes['(blank)'])+' blank</span>'
              : '<span class="badge badge-green">All captured</span>';
        return{cells:[
          v.total===0?sn:`<span class="clickable" onclick="showStoreModal('${sn.replace(/'/g,"\\'")}')">${sn}</span>`,
          v.market||'—',v.rm||'—',
          ...allPurposes.map(p=>{
            const c=v.purposes[p]||0;
            return c===0?'<span style="color:var(--muted)">0</span>':`<strong style="color:var(--green)">${fi(c)}</strong>`;
          }),
          v.purposes['(blank)']>0?`<strong style="color:var(--amber)">${fi(v.purposes['(blank)'])}</strong>`:'<span style="color:var(--muted)">0</span>',
          fi(v.total),
          v.total===0?'<span class="badge badge-red">—</span>':`<span class="badge ${cls(cov)}">${cov}%</span>`,
          blankBadge
        ],_cls:(v.total===0||v.purposes['(blank)']===v.total)?'audit-red':v.purposes['(blank)']>0?'audit-amber':''};
      });

      return`<div class="card">
        <div class="card-title">🚨 Store × Purpose coverage — stores that aren't collecting Purpose data (Zero = not captured)</div>
        <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1rem;">
          <div class="metric"><div class="lbl">Total stores</div><div class="val">${fi(totalStores)}</div></div>
          <div class="metric red"><div class="lbl">🔴 Not collecting at all</div><div class="val">${fi(zeroStores+allBlankStores)}</div><div class="sub">${zeroStores} no-data · ${allBlankStores} all-blank</div></div>
          <div class="metric amber"><div class="lbl">🟡 Partial collection</div><div class="val">${fi(arr.filter(([,v])=>v.total>0&&v.purposes['(blank)']>0&&v.purposes['(blank)']<v.total).length)}</div><div class="sub">some blank entries</div></div>
          <div class="metric green"><div class="lbl">🟢 Full coverage</div><div class="val">${fi(arr.filter(([,v])=>v.total>0&&v.purposes['(blank)']===0).length)}</div><div class="sub">every entry has purpose</div></div>
        </div>
        <p style="font-size:11px;color:var(--muted);margin-bottom:.5rem;">Sorted by lowest coverage first. Stores with red rows need immediate staff training on Purpose capture. Click any column header to re-sort.</p>
        ${sortableTbl(
          ['Store','Market','RM',...allPurposes,'(blank)','Total entries','Coverage%','Status'],
          tblRows,
          (()=>{
            const totRow=allPurposes.map(p=>fi(arr.reduce((s,[,v])=>s+(v.purposes[p]||0),0)));
            const totBlank=arr.reduce((s,[,v])=>s+(v.purposes['(blank)']||0),0);
            const totEntries=arr.reduce((s,[,v])=>s+v.total,0);
            const overallCov=totEntries>0?Math.round((totEntries-totBlank)/totEntries*100):0;
            return['Total','','',...totRow,fi(totBlank),fi(totEntries),`<span class="badge ${cls(overallCov)}">${overallCov}%</span>`,''];
          })(),
          r=>r._cls
        )}
      </div>`;
    })()}`;
  setTimeout(()=>{makeSortable('purp-cat-tbl');makeSortable('purp-rsn-tbl');},50);
}

// ── PURPOSE STORE DRILLDOWN MODAL ─────────────────────────
// Click a purpose name → see which stores have this purpose loss.

    storeMap[store].c++;
    if(reasonIdx>=0){const v=String(r[reasonIdx]||'');if(v)storeMap[store].reasons[v]=(storeMap[store].reasons[v]||0)+1;}
    if(catIdx>=0){const v=String(r[catIdx]||'');if(v)storeMap[store].cats[v]=(storeMap[store].cats[v]||0)+1;}
    if(custIdx>=0){const v=String(r[custIdx]||'');if(v)storeMap[store].custs[v]=(storeMap[store].custs[v]||0)+1;}
    if(r._wkStore){storeMap[store].market=r._wkStore.market;storeMap[store].rm=r._wkStore.rm;}
  });
  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1].c-a[1].c);
  const topOf=(obj)=>Object.entries(obj).sort((a,b)=>b[1]-a[1])[0];

  // Market + customer aggregates
  const mktMap={},custMap={};
  rows.forEach(r=>{
    const m=r._wkStore?r._wkStore.market:'Unknown';mktMap[m]=(mktMap[m]||0)+1;
    if(custIdx>=0){const c=String(r[custIdx]||'').trim();if(c)custMap[c]=(custMap[c]||0)+1;}
  });
  const mktArr=Object.entries(mktMap).sort((a,b)=>b[1]-a[1]);
  const custArr=Object.entries(custMap).sort((a,b)=>b[1]-a[1]);

  const tblRows=storeArr.map(([k,v])=>{
    const tR=topOf(v.reasons);const tC=topOf(v.cats);
    const custBreak=Object.entries(v.custs).map(([ck,cv])=>`${ck}:${cv}`).join(', ');
    return{cells:[
      `<span class="clickable" onclick="showStoreModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
      v.market,v.rm,
      `<strong style="font-size:14px;color:var(--green)">${fi(v.c)}</strong>`,
      `${pct(v.c,total)}%`,
      tR?tR[0]:'—',
      tC?tC[0]:'—',
      custBreak||'—'
    ]};
  });

  openModal(`🎯 Purpose: "${purpose}"`,`${fi(total)} entries · ${storeArr.length} stores · ${mktArr.length} markets`,`
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric green"><div class="lbl">Entries for this purpose</div><div class="val">${fi(total)}</div></div>
      <div class="metric"><div class="lbl">Stores affected</div><div class="val">${storeArr.length}</div></div>
      <div class="metric"><div class="lbl">Markets affected</div><div class="val">${mktArr.length}</div></div>
      <div class="metric amber"><div class="lbl">Top market</div><div class="val" style="font-size:14px">${mktArr[0]?mktArr[0][0]:'—'}</div><div class="sub">${mktArr[0]?fi(mktArr[0][1])+' entries':''}</div></div>
    </div>

    ${custArr.length?`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;">
      ${custArr.map(([k,v])=>`
        <div style="background:${k.toLowerCase().includes('new')?'#e6f5ee':k.toLowerCase().includes('repeat')?'#e6eefa':'#fff8e6'};border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">${k}</div>
          <div style="font-size:24px;font-weight:600;color:${k.toLowerCase().includes('new')?'var(--green)':k.toLowerCase().includes('repeat')?'var(--blue)':'var(--amber)'};">${fi(v)}</div>
          <div style="font-size:11px;color:var(--muted);">${pct(v,total)}% of this purpose</div>
        </div>`).join('')}
    </div>`:''}

    <div class="section-lbl">Store-wise — click a store for full detail (purpose breakdown included)</div>
    ${sortableTbl(
      ['Store','Market','RM','Count','Share%','Top reason','Top category','Customer type'],
      tblRows,
      ['Total','','',fi(total),'100%','','','']
    )}`);
};

// ── AUDIT TAB ─────────────────────────────────────────────
function renderAudit(){
  const f=getFilters();
  const filtStores=filterStores(_WK.stores,f);
  const filtLS=filterLS(f);
  const{storeIdx,reasonIdx,phoneIdx,subCatIdx,sizeIdx,styleIdx,colorIdx,polishIdx,designIdx,notesIdx}=_LS_IDX;

  const storeAudit=filtStores.map(s=>{
    const w=daysInRange(s.days,f).reduce((a,d)=>a+d.w,0);
    const b=daysInRange(s.days,f).reduce((a,d)=>a+d.b,0);
    const nb=w-b;
    const lsRows=filtLS.filter(r=>normStore(String(r[storeIdx]||''))===s.outletNorm);
    const ls=lsRows.length;const lsCov=pct(ls,nb);
    const badM=lsRows.filter(r=>r._mob!=='valid').length;const mobPct=pct(badM,ls||1);
    const rMap={};lsRows.forEach(r=>{const k=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';rMap[k]=(rMap[k]||0)+1;});
    const topReason=Object.entries(rMap).sort((a,b)=>b[1]-a[1])[0];
    const topReasonPct=topReason?pct(topReason[1],ls||1):0;
    return{outlet:s.outlet,market:s.market,rm:s.rm,w,b,nb,ls,lsCov,badM,mobPct,topReason:topReason?topReason[0]:'—',topReasonPct};
  }).sort((a,b)=>a.lsCov-b.lsCov);

  const covRows=storeAudit.map(s=>({cells:[`<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,s.market,s.rm,fi(s.nb),fi(s.ls),`<span class="badge ${bc(s.lsCov)}">${s.lsCov}%</span>`,s.lsCov<10?'<span class="badge badge-red">🔴 Critical</span>':s.lsCov<25?'<span class="badge badge-amber">🟡 Low</span>':'<span class="badge badge-green">🟢 OK</span>'],_cls:s.lsCov<10?'audit-red':s.lsCov<25?'audit-amber':''}));
  const mobRows=storeAudit.filter(s=>s.ls>0).sort((a,b)=>b.mobPct-a.mobPct).map(s=>({cells:[`<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,s.market,s.rm,fi(s.ls),fi(s.badM),`${s.mobPct}%`,s.mobPct>50?'<span class="badge badge-red">🔴 Critical</span>':s.mobPct>20?'<span class="badge badge-amber">🟡 High</span>':'<span class="badge badge-green">🟢 OK</span>'],_cls:s.mobPct>50?'audit-red':s.mobPct>20?'audit-amber':''}));
  const repRows=storeAudit.filter(s=>s.ls>0&&s.topReasonPct>=50).sort((a,b)=>b.topReasonPct-a.topReasonPct).map(s=>({cells:[`<span class="clickable" onclick="showStoreModal('${s.outlet.replace(/'/g,"\\'")}')">${s.outlet}</span>`,s.market,s.rm,s.topReason,fi(s.ls),`${s.topReasonPct}%`,s.topReasonPct>=70?'<span class="badge badge-red">🔴 Repetitive</span>':'<span class="badge badge-amber">🟡 Watch</span>'],_cls:s.topReasonPct>=70?'audit-red':'audit-amber'}));
  const prodMap={};
  filtLS.forEach(r=>{const k=r._product;if(!k||k==='Unknown')return;if(!prodMap[k])prodMap[k]={c:0,stores:new Set(),reasons:{}};prodMap[k].c++;prodMap[k].stores.add(normStore(String(r[storeIdx]||'')));const reason=reasonIdx>=0?String(r[reasonIdx]||''):'';if(reason)prodMap[k].reasons[reason]=(prodMap[k].reasons[reason]||0)+1;});
  const prodArr=Object.entries(prodMap).sort((a,b)=>b[1].c-a[1].c).slice(0,30);
  const prodRows=prodArr.map(([k,v],i)=>{const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];return{cells:[k,fi(v.c),fi(v.stores.size),topR?topR[0]:'—',i<5?'<span class="badge badge-red">🔴 High repeat</span>':i<15?'<span class="badge badge-amber">🟡 Watch</span>':'<span class="badge badge-green">OK</span>'],_cls:i<5?'audit-red':i<15?'audit-amber':''};});

  // ── PHONE NUMBER QUALITY — MARKET-LEVEL ROLLUP ─────────
  // Each market shows: total LS · invalid count · bad%. Click market → modal showing RMs in that market.
  // Click RM → modal showing stores under that RM. Stores show their own bad% counts.
  const phoneMktMap={};
  filtLS.forEach(r=>{
    const mkt=r._wkStore?r._wkStore.market:'Unknown';
    if(!phoneMktMap[mkt])phoneMktMap[mkt]={total:0,bad:0,rms:new Set(),stores:new Set()};
    phoneMktMap[mkt].total++;
    if(r._mob!=='valid')phoneMktMap[mkt].bad++;
    const rm=r._wkStore?r._wkStore.rm:r._rm;
    if(rm&&rm!=='Unknown')phoneMktMap[mkt].rms.add(rm);
    const sn=storeIdx>=0?String(r[storeIdx]||'').trim():'';
    if(sn)phoneMktMap[mkt].stores.add(sn);
  });
  const phoneMktArr=Object.entries(phoneMktMap).filter(([,v])=>v.total>0).sort((a,b)=>b[1].bad/Math.max(b[1].total,1)-a[1].bad/Math.max(a[1].total,1));
  const phoneMktRows=phoneMktArr.map(([mkt,v])=>{
    const badPct=pct(v.bad,v.total);
    const status=badPct>50?'<span class="badge badge-red">🔴 Critical</span>':badPct>20?'<span class="badge badge-amber">🟡 High</span>':'<span class="badge badge-green">🟢 OK</span>';
    return{cells:[
      `<span class="clickable" onclick="showPhoneMarketModal('${mkt.replace(/'/g,"\\'")}')">${mkt}</span>`,
      fi(v.rms.size),
      fi(v.stores.size),
      fi(v.total),
      fi(v.bad),
      `<span class="badge ${badPct>50?'badge-red':badPct>20?'badge-amber':'badge-green'}">${badPct}%</span>`,
      status
    ],_cls:badPct>50?'audit-red':badPct>20?'audit-amber':''};
  });
  // Cache for the modals
  window._phoneAuditCtx=filtLS;

  // ── ABNORMAL REASON FLAGGING (col J) ──────────────────────
  // Whitelist of reasons that should always be flagged for review,
  // PLUS auto-flag any reason with <2% share of total LS rows.
  const ABNORMAL_REASONS=new Set([
    'discount expectation not met',
    'offer not valid in store',
    'perceived poor value for money',
    'polish not available',
    'personalization not available',
    'found substitute product at lower price',
    'found cheaper online',
    '(blank)',
    'fit not comfortable',
    'repair service not available',
    'price mismatch with website'
  ]);
  const subRIdx=_LS_IDX.subReasonIdx>=0&&_LS_IDX.subReasonIdx!==reasonIdx?_LS_IDX.subReasonIdx:reasonIdx;
  const subRMap={};
  filtLS.forEach(r=>{
    if(subRIdx<0)return;
    const v=String(r[subRIdx]||'').trim()||'(blank)';
    if(!subRMap[v])subRMap[v]={c:0,stores:new Set(),rms:new Set(),markets:new Set()};
    subRMap[v].c++;
    const sn=storeIdx>=0?String(r[storeIdx]||''):'';
    if(sn)subRMap[v].stores.add(sn);
    if(r._wkStore){
      if(r._wkStore.rm&&r._wkStore.rm!=='Unknown')subRMap[v].rms.add(r._wkStore.rm);
      if(r._wkStore.market&&r._wkStore.market!=='Unknown')subRMap[v].markets.add(r._wkStore.market);
    }
  });
  const totalLSAudit=filtLS.length;
  const abnRows=[];
  Object.entries(subRMap).forEach(([reason,v])=>{
    const sh=pct(v.c,totalLSAudit);
    const lc=reason.toLowerCase();
    const isWhitelisted=ABNORMAL_REASONS.has(lc);
    const isLowFreq=sh<2&&v.c>0;
    if(!isWhitelisted&&!isLowFreq)return;
    const flagType=isWhitelisted?(isLowFreq?'whitelisted+rare':'whitelisted'):'rare';
    abnRows.push({reason,c:v.c,stores:v.stores.size,rms:v.rms.size,markets:v.markets.size,sh,flagType,isWhitelisted,isLowFreq});
  });
  // Sort: whitelisted first (alphabetic), then rare ones by count desc
  abnRows.sort((a,b)=>{
    if(a.isWhitelisted!==b.isWhitelisted)return a.isWhitelisted?-1:1;
    if(a.isWhitelisted)return a.reason.localeCompare(b.reason);
    return b.c-a.c;
  });
  const abnTblRows=abnRows.map(r=>{
    const flagBadge=r.isWhitelisted&&r.isLowFreq?'<span class="badge badge-red">🔴 Whitelisted + Rare</span>':r.isWhitelisted?'<span class="badge badge-red">🔴 Notify</span>':'<span class="badge badge-amber">🟡 Rare (<2%)</span>';
    return{cells:[
      `<span class="clickable" onclick="showReasonStoresModal('${r.reason.replace(/'/g,"\\'")}','${subRIdx===_LS_IDX.subReasonIdx?'J':'I'}')">${r.reason}</span>`,
      fi(r.c),
      fi(r.stores),
      fi(r.rms),
      fi(r.markets),
      `${r.sh}%`,
      flagBadge
    ],_cls:r.isWhitelisted?'audit-red':'audit-amber'};
  });
  const abnCriticalCount=abnRows.filter(r=>r.isWhitelisted).length;
  const abnRareCount=abnRows.filter(r=>!r.isWhitelisted&&r.isLowFreq).length;

  const covCritical=storeAudit.filter(s=>s.lsCov<10).length;
  const mobCritical=storeAudit.filter(s=>s.mobPct>50&&s.ls>0).length;
  const repCritical=storeAudit.filter(s=>s.topReasonPct>=70&&s.ls>0).length;

  // ── NOTES & PATTERNS ───────────────────────────────────
  // Extract recurring phrases (1-3 word n-grams) from Customer Notes + Notes
  // columns. Surface each phrase with the top values seen for color/size/style/
  // polish/design# in the rows where the phrase appeared. Also list repeated
  // design numbers separately so "X customers requested the same design" is visible.
  const {custNotesIdx,notes2Idx,colorIdx:_colIdx,sizeIdx:_szIdx,styleIdx:_stIdx,polishIdx:_polIdx,designIdx:_dnIdx}=_LS_IDX;
  const noteCols=[custNotesIdx,notes2Idx].filter(v=>v>=0&&v!==undefined);
  const STOP_NOTES=new Set(['the','of','and','in','on','for','to','a','an','is','are','with','our','my','your','i','no','not','by','at','this','that','was','it','be','have','has','as','from','but','or','if','do','does','did','can','will','want','wanted','need','needed','looking','look','please','customer','cust','rs','some','more','same','also','any','all','one','two','should','would','only','told','said','asked','came','went','dont','don','they','them','their','her','his','she','he','were','been','wants','request','requested','show','showed','will','than','then','when','where','which','what','who','why','how','here','there','very','just','too','out','up','down','off','about','into','over','under','again','still','now','already','too','much','many','few','little','first','last','next','old','new']);
  const SIZE_PAT=/^\d+(\.\d+|[-–]\d+(\.\d+)?)?$/;
  function tokenizeNotes(text){
    return String(text||'')
      .toLowerCase()
      .replace(/[^a-z0-9.\-]+/g,' ')
      .split(/\s+/)
      .filter(t=>t&&!STOP_NOTES.has(t)&&(t.length>=3||SIZE_PAT.test(t)));
  }
  const phraseRowIdx={};
  if(noteCols.length){
    filtLS.forEach((r,idx)=>{
      const text=noteCols.map(c=>String(r[c]||'')).join(' | ');
      if(!text.trim())return;
      const toks=tokenizeNotes(text);
      const phrases=new Set();
      // Unigrams: only meaningful tokens (≥4 chars, or matches size pattern)
      toks.forEach(t=>{if(t.length>=4||SIZE_PAT.test(t))phrases.add(t);});
      for(let i=0;i<toks.length-1;i++)phrases.add(toks[i]+' '+toks[i+1]);
      for(let i=0;i<toks.length-2;i++)phrases.add(toks[i]+' '+toks[i+1]+' '+toks[i+2]);
      phrases.forEach(p=>{if(!phraseRowIdx[p])phraseRowIdx[p]=[];phraseRowIdx[p].push(idx);});
    });
  }
  const topPhrases=Object.entries(phraseRowIdx).filter(([,arr])=>arr.length>=3).sort((a,b)=>b[1].length-a[1].length).slice(0,40);

  const _topOf2=m=>Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k,c])=>`${k} (${c})`).join(', ');
  const _aggCol=(rows,ix)=>{
    if(ix<0||ix===undefined)return '<span style="color:var(--muted)">—</span>';
    const m={};rows.forEach(r=>{const v=String(r[ix]||'').trim();if(v&&v!=='-')m[v]=(m[v]||0)+1;});
    return _topOf2(m)||'<span style="color:var(--muted)">—</span>';
  };

  const phraseTblRows=topPhrases.map(([phrase,idxs])=>{
    const rows=idxs.map(i=>filtLS[i]);
    const stores=new Set(rows.map(r=>String(r[storeIdx]||'')).filter(Boolean)).size;
    return{cells:[
      `<strong>${phrase}</strong>`,
      fi(idxs.length),
      fi(stores),
      _aggCol(rows,_colIdx),
      _aggCol(rows,_szIdx),
      _aggCol(rows,_stIdx),
      _aggCol(rows,_polIdx),
      _aggCol(rows,_dnIdx)
    ]};
  });

  // Repeated design numbers (independent of notes columns)
  const designReqMap={};
  if(_dnIdx>=0){
    filtLS.forEach((r,idx)=>{
      const d=String(r[_dnIdx]||'').trim();
      if(!d||d==='-'||d.length<3)return;
      if(!designReqMap[d])designReqMap[d]={c:0,rowIdxs:[]};
      designReqMap[d].c++;
      designReqMap[d].rowIdxs.push(idx);
    });
  }
  const topDesigns=Object.entries(designReqMap).filter(([,v])=>v.c>=2).sort((a,b)=>b[1].c-a[1].c).slice(0,40);
  const designTblRows=topDesigns.map(([dn,v])=>{
    const rows=v.rowIdxs.map(i=>filtLS[i]);
    const stores=new Set(rows.map(r=>String(r[storeIdx]||'')).filter(Boolean)).size;
    let sampleNote='—';
    for(const r of rows){for(const c of noteCols){const t=String(r[c]||'').trim();if(t){sampleNote=t.length>60?t.slice(0,60)+'…':t;break;}}if(sampleNote!=='—')break;}
    return{cells:[
      `<strong>${dn}</strong>`,
      fi(v.c),
      fi(stores),
      _aggCol(rows,_colIdx),
      _aggCol(rows,_szIdx),
      _aggCol(rows,_stIdx),
      _aggCol(rows,_polIdx),
      `<span style="font-size:11px;color:var(--muted);">${sampleNote}</span>`
    ]};
  });

  // Per-store narrative summary — forum/chat style
  // Group filtLS by store, run the same n-gram tokenization on each store's
  // notes rows, then produce: headline sentence with top phrase + secondary
  // bullets. Sorted by loss-entry volume desc, top 30 stores.
  const _storeRows={};
  if(storeIdx>=0){
    filtLS.forEach(r=>{
      const sn=String(r[storeIdx]||'').trim();
      if(!sn)return;
      if(!_storeRows[sn])_storeRows[sn]=[];
      _storeRows[sn].push(r);
    });
  }
  function _phrasesForRows(rows){
    const pri={};
    rows.forEach((r,i)=>{
      if(!noteCols.length)return;
      const text=noteCols.map(c=>String(r[c]||'')).join(' | ');
      if(!text.trim())return;
      const toks=tokenizeNotes(text);
      const phrases=new Set();
      toks.forEach(t=>{if(t.length>=4||SIZE_PAT.test(t))phrases.add(t);});
      for(let i=0;i<toks.length-1;i++)phrases.add(toks[i]+' '+toks[i+1]);
      for(let i=0;i<toks.length-2;i++)phrases.add(toks[i]+' '+toks[i+1]+' '+toks[i+2]);
      phrases.forEach(p=>{if(!pri[p])pri[p]=[];pri[p].push(i);});
    });
    return Object.entries(pri).filter(([,arr])=>arr.length>=2).sort((a,b)=>b[1].length-a[1].length);
  }
  function _ctxBits(rows){
    const bits=[];
    const _ag=ix=>{
      if(ix<0||ix===undefined)return null;
      const m={};rows.forEach(r=>{const v=String(r[ix]||'').trim();if(v&&v!=='-')m[v]=(m[v]||0)+1;});
      const top=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];
      return top?top[0]:null;
    };
    const cat=_LS_IDX.catIdx>=0?_ag(_LS_IDX.catIdx):null;
    const style=_ag(_stIdx);
    const size=_ag(_szIdx);
    const polish=_ag(_polIdx);
    if(cat)bits.push(`mostly <strong>${cat}</strong>`);
    if(style)bits.push(`style <strong>${style}</strong>`);
    if(size)bits.push(`size <strong>${size}</strong>`);
    if(polish)bits.push(`polish <strong>${polish}</strong>`);
    return bits.length?` — ${bits.join(' · ')}`:'';
  }
  const narrativeStores=Object.entries(_storeRows)
    .filter(([,rows])=>rows.length>=5)
    .sort((a,b)=>b[1].length-a[1].length)
    .slice(0,30);
  const narrativeBlocks=narrativeStores.map(([store,rows])=>{
    const phrases=_phrasesForRows(rows);
    const wkS=wk.stores.find(s=>s.outlet===store);
    const meta=wkS?`${wkS.market||'—'} · RM: ${wkS.rm||'—'}`:'—';
    if(!phrases.length){
      return `<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--muted);border-radius:10px;padding:12px 16px;margin-bottom:.6rem;">
        <div style="font-size:13px;font-weight:600;margin-bottom:2px;">
          <span class="clickable" onclick="showStoreModal('${store.replace(/'/g,"\\'")}')">${store}</span>
          <span style="font-weight:400;color:var(--muted);font-size:11px;margin-left:6px;">${meta} · ${rows.length} loss entries</span>
        </div>
        <div style="font-size:12px;color:var(--muted);">No recurring phrases in notes for this store.</div>
      </div>`;
    }
    const [topPhrase,topIdxs]=phrases[0];
    const topRows=topIdxs.map(i=>rows[i]);
    const headline=`Most of the loss is captured around <strong>${topPhrase}</strong> (${topIdxs.length} of ${rows.length} entries, ${pct(topIdxs.length,rows.length)}%)${_ctxBits(topRows)}.`;
    const secondary=phrases.slice(1,6);
    const bullets=secondary.map(([p,arr])=>{
      const rs=arr.map(i=>rows[i]);
      return `<li><strong>${p}</strong> — ${arr.length} mentions (${pct(arr.length,rows.length)}%)${_ctxBits(rs)}</li>`;
    }).join('');
    // Repeated design numbers within this store
    const dnMap={};
    if(_dnIdx>=0){
      rows.forEach(r=>{
        const d=String(r[_dnIdx]||'').trim();
        if(!d||d==='-'||d.length<3)return;
        dnMap[d]=(dnMap[d]||0)+1;
      });
    }
    const topDns=Object.entries(dnMap).filter(([,c])=>c>=2).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const dnLine=topDns.length?`<div style="font-size:12px;color:var(--muted);margin-top:6px;">🔁 Repeat design#s: ${topDns.map(([d,c])=>`<strong>${d}</strong> (${c}×)`).join(', ')}</div>`:'';
    return `<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--red);border-radius:10px;padding:12px 16px;margin-bottom:.6rem;">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px;">
        <span class="clickable" onclick="showStoreModal('${store.replace(/'/g,"\\'")}')">${store}</span>
        <span style="font-weight:400;color:var(--muted);font-size:11px;margin-left:6px;">${meta} · ${rows.length} loss entries</span>
      </div>
      <div style="font-size:13px;line-height:1.5;margin-bottom:${secondary.length?'6px':'0'};">${headline}</div>
      ${secondary.length?`<div style="font-size:12px;color:var(--muted);margin-bottom:2px;">Other recurring patterns:</div><ul style="margin:0 0 0 1.2rem;padding:0;font-size:12px;line-height:1.55;">${bullets}</ul>`:''}
      ${dnLine}
    </div>`;
  }).join('');

  const notesHtml=`
    <p style="font-size:11px;color:var(--muted);margin:0 0 10px 0;">
      📋 Recurring phrases extracted from <strong>Customer Notes</strong> + <strong>Notes</strong> columns (1-3 word phrases, stop-words filtered, ≥3 mentions). Repeated design numbers tracked separately. Each row shows the top 2 values of each attribute among the rows where that phrase appeared.
    </p>
    ${noteCols.length===0?'<div class="err-card" style="margin-bottom:1rem;">⚠️ Neither <code>Customer Notes</code> nor <code>Notes</code> column detected in the sheet. Add either column to surface phrase patterns here.</div>':''}
    <div class="section-lbl">📣 Store-wise summary — forum style (top driver as headline, secondary patterns as bullets)</div>
    ${narrativeBlocks||'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No stores with ≥5 loss entries and notes to summarise.</p>'}
    <div class="section-lbl" style="margin-top:1.25rem;">🔤 Top recurring phrases — keywords from notes (e.g., "size 2-2", "long hara", "antique")</div>
    ${phraseTblRows.length?sortableTbl(['Phrase / keyword','Mentions','Stores','Top color(s)','Top size(s)','Top style(s)','Top polish(es)','Top design#'],phraseTblRows,null):'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No recurring phrases found (need ≥3 mentions across notes).</p>'}
    <div class="section-lbl" style="margin-top:1.25rem;">🔁 Repeated design numbers — same design# requested ≥2 times</div>
    ${designTblRows.length?sortableTbl(['Design #','Requests','Stores','Top color(s)','Top size(s)','Top style(s)','Top polish(es)','Sample note'],designTblRows,null):'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No design numbers repeated, or column not detected.</p>'}
  `;
  const notesAlertCount=topPhrases.length+topDesigns.length;

  const auditTables={
    coverage:{title:'🔴 Non-buyer coverage gaps — sorted worst first',html:sortableTbl(['Store','Market','RM','Non-buyers','Loss captured','Coverage%','Status'],covRows,null,r=>r._cls)},
    mobile:{title:'📱 Phone number quality — market-level (click market → RM → store)',html:phoneMktRows.length?sortableTbl(['Market','RMs','Stores','Total entries','Invalid/Missing','Bad%','Status'],phoneMktRows,null,r=>r._cls):'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No phone data found.</p>'},
    reason:{title:'🔁 Stores with repetitive loss reasons (same reason >50%)',html:repRows.length?sortableTbl(['Store','Market','RM','Top reason','Loss entries','Repeat%','Status'],repRows,null,r=>r._cls):'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No stores with repetitive reasons found.</p>'},
    product:{title:'🏷️ Most repeated product issues',html:prodRows.length?sortableTbl(['Product details','Count','Stores affected','Top reason','Alert'],prodRows,null,r=>r._cls):'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No product data found.</p>'},
    abnormal:{title:`⚠️ Abnormal / notify-worthy reasons (col J) — ${abnCriticalCount} whitelisted · ${abnRareCount} rare (<2%)`,html:abnTblRows.length?`<p style="font-size:11px;color:var(--muted);margin:0 0 8px 0;">🔴 <strong>Whitelisted</strong> = always flagged (e.g., "Found cheaper online", "Polish not available"). 🟡 <strong>Rare</strong> = under 2% share, may indicate data entry issues or new edge cases. Click any reason to see store-wise breakdown.</p>${sortableTbl(['Abnormal reason','Count','Stores','RMs','Markets','Share%','Flag'],abnTblRows,null,r=>r._cls)}`:'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No abnormal reasons detected in current filter.</p>'},
    notes:{title:`📝 Notes & patterns — ${topPhrases.length} recurring phrases · ${topDesigns.length} repeated design#s`,html:notesHtml}
  };
  window._auditTables=auditTables;
  if(!window._activeAudit)window._activeAudit='coverage';

  // ═══════════════════════════════════════════════════════════════════
  // PROCESS ADHERENCE REPORT — one-shot summary of everything
  // For each store, score 5 checkpoints (Walkin entry, Loss capture,
  // Purpose capture, Phone quality, Reason diversity) red/amber/green,
  // plus an Overall rollup (worst-of). Sorted critical-first.
  // ═══════════════════════════════════════════════════════════════════
  const purposeIdxA=_LS_IDX.purposeIdx;
  const adherence=filtStores.map(s=>{
    const dRange=daysInRange(s.days,f);
    const w=dRange.reduce((a,d)=>a+d.w,0);
    const b=dRange.reduce((a,d)=>a+d.b,0);
    const nb=w-b;
    const daysWith=dRange.filter(d=>d.w>0).length;
    const totalDays=dRange.length;
    const lsRows=filtLS.filter(r=>normStore(String(r[storeIdx]||''))===s.outletNorm);
    const ls=lsRows.length;
    const cov=nb>0?pct(ls,nb):(ls>0?100:0);
    const validPh=lsRows.filter(r=>r._mob==='valid').length;
    const phPct=ls>0?pct(validPh,ls):0;
    const reasonSet=new Set(lsRows.map(r=>reasonIdx>=0?String(r[reasonIdx]||'').trim():'').filter(Boolean));
    const withPurpose=purposeIdxA>=0?lsRows.filter(r=>String(r[purposeIdxA]||'').trim()).length:0;
    const purpPct=ls>0?pct(withPurpose,ls):0;

    // Per-checkpoint status (red / amber / green / na)
    const walkinStatus =totalDays===0?'na':(w===0||daysWith===0)?'red':daysWith>=Math.ceil(totalDays*0.8)?'green':'amber';
    const lossStatus   =(nb<=10&&ls===0)?'na':cov>=50?'green':cov>=25?'amber':'red';
    const purposeStatus=purposeIdxA<0?'na':ls===0?'na':purpPct>=70?'green':purpPct>=30?'amber':'red';
    const phoneStatus  =ls===0?'na':phPct>=90?'green':phPct>=70?'amber':'red';
    const reasonStatus =ls===0?'na':reasonSet.size>=4?'green':reasonSet.size>=2?'amber':'red';

    const scores=[walkinStatus,lossStatus,purposeStatus,phoneStatus,reasonStatus].filter(x=>x!=='na');
    const overall=scores.includes('red')?'red':scores.includes('amber')?'amber':scores.length?'green':'na';

    const issues=[];
    if(walkinStatus==='red')issues.push('🚫 No walkins entered');
    else if(walkinStatus==='amber')issues.push(`📅 ${daysWith}/${totalDays} days only`);
    if(lossStatus==='red')issues.push(`📉 Loss-cov ${cov}%`);
    else if(lossStatus==='amber')issues.push(`📉 Loss-cov ${cov}%`);
    if(purposeStatus==='red')issues.push(purpPct===0?'🎯 No purpose captured':`🎯 Purpose ${purpPct}%`);
    else if(purposeStatus==='amber')issues.push(`🎯 Purpose ${purpPct}%`);
    if(phoneStatus==='red')issues.push(`📱 Valid phone ${phPct}%`);
    else if(phoneStatus==='amber')issues.push(`📱 Valid phone ${phPct}%`);
    if(reasonStatus==='red')issues.push('🔁 1 reason only');
    else if(reasonStatus==='amber')issues.push(`🔁 ${reasonSet.size} reasons`);

    return{s,w,b,nb,ls,cov,daysWith,totalDays,phPct,reasonCount:reasonSet.size,purpPct,withPurpose,walkinStatus,lossStatus,purposeStatus,phoneStatus,reasonStatus,overall,issues};
  });
  // Sort: critical (red) first, then amber, then green
  const _stOrd={red:0,amber:1,green:2,na:3};
  adherence.sort((a,b)=>_stOrd[a.overall]-_stOrd[b.overall]||(a.s.outlet>b.s.outlet?1:-1));

  // Per-checkpoint summary counts
  const summarize=(field)=>({
    red:adherence.filter(a=>a[field]==='red').length,
    amber:adherence.filter(a=>a[field]==='amber').length,
    green:adherence.filter(a=>a[field]==='green').length,
    na:adherence.filter(a=>a[field]==='na').length
  });
  const sumOverall=summarize('overall');
  const sumWalkin=summarize('walkinStatus');
  const sumLoss=summarize('lossStatus');
  const sumPurpose=summarize('purposeStatus');
  const sumPhone=summarize('phoneStatus');
  const sumReason=summarize('reasonStatus');

  const stBadge=(status,label)=>{
    if(status==='red')return `<span class="badge badge-red">🔴 ${label}</span>`;
    if(status==='amber')return `<span class="badge badge-amber">🟡 ${label}</span>`;
    if(status==='green')return `<span class="badge badge-green">🟢 ${label}</span>`;
    return `<span class="badge" style="background:#f0f0f0;color:var(--muted);">— n/a</span>`;
  };

  const adherenceTblRows=adherence.map(a=>({
    cells:[
      `<span class="clickable" onclick="showStoreModal('${a.s.outlet.replace(/'/g,"\\'")}')">${a.s.outlet}</span>`,
      a.s.market||'—',
      a.s.rm||'—',
      stBadge(a.walkinStatus,a.walkinStatus==='na'?'n/a':a.walkinStatus==='red'?'No':a.walkinStatus==='green'?'OK':`${a.daysWith}/${a.totalDays}`),
      stBadge(a.lossStatus,a.lossStatus==='na'?'n/a':a.cov+'%'),
      stBadge(a.purposeStatus,a.purposeStatus==='na'?'n/a':a.purpPct+'%'),
      stBadge(a.phoneStatus,a.phoneStatus==='na'?'n/a':a.phPct+'%'),
      stBadge(a.reasonStatus,a.reasonStatus==='na'?'n/a':a.reasonCount+''),
      stBadge(a.overall,a.overall==='red'?'Critical':a.overall==='amber'?'Watch':a.overall==='green'?'Compliant':'n/a'),
      a.issues.length?`<span style="font-size:11px;">${a.issues.join(' · ')}</span>`:'<span style="color:var(--green);font-size:11px;">✓ all green</span>'
    ],
    _cls:a.overall==='red'?'audit-red':a.overall==='amber'?'audit-amber':''
  }));

  const cpTile=(emoji,label,sum,unit)=>`
    <div class="metric" style="border-left:4px solid ${sum.red>0?'var(--red)':sum.amber>0?'var(--amber)':'var(--green)'};">
      <div class="lbl">${emoji} ${label}</div>
      <div style="display:flex;gap:6px;align-items:baseline;font-weight:600;font-size:14px;margin-top:6px;">
        <span style="color:var(--red);">🔴 ${sum.red}</span>
        <span style="color:var(--amber);">🟡 ${sum.amber}</span>
        <span style="color:var(--green);">🟢 ${sum.green}</span>
        ${sum.na?`<span style="color:var(--muted);">— ${sum.na}</span>`:''}
      </div>
      <div class="sub">${unit}</div>
    </div>`;

  const adherenceBlock=`
    <div style="background:linear-gradient(135deg,#fff5e6 0%,#fff 100%);border:1px solid #f0d68a;border-left:4px solid var(--amber);border-radius:10px;padding:14px 18px;margin-bottom:1rem;">
      <div style="font-size:18px;font-weight:600;color:var(--text);margin-bottom:2px;">📋 Process Adherence Report</div>
      <div style="font-size:12px;color:var(--muted);">One-shot health check across every store. Five checkpoints scored ${'<strong style="color:var(--red)">🔴 red</strong>'} / ${'<strong style="color:var(--amber)">🟡 amber</strong>'} / ${'<strong style="color:var(--green)">🟢 green</strong>'}. Overall is the worst-of. Sorted critical first.</div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:.75rem;">
      <div style="background:#fdeaea;border:1px solid #fbc7c7;border-radius:10px;padding:12px 16px;text-align:center;">
        <div style="font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;margin-bottom:4px;">🔴 Critical</div>
        <div style="font-size:28px;font-weight:600;color:var(--red);">${fi(sumOverall.red)}</div>
        <div style="font-size:11px;color:var(--muted);">stores · immediate intervention needed</div>
      </div>
      <div style="background:#fff8e6;border:1px solid #f0d68a;border-radius:10px;padding:12px 16px;text-align:center;">
        <div style="font-size:11px;font-weight:600;color:var(--amber);text-transform:uppercase;margin-bottom:4px;">🟡 Watch</div>
        <div style="font-size:28px;font-weight:600;color:var(--amber);">${fi(sumOverall.amber)}</div>
        <div style="font-size:11px;color:var(--muted);">stores · partial gaps, coachable</div>
      </div>
      <div style="background:#e6f5ee;border:1px solid #b8e0cc;border-radius:10px;padding:12px 16px;text-align:center;">
        <div style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;margin-bottom:4px;">🟢 Compliant</div>
        <div style="font-size:28px;font-weight:600;color:var(--green);">${fi(sumOverall.green)}</div>
        <div style="font-size:11px;color:var(--muted);">stores · all checkpoints clean</div>
      </div>
    </div>

    <div class="metrics" style="grid-template-columns:repeat(5,minmax(0,1fr));margin-bottom:1rem;">
      ${cpTile('👣','Walkin entry',sumWalkin,'all days covered')}
      ${cpTile('📉','Loss capture',sumLoss,'≥50% of non-buyers')}
      ${cpTile('🎯','Purpose capture',sumPurpose,'≥70% have purpose')}
      ${cpTile('📱','Phone quality',sumPhone,'≥90% valid numbers')}
      ${cpTile('🔁','Reason diversity',sumReason,'≥4 distinct reasons')}
    </div>

    <div class="card">
      <div class="card-title">📋 Per-store adherence — click store for full detail</div>
      ${sortableTbl(
        ['Store','Market','RM','Walkin','Loss capture','Purpose','Phone','Reason','Overall','Issues'],
        adherenceTblRows,
        null,
        r=>r._cls
      )}
    </div>

    <div style="background:#f8f9fb;border:1px solid var(--border);border-radius:10px;padding:6px 14px;margin-top:1.5rem;margin-bottom:.5rem;">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">🔍 Detail drilldowns — pick a category below</div>
    </div>`;

  document.getElementById('audit').innerHTML=adherenceBlock+`
    <div class="metrics" style="cursor:pointer;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
      <div class="metric red audit-card" id="ac-coverage" onclick="selectAudit('coverage')" style="transition:all .15s;">
        <div class="lbl">🔴 Coverage critical</div><div class="val">${covCritical}</div><div class="sub">stores &lt;10% coverage · click to view</div>
      </div>
      <div class="metric red audit-card" id="ac-mobile" onclick="selectAudit('mobile')" style="transition:all .15s;">
        <div class="lbl">🔴 Mobile critical</div><div class="val">${mobCritical}</div><div class="sub">stores &gt;50% bad numbers · click to view</div>
      </div>
      <div class="metric amber audit-card" id="ac-reason" onclick="selectAudit('reason')" style="transition:all .15s;">
        <div class="lbl">🟡 Repeated reason</div><div class="val">${repCritical}</div><div class="sub">stores &gt;70% same reason · click to view</div>
      </div>
      <div class="metric amber audit-card" id="ac-product" onclick="selectAudit('product')" style="transition:all .15s;">
        <div class="lbl">🟡 Top product issues</div><div class="val">${prodArr.length}</div><div class="sub">repeated combinations · click to view</div>
      </div>
      <div class="metric red audit-card" id="ac-abnormal" onclick="selectAudit('abnormal')" style="transition:all .15s;">
        <div class="lbl">⚠️ Abnormal reasons</div><div class="val">${abnCriticalCount+abnRareCount}</div><div class="sub">${abnCriticalCount} notify · ${abnRareCount} rare · click to view</div>
      </div>
      <div class="metric amber audit-card" id="ac-notes" onclick="selectAudit('notes')" style="transition:all .15s;">
        <div class="lbl">📝 Notes patterns</div><div class="val">${notesAlertCount}</div><div class="sub">${topPhrases.length} phrases · ${topDesigns.length} design# repeats</div>
      </div>
    </div>
    <div class="audit-legend">
      <span><span class="leg-red"></span> Red = Critical / immediate action</span>
      <span><span class="leg-amber"></span> Amber = Watch / needs improvement</span>
    </div>
    <div class="card" id="audit-detail-card">
      <div class="card-title" id="audit-detail-title"></div>
      <div id="audit-detail-body"></div>
    </div>`;
  setTimeout(()=>selectAudit(window._activeAudit),50);
}

window.selectAudit=function(key){
  window._activeAudit=key;
  const t=window._auditTables;if(!t)return;
  ['coverage','mobile','reason','product','abnormal','notes'].forEach(k=>{
    const el=document.getElementById('ac-'+k);if(!el)return;
    const isRed=k==='coverage'||k==='mobile'||k==='abnormal';
    if(k===key){el.style.border=`2px solid ${isRed?'var(--red)':'var(--amber)'}`;el.style.boxShadow=`0 0 0 3px ${isRed?'rgba(196,48,48,0.15)':'rgba(196,122,15,0.15)'}`;el.style.transform='translateY(-2px)';}
    else{el.style.border='1px solid var(--border)';el.style.boxShadow='none';el.style.transform='none';}
  });
  const titleEl=document.getElementById('audit-detail-title');
  const bodyEl=document.getElementById('audit-detail-body');
  if(titleEl)titleEl.textContent=t[key].title;
  if(bodyEl){bodyEl.innerHTML=t[key].html;const tbl=bodyEl.querySelector('table');if(tbl)makeSortable(tbl.id);}
};

const mts='padding:6px 10px;border-bottom:1px solid rgba(0,0,0,0.07);font-size:12px;';
const ths='padding:6px 10px;color:#6b6b6b;font-size:11px;font-weight:600;text-transform:uppercase;border-bottom:2px solid rgba(0,0,0,0.09);text-align:left;';

// ── DAY-WISE LOSS TABLE HELPER ────────────────────────────
function dayWiseLSTable(lsRows,wkDayMap){
  // lsRows = filtered loss rows, wkDayMap = {dk: {w,b}} from walkins
  const dayLS={};
  lsRows.forEach(r=>{if(r._syncedDk){if(!dayLS[r._syncedDk])dayLS[r._syncedDk]=0;dayLS[r._syncedDk]++;}});
  const allDks=[...new Set([...Object.keys(wkDayMap||{}),...Object.keys(dayLS)])].sort();
  if(!allDks.length)return'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No day-wise data.</p>';
  const total=lsRows.length;
  const rows=allDks.map(dk=>{
    const ls=dayLS[dk]||0;
    const wk=wkDayMap?wkDayMap[dk]:null;
    const nb=wk?wk.w-wk.b:0;
    const cov=pct(ls,nb);
    return{cells:[`<strong>${fmtDK(dk)}</strong>`,wk?fi(wk.w):'—',wk?fi(wk.b):'—',wk?fi(nb):'—',fi(ls),`${pct(ls,total)}%`,nb>0?`<span class="badge ${bc(cov)}">${cov}%</span>`:'—']};
  });
  const totLS=Object.values(dayLS).reduce((s,v)=>s+v,0);
  const totW=wkDayMap?Object.values(wkDayMap).reduce((s,v)=>s+v.w,0):0;
  const totB=wkDayMap?Object.values(wkDayMap).reduce((s,v)=>s+v.b,0):0;
  const totNB=totW-totB;
  return sortableTbl(['Date','Walkins','Bills','Non-buyers','Loss captured','Share%','Coverage%'],rows,['Total',fi(totW),fi(totB),fi(totNB),fi(totLS),'100%',`<span class="badge ${bc(pct(totLS,totNB))}">${pct(totLS,totNB)}%</span>`]);
}

// Build wkDayMap from a list of walkins store objects
function buildWkDayMap(wkStores,f){
  const m={};
  wkStores.forEach(s=>daysInRange(s.days,f).forEach(d=>{
    if(!m[d.dk])m[d.dk]={w:0,b:0};
    m[d.dk].w+=d.w;m[d.dk].b+=d.b;
  }));
  return m;
}

// ── REASON MODAL → store list with count ──────────────────
// ── REASON DRILLDOWN CHAIN ─────────────────────────────
// Level 1: showReasonStoresModal(reasonValue, sourceCol)
//   Click reason → modal showing list of STORES with this reason (from filtered LS).
// Level 2: showReasonStoreCatModal(reasonValue, sourceCol, store)
//   Click a store → modal showing CATEGORY BIFURCATION for that store + reason.
// Level 3: showReasonStoreCatDetailModal(reasonValue, sourceCol, store, category)
//   Click a category → modal showing OTHER REASONS + STAFF-WISE counts for that store + category.
// `sourceCol` is 'I' for Reason Of Loss Of Sale (col I) or 'J' for Reason (col J).

function _reasonColIdx(sourceCol){return sourceCol==='J'?_LS_IDX.subReasonIdx:_LS_IDX.reasonIdx;}
function _otherReasonColIdx(sourceCol){return sourceCol==='J'?_LS_IDX.reasonIdx:_LS_IDX.subReasonIdx;}
function _reasonLabel(sourceCol){return sourceCol==='J'?'Specific Reason (col J)':'Reason of Loss (col I)';}

window.showReasonStoresModal=function(reasonValue,sourceCol){
  sourceCol=sourceCol||'I';
  const idx=_reasonColIdx(sourceCol);
  if(idx<0){alert('Reason column not found');return;}
  // If we're scoped to a specific store, skip the "stores list" step and go straight to category view
  const sc=window._insScope;
  if(sc&&sc.mode==='store'&&sc.entity){
    return showReasonStoreCatModal(reasonValue,sourceCol,sc.entity);
  }
  const f=getFilters();
  const allFiltered=applyInsScope(filterLS(f));
  const matchRows=allFiltered.filter(r=>String(r[idx]||'').trim()===reasonValue);
  const total=matchRows.length;
  const{storeIdx,catIdx,empIdx}=_LS_IDX;
  const scopeLbl=insScopeLabel();

  // Group by store
  const storeMap={};
  matchRows.forEach(r=>{
    const sn=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    if(!storeMap[sn])storeMap[sn]={c:0,cats:{},market:'—',rm:'—',cluster:'—'};
    storeMap[sn].c++;
    const cat=catIdx>=0?String(r[catIdx]||''):'';
    if(cat)storeMap[sn].cats[cat]=(storeMap[sn].cats[cat]||0)+1;
    if(r._wkStore){storeMap[sn].market=r._wkStore.market;storeMap[sn].rm=r._wkStore.rm;storeMap[sn].cluster=r._wkStore.cluster;}
  });
  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1].c-a[1].c);

  // Quick aggregations for header
  const mktSet=new Set();const rmSet=new Set();
  matchRows.forEach(r=>{if(r._wkStore){mktSet.add(r._wkStore.market);rmSet.add(r._wkStore.rm);}});

  const tblRows=storeArr.map(([k,v])=>{
    const topCat=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
    return{cells:[
      `<span class="clickable" onclick="showReasonStoreCatModal('${reasonValue.replace(/'/g,"\\'")}','${sourceCol}','${k.replace(/'/g,"\\'")}')">${k}</span>`,
      v.market,v.rm,
      fi(v.c),
      `<span class="badge ${pct(v.c,total)>=20?'badge-red':pct(v.c,total)>=10?'badge-amber':'badge-green'}">${pct(v.c,total)}%</span>`,
      topCat?`${topCat[0]} (${topCat[1]})`:'—'
    ]};
  });

  openModal(
    `🎯 ${_reasonLabel(sourceCol)}: "${reasonValue}"`,
    `Step 1 of 3 · ${fi(total)} entries · ${storeArr.length} stores · ${mktSet.size} markets · ${rmSet.size} RMs${scopeLbl?' · 🔒 '+scopeLbl:''}`,
    `${scopeLbl?`<div style="background:#fff8e6;border:1px solid #f0d68a;border-radius:8px;padding:8px 12px;margin-bottom:.75rem;font-size:11px;color:#a05d0a;">🔒 <strong>Scoped to ${scopeLbl}</strong> — showing only this entity's data</div>`:''}
    <div style="background:#f5f0ff;border:1px solid #e0d4f7;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:#5a3da0;">
      <strong>📍 Drill path:</strong> Reason → <strong>Stores</strong> → Category → Other Reasons & Staff &nbsp;·&nbsp; click a store to continue
    </div>
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">

window.showReasonStoreCatDetailModal=function(reasonValue,sourceCol,store,category){
  const{storeIdx,catIdx,empIdx,custIdx}=_LS_IDX;
  const reasonIdx=_LS_IDX.reasonIdx;
  const subReasonIdx=_LS_IDX.subReasonIdx;
  if(storeIdx<0||catIdx<0){alert('Required columns not found');return;}
  const f=getFilters();
  // Filter to: this store + this category + drilled-in reason value
  const drilledIdx=_reasonColIdx(sourceCol);
  const matchRows=filterLS(f).filter(r=>
    String(r[storeIdx]||'').trim()===store&&
    (String(r[catIdx]||'(blank)').trim()||'(blank)')===category&&
    (drilledIdx<0||(String(r[drilledIdx]||'').trim()||'(blank)')===reasonValue)
  );
  const total=matchRows.length;

  // OTHER reasons: aggregate by the OTHER reason column (not the one we drilled in via)
  const otherIdx=_otherReasonColIdx(sourceCol);
  const otherLabel=_reasonLabel(sourceCol==='I'?'J':'I');
  const otherMap={};
  if(otherIdx>=0){
    matchRows.forEach(r=>{
      const v=String(r[otherIdx]||'').trim()||'(blank)';
      otherMap[v]=(otherMap[v]||0)+1;
    });
  }
  const otherArr=Object.entries(otherMap).sort((a,b)=>b[1]-a[1]);

  // Same-source reasons (e.g., if we drilled via col I, also show col I distribution among these rows)
  const sameIdx=_reasonColIdx(sourceCol);
  const sameLabel=_reasonLabel(sourceCol);
  const sameMap={};
  if(sameIdx>=0){
    matchRows.forEach(r=>{
      const v=String(r[sameIdx]||'').trim()||'(blank)';
      sameMap[v]=(sameMap[v]||0)+1;
    });
  }
  const sameArr=Object.entries(sameMap).sort((a,b)=>b[1]-a[1]);

  // Staff-wise counts
  const staffMap={};
  if(empIdx>=0){
    matchRows.forEach(r=>{
      const v=String(r[empIdx]||'').trim()||'(no staff)';
      if(!staffMap[v])staffMap[v]={c:0,reasons:{},cust:{}};
      staffMap[v].c++;
      if(otherIdx>=0){
        const rk=String(r[otherIdx]||'').trim()||'(blank)';
        staffMap[v].reasons[rk]=(staffMap[v].reasons[rk]||0)+1;
      }
      if(custIdx>=0){
        const ck=String(r[custIdx]||'').trim();
        if(ck)staffMap[v].cust[ck]=(staffMap[v].cust[ck]||0)+1;
      }
    });
  }
  const staffArr=Object.entries(staffMap).sort((a,b)=>b[1].c-a[1].c);

  // Customer type
  const custMap={};
  if(custIdx>=0){
    matchRows.forEach(r=>{const v=String(r[custIdx]||'').trim();if(v)custMap[v]=(custMap[v]||0)+1;});
  }
  const custArr=Object.entries(custMap).sort((a,b)=>b[1]-a[1]);

  const sameTbl=sameArr.length?sortableTbl(
    [sameLabel,'Count','Share%'],
    sameArr.map(([k,v])=>({cells:[
      k===reasonValue?`<strong style="color:var(--red)">${k} ◀ drilled-in</strong>`:k,
      fi(v),
      `${pct(v,total)}%`
    ]})),
    ['Total',fi(total),'100%']
  ):'<p style="color:var(--muted);font-size:12px;">—</p>';

  const otherTbl=otherArr.length?sortableTbl(
    [otherLabel,'Count','Share%'],
    otherArr.map(([k,v])=>({cells:[
      `<span class="clickable" onclick="showReasonStoreCatDetailModal('${k.replace(/'/g,"\\'")}','${sourceCol==='I'?'J':'I'}','${store.replace(/'/g,"\\'")}','${category.replace(/'/g,"\\'")}')">${k}</span>`,
      fi(v),
      `${pct(v,total)}%`
    ]})),
    ['Total',fi(total),'100%']
  ):'<p style="color:var(--muted);font-size:12px;">No data in '+otherLabel+' column.</p>';

  const staffTbl=staffArr.length?sortableTbl(
    ['Staff','Count','Share%','Top reason','Customer type'],
    staffArr.map(([k,v])=>{
      const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
      const custB=Object.entries(v.cust).map(([ck,cv])=>`${ck}:${cv}`).join(', ');
      return{cells:[
        `<span class="clickable" onclick="showStaffDrillModal('${k.replace(/'/g,"\\'")}','${store.replace(/'/g,"\\'")}','${category.replace(/'/g,"\\'")}','${reasonValue.replace(/'/g,"\\'")}','${sourceCol}')">${k}</span>`,
        fi(v.c),
        `<span class="badge ${pct(v.c,total)>=30?'badge-red':pct(v.c,total)>=15?'badge-amber':'badge-green'}">${pct(v.c,total)}%</span>`,
        topR?`${topR[0]} (${topR[1]})`:'—',
        custB||'—'
      ]};
    }),
    ['Total','',fi(total),'','']
  ):'<p style="color:var(--muted);font-size:12px;">No staff data in this column.</p>';

  const wkStore=matchRows[0]?matchRows[0]._wkStore:null;
  const ctxLine=wkStore?`${wkStore.market} · ${wkStore.cluster} · RM: ${wkStore.rm}`:'';

  openModal(
    `📦 ${store} · ${category} · "${reasonValue}"`,
    `Step 3 of 3 · ${fi(total)} entries (filtered to drilled reason) · ${staffArr.length} staff ${ctxLine?'· '+ctxLine:''}`,
    `<div style="background:#f5f0ff;border:1px solid #e0d4f7;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:12px;color:#5a3da0;">
      <strong>📍 Drill path:</strong> Reason → Stores → Category → <strong>Other Reasons & Staff</strong> ✓ deepest level<br>
      <span style="font-size:11px;">Showing only entries where ${_reasonLabel(sourceCol)} = <strong>"${reasonValue}"</strong></span>
    </div>
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric red"><div class="lbl">Total entries</div><div class="val">${fi(total)}</div></div>
      <div class="metric"><div class="lbl">Staff involved</div><div class="val">${staffArr.length}</div></div>
      <div class="metric"><div class="lbl">Other reasons</div><div class="val">${otherArr.length}</div></div>
      <div class="metric green"><div class="lbl">Customer types</div><div class="val">${custArr.length}</div></div>
    </div>

    ${custArr.length?`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;">
      ${custArr.map(([k,v])=>`
        <div style="background:${k.toLowerCase().includes('new')?'#e6f5ee':k.toLowerCase().includes('repeat')?'#e6eefa':'#fff8e6'};border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">${k}</div>
          <div style="font-size:24px;font-weight:600;">${fi(v)}</div>
          <div style="font-size:11px;color:var(--muted);">${pct(v,total)}%</div>
        </div>`).join('')}
    </div>`:''}

    <div class="two-col" style="margin-bottom:1.25rem;">
      <div>
        <div class="section-lbl">${sameLabel}</div>
        ${sameTbl}

      <div>
        <div class="section-lbl">${otherLabel} (click to switch drill)</div>
        ${otherTbl}

    <div class="section-lbl">👥 Staff-wise breakdown</div>
    ${staffTbl}`
  );

window.showStaffInsightModal=function(staff){
  const{storeIdx,catIdx,reasonIdx,subReasonIdx,custIdx,empIdx,phoneIdx,timingIdx,dateIdx,nameIdx,subCatIdx,sizeIdx,styleIdx}=_LS_IDX;
  if(empIdx<0){alert('Employee column not found');return;}
  const f=getFilters();
  const scopedRows=applyInsScope(filterLS(f)).filter(r=>String(r[empIdx]||'').trim()===staff);
  const total=scopedRows.length;
  const scopeLbl=insScopeLabel();
  if(!total){
    openModal(`👤 ${staff}`,`No entries in scope`,`<p style="padding:1rem;color:var(--muted);">No loss entries found for this staff within ${scopeLbl||'current filters'}.</p>`);
    return;
  }

  // Aggregations
  const reasonMap={},subReasonMap={},catMap={},timeMap={},custMap={},storeMap={};
  let phValid=0,phBad=0,phMiss=0;
  let newC=0,repC=0;
  scopedRows.forEach(r=>{
    if(reasonIdx>=0){const k=String(r[reasonIdx]||'').trim()||'(blank)';reasonMap[k]=(reasonMap[k]||0)+1;}
    if(subReasonIdx>=0){const k=String(r[subReasonIdx]||'').trim()||'(blank)';subReasonMap[k]=(subReasonMap[k]||0)+1;}
    if(catIdx>=0){const k=String(r[catIdx]||'').trim()||'(blank)';catMap[k]=(catMap[k]||0)+1;}
    if(r._time){timeMap[r._time]=(timeMap[r._time]||0)+1;}
    if(custIdx>=0){const c=String(r[custIdx]||'').toLowerCase().trim();if(isNewVal(c))newC++;else if(isRepVal(c))repC++;}
    if(storeIdx>=0){const k=String(r[storeIdx]||'').trim()||'Unknown';storeMap[k]=(storeMap[k]||0)+1;}
    if(r._mob==='valid')phValid++;else if(r._mob==='missing')phMiss++;else phBad++;
  });
  const reasonArr=Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]);
  const subReasonArr=Object.entries(subReasonMap).sort((a,b)=>b[1]-a[1]);
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const timeArr=Object.entries(timeMap).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1]-a[1]);
  const peakTime=timeArr.length?timeArr.reduce((m,e)=>e[1]>m[1]?e:m):null;
  const reasonDiversity=reasonArr.length;
  const phBadPct=pct(phBad+phMiss,total);

  // Detail rows
  const detailRows=scopedRows.slice(0,200).map(r=>{
    const d=fmtDK(r._dk||'');
    const tm=timingIdx>=0?String(r[timingIdx]||''):'';
    const cust=nameIdx>=0?String(r[nameIdx]||''):'';
    const ph=phoneIdx>=0?String(r[phoneIdx]||''):'';
    const phBadge=r._mob==='valid'?'<span class="badge badge-green">✓</span>':'<span class="badge badge-red">⚠</span>';
    const ctype=custIdx>=0?String(r[custIdx]||''):'';
    const cat=catIdx>=0?String(r[catIdx]||''):'';
    const rsn=reasonIdx>=0?String(r[reasonIdx]||''):'';
    const sn=storeIdx>=0?String(r[storeIdx]||''):'';
    return{cells:[d||'—',tm||'—',ctype||'—',cust||'—',`${ph||'—'} ${phBadge}`,sn,cat||'—',rsn||'—']};
  });

  // Quality flags for this staff
  const flags=[];
  if(reasonDiversity<=2&&total>=10)flags.push(`⚠️ <strong>Lazy entry suspected:</strong> uses only ${reasonDiversity} distinct reason${reasonDiversity===1?'':'s'} across ${fi(total)} entries`);
  if(phBadPct>40)flags.push(`📱 <strong>Phone quality concern:</strong> ${phBadPct}% of phone numbers are invalid (${fi(phBad+phMiss)} of ${fi(total)})`);
  if(peakTime&&pct(peakTime[1],total)>=70)flags.push(`⏰ <strong>Time anomaly:</strong> ${pct(peakTime[1],total)}% of entries clustered in ${peakTime[0]} — possible batch entry`);
  if(reasonArr.length){
    const topR=reasonArr[0];
    if(pct(topR[1],total)>=70)flags.push(`🎯 <strong>Reason monopoly:</strong> "${topR[0]}" = ${pct(topR[1],total)}% of all entries`);
  }

  openModal(
    `👤 ${staff}${scopeLbl?' · '+scopeLbl:''}`,
    `${fi(total)} loss entries · ${reasonArr.length} reasons · ${catArr.length} categories · ${storeArr.length} stores${scopeLbl?' · 🔒 scoped':''}`,
    `${scopeLbl?`<div style="background:#fff8e6;border:1px solid #f0d68a;border-radius:8px;padding:8px 12px;margin-bottom:.75rem;font-size:11px;color:#a05d0a;">🔒 <strong>Scoped to ${scopeLbl}</strong> — showing only this entity's data</div>`:''}

    ${flags.length?`<div style="background:#fff5f5;border:1px solid #fdeaea;border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:1rem;font-size:12px;line-height:1.7;">
      <strong style="color:#a32020;">🚩 Quality flags for this staff:</strong>
      ${flags.map(f=>`<div style="margin-top:4px;">${f}</div>`).join('')}
    </div>`:''}

    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric red"><div class="lbl">Total entries</div><div class="val">${fi(total)}</div></div>
      <div class="metric"><div class="lbl">Reason diversity</div><div class="val">${reasonDiversity}</div><div class="sub">${reasonDiversity<=2?'⚠️ low':reasonDiversity<=4?'medium':'good'}</div></div>
      <div class="metric ${phBadPct>40?'red':phBadPct>20?'amber':'green'}"><div class="lbl">Phone bad%</div><div class="val">${phBadPct}%</div><div class="sub">${fi(phBad+phMiss)} bad of ${fi(total)}</div></div>
      <div class="metric green"><div class="lbl">Customer mix</div><div class="val" style="font-size:14px;padding-top:6px;">${fi(newC)} new / ${fi(repC)} rep</div></div>
    </div>

    <div class="two-col">
      <div>
        <div class="section-lbl">Top reasons (col I)</div>
        ${reasonArr.length?sortableTbl(['Reason','Count','Share%'],
          reasonArr.slice(0,10).map(([k,v])=>({cells:[k,fi(v),`<span class="badge ${pct(v,total)>=40?'badge-red':pct(v,total)>=20?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`]})),null):'<p style="color:var(--muted)">—</p>'}
      </div>
      <div>
        <div class="section-lbl">Top categories</div>
        ${catArr.length?sortableTbl(['Category','Count','Share%'],
          catArr.slice(0,10).map(([k,v])=>({cells:[k,fi(v),`<span class="badge ${pct(v,total)>=40?'badge-red':pct(v,total)>=20?'badge-amber':'badge-green'}">${pct(v,total)}%</span>`]})),null):'<p style="color:var(--muted)">—</p>'}
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="section-lbl">⏰ Time pattern</div>
        ${timeArr.length?sortableTbl(['Time slot','Count','Share%'],
          timeArr.map(([k,v])=>({cells:[k,fi(v),`${pct(v,total)}% ${peakTime&&k===peakTime[0]?'⚡':''}`]})),null):'<p style="color:var(--muted)">—</p>'}
      </div>
      <div>
        <div class="section-lbl">Stores covered (${storeArr.length})</div>
        ${storeArr.length?sortableTbl(['Store','Entries','Share%'],
          storeArr.slice(0,10).map(([k,v])=>({cells:[`<span class="clickable" onclick="showStoreModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,fi(v),`${pct(v,total)}%`]})),null):'<p style="color:var(--muted)">—</p>'}
      </div>
    </div>

    <div class="section-lbl">📋 Loss entries by ${staff}${total>200?' (showing first 200 of '+fi(total)+')':''}</div>
    ${sortableTbl(
      ['Date','Time','Cust type','Customer','Phone','Store','Category','Reason'],
      detailRows,
      null
    )}`
  );
};

window.showReasonModal=function(reason){
  const f=getFilters();
  const{storeIdx,catIdx,reasonIdx,custIdx}=_LS_IDX;
  // If scoped to a specific store, jump straight to category drill
  const sc=window._insScope;
  if(sc&&sc.mode==='store'&&sc.entity){
    return showReasonStoreCatModal(reason,'I',sc.entity);
  }
  const rows=applyInsScope(filterLS(f)).filter(r=>reasonIdx>=0&&String(r[reasonIdx]||'')===reason);
  const total=rows.length;
  const scopeLbl=insScopeLabel();

  // Group by store with full details
  const storeMap={};
  rows.forEach(r=>{
    const store=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';
    const cat=catIdx>=0?String(r[catIdx]||''):'';
    const cust=custIdx>=0?String(r[custIdx]||''):'';
    if(!storeMap[store])storeMap[store]={c:0,cats:{},custs:{},rm:'—',market:'—'};
    storeMap[store].c++;
    if(cat)storeMap[store].cats[cat]=(storeMap[store].cats[cat]||0)+1;
    if(cust)storeMap[store].custs[cust]=(storeMap[store].custs[cust]||0)+1;
    if(r._wkStore){storeMap[store].rm=r._wkStore.rm;storeMap[store].market=r._wkStore.market;}
  });
  const storeArr=Object.entries(storeMap).sort((a,b)=>b[1].c-a[1].c);

  // Group by market
  const mktMap={};
  rows.forEach(r=>{const mkt=r._wkStore?r._wkStore.market:'Unknown';if(!mktMap[mkt])mktMap[mkt]=0;mktMap[mkt]++;});
  const mktArr=Object.entries(mktMap).sort((a,b)=>b[1]-a[1]);

  // Group by category
  const catMap={};
  rows.forEach(r=>{const c=catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown';if(!catMap[c])catMap[c]=0;catMap[c]++;});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // Customer type for this reason
  const custMap={};
  rows.forEach(r=>{const c=custIdx>=0?String(r[custIdx]||'Unknown'):'Unknown';if(!custMap[c])custMap[c]=0;custMap[c]++;});
  const custArr=Object.entries(custMap).filter(([k])=>k&&k!=='Unknown').sort((a,b)=>b[1]-a[1]);

  const storeRows=storeArr.map(([k,v])=>{
    const topCat=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
    const custBreak=Object.entries(v.custs).map(([ck,cv])=>`${ck}:${cv}`).join(', ');
    return{cells:[
      `<span class="clickable" onclick="showStoreModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
      v.market,v.rm,
      `<strong style="font-size:14px;color:var(--red)">${fi(v.c)}</strong>`,
      `${pct(v.c,total)}%`,
      topCat?topCat[0]:'—',
      custBreak||'—'
    ]};
  });

  openModal(`Reason: "${reason}"${scopeLbl?' · '+scopeLbl:''}`,`${fi(total)} entries · ${storeArr.length} stores · ${mktArr.length} markets${scopeLbl?' · 🔒 scoped':''}`,`
    ${scopeLbl?`<div style="background:#fff8e6;border:1px solid #f0d68a;border-radius:8px;padding:8px 12px;margin-bottom:.75rem;font-size:11px;color:#a05d0a;">🔒 <strong>Scoped to ${scopeLbl}</strong> — showing only this entity's data</div>`:''}
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric red"><div class="lbl">Total for this reason</div><div class="val">${fi(total)}</div><div class="sub">${pct(total,filterLS(f).length)}% of all loss</div></div>
      <div class="metric"><div class="lbl">Stores affected</div><div class="val">${storeArr.length}</div></div>
      <div class="metric"><div class="lbl">Markets affected</div><div class="val">${mktArr.length}</div></div>
      <div class="metric green"><div class="lbl">Top market</div><div class="val" style="font-size:14px">${mktArr[0]?mktArr[0][0]:'—'}</div><div class="sub">${mktArr[0]?fi(mktArr[0][1])+' entries':''}</div></div>
    </div>

    ${custArr.length?`
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;">
      ${custArr.map(([k,v])=>`
        <div style="background:${k.toLowerCase().includes('new')?'#e6f5ee':k.toLowerCase().includes('repeat')?'#e6eefa':'#fff8e6'};border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;">${k}</div>
          <div style="font-size:24px;font-weight:600;color:${k.toLowerCase().includes('new')?'var(--green)':k.toLowerCase().includes('repeat')?'var(--blue)':'var(--amber)'};">${fi(v)}</div>
          <div style="font-size:11px;color:var(--muted);">${pct(v,total)}% of this reason</div>
        </div>`).join('')}
    </div>`:''}

    <div class="two-col" style="margin-bottom:1rem;">
      <div>
        <div class="section-lbl">By market</div>
        ${sortableTbl(['Market','Count','Share%'],
          mktArr.map(([k,v])=>({cells:[k,fi(v),`${pct(v,total)}%`]})),
          ['Total',fi(total),'100%']

      <div>
