<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loss of Sale Dashboard — Apr 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f4f0;--surface:#fff;--border:rgba(0,0,0,0.09);--text:#1a1a1a;--muted:#6b6b6b;--hint:#aaa;--blue:#2a5fd4;--green:#1a9e6e;--amber:#c47a0f;--red:#c43030;--radius:12px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;gap:12px;flex-wrap:wrap;}
.brand{font-size:15px;font-weight:600;}.brand span{color:var(--blue);}
.topbar-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500;}
.pill-ok{background:#e6f5ee;color:#1a6e40;}.pill-err{background:#fdeaea;color:#a32020;}.pill-wait{background:#e6eefa;color:#2a4fb0;}
.container{max-width:1320px;margin:0 auto;padding:1.5rem 2rem 3rem;}
/* FILTER BAR */
.filter-bar{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;margin-bottom:1rem;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;}
.filter-bar label{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap;flex-shrink:0;}
.filter-bar select{font-size:11px;padding:4px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;min-width:100px;max-width:140px;flex-shrink:1;}
.filter-bar select:focus{outline:none;border-color:var(--blue);}
.filter-btn{font-size:11px;padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-weight:500;white-space:nowrap;flex-shrink:0;}
.filter-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
/* TOGGLE */
.switch{position:relative;width:38px;height:20px;flex-shrink:0;display:inline-block;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:20px;transition:.25s;}
.slider:before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;}
input:checked+.slider{background:var(--blue);}
input:checked+.slider:before{transform:translateX(18px);}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;}
.sync-on{background:#e6eefa;color:#1a3fa0;}.sync-off{background:#f0f0f0;color:var(--muted);}
/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem;width:fit-content;}
.tab-btn{padding:7px 18px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-radius:9px;cursor:pointer;transition:all .15s;}
.tab-btn.active{background:var(--blue);color:#fff;}
.tab-btn:hover:not(.active){background:var(--bg);color:var(--text);}
.pane{display:none;}.pane.active{display:block;}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;}
.metric .lbl{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.metric .val{font-size:26px;font-weight:600;line-height:1;}
.metric .sub{font-size:11px;color:var(--hint);margin-top:5px;}
.metric.blue .val{color:var(--blue);}.metric.green .val{color:var(--green);}.metric.amber .val{color:var(--amber);}.metric.red .val{color:var(--red);}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;}
/* INSIGHTS */
.insights{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:1rem;}
.insight{border-radius:var(--radius);padding:1rem 1.2rem;border-left:4px solid;}
.insight.red{background:#fff5f5;border-color:var(--red);}.insight.amber{background:#fffbf0;border-color:var(--amber);}.insight.green{background:#f0faf5;border-color:var(--green);}
.insight .i-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.insight.red .i-label{color:var(--red);}.insight.amber .i-label{color:var(--amber);}.insight.green .i-label{color:var(--green);}
.insight .i-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.insight .i-body{font-size:12px;color:var(--muted);line-height:1.5;}
.insight .i-val{font-size:22px;font-weight:600;margin-bottom:3px;}
.insight.red .i-val{color:var(--red);}.insight.amber .i-val{color:var(--amber);}.insight.green .i-val{color:var(--green);}
/* TABLE */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:2px solid var(--border);}
th{text-align:left;padding:7px 10px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--blue);}
th.sort-asc::after{content:' ▲';font-size:9px;color:var(--blue);}
th.sort-desc::after{content:' ▼';font-size:9px;color:var(--blue);}
td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px;}
tr:last-child td{border-bottom:none;}tr:hover td{background:var(--bg);}
tfoot td{border-top:2px solid var(--border);font-weight:600;background:var(--bg);}
tr.audit-red td{background:#fff5f5;}tr.audit-amber td{background:#fffbf0;}
tr.audit-red:hover td{background:#ffe8e8;}tr.audit-amber:hover td{background:#fff3d6;}
/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-hi{background:#e6f5ee;color:#1a6e40;}.badge-mid{background:#fff8e6;color:#7a4e00;}.badge-lo{background:#fdeaea;color:#a32020;}
.badge-red{background:#fdeaea;color:#a32020;}.badge-amber{background:#fff8e6;color:#7a4e00;}.badge-green{background:#e6f5ee;color:#1a6e40;}
.clickable{cursor:pointer;color:var(--blue);font-weight:600;text-decoration:underline;text-underline-offset:2px;}
.clickable:hover{color:#6b52d4;}
/* AUDIT */
.audit-legend{display:flex;gap:16px;margin-bottom:1rem;font-size:11px;}
.audit-legend span{display:flex;align-items:center;gap:5px;}
.leg-red{width:12px;height:12px;border-radius:3px;background:#fff5f5;border:2px solid var(--red);}
.leg-amber{width:12px;height:12px;border-radius:3px;background:#fffbf0;border:2px solid var(--amber);}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:94%;max-width:980px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:600;}.modal-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);margin-left:12px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1rem;}
.section-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.loading{padding:3rem;text-align:center;color:var(--muted);font-size:14px;}
.err-card{padding:1.5rem;background:#fdeaea;border-radius:var(--radius);color:#a32020;font-size:13px;margin-bottom:1rem;}
@media(max-width:700px){.insights{grid-template-columns:1fr;}.metrics{grid-template-columns:1fr 1fr;}.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Loss of Sale <span>Dashboard</span></div>
  <div class="pills" id="pills"></div>
  <div class="topbar-meta" id="topbar-meta">Loading...</div>
</div>
<div class="container">
  <!-- GLOBAL FILTER BAR — always visible -->
  <div id="global-filter-bar"></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="show('ov')">Overview</button>
    <button class="tab-btn" onclick="show('ls')">Loss of Sale</button>
    <button class="tab-btn" onclick="show('lsd')">Loss Detail</button>
    <button class="tab-btn" onclick="show('cat')">Category Analysis</button>
    <button class="tab-btn" onclick="show('audit')">Audit</button>
  </div>
  <div id="ov" class="pane active"><div class="loading">Loading...</div></div>
  <div id="ls" class="pane"><div class="loading">Loading...</div></div>
  <div id="lsd" class="pane"><div class="loading">Loading...</div></div>
  <div id="cat" class="pane"><div class="loading">Loading...</div></div>
  <div id="audit" class="pane"><div class="loading">Loading...</div></div>
</div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-title"></div><div class="modal-sub" id="modal-sub"></div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbxt8el2WpNbtl0-_isMvhUset6Jgp-l0Ln4gtzyym6UtMjjoJs6rjE4OLGxOy4DKu8s/exec';

// ── UTILS ─────────────────────────────────────────────────
function n(v){return parseFloat(v)||0;}
function fi(v){return Math.round(v).toLocaleString('en-IN');}
function fs(v){return v>=1e5?(v/1e5).toFixed(1)+'L':v>=1000?(v/1000).toFixed(1)+'K':Math.round(v)+'';}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function bc(p){return p>=40?'badge-hi':p>=25?'badge-mid':'badge-lo';}
function dayKey(d){return`2026-04-${String(d).padStart(2,'0')}`;}
function fmtDK(dk){try{const d=new Date(dk+'T00:00:00');return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});}catch{return dk;}}

// ── TAB SWITCHING ─────────────────────────────────────────
function show(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['ov','ls','lsd','cat','audit'][i]===id));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='audit')renderAudit();
  if(id==='lsd')renderLossDetail();
  if(id==='cat')renderCatAnalysis();
}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');}
function openModal(title,sub,html){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-sub').textContent=sub||'';
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
async function fetchTab(name){
  const r=await fetch(`${API}?sheet=${encodeURIComponent(name)}`,{redirect:'follow'});
  return r.json();
}
function addPill(text,cls){
  const p=document.createElement('span');p.className=`pill ${cls}`;p.textContent=text;
  document.getElementById('pills').appendChild(p);return p;
}

// ── SORTABLE TABLE ────────────────────────────────────────
let _sortState={},_tblCounter=0;
function makeSortable(tableId){
  const tbl=document.getElementById(tableId);if(!tbl)return;
  const ths=tbl.querySelectorAll('thead th');
  ths.forEach((th,ci)=>{
    th.addEventListener('click',()=>{
      const prev=_sortState[tableId]||{};
      const asc=prev.col===ci?!prev.asc:true;
      _sortState[tableId]={col:ci,asc};
      ths.forEach(h=>h.classList.remove('sort-asc','sort-desc'));
      th.classList.add(asc?'sort-asc':'sort-desc');
      const tbody=tbl.querySelector('tbody');
      const rows=[...tbody.querySelectorAll('tr')];
      rows.sort((a,b)=>{
        const av=(a.cells[ci]?.textContent||'').replace(/[₹,% ▲▼]/g,'').trim();
        const bv=(b.cells[ci]?.textContent||'').replace(/[₹,% ▲▼]/g,'').trim();
        const an=parseFloat(av),bn=parseFloat(bv);
        if(!isNaN(an)&&!isNaN(bn))return asc?an-bn:bn-an;
        return asc?av.localeCompare(bv):bv.localeCompare(av);
      });
      rows.forEach(r=>tbody.appendChild(r));
    });
  });
}
function sortableTbl(headers,rows,footerRow,rowClass){
  const id='tbl-'+(++_tblCounter);
  const html=`<div class="tw"><table id="${id}">
    <thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr${rowClass&&rowClass(r)?` class="${rowClass(r)}"`:''}>
      ${r.cells.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
    ${footerRow?`<tfoot><tr>${footerRow.map(c=>`<td>${c}</td>`).join('')}</tr></tfoot>`:''}
  </table></div>`;
  setTimeout(()=>makeSortable(id),50);
  return html;
}

// ── DATE / TIME / MOBILE ──────────────────────────────────
function toAprilDay(raw){
  if(!raw)return null;const s=String(raw).trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return(parseInt(m[1])===2026&&parseInt(m[2])===4)?parseInt(m[3]):null;
  m=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{2,4})$/);
  if(m){const mo={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12}[m[2].toLowerCase()];const yr=m[3].length===2?2000+parseInt(m[3]):parseInt(m[3]);return(mo===4&&yr===2026)?parseInt(m[1]):null;}
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return(parseInt(m[2])===4&&parseInt(m[3])===2026)?parseInt(m[1]):null;
  return null;
}
function toTimeBucket(raw){
  if(!raw)return null;const s=String(raw).trim();
  const m=s.match(/^(\d{1,2})-(\d{1,2})\s*(AM|PM)$/i);
  if(m){let h=parseInt(m[1]);const ap=m[3].toUpperCase();if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return`${String(h).padStart(2,'0')}:00-${String(h+1).padStart(2,'0')}:00`;}
  if(s&&s!=='-')return s;return null;
}
function mobStatus(val){
  if(!val||String(val).trim()===''||String(val).trim()==='-')return'missing';
  const s=String(val).replace(/\D/g,'');
  if(s.length!==10)return'invalid_length';
  if(/^(\d)\1{9}$/.test(s))return'invalid_junk';
  return'valid';
}
function normStore(s){return String(s||'').replace(/\s*\([^)]*\)\s*$/,'').trim().toUpperCase();}

// ── GLOBAL STATE ──────────────────────────────────────────
let _WK=null,_LS_ROWS=[],_LS_IDX={},_LS_DAY_MAP={},_STORE_RM={};
let _lsSyncOn=false; // toggle: false = Loss tab shows ALL data

// ── FILTER STATE — stored in object, not just DOM ─────────
let _F={dateFrom:'',dateTo:'',cluster:'',rm:'',market:'',store:'',reason:''};

function getFilters(){return{..._F};}

function setFilter(key,val){
  _F[key]=val;
  renderAll();
}
function resetFilters(){
  _F={dateFrom:'',dateTo:'',cluster:'',rm:'',market:'',store:'',reason:''};
  ['f-date-from','f-date-to','f-cluster','f-rm','f-market','f-store','f-reason'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  buildFilterBar();
  renderAll();
}

// ── PARSE WALKINS ─────────────────────────────────────────
function parseWalkins(headers,rows){
  const lh=headers.map(h=>(h||'').toLowerCase());
  let twIdx=-1,tbIdx=-1;
  for(let i=lh.length-1;i>=0;i--){if(lh[i].includes('total')&&lh[i].includes('walk')){twIdx=i;break;}}
  for(let i=lh.length-1;i>=0;i--){if(lh[i].includes('total')&&lh[i].includes('bill')&&!lh[i].includes('conv')){tbIdx=i;break;}}
  if(twIdx<0){for(let i=lh.length-1;i>=0;i--){if(lh[i].includes('walk')){twIdx=i;break;}}}
  if(tbIdx<0){for(let i=lh.length-1;i>=0;i--){if(lh[i].includes('bill')&&!lh[i].includes('conv')){tbIdx=i;break;}}}
  const INFO=8,GRP=4;const groups=[];
  for(let i=INFO;i+2<headers.length;i+=GRP){if((headers[i]||'').toLowerCase().includes('total'))break;groups.push({di:i,wi:i+1,bi:i+2});}
  const stores=rows.map(row=>{
    if(!row||!row[1])return null;
    const outlet=String(row[1]||'').trim();
    if(!outlet||outlet==='Outlet Name')return null;
    const days=groups.map(g=>{const d=toAprilDay(row[g.di]);if(!d)return null;return{dk:dayKey(d),dayNum:d,w:n(row[g.wi]),b:n(row[g.bi])};}).filter(Boolean);
    return{outlet,outletNorm:normStore(outlet),market:String(row[3]||'Unknown'),rm:String(row[4]||'Unknown'),cluster:String(row[5]||'Unknown'),region:String(row[6]||'Unknown'),type:String(row[7]||'Unknown'),totalW:twIdx>=0?n(row[twIdx]):0,totalB:tbIdx>=0?n(row[tbIdx]):0,days};
  }).filter(s=>s&&(s.totalW>0||s.totalB>0));
  const dayMap={};
  stores.forEach(s=>s.days.forEach(d=>{if(!dayMap[d.dk])dayMap[d.dk]={dk:d.dk,dayNum:d.dayNum,w:0,b:0};dayMap[d.dk].w+=d.w;dayMap[d.dk].b+=d.b;}));
  const days=Object.values(dayMap).sort((a,b)=>a.dayNum-b.dayNum);
  const rms=[...new Set(stores.map(s=>s.rm).filter(Boolean))].sort();
  const clusters=[...new Set(stores.map(s=>s.cluster).filter(Boolean))].sort();
  const markets=[...new Set(stores.map(s=>s.market).filter(Boolean))].sort();
  const dks=days.map(d=>d.dk);
  stores.forEach(s=>{_STORE_RM[s.outletNorm]=s.rm;});
  return{stores,days,rms,clusters,markets,dks};
}

// ── PARSE LOSS OF SALE ────────────────────────────────────
function parseLoss(headers,rows){
  const lh=headers.map(h=>(h||'').toLowerCase().trim());
  const ep=(exact,parts)=>{let i=lh.indexOf(exact);if(i<0)i=lh.findIndex(h=>parts.some(p=>h===p||h.includes(p)));return i;};
  _LS_IDX={
    dateIdx:   ep('date',['date']),
    reasonIdx: ep('reason',['reason','cause','remark']),
    catIdx:    ep('category',['category','cat','dept','group','segment']),
    qtyIdx:    ep('qty',['qty','quantity','nos','pcs']),
    valIdx:    ep('value',['value','amount','loss value','price']),
    storeIdx:  ep('store name',['store name','store','outlet','branch']),
    phoneIdx:  ep('phone number',['phone number','phone','mobile','contact']),
    timingIdx: ep('timing',['timing','time']),
    empIdx:    ep('employee',['employee name','employee','emp','staff','executive','se','salesperson']),
    subCatIdx: ep('product sub category',['product sub category','sub category','subcategory']),
    sizeIdx:   ep('size',['size']),styleIdx:ep('style',['style']),
    colorIdx:  ep('color',['color','colour']),polishIdx:ep('polish',['polish']),
    designIdx: ep('design number',['design number','design no','design']),
    notesIdx:  ep('notes',['notes','note','remarks']),
  };
  const{dateIdx,storeIdx,phoneIdx,timingIdx}=_LS_IDX;
  const wkDayNums=_WK.days.map(d=>d.dayNum);
  const maxWkDay=wkDayNums.length?Math.max(...wkDayNums):31;
  const minWkDay=wkDayNums.length?Math.min(...wkDayNums):1;
  _LS_ROWS=rows.map(r=>{
    const dayNum=toAprilDay(r[dateIdx]);
    const withinWk=dayNum&&dayNum>=minWkDay&&dayNum<=maxWkDay;
    const dk=dayNum?dayKey(dayNum):null; // always set dk if date parsed
    const syncedDk=withinWk?dk:null;    // syncedDk is null if beyond walkins
    const storeNorm=normStore(String(r[storeIdx]||''));
    const wkStore=_WK.stores.find(s=>s.outletNorm===storeNorm);
    const rm=_STORE_RM[storeNorm]||(wkStore?wkStore.rm:'Unknown');
    const productParts=[_LS_IDX.subCatIdx,_LS_IDX.sizeIdx,_LS_IDX.styleIdx,_LS_IDX.colorIdx,_LS_IDX.polishIdx,_LS_IDX.designIdx,_LS_IDX.notesIdx].filter(i=>i>=0).map(i=>String(r[i]||'').trim()).filter(Boolean);
    return{...r,_dk:dk,_syncedDk:syncedDk,_rm:rm,_mob:mobStatus(phoneIdx>=0?r[phoneIdx]:''),_time:toTimeBucket(timingIdx>=0?r[timingIdx]:''),_product:productParts.join(' | ')||'Unknown',_wkStore:wkStore};
  });
  // Day map uses synced dates only
  _LS_DAY_MAP={};
  _LS_ROWS.forEach(r=>{if(r._syncedDk){if(!_LS_DAY_MAP[r._syncedDk])_LS_DAY_MAP[r._syncedDk]=0;_LS_DAY_MAP[r._syncedDk]++;}});
}

// ── FILTER FUNCTIONS ──────────────────────────────────────
function dateInRange(dk,f){
  if(!dk)return false;
  if(f.dateFrom&&dk<f.dateFrom)return false;
  if(f.dateTo&&dk>f.dateTo)return false;
  return true;
}
function daysInRange(days,f){
  if(!f.dateFrom&&!f.dateTo)return days;
  return days.filter(d=>dateInRange(d.dk,f));
}

function filterStores(stores,f){
  return stores.filter(s=>
    ((!f.dateFrom&&!f.dateTo)||s.days.some(d=>dateInRange(d.dk,f)))&&
    (!f.rm||s.rm===f.rm)&&(!f.cluster||s.cluster===f.cluster)&&
    (!f.market||s.market===f.market)&&(!f.store||s.outlet===f.store)
  );
}

// filterLS: for Overview/Audit/LossDetail — always uses synced dates
function filterLS(f){
  const{storeIdx,reasonIdx}=_LS_IDX;
  return _LS_ROWS.filter(r=>{
    if(!r._syncedDk)return false;
    if(!dateInRange(r._syncedDk,f))return false;
    const wkStore=r._wkStore;
    const storeRM=wkStore?wkStore.rm:r._rm;
    if(f.rm&&storeRM!==f.rm)return false;
    if(f.cluster&&(!wkStore||wkStore.cluster!==f.cluster))return false;
    if(f.market&&(!wkStore||wkStore.market!==f.market))return false;
    if(f.store&&storeIdx>=0&&String(r[storeIdx]||'')!==f.store)return false;
    if(f.reason&&reasonIdx>=0&&String(r[reasonIdx]||'')!==f.reason)return false;
    return true;
  });
}

// filterLSTab: for Loss of Sale tab — respects toggle
function filterLSTab(f){
  const{storeIdx,reasonIdx}=_LS_IDX;
  return _LS_ROWS.filter(r=>{
    if(_lsSyncOn&&!r._syncedDk)return false;
    const dk=_lsSyncOn?r._syncedDk:r._dk;
    if(!dateInRange(dk,f))return false;
    const wkStore=r._wkStore;
    const storeRM=wkStore?wkStore.rm:r._rm;
    if(f.rm&&storeRM!==f.rm)return false;
    if(f.cluster&&(!wkStore||wkStore.cluster!==f.cluster))return false;
    if(f.market&&(!wkStore||wkStore.market!==f.market))return false;
    if(f.store&&storeIdx>=0&&String(r[storeIdx]||'')!==f.store)return false;
    if(f.reason&&reasonIdx>=0&&String(r[reasonIdx]||'')!==f.reason)return false;
    return true;
  });
}

// ── OVERVIEW ──────────────────────────────────────────────
function renderOverview(){
  const f=getFilters();
  const filtStores=filterStores(_WK.stores,f);
  const filtLS=filterLS(f);
  const{storeIdx}=_LS_IDX;

  const totalW=filtStores.reduce((s,r)=>s+(daysInRange(r.days,f).reduce((a,d)=>a+d.w,0)),0);
  const totalB=filtStores.reduce((s,r)=>s+(daysInRange(r.days,f).reduce((a,d)=>a+d.b,0)),0);
  const totalNB=totalW-totalB;
  const totalLS=filtLS.length;
  const avgConv=pct(totalB,totalW);
  const lsCov=pct(totalLS,totalNB);

  const mktMap={};
  filtStores.forEach(s=>{
    const w=daysInRange(s.days,f).reduce((a,d)=>a+d.w,0);
    const b=daysInRange(s.days,f).reduce((a,d)=>a+d.b,0);
    if(!mktMap[s.market])mktMap[s.market]={w:0,b:0,ls:0};
    mktMap[s.market].w+=w;mktMap[s.market].b+=b;
  });
  filtLS.forEach(r=>{if(r._wkStore&&mktMap[r._wkStore.market])mktMap[r._wkStore.market].ls++;});
  const mktArr=Object.entries(mktMap).sort((a,b)=>b[1].w-a[1].w);

  const filtDayMap={};
  filtStores.forEach(s=>s.days.forEach(d=>{
    if(!dateInRange(d.dk,f))return;
    if(!filtDayMap[d.dk])filtDayMap[d.dk]={dk:d.dk,dayNum:d.dayNum,w:0,b:0,ls:0};
    filtDayMap[d.dk].w+=d.w;filtDayMap[d.dk].b+=d.b;
  }));
  filtLS.forEach(r=>{if(r._syncedDk&&filtDayMap[r._syncedDk])filtDayMap[r._syncedDk].ls++;});
  const dayRows=Object.values(filtDayMap).sort((a,b)=>a.dayNum-b.dayNum);

  const mktTblRows=mktArr.map(([mkt,v])=>{const nb=v.w-v.b;const cv=pct(v.b,v.w);const lsPct=pct(v.ls,nb);
    return{cells:[`<span class="clickable" onclick="showMarketModal('${mkt.replace(/'/g,"\\'")}')">${mkt}</span>`,fi(v.w),fi(v.b),fi(nb),`<span class="badge ${bc(cv)}">${cv}%</span>`,fi(v.ls),`<span class="badge ${bc(lsPct)}">${lsPct}%</span>`]};});
  const dayTblRows=dayRows.map(d=>{const nb=d.w-d.b;const conv=pct(d.b,d.w);const lsPct=pct(d.ls,nb);
    return{cells:[`<strong>${fmtDK(d.dk)}</strong>`,fi(d.w),fi(d.b),`<span class="badge ${bc(conv)}">${conv}%</span>`,fi(nb),fi(d.ls),`<span class="badge ${bc(lsPct)}">${lsPct}%</span>`]};});

  document.getElementById('ov').innerHTML=`
    <div class="metrics">
      <div class="metric blue"><div class="lbl">Total walkins</div><div class="val">${fi(totalW)}</div><div class="sub">${filtStores.length} stores</div></div>
      <div class="metric green"><div class="lbl">Total bills</div><div class="val">${fi(totalB)}</div><div class="sub">${avgConv}% conversion</div></div>
      <div class="metric red"><div class="lbl">Non-buyers</div><div class="val">${fi(totalNB)}</div><div class="sub">walkins − bills</div></div>
      <div class="metric amber"><div class="lbl">Loss captured</div><div class="val">${fi(totalLS)}</div><div class="sub">${lsCov}% of non-buyers</div></div>
    </div>
    <div class="card"><div class="card-title">Market summary — click market for store details</div>
      ${sortableTbl(['Market','Walkins','Bills','Non-buyers','Conv%','Loss captured','Coverage%'],mktTblRows,['Total',fi(totalW),fi(totalB),fi(totalNB),`<span class="badge ${bc(avgConv)}">${avgConv}%</span>`,fi(totalLS),`<span class="badge ${bc(lsCov)}">${lsCov}%</span>`])}
    </div>
    <div class="card"><div class="card-title">Day-wise summary</div>
      ${sortableTbl(['Date','Walkins','Bills','Conv%','Non-buyers','Loss captured','Coverage%'],dayTblRows,['Total',fi(totalW),fi(totalB),`<span class="badge ${bc(avgConv)}">${avgConv}%</span>`,fi(totalNB),fi(totalLS),`<span class="badge ${bc(lsCov)}">${lsCov}%</span>`])}
    </div>`;
}

// ── CATEGORY ANALYSIS TAB ────────────────────────────────
function renderCatAnalysis(){
  const f=getFilters();
  const rows=filterLS(f);
  const total=rows.length;
  const{catIdx,reasonIdx,storeIdx,sizeIdx,styleIdx,subCatIdx,colorIdx,polishIdx,designIdx,notesIdx}=_LS_IDX;

  if(!total){
    document.getElementById('cat').innerHTML=`<div class="err-card">No loss of sale data for the selected filters.</div>`;
    return;
  }

  // ── GROUP HELPERS ─────────────────────────────────────────
  function grp(rows,getKey){
    const m={};
    rows.forEach(r=>{
      const k=String(getKey(r)||'Unknown');
      if(!m[k])m[k]={c:0,stores:new Set(),reasons:{},sizes:{},styles:{},cats:{}};
      m[k].c++;
      const store=storeIdx>=0?String(r[storeIdx]||''):'';
      if(store)m[k].stores.add(store);
      const reason=reasonIdx>=0?String(r[reasonIdx]||''):'';
      if(reason)m[k].reasons[reason]=(m[k].reasons[reason]||0)+1;
      const size=sizeIdx>=0?String(r[sizeIdx]||''):'';
      if(size)m[k].sizes[size]=(m[k].sizes[size]||0)+1;
      const style=styleIdx>=0?String(r[styleIdx]||''):'';
      if(style)m[k].styles[style]=(m[k].styles[style]||0)+1;
      const cat=catIdx>=0?String(r[catIdx]||''):'';
      if(cat)m[k].cats[cat]=(m[k].cats[cat]||0)+1;
    });
    return Object.entries(m).sort((a,b)=>b[1].c-a[1].c);
  }

  function topN(obj,n){return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n).map(([k,v])=>`${k}(${v})`).join(', ');}

  // ── MARKET → CATEGORY BREAKDOWN ──────────────────────────
  const markets=[...new Set(rows.map(r=>r._wkStore?r._wkStore.market:'Unknown').filter(Boolean))].sort();

  // Overall category summary
  const catGrp=grp(rows,r=>catIdx>=0?r[catIdx]:'Unknown');
  const reasonGrp=grp(rows,r=>reasonIdx>=0?r[reasonIdx]:'Unknown');
  const sizeGrp=grp(rows,r=>sizeIdx>=0?r[sizeIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');
  const styleGrp=grp(rows,r=>styleIdx>=0?r[styleIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');
  const subCatGrp=grp(rows,r=>subCatIdx>=0?r[subCatIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown'&&k!=='-');

  // Market wise category matrix
  const mktCatMap={};
  rows.forEach(r=>{
    const mkt=r._wkStore?r._wkStore.market:'Unknown';
    const cat=catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown';
    const reason=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';
    const size=sizeIdx>=0?String(r[sizeIdx]||''):'';
    if(!mktCatMap[mkt])mktCatMap[mkt]={total:0,cats:{},reasons:{},sizes:{}};
    mktCatMap[mkt].total++;
    mktCatMap[mkt].cats[cat]=(mktCatMap[mkt].cats[cat]||0)+1;
    mktCatMap[mkt].reasons[reason]=(mktCatMap[mkt].reasons[reason]||0)+1;
    if(size)mktCatMap[mkt].sizes[size]=(mktCatMap[mkt].sizes[size]||0)+1;
  });
  const mktArr=Object.entries(mktCatMap).sort((a,b)=>b[1].total-a[1].total);

  // Category × Reason cross table
  const allCats=[...new Set(rows.map(r=>catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown'))].filter(c=>c!=='Unknown').sort();
  const allReasons=[...new Set(rows.map(r=>reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown'))].filter(r=>r!=='Unknown').sort();
  const crossMap={};
  rows.forEach(r=>{
    const cat=catIdx>=0?String(r[catIdx]||'Unknown'):'Unknown';
    const reason=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';
    if(!crossMap[cat])crossMap[cat]={};
    crossMap[cat][reason]=(crossMap[cat][reason]||0)+1;
  });

  const prAlert=sh=>sh>=30?'<span class="badge badge-red">High</span>':sh>=15?'<span class="badge badge-amber">Medium</span>':'<span class="badge badge-green">Low</span>';
  const stAlert=sh=>sh>=10?'<span class="badge badge-red">High</span>':sh>=5?'<span class="badge badge-amber">Watch</span>':'<span class="badge badge-green">OK</span>';

  document.getElementById('cat').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="lbl">Total loss entries</div><div class="val">${fi(total)}</div><div class="sub">filtered</div></div>
      <div class="metric red"><div class="lbl">Categories affected</div><div class="val">${catGrp.length}</div></div>
      <div class="metric amber"><div class="lbl">Unique reasons</div><div class="val">${reasonGrp.length}</div></div>
      <div class="metric"><div class="lbl">Markets affected</div><div class="val">${mktArr.length}</div></div>
    </div>

    <!-- MARKET × CATEGORY TABLE -->
    <div class="card">
      <div class="card-title">Market-wise category impact — click market for drill-down</div>
      ${sortableTbl(
        ['Market','Total loss','Top category','Top category%','Top reason','Top reason%','Top size'],
        mktArr.map(([mkt,v])=>{
          const topCat=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
          const topReason=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
          const topSize=Object.entries(v.sizes).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[
            `<span class="clickable" onclick="showCatMarketModal('${mkt.replace(/'/g,"\\'")}')">${mkt}</span>`,
            fi(v.total),
            topCat?topCat[0]:'—',
            topCat?`<span class="badge ${topCat[1]/v.total>=.3?'badge-red':topCat[1]/v.total>=.15?'badge-amber':'badge-green'}">${pct(topCat[1],v.total)}%</span>`:'—',
            topReason?topReason[0]:'—',
            topReason?`<span class="badge ${topReason[1]/v.total>=.3?'badge-red':topReason[1]/v.total>=.15?'badge-amber':'badge-green'}">${pct(topReason[1],v.total)}%</span>`:'—',
            topSize?`${topSize[0]} (${topSize[1]})`:'—'

      )}
    </div>

    <!-- CATEGORY SUMMARY -->
    <div class="card">
      <div class="card-title">Overall loss by category — click for market breakdown</div>
      ${sortableTbl(
        ['Category','Count','Stores affected','Top reason','Top size','Top style','Share%','Alert'],
        catGrp.map(([k,v])=>{
          const sh=pct(v.c,total);
          const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
          const topSz=Object.entries(v.sizes).sort((a,b)=>b[1]-a[1])[0];
          const topSt=Object.entries(v.styles).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[
            `<span class="clickable" onclick="showCatDetailModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,
            fi(v.c),fi(v.stores.size),
            topR?topR[0]:'—',
            topSz?`${topSz[0]}(${topSz[1]})`:'—',
            topSt?`${topSt[0]}(${topSt[1]})`:'—',
            `${sh}%`,prAlert(sh)
          ]};
        }),
        ['Total',fi(total),'','','','','100%','']
      )}
    </div>

    <!-- REASON SUMMARY -->
    <div class="card">
      <div class="card-title">Overall loss by reason — why customers are not buying</div>
      ${sortableTbl(
        ['Reason','Count','Stores affected','Top category','Top size','Share%','Alert'],
        reasonGrp.map(([k,v])=>{
          const sh=pct(v.c,total);
          const topC=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
          const topSz=Object.entries(v.sizes).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[
            k,fi(v.c),fi(v.stores.size),
            topC?topC[0]:'—',
            topSz?`${topSz[0]}(${topSz[1]})`:'—',
            `${sh}%`,prAlert(sh)
          ]};
        }),

    <!-- SIZE ANALYSIS -->

      <div class="card-title">Size-wise loss analysis</div>
      ${sortableTbl(
        ['Size','Count','Top category','Top reason','Share%','Alert'],

          const sh=pct(v.c,total);
          const topC=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
          const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[k,fi(v.c),topC?topC[0]:'—',topR?topR[0]:'—',`${sh}%`,prAlert(sh)]};
        }),
        ['Total',fi(total),'','','100%','']
      )}

    <!-- STYLE ANALYSIS -->
    ${styleGrp.length?`<div class="card">
      <div class="card-title">Style-wise loss analysis</div>
      ${sortableTbl(
        ['Style','Count','Top category','Top reason','Share%','Alert'],

          const topC=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
          const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
          return{cells:[k,fi(v.c),topC?topC[0]:'—',topR?topR[0]:'—',`${sh}%`,prAlert(sh)]};

    <!-- SUB CATEGORY ANALYSIS -->
    ${subCatGrp.length?`<div class="card">
      <div class="card-title">Product sub-category loss analysis</div>

        ['Sub Category','Count','Top reason','Top size','Share%','Alert'],
        subCatGrp.map(([k,v])=>{

// ── AUDIT TAB ─────────────────────────────────────────────
function renderAudit(){
  const f=getFilters();
  const filtStores=filterStores(_WK.stores,f);
  const filtLS=filterLS(f);
  const{storeIdx,reasonIdx,phoneIdx,subCatIdx,sizeIdx,styleIdx,colorIdx,polishIdx,designIdx,notesIdx}=_LS_IDX;

  const storeAudit=filtStores.map(s=>{
    const w=daysInRange(s.days,f).reduce((a,d)=>a+d.w,0);
    const b=daysInRange(s.days,f).reduce((a,d)=>a+d.b,0);
    const nb=w-b;
    const lsRows=filtLS.filter(r=>normStore(String(r[storeIdx]||''))===s.outletNorm);
    const ls=lsRows.length;const lsCov=pct(ls,nb);
    const badM=lsRows.filter(r=>r._mob!=='valid').length;const mobPct=pct(badM,ls||1);
    const rMap={};lsRows.forEach(r=>{const k=reasonIdx>=0?String(r[reasonIdx]||'Unknown'):'Unknown';rMap[k]=(rMap[k]||0)+1;});
    const topReason=Object.entries(rMap).sort((a,b)=>b[1]-a[1])[0];
    const topReasonPct=topReason?pct(topReason[1],ls||1):0;
    return{outlet:s.outlet,market:s.market,rm:s.rm,w,b,nb,ls,lsCov,badM,mobPct,topReason:topReason?topReason[0]:'—',topReasonPct};
  }).sort((a,b)=>a.lsCov-b.lsCov);

// ── DAY-WISE LOSS TABLE HELPER ────────────────────────────
function dayWiseLSTable(lsRows,wkDayMap){
  // lsRows = filtered loss rows, wkDayMap = {dk: {w,b}} from walkins
  const dayLS={};
  lsRows.forEach(r=>{if(r._syncedDk){if(!dayLS[r._syncedDk])dayLS[r._syncedDk]=0;dayLS[r._syncedDk]++;}});
  const allDks=[...new Set([...Object.keys(wkDayMap||{}),...Object.keys(dayLS)])].sort();
  if(!allDks.length)return'<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No day-wise data.</p>';
  const total=lsRows.length;
  const rows=allDks.map(dk=>{
    const ls=dayLS[dk]||0;
    const wk=wkDayMap?wkDayMap[dk]:null;
    const nb=wk?wk.w-wk.b:0;
    const cov=pct(ls,nb);
    return{cells:[`<strong>${fmtDK(dk)}</strong>`,wk?fi(wk.w):'—',wk?fi(wk.b):'—',wk?fi(nb):'—',fi(ls),`${pct(ls,total)}%`,nb>0?`<span class="badge ${bc(cov)}">${cov}%</span>`:'—']};
  });
  const totLS=Object.values(dayLS).reduce((s,v)=>s+v,0);
  const totW=wkDayMap?Object.values(wkDayMap).reduce((s,v)=>s+v.w,0):0;
  const totB=wkDayMap?Object.values(wkDayMap).reduce((s,v)=>s+v.b,0):0;
  const totNB=totW-totB;
  return sortableTbl(['Date','Walkins','Bills','Non-buyers','Loss captured','Share%','Coverage%'],rows,['Total',fi(totW),fi(totB),fi(totNB),fi(totLS),'100%',`<span class="badge ${bc(pct(totLS,totNB))}">${pct(totLS,totNB)}%</span>`]);
}

// Build wkDayMap from a list of walkins store objects
function buildWkDayMap(wkStores,f){
  const m={};
  wkStores.forEach(s=>daysInRange(s.days,f).forEach(d=>{
    if(!m[d.dk])m[d.dk]={w:0,b:0};
    m[d.dk].w+=d.w;m[d.dk].b+=d.b;
  }));
  return m;
}

  const total=rows.length;
  const m={};
  rows.forEach(r=>{const k=storeIdx>=0?String(r[storeIdx]||'Unknown'):'Unknown';if(!m[k])m[k]={c:0,reasons:{},cats:{}};m[k].c++;const reason=reasonIdx>=0?String(r[reasonIdx]||''):'';if(reason)m[k].reasons[reason]=(m[k].reasons[reason]||0)+1;const cat=catIdx>=0?String(r[catIdx]||''):'';if(cat)m[k].cats[cat]=(m[k].cats[cat]||0)+1;});
  const sGrp=Object.entries(m).sort((a,b)=>b[1].c-a[1].c);
  const mktStores=filterStores(_WK.stores,{...f,market});
  const wkDayMap=buildWkDayMap(mktStores,f);
  const storeRows=sGrp.map(([k,v])=>{
    const topR=Object.entries(v.reasons).sort((a,b)=>b[1]-a[1])[0];
    const topC=Object.entries(v.cats).sort((a,b)=>b[1]-a[1])[0];
    const wkStore=_WK.stores.find(s=>s.outlet===k||s.outletNorm===normStore(k));
    const wkDays=wkStore?(daysInRange(wkStore.days,f)):[];
    const stW=wkDays.reduce((s,d)=>s+d.w,0),stB=wkDays.reduce((s,d)=>s+d.b,0),stNB=stW-stB;
    return{cells:[`<span class="clickable" onclick="showStoreModal('${k.replace(/'/g,"\\'")}')">${k}</span>`,rows.find(r=>String(r[storeIdx]||'')===k)?._rm||'—',fi(stW),fi(stB),fi(stNB),`<span class="badge ${bc(pct(stB,stW))}">${pct(stB,stW)}%</span>`,fi(v.c),`${pct(v.c,stNB||1)}%`,topR?topR[0]:'—',topC?topC[0]:'—']};
  });
  openModal(`Market: ${market} — store detail`,`${sGrp.length} stores · ${fi(total)} loss entries`,`
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.25rem;">
      <div class="metric amber"><div class="lbl">Loss entries</div><div class="val">${fi(total)}</div></div>
      <div class="metric"><div class="lbl">Stores</div><div class="val">${sGrp.length}</div></div>
      ${qtyIdx>=0?`<div class="metric red"><div class="lbl">Qty lost</div><div class="val">${fi(rows.reduce((s,r)=>s+n(r[qtyIdx]),0))}</div></div>`:''}
    </div>
    <div class="section-lbl">Store-wise detail</div>
    ${sortableTbl(['Store','RM','Walkins','Bills','Non-buyers','Conv%','Loss','Coverage%','Top reason','Top category'],storeRows,null)}
    <div class="section-lbl" style="margin-top:1.25rem;">Day-wise loss captured</div>
    ${dayWiseLSTable(rows,wkDayMap)}`);
};

window.showStoreModal=function(storeName){
  const f=getFilters();
  const{storeIdx,reasonIdx,catIdx,qtyIdx,valIdx,empIdx}=_LS_IDX;
  const rows=filterLS(f).filter(r=>String(r[storeIdx]||'')===storeName||normStore(String(r[storeIdx]||''))===normStore(storeName));
  const total=rows.length;
  const wkStore=_WK.stores.find(s=>s.outlet===storeName||s.outletNorm===normStore(storeName));
  const days=wkStore?(daysInRange(wkStore.days,f)):[];
  const stW=days.reduce((s,d)=>s+d.w,0),stB=days.reduce((s,d)=>s+d.b,0),stNB=stW-stB;
  // Build day map for this store
  const storeWkDayMap={};
  days.forEach(d=>{storeWkDayMap[d.dk]={w:d.w,b:d.b};});
  function grpS(getKey){const m={};rows.forEach(r=>{const k=String(getKey(r)||'Unknown');if(!m[k])m[k]={c:0};m[k].c++;});return Object.entries(m).sort((a,b)=>b[1].c-a[1].c);}
  const byReason=grpS(r=>reasonIdx>=0?r[reasonIdx]:'Unknown');
  const byCat=grpS(r=>catIdx>=0?r[catIdx]:'Unknown');
  const byEmp=grpS(r=>empIdx>=0?r[empIdx]:'Unknown').filter(([k])=>k&&k!=='Unknown');
  const byTime=grpS(r=>r._time).filter(([k])=>k&&k!=='Unknown');
  const validM=rows.filter(r=>r._mob==='valid').length,invL=rows.filter(r=>r._mob==='invalid_length').length,invJ=rows.filter(r=>r._mob==='invalid_junk').length,missM=rows.filter(r=>r._mob==='missing').length;
  const mini=(arr,lbl)=>arr.length?`<table style="width:100%;border-collapse:collapse;">
    <thead><tr><th style="${ths}">${lbl}</th><th style="${ths}">Count</th><th style="${ths}">%</th></tr></thead>
    <tbody>${arr.map(([k,v])=>`<tr><td style="${mts}">${k}</td><td style="${mts}font-weight:600">${fi(v.c)}</td><td style="${mts}">${pct(v.c,total)}%</td></tr>`).join('')}</tbody>
    <tfoot><tr><td style="${mts}font-weight:600">Total</td><td style="${mts}font-weight:600">${fi(total)}</td><td style="${mts}">100%</td></tr></tfoot>
  </table>`:`<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No data</p>`;
  openModal(storeName,wkStore?`${wkStore.market} · ${wkStore.rm} · ${wkStore.type}`:'',`
    <div class="metrics" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1.25rem;">
      <div class="metric blue"><div class="lbl">Walkins</div><div class="val">${fi(stW)}</div></div>
      <div class="metric green"><div class="lbl">Bills</div><div class="val">${fi(stB)}</div><div class="sub">${pct(stB,stW)}% conv</div></div>
      <div class="metric red"><div class="lbl">Non-buyers</div><div class="val">${fi(stNB)}</div></div>
      <div class="metric amber"><div class="lbl">Loss captured</div><div class="val">${fi(total)}</div><div class="sub">${pct(total,stNB)}% coverage</div></div>
    </div>
    <div style="background:#fff5f5;border-left:4px solid var(--red);border-radius:8px;padding:.85rem 1rem;margin-bottom:1.25rem;">
      <div style="font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;margin-bottom:.5rem;">📱 Phone number quality</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px;">
        <div><strong style="color:var(--green)">${fi(validM)}</strong> valid (${pct(validM,total||1)}%)</div>
        <div><strong style="color:var(--red)">${fi(invL)}</strong> wrong length</div>
        <div><strong style="color:var(--red)">${fi(invJ)}</strong> junk numbers</div>
        <div><strong style="color:var(--amber)">${fi(missM)}</strong> missing</div>
      </div>
    </div>
    <div class="section-lbl">Day-wise loss captured</div>
    ${dayWiseLSTable(rows,storeWkDayMap)}
    <div class="two-col" style="margin-top:1rem;">
      <div><div class="section-lbl">Loss by reason</div>${mini(byReason,'Reason')}</div>
      <div><div class="section-lbl">Loss by category</div>${mini(byCat,'Category')}</div>
    </div>
    <div class="two-col">
      <div><div class="section-lbl">⏰ Loss by timing</div>${mini(byTime,'Time slot')}</div>
      <div><div class="section-lbl">👤 Loss by employee</div>${byEmp.length?mini(byEmp,'Employee'):`<p style="color:var(--muted);font-size:12px;padding:.5rem 0;">No employee data found.</p>`}</div>
    </div>`);
};

// ── INIT ──────────────────────────────────────────────────
async function init(){
  const wkPill=addPill('Walkins — loading...','pill-wait');
  const lsPill=addPill('Loss of Sale — loading...','pill-wait');
  try{
    const wkRaw=await fetchTab('Walkins from Yallappa');
    _WK=parseWalkins(wkRaw.headers,wkRaw.rows);
    const lastWkDay=_WK.days.length?_WK.days[_WK.days.length-1]:null;
    wkPill.className='pill pill-ok';
    wkPill.textContent=`Walkins — ${_WK.stores.length} stores · till ${lastWkDay?fmtDK(lastWkDay.dk):'—'}`;
  }catch(e){wkPill.className='pill pill-err';wkPill.textContent='Walkins — error: '+e.message;}
  try{
    const lsRaw=await fetchTab('Loss of sale data APR');
    parseLoss(lsRaw.headers,lsRaw.rows);
    const totalLS=Object.values(_LS_DAY_MAP).reduce((s,v)=>s+v,0);
    const lastWkDay=_WK&&_WK.days.length?_WK.days[_WK.days.length-1]:null;
    lsPill.className='pill pill-ok';
    lsPill.textContent=`Loss of Sale — ${lsRaw.rows.length} total · ${totalLS} synced till ${lastWkDay?fmtDK(lastWkDay.dk):'—'}`;
  }catch(e){lsPill.className='pill pill-err';lsPill.textContent='Loss of Sale — error: '+e.message;}

  if(_WK&&_LS_ROWS.length){
    buildFilterBar();
    renderAll();
  }else if(_WK){
    buildFilterBar();
    renderOverview();
  }
  const lastWkDay=_WK&&_WK.days.length?_WK.days[_WK.days.length-1]:null;
  document.getElementById('topbar-meta').textContent=`Apr 2026 · Walkins & Loss synced till ${lastWkDay?fmtDK(lastWkDay.dk):'—'} · Live`;
}
init();
</script>
